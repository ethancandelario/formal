<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Form Runtime</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #f7f5f2;
      --panel: #ffffff;
      --panel-2: #f4f2ef;
      --ink: #1f1f1f;
      --muted: #5f6366;
      --line: #d7d2cb;
      --accent: #861f41;
      --accent-soft: #f3e8ed;
      --accent-2: #ca4f00;
      --success: #2e7d32;
      --warning: #946200;
      --danger: #b3261e;
      --success-soft: rgba(46, 125, 50, 0.12);
      --warning-soft: rgba(148, 98, 0, 0.12);
      --danger-soft: rgba(179, 38, 30, 0.12);
      --focus: #861f41;
      --form-font-family: "Roboto", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --sidebar: #2f3033;
      --sidebar-2: #383a3d;
      --sidebar-line: #4a4d50;
      --shadow: 0 12px 28px rgba(31, 31, 31, 0.07);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --focus-ring: rgba(134, 31, 65, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "Roboto", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
    }

    #app {
      min-height: 100vh;
    }

    .runtime-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 236px minmax(0, 1fr);
      position: relative;
      transition: grid-template-columns 240ms var(--ease);
    }

    .runtime-shell.sidebar-collapsed {
      grid-template-columns: 56px minmax(0, 1fr);
    }

    .runtime-sidebar {
      min-width: 0;
      height: 100vh;
      max-height: 100vh;
      position: sticky;
      top: 0;
      align-self: start;
      color: #f7f5f2;
      background: var(--sidebar);
      border-right: 1px solid var(--sidebar-line);
      padding: 14px 10px;
      overflow-x: hidden;
      overflow-y: auto;
      transition: padding 240ms var(--ease), border-color 180ms ease;
    }

    .runtime-sidebar-content {
      min-width: 216px;
      min-height: calc(100vh - 28px);
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: opacity 150ms ease, transform 240ms var(--ease);
      will-change: opacity, transform;
    }

    .runtime-shell.sidebar-collapsed .runtime-sidebar {
      padding-left: 8px;
      padding-right: 8px;
      border-right-color: var(--sidebar-line);
      overflow: hidden;
    }

    .runtime-shell.sidebar-collapsed .runtime-sidebar-content {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-14px);
    }

    .runtime-sidebar-head {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 10px;
    }

    .sidebar-title {
      color: #d7d2cb;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .sidebar-actions,
    .runtime-sidebar-footer {
      display: grid;
      gap: 8px;
    }

    .runtime-sidebar-footer {
      margin-top: auto;
    }

    .icon-button.sidebar-expand-button {
      position: absolute;
      top: 14px;
      left: 8px;
      z-index: 16;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-10px) scale(0.96);
      box-shadow: 0 8px 18px rgba(31, 31, 31, 0.12);
      background: var(--sidebar-2);
      border-color: var(--sidebar-line);
      color: #f4f2ef;
      transition: opacity 150ms ease, transform 240ms var(--ease), background 160ms ease, border-color 160ms ease;
    }

    .icon-button.sidebar-expand-button:hover {
      background: #424548;
      border-color: #666a6d;
      color: #ffffff;
    }

    .runtime-shell.sidebar-collapsed .sidebar-expand-button {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0) scale(1);
    }

    .button,
    .icon-button,
    .select {
      min-height: 40px;
      border-radius: 8px;
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #ffffff;
      color: var(--ink);
      padding: 0 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 750;
      line-height: 1;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .button:hover,
    .icon-button:hover,
    .select:hover {
      background: var(--panel-2);
      border-color: #cbc5b6;
    }

    .button:focus-visible,
    .icon-button:focus-visible,
    .select:focus-visible,
    .poll-option:focus-visible,
    .meter-option:focus-visible,
    .star-option:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .button:active,
    .icon-button:active {
      transform: translateY(1px);
    }

    .button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .button.primary:hover {
      background: #6f1936;
      border-color: #6f1936;
    }

    .button:disabled,
    .icon-button:disabled,
    .select:disabled {
      opacity: 0.46;
      cursor: not-allowed;
      transform: none;
    }

    .button.full,
    .select {
      width: 100%;
    }

    .icon-button {
      width: 40px;
      padding: 0;
      flex: 0 0 auto;
    }

    .runtime-sidebar .button,
    .runtime-sidebar .icon-button,
    .runtime-sidebar .select {
      border-color: var(--sidebar-line);
      color: #f4f2ef;
      background: var(--sidebar-2);
    }

    .runtime-sidebar .button:hover,
    .runtime-sidebar .icon-button:hover,
    .runtime-sidebar .select:hover {
      background: #424548;
      border-color: #666a6d;
    }

    .runtime-sidebar .button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .runtime-sidebar .button.primary:hover {
      background: #6f1936;
      border-color: #6f1936;
    }

    .runtime-sidebar .button.full:not(.primary) {
      justify-content: flex-start;
    }

    .runtime-sidebar .button.full:not(.primary) i {
      width: 16px;
      text-align: center;
    }

    .select-wrap {
      position: relative;
    }

    .select {
      appearance: none;
      display: block;
      height: 40px;
      padding-right: 32px;
      outline: none;
    }

    .select-icon {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: #d7d2cb;
      pointer-events: none;
    }

    .select-label {
      color: #d7d2cb;
      font-size: 11.5px;
      font-weight: 700;
    }

    .stage {
      min-width: 0;
      padding: 24px 16px 46px;
      color: var(--ink);
      background: var(--bg);
      font-family: var(--form-font-family);
      transition: padding 240ms var(--ease);
    }

    .runtime-shell.sidebar-collapsed .stage {
      padding-left: 16px;
    }

    .capture {
      max-width: 860px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .form-header {
      padding: 24px 28px 22px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .form-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.18;
    }

    .form-description {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    .fields {
      display: grid;
      gap: 12px;
      padding: 16px;
      align-content: start;
      grid-auto-rows: max-content;
    }

    .field {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 16px;
      display: grid;
      gap: 10px;
      align-self: start;
      animation: field-in 160ms var(--ease) both;
      transition: border-color 150ms ease, box-shadow 150ms ease, transform 160ms var(--ease);
    }

    .field:hover {
      transform: translateY(-1px);
    }

    .field.media-field.no-outline {
      border-color: transparent;
      background: transparent;
      padding: 0;
    }

    .field.media-field.no-outline:hover,
    .headline-field:not(.with-outline):hover {
      transform: none;
    }

    .headline-field {
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 8px 12px;
      display: grid;
      gap: 7px;
      align-self: start;
      animation: field-in 160ms var(--ease) both;
      transition: border-color 150ms ease, box-shadow 150ms ease, transform 160ms var(--ease);
    }

    .headline-field.with-outline {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 16px;
    }

    .headline-field.with-outline:hover {
      transform: translateY(-1px);
    }

    .headline-title {
      margin: 0;
      color: var(--ink);
      font-size: 28px;
      line-height: 1.18;
      overflow-wrap: anywhere;
    }

    .headline-description {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .field.invalid {
      border-color: rgba(134, 31, 65, 0.7);
      box-shadow: 0 0 0 3px rgba(134, 31, 65, 0.08);
    }

    .field-head {
      display: grid;
      gap: 4px;
    }

    .field-label {
      font-weight: 750;
      line-height: 1.35;
      font-size: 15px;
    }

    .required-mark {
      color: var(--accent-2);
      margin-left: 3px;
    }

    .field-help {
      color: var(--muted);
      line-height: 1.5;
      font-size: 13px;
    }

    .control,
    .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--ink);
      padding: 9px 10px;
      min-height: 40px;
      font-size: 14px;
      outline: none;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .textarea {
      min-height: 104px;
      resize: vertical;
      line-height: 1.5;
    }

    .control:focus,
    .textarea:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(134, 31, 65, 0.12);
      background: #ffffff;
    }

    .choice-list {
      display: grid;
      gap: 8px;
    }

    .choice-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: var(--ink);
      line-height: 1.45;
      font-size: 14px;
    }

    .choice-row input {
      width: 17px;
      height: 17px;
      margin-top: 1px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    .poll-grid,
    .meter-grid,
    .star-grid {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .poll-option,
    .meter-option,
    .star-option {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 10px;
      background: var(--panel-2);
      color: var(--ink);
      cursor: pointer;
      font-size: 14px;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .poll-option:hover,
    .meter-option:hover,
    .star-option:hover {
      transform: translateY(-1px);
      border-color: #cbc5b6;
      background: #ffffff;
    }

    .meter-option,
    .star-option {
      width: 40px;
      min-height: 40px;
      padding: 0;
    }

    .poll-option {
      min-height: 40px;
    }

    .poll-option.selected,
    .meter-option.selected,
    .star-option.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
      box-shadow: 0 4px 12px rgba(134, 31, 65, 0.08);
    }

    .star-option.selected i {
      font-weight: 900;
    }

    .range-wrap {
      display: grid;
      grid-template-columns: auto minmax(160px, 1fr) auto auto;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .linear-scale-control {
      position: relative;
      min-width: 160px;
      min-height: 40px;
      display: grid;
      align-items: center;
    }

    .linear-scale-track {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 8px;
      transform: translateY(-50%);
      border-radius: 999px;
      background: #d7d2cb;
      overflow: hidden;
      pointer-events: none;
    }

    .linear-scale-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      pointer-events: none;
    }

    .linear-scale-thumb {
      position: absolute;
      top: 50%;
      width: 18px;
      height: 18px;
      border: 2px solid var(--accent);
      border-radius: 999px;
      background: #ffffff;
      transform: translate(-50%, -50%);
      box-shadow: 0 3px 8px rgba(31, 31, 31, 0.13);
      pointer-events: none;
    }

    .linear-scale-native {
      position: absolute;
      inset: 0;
      width: 100%;
      min-height: 40px;
      opacity: 0;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .range-wrap input[type="range"] {
      width: 100%;
      min-height: 40px;
      accent-color: var(--accent);
    }

    .range-value {
      color: var(--ink);
      font-weight: 750;
      min-width: 36px;
      text-align: center;
    }

    .radar-wrap {
      display: grid;
      grid-template-columns: minmax(240px, 300px) minmax(260px, 340px);
      align-items: center;
      justify-content: center;
      gap: 28px;
      min-width: 0;
      max-width: 760px;
      margin: 0 auto;
    }

    .radar-wrap.point-mode {
      grid-template-columns: minmax(240px, 300px) minmax(260px, 340px);
    }

    .radar-point-inner {
      display: contents;
    }

    .radar-chart {
      width: min(300px, 100%);
      min-width: 0;
      justify-self: center;
      align-self: center;
      contain: layout paint;
    }

    .radar-chart svg {
      width: 100%;
      max-width: 300px;
      height: auto;
      display: block;
      margin: 0 auto;
      overflow: visible;
      touch-action: none;
    }

    .radar-grid polygon,
    .radar-grid line {
      fill: none;
      stroke: #c9c4bd;
      stroke-width: 1;
    }

    .radar-fill {
      fill: rgba(134, 31, 65, 0.12);
      stroke: var(--accent);
      stroke-width: 2;
    }

    .radar-point-line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-dasharray: 4 5;
    }

    .radar-free-hit {
      fill: transparent;
      cursor: pointer;
      pointer-events: all;
    }

    .radar-label {
      fill: var(--muted);
      font-size: 11px;
    }

    .radar-hit {
      fill: none;
      stroke: transparent;
      stroke-width: 24;
      cursor: pointer;
      pointer-events: stroke;
    }

    .radar-handle {
      fill: #ffffff;
      stroke: var(--accent);
      stroke-width: 2.4;
      cursor: grab;
      filter: drop-shadow(0 3px 6px rgba(31, 31, 31, 0.14));
      transition: fill 140ms ease, stroke-width 140ms ease;
    }

    .radar-handle:hover,
    .radar-handle:focus {
      fill: var(--accent-soft);
      stroke-width: 3;
      outline: none;
    }

    .radar-handle:active {
      cursor: grabbing;
    }

    .radar-values {
      width: 100%;
      min-width: 0;
      max-width: 340px;
      display: grid;
      gap: 7px;
      justify-self: stretch;
      align-self: center;
      contain: paint;
    }

    .radar-values.point-readout {
      min-height: 124px;
      align-content: center;
    }

    .radar-value-row {
      display: grid;
      grid-template-columns: minmax(86px, max-content) minmax(0, 1fr);
      align-items: start;
      gap: 9px;
      color: var(--muted);
      font-size: 13px;
      min-height: 36px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .radar-values.point-readout .radar-value-row {
      grid-template-columns: 68px minmax(0, 1fr);
    }

    .radar-value-row span {
      min-width: 0;
      color: var(--muted);
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .radar-value {
      min-width: 0;
      max-width: none;
      text-align: left;
      color: var(--ink);
      font-weight: 750;
      line-height: 1.35;
      border-radius: 8px;
      background: #ffffff;
      padding: 2px 8px;
      overflow-wrap: anywhere;
      white-space: normal;
    }

    .field-error {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 700;
    }

    .link-preview {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      text-decoration: none;
      max-width: 100%;
      overflow-wrap: anywhere;
    }



    .calendar-preview,
    .calendar-control {
      display: grid;
      gap: 10px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      padding: 10px;
    }

    .calendar-preview-head,
    .calendar-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .calendar-month-label {
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calendar-preview-dates,
    .calendar-date-inputs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .calendar-date-chip,
    .calendar-date-field {
      min-width: 0;
      display: grid;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 8px;
    }

    .calendar-date-chip span,
    .calendar-date-field span {
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 750;
    }

    .calendar-date-chip strong {
      min-width: 0;
      color: var(--ink);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 3px;
    }

    .calendar-weekday {
      color: var(--muted);
      font-size: 10.5px;
      font-weight: 800;
      text-align: center;
      user-select: none;
    }

    .calendar-day,
    .calendar-day-button {
      position: relative;
      min-width: 0;
      min-height: 30px;
      display: grid;
      place-items: center;
      border: 1px solid transparent;
      border-radius: 7px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      background: #ffffff;
      font-variant-numeric: tabular-nums;
    }

    .calendar-day.is-outside,
    .calendar-day-button.is-outside {
      color: #a6a09a;
      background: rgba(255, 255, 255, 0.54);
    }

    .calendar-day.is-range,
    .calendar-day-button.is-range {
      border-color: rgba(134, 31, 65, 0.16);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .calendar-day.is-boundary,
    .calendar-day-button.is-boundary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .calendar-day.is-milestone::after,
    .calendar-day-button.is-milestone::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 4px;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: var(--accent-2);
      transform: translateX(-50%);
    }

    .calendar-milestone-list,
    .calendar-milestone-editor {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .calendar-milestone-editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .calendar-milestone-empty {
      color: var(--muted);
      font-size: 12px;
    }

    .calendar-milestone-empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.52);
    }

    .calendar-milestone-item {
      min-width: 0;
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12.5px;
    }

    .calendar-milestone-date {
      color: var(--accent-2);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .calendar-milestone-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calendar-milestone-row {
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr) auto;
      gap: 5px;
      align-items: center;
    }


    .calendar-date-field .control {
      background: var(--panel-2);
    }

    .calendar-day-button {
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .calendar-day-button:hover {
      border-color: #cbc5b6;
      background: #ffffff;
      transform: translateY(-1px);
    }

    .calendar-day-button.is-boundary:hover {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .calendar-day-button.is-boundary {
      cursor: grab;
    }

    .calendar-day-button.is-dragging {
      cursor: grabbing;
      box-shadow: 0 0 0 3px rgba(134, 31, 65, 0.12);
    }

    .calendar-nav-buttons {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .button.ghost {
      background: transparent;
    }

    .media-preview,
    .media-upload-preview {
      display: grid;
      gap: 8px;
      min-width: 0;
      color: var(--muted);
    }

    .media-content-wrap {
      display: flex;
      width: 100%;
      min-width: 0;
    }

    .media-visual {
      display: block;
      max-width: 100%;
      border: 0;
      border-radius: 8px;
      background: transparent;
      object-fit: contain;
    }

    .media-preview img.media-visual,
    .media-upload-preview img.media-visual,
    .media-preview video.media-visual,
    .media-upload-preview video.media-visual,
    .media-preview object.media-visual,
    .media-upload-preview object.media-visual {
      width: 100%;
    }

    .media-preview audio.media-visual,
    .media-upload-preview audio.media-visual {
      width: 100%;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .media-embed {
      width: 100%;
      min-height: 180px;
      border: 0;
      border-radius: 8px;
      background: transparent;
    }

    .media-placeholder {
      min-height: 78px;
      display: grid;
      place-items: center;
      border: 1px dashed #b8b2aa;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      color: var(--muted);
      user-select: none;
    }

    .media-caption {
      margin: 0;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .media-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      overflow-wrap: anywhere;
    }

    .field.spacer-field {
      border: 0;
      background: transparent;
      padding: 0 16px;
      box-shadow: none;
      pointer-events: none;
      user-select: none;
    }

    .field.spacer-field:hover {
      transform: none;
    }

    .spacer-preview {
      min-height: 8px;
      display: flex;
      align-items: center;
      width: 100%;
      user-select: none;
    }

    .spacer-line {
      width: 100%;
      border: 0;
      border-top: 1px solid var(--line);
      margin: 0;
      pointer-events: none;
      user-select: none;
    }

    .empty {
      min-height: 360px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 22px;
      user-select: none;
      animation: field-in 160ms var(--ease) both;
    }

    .empty-inner {
      display: grid;
      gap: 8px;
      justify-items: center;
    }

    .empty-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: #8b8f92;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes field-in {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 780px) {
      .runtime-shell,
      .runtime-shell.sidebar-collapsed {
        grid-template-columns: 1fr;
      }

      .runtime-sidebar {
        height: auto;
        max-height: none;
        position: static;
        border-right: 0;
        border-bottom: 1px solid var(--sidebar-line);
        display: grid;
        grid-template-rows: 1fr;
        overflow: hidden;
        transition: grid-template-rows 260ms var(--ease), padding 240ms var(--ease), border-color 180ms ease;
      }

      .runtime-sidebar-content {
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }

      .runtime-shell.sidebar-collapsed .runtime-sidebar {
        grid-template-rows: 0fr;
        padding-top: 0;
        padding-bottom: 0;
        border-bottom-color: transparent;
        border-right-color: transparent;
        overflow: hidden;
      }

      .stage {
        padding: 12px 10px 34px;
      }

      .runtime-shell.sidebar-collapsed .stage {
        padding: 60px 10px 34px;
      }

      .form-header {
        padding: 20px 16px;
      }

      .form-title {
        font-size: 23px;
      }

      .fields {
        padding: 10px;
      }

      .field {
        padding: 12px;
      }

      .range-wrap {
        grid-template-columns: 1fr;
      }

      .radar-wrap {
        grid-template-columns: 1fr;
        gap: 14px;
        max-width: 360px;
      }

      .radar-chart {
        width: min(300px, 100%);
      }

      .radar-values {
        width: 100%;
        max-width: none;
        justify-self: stretch;
      }

      .radar-value-row,
      .radar-values.point-readout .radar-value-row {
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .radar-values.point-readout .radar-value {
        max-width: 220px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { h, render } from "https://esm.sh/preact@10.23.1";
    import { useEffect, useRef, useState } from "https://esm.sh/preact@10.23.1/hooks";
    import htm from "https://esm.sh/htm@3.1.1";

    const html = htm.bind(h);
    const BUILDER_STORAGE_KEY = "formal.builder.schema";
    const RADAR_MIN_VALUE = 1;
    const DEFAULT_RADAR_AXES = ["formal", "reserved", "vibrant", "casual"];
    const DEFAULT_RADAR_MAX = 5;
    const DEFAULT_RADAR_VALUES = [3, 3, 3, 3];
    const DEFAULT_RADAR_POINT = { angle: 0, value: 3 };
    const DEFAULT_THEME = {
      bg: "#f7f5f2",
      panel: "#ffffff",
      panel2: "#f4f2ef",
      ink: "#1f1f1f",
      muted: "#5f6366",
      line: "#d7d2cb",
      accent: "#861f41",
      accent2: "#ca4f00",
      accentSoft: "#f3e8ed",
      success: "#2e7d32",
      warning: "#946200",
      danger: "#b3261e",
      fontFamily: '"Roboto", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif'
    };
    const RADAR_AXIS_SNAP_ENTER_PX = 8;
    const RADAR_AXIS_SNAP_EXIT_PX = 14;
    const RADAR_RING_SNAP_ENTER_PX = 5;
    const RADAR_RING_SNAP_EXIT_PX = 10;
    const RADAR_AXIS_SNAP_MIN_RADIUS_PX = 18;

    const fieldTypes = {
      headline: { label: "Headline" },
      short_answer: { label: "Short answer" },
      long_answer: { label: "Long answer" },
      multiple_choice: { label: "Multiple choice" },
      checkbox: { label: "Checkbox" },
      email: { label: "Email" },
      number: { label: "Number" },
      calendar: { label: "Calendar" },
      poll: { label: "Poll" },
      mood_meter: { label: "Mood meter" },
      linear_scale: { label: "Linear scale" },
      star_rating: { label: "Star rating" },
      radar: { label: "Radar" },
      media_upload: { label: "Media upload" },
      media: { label: "Media" },
      spacer: { label: "Spacer" },
      link: { label: "Link" }
    };

    function uid() {
      return "field_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function cleanColor(value, fallback) {
      const text = String(value || "").trim();
      return /^#[0-9a-f]{6}$/i.test(text) ? text : fallback;
    }

    function cleanFontFamily(value) {
      const text = String(value || "").trim();
      if (!text) return DEFAULT_THEME.fontFamily;
      return /^[a-zA-Z0-9_\-\s"',.()]+$/.test(text) ? text : DEFAULT_THEME.fontFamily;
    }

    function unquoteFontName(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      return text.replace(/^['"]|['"]$/g, "").trim();
    }

    function fontNameFromStack(value) {
      const first = cleanFontFamily(value).split(",")[0] || "";
      const name = unquoteFontName(first);
      return /^(ui-sans-serif|system-ui|-apple-system|BlinkMacSystemFont)$/i.test(name) ? "System UI" : name || "Roboto";
    }

    function googleFontParam(family) {
      return encodeURIComponent(String(family || "").trim()).replace(/%20/g, "+");
    }

    function googleFontFamilyFromStack(value) {
      const family = fontNameFromStack(value);
      return family && family !== "System UI" ? family : "";
    }

    function ensureGoogleFontLoaded(value) {
      const family = googleFontFamilyFromStack(value);
      if (!family) return;
      const id = `google-font-${family.toLowerCase().replace(/[^a-z0-9]+/g, "-")}`;
      if (document.getElementById(id)) return;
      const link = document.createElement("link");
      link.id = id;
      link.rel = "stylesheet";
      link.href = `https://fonts.googleapis.com/css2?family=${googleFontParam(family)}:wght@400;500;700;900&display=swap`;
      document.head.appendChild(link);
    }

    function normalizeTheme(input = {}) {
      const theme = { ...DEFAULT_THEME, ...(input || {}) };
      return {
        bg: cleanColor(theme.bg, DEFAULT_THEME.bg),
        panel: cleanColor(theme.panel, DEFAULT_THEME.panel),
        panel2: cleanColor(theme.panel2, DEFAULT_THEME.panel2),
        ink: cleanColor(theme.ink, DEFAULT_THEME.ink),
        muted: cleanColor(theme.muted, DEFAULT_THEME.muted),
        line: cleanColor(theme.line, DEFAULT_THEME.line),
        accent: cleanColor(theme.accent, DEFAULT_THEME.accent),
        accent2: cleanColor(theme.accent2, DEFAULT_THEME.accent2),
        accentSoft: cleanColor(theme.accentSoft, DEFAULT_THEME.accentSoft),
        success: cleanColor(theme.success, DEFAULT_THEME.success),
        warning: cleanColor(theme.warning, DEFAULT_THEME.warning),
        danger: cleanColor(theme.danger, DEFAULT_THEME.danger),
        fontFamily: cleanFontFamily(theme.fontFamily)
      };
    }

    function hexToRgba(hex, alpha) {
      const clean = cleanColor(hex, DEFAULT_THEME.accent).slice(1);
      const value = parseInt(clean, 16);
      const r = (value >> 16) & 255;
      const g = (value >> 8) & 255;
      const b = value & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function themeStyle(schema) {
      const theme = normalizeTheme(schema?.settings?.theme);
      return [
        `--bg: ${theme.bg}`,
        `--panel: ${theme.panel}`,
        `--panel-2: ${theme.panel2}`,
        `--ink: ${theme.ink}`,
        `--muted: ${theme.muted}`,
        `--line: ${theme.line}`,
        `--accent: ${theme.accent}`,
        `--accent-2: ${theme.accent2}`,
        `--accent-soft: ${theme.accentSoft}`,
        `--success: ${theme.success}`,
        `--warning: ${theme.warning}`,
        `--danger: ${theme.danger}`,
        `--success-soft: ${hexToRgba(theme.success, 0.12)}`,
        `--warning-soft: ${hexToRgba(theme.warning, 0.12)}`,
        `--danger-soft: ${hexToRgba(theme.danger, 0.12)}`,
        `--focus: ${theme.accent}`,
        `--focus-ring: ${hexToRgba(theme.accent, 0.28)}`,
        `--form-font-family: ${theme.fontFamily}`
      ].join("; ");
    }

    function sanitizeId(value) {
      const clean = String(value || "").replace(/[^a-zA-Z0-9_-]/g, "_");
      return clean || uid();
    }

    function uniqueId(value, seen) {
      const base = sanitizeId(value);
      let next = base;
      let count = 2;
      while (seen.has(next)) {
        next = base + "_" + count;
        count += 1;
      }
      seen.add(next);
      return next;
    }

    function settingNumber(value, fallback) {
      const text = String(value ?? "").trim();
      if (!text) return fallback;
      const number = Number(text);
      return Number.isFinite(number) ? number : fallback;
    }

    function clampSettingNumber(value, fallback, min, max, round = false) {
      const number = settingNumber(value, fallback);
      const clamped = Math.max(min, Math.min(max, number));
      return round ? Math.round(clamped) : clamped;
    }

    function normalizeRadarAxes(axes) {
      const source = Array.isArray(axes) ? axes : DEFAULT_RADAR_AXES;
      const normalized = source.map((axis) => String(axis || "").trim()).filter(Boolean);
      return normalized.length ? normalized : DEFAULT_RADAR_AXES;
    }

    function normalizeRadarMode(mode) {
      return mode === "point" ? "point" : "shape";
    }

    function normalizeRadarMax(value) {
      const number = settingNumber(value, DEFAULT_RADAR_MAX);
      return Math.max(RADAR_MIN_VALUE + 1, Math.round(number));
    }

    function clampRadarValue(value, max) {
      const number = settingNumber(value, Number.NaN);
      if (!Number.isFinite(number)) return null;
      return Math.max(RADAR_MIN_VALUE, Math.min(max, Math.round(number)));
    }

    function normalizeRadarValues(values, axes, max) {
      const midpoint = Math.round(RADAR_MIN_VALUE + (max - RADAR_MIN_VALUE) / 2);
      const source = Array.isArray(values) ? values : DEFAULT_RADAR_VALUES;
      return axes.map((_, index) => clampRadarValue(source[index], max) ?? midpoint);
    }

    function normalizeRadarAngle(value) {
      const number = settingNumber(value, DEFAULT_RADAR_POINT.angle);
      const wrapped = ((number % 360) + 360) % 360;
      return Math.round(wrapped * 100) / 100;
    }

    function clampRadarPointValue(value, max) {
      const number = settingNumber(value, Number.NaN);
      if (!Number.isFinite(number)) return null;
      return Math.round(Math.max(RADAR_MIN_VALUE, Math.min(max, number)) * 100) / 100;
    }

    function normalizeRadarPoint(point, max) {
      const source = point && typeof point === "object" && !Array.isArray(point) ? point : DEFAULT_RADAR_POINT;
      return {
        angle: normalizeRadarAngle(source.angle),
        value: clampRadarPointValue(source.value, max) ?? clampRadarPointValue(DEFAULT_RADAR_POINT.value, max) ?? RADAR_MIN_VALUE
      };
    }

    function defaultSchema() {
      return {
        version: 4,
        settings: { theme: clone(DEFAULT_THEME) },
        fields: []
      };
    }



    function padDatePart(value) {
      return String(value).padStart(2, "0");
    }

    function isoFromDate(date) {
      return [date.getFullYear(), padDatePart(date.getMonth() + 1), padDatePart(date.getDate())].join("-");
    }

    function dateFromISO(value) {
      const text = String(value || "").trim();
      if (!/^\d{4}-\d{2}-\d{2}$/.test(text)) return null;
      const [year, month, day] = text.split("-").map(Number);
      const date = new Date(year, month - 1, day);
      if (date.getFullYear() !== year || date.getMonth() !== month - 1 || date.getDate() !== day) return null;
      return date;
    }

    function cleanDate(value) {
      const date = dateFromISO(value);
      return date ? isoFromDate(date) : "";
    }

    function todayISO() {
      return isoFromDate(new Date());
    }

    function addDays(value, amount) {
      const date = dateFromISO(value) || new Date();
      date.setDate(date.getDate() + amount);
      return isoFromDate(date);
    }

    function dateTime(value) {
      const date = dateFromISO(value);
      return date ? date.getTime() : null;
    }

    function readableDate(value) {
      const date = dateFromISO(value);
      return date ? date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) : "Not set";
    }

    function monthStartFromDate(value) {
      const date = dateFromISO(value) || new Date();
      return new Date(date.getFullYear(), date.getMonth(), 1);
    }

    function monthLabel(date) {
      return date.toLocaleDateString(undefined, { month: "long", year: "numeric" });
    }

    function calendarGridDates(monthDate) {
      const first = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());
      return Array.from({ length: 42 }, (_, index) => {
        const date = new Date(start);
        date.setDate(start.getDate() + index);
        return date;
      });
    }

    function normalizeCalendarMilestones(items) {
      const source = Array.isArray(items) ? items : [];
      return source
        .map((item, index) => ({
          id: sanitizeId(item?.id || `milestone_${index + 1}`),
          date: cleanDate(item?.date),
          label: String(item?.label || "").trim()
        }))
        .filter((item) => item.date || item.label)
        .sort((a, b) => (dateTime(a.date) ?? Number.MAX_SAFE_INTEGER) - (dateTime(b.date) ?? Number.MAX_SAFE_INTEGER) || a.label.localeCompare(b.label));
    }

    function normalizeCalendarSettings(field) {
      const settings = field?.settings || {};
      let startDate = cleanDate(settings.startDate);
      let endDate = cleanDate(settings.endDate);
      if (startDate && endDate && dateTime(endDate) < dateTime(startDate)) {
        [startDate, endDate] = [endDate, startDate];
      }
      return {
        startDate,
        endDate,
        allowMilestones: settings.allowMilestones !== false,
        milestones: normalizeCalendarMilestones(settings.milestones)
      };
    }


    function normalizeCalendarValue(value, settings) {
      const source = value && typeof value === "object" && !Array.isArray(value) ? value : {};
      let startDate = cleanDate(source.startDate ?? settings.startDate);
      let endDate = cleanDate(source.endDate ?? settings.endDate);
      if (startDate && endDate && dateTime(endDate) < dateTime(startDate)) {
        [startDate, endDate] = [endDate, startDate];
      }
      return {
        startDate,
        endDate,
        milestones: settings.allowMilestones ? normalizeCalendarMilestones(source.milestones ?? settings.milestones) : []
      };
    }

    function calendarMonthKey(value) {
      const date = dateFromISO(value) || new Date();
      return `${date.getFullYear()}-${padDatePart(date.getMonth() + 1)}`;
    }

    function monthFromKey(key) {
      const [year, month] = String(key || "").split("-").map(Number);
      if (!Number.isFinite(year) || !Number.isFinite(month)) return monthStartFromDate(todayISO());
      return new Date(year, month - 1, 1);
    }

    function shiftMonthKey(key, amount) {
      const date = monthFromKey(key);
      date.setMonth(date.getMonth() + amount);
      return calendarMonthKey(isoFromDate(date));
    }

    function normalizeSpacerSettings(field) {
      const settings = field?.settings || {};
      const style = ["solid", "dashed", "dotted"].includes(settings.lineStyle) ? settings.lineStyle : "solid";
      return {
        height: clampSettingNumber(settings.height, 32, 0, 240, true),
        showLine: Boolean(settings.showLine),
        lineStyle: style,
        lineThickness: clampSettingNumber(settings.lineThickness, 1, 1, 12, true)
      };
    }

    function normalizeLinearScaleSettings(field) {
      const settings = field?.settings || {};
      let min = settingNumber(settings.min, 1);
      let max = settingNumber(settings.max, 10);
      if (max < min) [min, max] = [max, min];
      if (max === min) max = min + 1;
      return {
        min,
        max,
        minLabel: Object.prototype.hasOwnProperty.call(settings, "minLabel") ? String(settings.minLabel ?? "") : "Low",
        maxLabel: Object.prototype.hasOwnProperty.call(settings, "maxLabel") ? String(settings.maxLabel ?? "") : "High"
      };
    }

    function normalizeStarRatingSettings(field) {
      const settings = field?.settings || {};
      return { max: clampSettingNumber(settings.max, 5, 3, 10, true) };
    }

    function spacerStyle(settings) {
      const normalized = normalizeSpacerSettings({ settings });
      return `height: ${normalized.height}px;`;
    }

    function spacerLineStyle(settings) {
      const normalized = normalizeSpacerSettings({ settings });
      return `border-top-width: ${normalized.lineThickness}px; border-top-style: ${normalized.lineStyle};`;
    }

    function normalizeField(raw) {
      const type = fieldTypes[raw?.type] ? raw.type : "short_answer";
      const next = {
        id: sanitizeId(raw?.id || uid()),
        type,
        label: Object.prototype.hasOwnProperty.call(raw || {}, "label") ? String(raw.label ?? "") : fieldTypes[type].label,
        description: String(raw?.description || ""),
        required: Boolean(raw?.required),
        placeholder: String(raw?.placeholder || ""),
        options: Array.isArray(raw?.options) ? raw.options.map(String) : [],
        settings: { ...(raw?.settings || {}) }
      };

      if (!next.options.length && ["multiple_choice", "checkbox", "poll"].includes(type)) {
        next.options = ["Option 1", "Option 2"];
      }

      if (type === "linear_scale") {
        next.settings = normalizeLinearScaleSettings(next);
      }

      if (type === "mood_meter") {
        next.settings = { minLabel: "Low", maxLabel: "High", ...next.settings };
      }

      if (type === "star_rating") {
        next.settings = normalizeStarRatingSettings(next);
      }

      if (type === "radar") {
        const settings = { mode: "shape", max: DEFAULT_RADAR_MAX, axes: DEFAULT_RADAR_AXES, defaultValues: DEFAULT_RADAR_VALUES, defaultPoint: DEFAULT_RADAR_POINT, ...next.settings };
        const mode = normalizeRadarMode(settings.mode);
        const max = normalizeRadarMax(settings.max);
        const axes = normalizeRadarAxes(settings.axes);
        next.settings = {
          mode,
          max,
          axes,
          defaultValues: normalizeRadarValues(settings.defaultValues, axes, max),
          defaultPoint: normalizeRadarPoint(settings.defaultPoint, max)
        };
      }

      if (type === "headline") {
        next.required = false;
        next.placeholder = "";
        next.options = [];
        next.settings = headlineSettings(next);
      }

      if (type === "calendar") {
        next.settings = normalizeCalendarSettings(next);
      }

      if (type === "media_upload") {
        next.settings = { accept: "image/*,video/*,audio/*,.svg,.pdf", ...next.settings };
      }

      if (type === "media") {
        next.required = false;
        next.settings = mediaSettings(next);
      }

      if (type === "spacer") {
        next.required = false;
        next.label = "";
        next.description = "";
        next.placeholder = "";
        next.options = [];
        next.settings = normalizeSpacerSettings(next);
      }

      return next;
    }

    function normalizeSchema(input) {

                onPointerCancel=${handlePointerUp}
              />
              <line class="radar-point-line" x1=${center} y1=${center} x2=${handlePoint.x} y2=${handlePoint.y} />

                aria-valuenow=${formatRadarNumber(current.value)}

                onPointerDown=${handlePointerDown}
                onPointerMove=${handlePointerMove}

                onPointerCancel=${handlePointerUp}
                onKeyDown=${handleKeyDown}

                const point = radarPoint(index, labels.length, center, radius + 24);
                const anchor = Math.abs(point.x - center) < 8 ? "middle" : point.x > center ? "start" : "end";
                return html`<text class="radar-label" x=${point.x} y=${point.y} text-anchor=${anchor} dominant-baseline="middle">${label}</text>`;

    function fieldLabelText(field) {
      return String(field?.label ?? "").trim();
    }

    function fieldAccessibleName(field) {
      return fieldLabelText(field) || fieldTypes[field?.type]?.label || "Field";
    }

    function FieldShell({ field, invalid, children }) {
      const visibleLabel = fieldLabelText(field);
      const labelId = visibleLabel ? field.id + "_label" : null;
      const helpId = field.description ? field.id + "_help" : null;
      const errorId = invalid ? field.id + "_error" : null;
      const hasHead = Boolean(visibleLabel || field.description);
      const typeClass = field.type ? ` ${String(field.type).replace(/_/g, "-")}-field` : "";
      const outlineClass = field.type === "media" && mediaSettings(field).outline === false ? " no-outline" : "";
      return html`
        <section class=${`field${typeClass}${outlineClass}${invalid ? " invalid" : ""}`} data-field-wrap=${field.id} aria-invalid=${invalid ? "true" : null} aria-describedby=${[helpId, errorId].filter(Boolean).join(" ") || null}>
          ${hasHead ? html`
            <div class="field-head">
              ${visibleLabel ? html`<label class="field-label" id=${labelId} for=${field.id}>${visibleLabel}${field.required ? html`<span class="required-mark">*</span>` : null}</label>` : null}
              ${field.description ? html`<div class="field-help" id=${helpId}>${field.description}</div>` : null}
            </div>
          ` : null}
          ${children}
          ${invalid ? html`<div class="field-error" id=${errorId} role="alert"><i class="fa-solid fa-circle-exclamation" aria-hidden="true"></i><span>Required field</span></div>` : null}
        </section>
      `;
    }



    function CalendarInput({ field, value, invalid, onValue, labelProps, describedBy }) {
      const settings = normalizeCalendarSettings(field);
      const current = normalizeCalendarValue(value, settings);
      const anchorDate = current.startDate || current.endDate || settings.startDate || settings.endDate || todayISO();
      const [viewMonth, setViewMonth] = useState(() => calendarMonthKey(anchorDate));
      const [draggingBoundary, setDraggingBoundary] = useState(null);
      const suppressClickRef = useRef(false);
      const monthDate = monthFromKey(viewMonth);
      const month = monthDate.getMonth();
      const startTime = dateTime(current.startDate);
      const endTime = dateTime(current.endDate);
      const hasRange = startTime !== null && endTime !== null;
      const milestoneDates = new Set(current.milestones.map((item) => item.date).filter(Boolean));
      const rangeStart = hasRange ? Math.min(startTime, endTime) : startTime;
      const rangeEnd = hasRange ? Math.max(startTime, endTime) : endTime;

      useEffect(() => {
        if (anchorDate) setViewMonth(calendarMonthKey(anchorDate));
      }, [anchorDate]);

      useEffect(() => {
        if (!draggingBoundary) return undefined;
        function stopDragging() {
          setDraggingBoundary(null);
          window.setTimeout(() => {
            suppressClickRef.current = false;
          }, 0);
        }
        window.addEventListener("mouseup", stopDragging);
        return () => window.removeEventListener("mouseup", stopDragging);
      }, [draggingBoundary]);

      function commit(patch) {
        onValue(normalizeCalendarValue({ ...current, ...patch }, settings));
      }

      function updateStart(raw) {
        const startDate = cleanDate(raw);
        let endDate = current.endDate;
        if (startDate && endDate && dateTime(endDate) < dateTime(startDate)) endDate = startDate;
        commit({ startDate, endDate });
      }

      function updateEnd(raw) {
        const endDate = cleanDate(raw);
        let startDate = current.startDate;
        if (startDate && endDate && dateTime(endDate) < dateTime(startDate)) startDate = endDate;
        commit({ startDate, endDate });
      }

      function boundaryForDate(iso) {
        if (iso === current.startDate && iso === current.endDate) return "end";
        if (iso === current.startDate) return "start";
        if (iso === current.endDate) return "end";
        return "";
      }

      function dragBoundary(boundary, iso) {
        setViewMonth(calendarMonthKey(iso));
        if (boundary === "start") {
          let endDate = current.endDate;
          if (endDate && dateTime(endDate) < dateTime(iso)) endDate = iso;
          commit({ startDate: iso, endDate });
        } else {
          let startDate = current.startDate || iso;
          if (dateTime(iso) < dateTime(startDate)) startDate = iso;
          commit({ startDate, endDate: iso });
        }
      }

      function pickDate(iso) {
        setViewMonth(calendarMonthKey(iso));
        if (!current.startDate || current.endDate) {
          commit({ startDate: iso, endDate: "" });
          return;
        }
        if (dateTime(iso) < dateTime(current.startDate)) {
          commit({ startDate: iso, endDate: current.startDate });
        } else {
          commit({ endDate: iso });
        }
      }

      function updateMilestone(index, patch) {
        const milestones = current.milestones.map((item, itemIndex) => itemIndex === index ? { ...item, ...patch } : item);
        commit({ milestones });
      }

      function removeMilestone(index) {
        commit({ milestones: current.milestones.filter((_, itemIndex) => itemIndex !== index) });
      }

      function addMilestone() {
        commit({ milestones: [...current.milestones, { id: uid(), date: current.startDate || todayISO(), label: "Milestone " + (current.milestones.length + 1) }] });

              <button class="icon-button" type="button" title="Next month" aria-label="Next month" onClick=${() => setViewMonth(shiftMonthKey(viewMonth, 1))}><i class="fa-solid fa-chevron-right"></i></button>

            ${["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map((day) => html`<div class="calendar-weekday" key=${day}>${day}</div>`)}
          </div>
          <div class="calendar-grid">
            ${calendarGridDates(monthDate).map((date) => {
              const iso = isoFromDate(date);
              const time = date.getTime();
              const inRange = rangeStart !== null && rangeEnd !== null && time >= rangeStart && time <= rangeEnd;
              const isBoundary = iso === current.startDate || iso === current.endDate;
              const isOutside = date.getMonth() !== month;
              const isMilestone = milestoneDates.has(iso);
              const boundary = boundaryForDate(iso);
              return html`
                <button
                  class=${`calendar-day-button${isOutside ? " is-outside" : ""}${inRange ? " is-range" : ""}${isBoundary ? " is-boundary" : ""}${draggingBoundary === boundary && boundary ? " is-dragging" : ""}${isMilestone ? " is-milestone" : ""}`}
                  type="button"
                  key=${iso}
                  onMouseDown=${(event) => {
                    if (!boundary) return;
                    event.preventDefault();
                    suppressClickRef.current = true;
                    setDraggingBoundary(boundary);
                  }}
                  onMouseEnter=${() => draggingBoundary && dragBoundary(draggingBoundary, iso)}
                  onMouseUp=${() => {
                    if (draggingBoundary) dragBoundary(draggingBoundary, iso);
                    setDraggingBoundary(null);

            <div class="calendar-milestone-editor">
              <div class="calendar-milestone-editor-head">
                <div class="mini-label">Milestones</div>
              </div>
              ${current.milestones.length ? current.milestones.map((item, index) => html`
                <div class="calendar-milestone-row" key=${item.id || index}>

                  <input class="control" value=${item.label} placeholder="Milestone name" aria-label=${`Milestone ${index + 1} label`} onInput=${(event) => updateMilestone(index, { label: event.currentTarget.value })} />
                  <button class="icon-button danger" type="button" title="Remove milestone" aria-label="Remove milestone" onClick=${() => removeMilestone(index)}><i class="fa-solid fa-xmark"></i></button>
                </div>

              <button class="button ghost" type="button" onClick=${addMilestone}><i class="fa-solid fa-plus"></i><span>Add milestone</span></button>
            </div>
          ` : null}
        </div>
      `;
    }

    function decodeSchemaToken(token) {
      const base64 = String(token || "").replace(/-/g, "+").replace(/_/g, "/");
      const padded = base64 + "=".repeat((4 - base64.length % 4) % 4);
      const binary = atob(padded);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return JSON.parse(new TextDecoder().decode(bytes));
    }

    function schemaTokenFromPath() {
      const segment = window.location.pathname.replace(/\/+$/g, "").split("/").pop() || "";
      if (!segment || segment.includes(".") || segment.length < 16) return "";
      return segment;
    }

    function inlineSchemaFromLocation() {
      try {
        const params = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(window.location.hash.slice(1));
        const token = params.get("s") || hashParams.get("s") || schemaTokenFromPath();
        if (token) return decodeSchemaToken(token);

        const legacySchema = hashParams.get("schema");
        return legacySchema ? JSON.parse(legacySchema) : null;
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    function RuntimeApp() {
      const [schema, setSchemaState] = useState(null);
      const [values, setValues] = useState({});
      const [invalidIds, setInvalidIds] = useState(new Set());
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
      const [exportFormat, setExportFormat] = useState("pdf");
      const [exporting, setExporting] = useState(false);
      const captureRef = useRef(null);

      function setLoadedSchema(nextSchema) {
        const normalized = normalizeSchema(nextSchema);
        setSchemaState(normalized);
        setValues(initialValuesFor(normalized));
        setInvalidIds(new Set());
      }

      useEffect(() => {
        document.title = schema ? schemaDisplayName(schema) + " - Form Runtime" : "Form Runtime";
      }, [schema]);

      useEffect(() => {
        if (schema) ensureGoogleFontLoaded(normalizeTheme(schema?.settings?.theme).fontFamily);
      }, [schema]);

      useEffect(() => {
        async function bootstrap() {
          const params = new URLSearchParams(window.location.search);
          const schemaUrl = params.get("schema");
          const previewMode = params.get("preview") === "1";

          if (window.FORM_SCHEMA) {
            setLoadedSchema(window.FORM_SCHEMA);
            return;
          }

          const inlineSchema = inlineSchemaFromLocation();
          if (inlineSchema) {
            setLoadedSchema(inlineSchema);
            return;
          }

          if (previewMode) {
            try {
              const builderSchema = localStorage.getItem(BUILDER_STORAGE_KEY);
              if (builderSchema) {
                setLoadedSchema(JSON.parse(builderSchema));
                return;
              }
            } catch (error) {
              console.warn(error);
            }
          }

          if (schemaUrl) {
            try {
              const response = await fetch(schemaUrl);
              if (!response.ok) throw new Error("Unable to load schema");
              setLoadedSchema(await response.json());
              return;
            } catch (error) {
              console.error(error);
              window.alert("The schema URL could not be loaded.");
            }
          }

          setSchemaState(null);
          setValues({});
          setInvalidIds(new Set());
        }

        bootstrap();
      }, []);

      useEffect(() => {
        function prevent(event) {
          event.preventDefault();
        }

        async function drop(event) {
          event.preventDefault();
          const file = [...event.dataTransfer.files].find((item) => item.type === "application/json" || item.name.endsWith(".json"));
          if (!file) return;
          try {
            setLoadedSchema(JSON.parse(await file.text()));
          } catch (error) {
            window.alert("That JSON file could not be loaded.");
            console.error(error);
          }
        }

        document.addEventListener("dragover", prevent);
        document.addEventListener("drop", drop);
        return () => {
          document.removeEventListener("dragover", prevent);
          document.removeEventListener("drop", drop);
        };
      }, []);

      async function importSchema(event) {
        const file = event.currentTarget.files?.[0];
        if (!file) return;
        try {
          setLoadedSchema(JSON.parse(await file.text()));
        } catch (error) {
          window.alert("That JSON file could not be loaded.");
          console.error(error);
        } finally {
          event.currentTarget.value = "";
        }
      }

      function updateValue(id, value) {
        setValues((current) => ({ ...current, [id]: value }));
        setInvalidIds((current) => {
          const next = new Set(current);
          next.delete(id);
          return next;
        });
      }

      function resetForm() {
        if (!schema) return;
        setValues(initialValuesFor(schema));
        setInvalidIds(new Set());
      }

      function validateRequired() {
        if (!schema) return false;
        const invalid = new Set();
        schema.fields.forEach((field) => {
          if (!field.required || field.type === "headline" || field.type === "media" || field.type === "spacer") return;
          const value = values[field.id];
          const emptyArray = Array.isArray(value) && value.length === 0;
          const emptyMediaObject = field.type === "media_upload" && typeof value === "object" && value && !Array.isArray(value) && !value.dataUrl;
          const emptyCalendar = field.type === "calendar" && (!value || !value.startDate || !value.endDate);
          if (value === undefined || value === null || value === "" || emptyArray || emptyMediaObject || emptyCalendar) invalid.add(field.id);
        });
        setInvalidIds(invalid);
        if (invalid.size) {
          setTimeout(() => document.querySelector(".field.invalid")?.scrollIntoView({ behavior: "smooth", block: "center" }), 0);
          return false;
        }
        return true;
      }

      async function exportFilledForm(kind) {
        if (!schema || exporting || !captureRef.current || !validateRequired()) return;

        setExporting(true);
        try {
          if (document.fonts?.ready) await document.fonts.ready;
          const canvas = await html2canvas(captureRef.current, {
            scale: 2,
            backgroundColor: normalizeTheme(schema?.settings?.theme).bg,
            useCORS: true,
            logging: false
          });

          if (kind === "pdf") {
            exportPdf(canvas);
          } else {
            const mime = kind === "jpg" ? "image/jpeg" : "image/png";
            const dataUrl = canvas.toDataURL(mime, 0.94);
            downloadDataUrl(dataUrl, safeFileName(schemaDisplayName(schema)) + "." + kind);
          }
        } finally {
          setExporting(false);
        }
      }

      function exportPdf(canvas) {
        const pdfCtor = window.jspdf?.jsPDF;
        if (!pdfCtor) {
          window.alert("PDF export library did not load.");
          return;
        }

        const pdf = new pdfCtor("p", "pt", "a4");
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        const margin = 28;
        const imgWidth = pageWidth - margin * 2;
        const imgHeight = canvas.height * imgWidth / canvas.width;
        const imgData = canvas.toDataURL("image/png");

        let position = margin;
        let remaining = imgHeight;
        pdf.addImage(imgData, "PNG", margin, position, imgWidth, imgHeight);
        remaining -= pageHeight - margin * 2;

        while (remaining > 0) {
          pdf.addPage();
          position = margin - (imgHeight - remaining);
          pdf.addImage(imgData, "PNG", margin, position, imgWidth, imgHeight);
          remaining -= pageHeight - margin * 2;
        }

        pdf.save(safeFileName(schemaDisplayName(schema)) + ".pdf");
      }

      function downloadDataUrl(dataUrl, fileName) {
        const link = document.createElement("a");
        link.href = dataUrl;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
      }

      const exportIcon = exportFormat === "pdf"
        ? "fa-regular fa-file-lines"
        : exportFormat === "jpg"
          ? "fa-regular fa-file-image"
          : "fa-regular fa-image";

      return html`
        <div class=${`runtime-shell${sidebarCollapsed ? " sidebar-collapsed" : ""}`}>
          <button class="icon-button sidebar-expand-button" type="button" title="Expand sidebar" aria-label="Expand sidebar" aria-hidden=${!sidebarCollapsed} tabIndex=${sidebarCollapsed ? 0 : -1} onClick=${() => setSidebarCollapsed(false)}>
            <i class="fa-solid fa-chevron-right"></i>
          </button>

          <aside class="runtime-sidebar" aria-label="Runtime actions" aria-hidden=${sidebarCollapsed} inert=${sidebarCollapsed ? "" : null}>
            <div class="runtime-sidebar-content">
              <div>
                <div class="runtime-sidebar-head">
                  <button class="icon-button" type="button" title="Collapse sidebar" aria-label="Collapse sidebar" onClick=${() => setSidebarCollapsed(true)}>
                    <i class="fa-solid fa-chevron-left"></i>
                  </button>
                </div>
                <div class="sidebar-actions">
                  <label class="button full" for="schemaFile"><i class="fa-regular fa-folder-open"></i><span>Open schema</span></label>
                  <input class="sr-only" id="schemaFile" type="file" accept="application/json,.json" onChange=${importSchema} />
                  <button class="button full" type="button" disabled=${!schema} onClick=${resetForm}><i class="fa-solid fa-rotate-left"></i><span>Reset answers</span></button>
                </div>
              </div>

              <div class="runtime-sidebar-footer">
                <label class="select-label" for="exportFormat">Save as</label>
                <div class="select-wrap">
                  <select class="select" id="exportFormat" value=${exportFormat} disabled=${!schema || exporting} onChange=${(event) => setExportFormat(event.currentTarget.value)}>
                    <option value="pdf">PDF</option>
                    <option value="png">PNG</option>
                    <option value="jpg">JPG</option>
                  </select>
                  <i class="select-icon fa-solid fa-chevron-down" aria-hidden="true"></i>
                </div>
                <button class="button primary full" type="button" data-export disabled=${!schema || exporting} onClick=${() => exportFilledForm(exportFormat)}>
                  <i class=${exportIcon}></i><span>${exporting ? "Preparing" : "Download"}</span>
                </button>
              </div>
            </div>
          </aside>

          <main class="stage" style=${schema ? themeStyle(schema) : ""}>
            <section class="capture" ref=${captureRef}>
              ${schema ? html`
                <div class="fields">
                  ${schema.fields.length
                    ? schema.fields.map((field) => html`
                      <${RuntimeField}
                        key=${field.id}
                        field=${field}
                        value=${values[field.id]}
                        invalid=${invalidIds.has(field.id)}
                        onValue=${(value) => updateValue(field.id, value)}
                      />
                    `)
                    : html`<div class="empty"><strong>Blank form</strong></div>`}
                </div>
              ` : html`
                <div class="empty">
                  <div class="empty-inner">
                    <span class="empty-icon"><i class="fa-regular fa-file-code"></i></span>
                    <strong>No schema loaded</strong>
                  </div>
                </div>
              `}
            </section>
          </main>
        </div>
      `;
    }

    render(html`<${RuntimeApp} />`, document.getElementById("app"));
  </script>
</body>
</html>
