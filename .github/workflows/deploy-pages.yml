name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Pages artifact
        shell: bash
        run: |
          set -euo pipefail

          rm -rf _site
          mkdir -p _site
          cp form-builder.html _site/index.html
          cp form-runtime.html _site/form-runtime.html

          demo_manifest="_site/demo-manifest.txt"
          {
            echo "# Published demo pages"
            echo
          } > "$demo_manifest"

          shopt -s nullglob
          for file in demo/*.html; do
            name="$(basename "$file" .html)"
            mkdir -p "_site/$name"
            cp "$file" "_site/$name/index.html"
            echo "/$name/" >> "$demo_manifest"
          done

          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
