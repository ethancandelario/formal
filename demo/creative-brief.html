<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #f7f5f2;
      --panel: #ffffff;
      --panel-2: #f4f2ef;
      --ink: #1f1f1f;
      --muted: #5f6366;
      --line: #d7d2cb;
      --accent: #861f41;
      --accent-highlight: #f3e8ed;
      --accent-2: #ca4f00;
      --success: #2e7d32;
      --warning: #946200;
      --danger: #b3261e;
      --success-soft: rgba(46, 125, 50, 0.12);
      --warning-soft: rgba(148, 98, 0, 0.12);
      --danger-soft: rgba(179, 38, 30, 0.12);
      --focus: #861f41;
      --form-font-family: "Roboto", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --body-font-family: var(--form-font-family);
      --body-color: var(--ink);
      --body-font-size: 14px;
      --body-font-weight: 400;
      --body-font-style: normal;
      --body-line-height: 1.45;
      --body-letter-spacing: 0px;
      --body-text-transform: none;
      --sidebar: #2f3033;
      --sidebar-2: #383a3d;
      --sidebar-line: #4a4d50;
      --shadow: 0 12px 28px rgba(31, 31, 31, 0.07);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --focus-ring: rgba(134, 31, 65, 0.28);
      --form-page-margin: 20px;
      --form-page-padding: 16px;
      --form-field-spacing: 10px;
      --form-field-padding: 16px;
      --heading-font-family: var(--form-font-family);
      --heading-color: var(--ink);
      --heading-font-size: 26px;
      --heading-font-weight: 750;
      --heading-font-style: normal;
      --heading-line-height: 1.2;
      --heading-letter-spacing: 0px;
      --heading-text-transform: none;
      --description-font-family: var(--form-font-family);
      --description-color: var(--muted);
      --description-font-size: 14px;
      --description-font-weight: 400;
      --description-font-style: normal;
      --description-line-height: 1.5;
      --description-letter-spacing: 0px;
      --description-text-transform: none;
      --label-font-family: var(--form-font-family);
      --label-color: var(--ink);
      --label-font-size: 16px;
      --label-font-weight: 700;
      --label-font-style: normal;
      --label-line-height: 1.35;
      --label-letter-spacing: 0px;
      --label-text-transform: none;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "Roboto", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
    }

    #app {
      min-height: 100vh;
    }

    .runtime-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 236px minmax(0, 1fr);
      position: relative;
      transition: grid-template-columns 240ms var(--ease);
    }

    .runtime-shell.sidebar-collapsed {
      grid-template-columns: 56px minmax(0, 1fr);
    }

    .runtime-sidebar {
      min-width: 0;
      height: 100vh;
      height: 100dvh;
      max-height: 100vh;
      max-height: 100dvh;
      position: sticky;
      top: 0;
      align-self: start;
      color: #f7f5f2;
      background: var(--sidebar);
      border-right: 1px solid var(--sidebar-line);
      padding: 14px 10px;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      transition: padding 240ms var(--ease), border-color 180ms ease;
    }

    .runtime-sidebar-content {
      min-width: 216px;
      min-height: calc(100vh - 28px);
      min-height: calc(100dvh - 28px);
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: opacity 150ms ease, transform 240ms var(--ease);
      will-change: opacity, transform;
    }

    .runtime-shell.sidebar-collapsed .runtime-sidebar {
      padding-left: 8px;
      padding-right: 8px;
      border-right-color: var(--sidebar-line);
      overflow: hidden;
    }

    .runtime-shell.sidebar-collapsed .runtime-sidebar-content {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-14px);
    }

    .runtime-sidebar-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      margin-bottom: 10px;
    }

    .sidebar-title {
      color: #d7d2cb;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .sidebar-actions {
      display: grid;
      gap: 8px;
    }

    .icon-button.sidebar-expand-button {
      position: fixed;
      top: 14px;
      left: 8px;
      z-index: 16;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-10px) scale(0.96);
      box-shadow: 0 8px 18px rgba(31, 31, 31, 0.12);
      background: var(--sidebar-2);
      border-color: var(--sidebar-line);
      color: #f4f2ef;
      transition: opacity 150ms ease, transform 240ms var(--ease), background 160ms ease, border-color 160ms ease;
    }

    .icon-button.sidebar-expand-button:hover {
      background: #424548;
      border-color: #666a6d;
      color: #ffffff;
    }

    .runtime-shell.sidebar-collapsed .sidebar-expand-button {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0) scale(1);
    }

    .button,
    .icon-button,
    .select {
      min-height: 40px;
      border-radius: 8px;
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #ffffff;
      color: var(--ink);
      padding: 0 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 750;
      line-height: 1;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .button:hover,
    .icon-button:hover,
    .select:hover {
      background: var(--panel-2);
      border-color: #cbc5b6;
    }

    .button:focus-visible,
    .icon-button:focus-visible,
    .select:focus-visible,
    .poll-option:focus-visible,
    .meter-option:focus-visible,
    .star-option:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .button:active,
    .icon-button:active {
      transform: translateY(1px);
    }

    .button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .button.primary:hover {
      background: #6f1936;
      border-color: #6f1936;
    }

    .button:disabled,
    .icon-button:disabled,
    .select:disabled {
      opacity: 0.46;
      cursor: not-allowed;
      transform: none;
    }

    .button.full,
    .select {
      width: 100%;
    }

    .icon-button {
      width: 40px;
      padding: 0;
      flex: 0 0 auto;
    }

    .runtime-sidebar .button,
    .runtime-sidebar .icon-button,
    .runtime-sidebar .select {
      border-color: var(--sidebar-line);
      color: #f4f2ef;
      background: var(--sidebar-2);
    }

    .runtime-sidebar .button:hover,
    .runtime-sidebar .icon-button:hover,
    .runtime-sidebar .select:hover {
      background: #424548;
      border-color: #666a6d;
    }

    .runtime-sidebar .button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .runtime-sidebar .button.primary:hover {
      background: #6f1936;
      border-color: #6f1936;
    }

    .runtime-sidebar .button.full:not(.primary) {
      justify-content: flex-start;
    }

    .runtime-sidebar .button.full:not(.primary) .svg-icon {
      width: 16px;
    }

    .svg-icon {
      width: 1em;
      height: 1em;
      display: block;
      flex: 0 0 1em;
      overflow: visible;
      fill: currentColor;
    }

    .svg-icon path {
      fill: currentColor;
    }

    .svg-icon-stroke {
      fill: none;
    }

    .svg-icon-stroke path,
    .svg-icon-radar polygon,
    .svg-icon-radar line,
    .svg-icon-radar circle {
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .svg-icon-radar polygon,
    .svg-icon-radar line,
    .svg-icon-radar circle {
      stroke-width: 1.8;
    }

    .svg-icon-radar circle {
      fill: currentColor;
    }

    .select-wrap {
      position: relative;
    }

    .select {
      appearance: none;
      display: block;
      height: 40px;
      padding-right: 32px;
      outline: none;
    }

    .select-icon {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: #d7d2cb;
      pointer-events: none;
    }

    .select-label {
      color: #d7d2cb;
      font-size: 11.5px;
      font-weight: 700;
    }

    .runtime-export-bar {
      max-width: 860px;
      margin: 12px auto 0;
      display: flex;
      justify-content: flex-end;
      align-items: stretch;
      gap: 8px;
    }

    .runtime-export-bar .select-wrap {
      width: 104px;
      flex: 0 0 104px;
    }

    .runtime-export-bar .select-icon {
      color: var(--muted);
    }

    .runtime-export-bar .button.primary {
      min-width: 132px;
    }

    .stage {
      min-width: 0;
      padding: var(--form-page-margin);
      padding-bottom: calc(var(--form-page-margin) + 22px);
      color: var(--ink);
      background: var(--bg);
      font-family: var(--form-font-family);
      transition: padding 240ms var(--ease);
    }

    .runtime-shell.sidebar-collapsed .stage {
      padding-left: var(--form-page-margin);
    }

    .capture {
      max-width: 860px;
      margin: 0 auto;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .export-mount {
      position: fixed;
      top: 0;
      left: -10000px;
      width: 842px;
      z-index: -1;
      pointer-events: none;
    }

    .export-document {
      width: 842px;
      display: grid;
      gap: var(--form-field-spacing);
      padding: var(--form-page-margin);
      background: var(--bg);
      color: var(--ink);
      font-family: var(--form-font-family);
      box-sizing: border-box;
    }

    .export-page {
      width: 794px;
      height: 1123px;
      padding: 48px;
      box-sizing: border-box;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
    }

    .export-page-content {
      display: grid;
      gap: var(--form-field-spacing);
      align-content: start;
      min-width: 0;
    }

    .export-page-content > * {
      min-width: 0;
      width: 100%;
      break-inside: avoid;
    }

    .export-document .field,
    .export-document .headline-field,
    .export-document .spacer-field {
      width: 100%;
      margin: 0;
      animation: none;
      transition: none;
      transform: none;
    }

    .export-document .field:hover,
    .export-document .headline-field:hover,
    .export-document .spacer-field:hover {
      transform: none;
    }

    .export-document .field.no-outline:hover,
    .export-document .headline-field:not(.with-outline):hover {
      transform: none;
    }

    .export-document .calendar-nav-buttons,
    .export-document .calendar-milestone-editor > .button,
    .export-document .calendar-milestone-row .icon-button,
    .export-document .calendar-milestone-empty,
    .export-document .media-upload-preview > input[type="file"],
    .export-document [data-export-hidden="true"] {
      display: none !important;
    }

    .export-document input,
    .export-document textarea,
    .export-document select,
    .export-document button {
      pointer-events: none;
    }

    .export-document .calendar-day-button {
      cursor: default;
    }

    .export-document .linear-scale-native {
      display: none !important;
    }

    .export-document svg.media-visual[data-export-inlined-svg="true"] {
      flex: 0 1 auto;
    }

    .export-empty {
      min-height: 220px;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-weight: 750;
    }

    .form-header {
      padding: 24px 28px 22px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
    }

    .form-title {
      margin: 0;
      color: var(--heading-color);
      font-family: var(--heading-font-family);
      font-size: var(--heading-font-size);
      line-height: var(--heading-line-height);
      font-weight: var(--heading-font-weight);
      font-style: var(--heading-font-style);
      letter-spacing: var(--heading-letter-spacing);
      text-transform: var(--heading-text-transform);
    }

    .form-description {
      margin: 8px 0 0;
      color: var(--description-color);
      font-family: var(--description-font-family);
      line-height: var(--description-line-height);
      font-size: var(--description-font-size);
      font-weight: var(--description-font-weight);
      font-style: var(--description-font-style);
      letter-spacing: var(--description-letter-spacing);
      text-transform: var(--description-text-transform);
    }

    .fields {
      display: grid;
      gap: var(--form-field-spacing);
      padding: var(--form-page-padding);
      align-content: start;
      grid-auto-rows: max-content;
    }

    .form-block {
      display: grid;
      gap: var(--form-field-spacing);
      min-width: 0;
      align-content: start;
    }

    .block-middle {
      /* Middle placements are positional; sizing belongs to the container. */
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      grid-template-areas: "main";
      gap: var(--form-field-spacing);
      min-width: 0;
      align-items: stretch;
    }

    .block-middle.layout-left-main-right {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-areas: "left main right";
    }

    .block-middle.layout-left-main {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-areas: "left main";
    }

    .block-middle.layout-main-right {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-areas: "main right";
    }

    .block-middle.layout-left-right {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-areas: "left right";
    }

    .block-middle.layout-left {
      grid-template-areas: "left";
    }

    .block-middle.layout-right {
      grid-template-areas: "right";
    }

    .block-left,
    .block-main,
    .block-right {
      width: auto;
      min-width: 0;
      max-width: 100%;
    }

    .block-left {
      grid-area: left;
    }

    .block-main {
      grid-area: main;
    }

    .block-right {
      grid-area: right;
    }

    .block-stack,
    .block-container {
      display: grid;
      gap: var(--form-field-spacing);
      min-width: 0;
      align-content: stretch;
    }

    .block-stack {
      container-type: inline-size;
    }

    .block-container {
      width: 100%;
    }

    .field {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: transparent;
      padding: var(--form-field-padding);
      display: grid;
      gap: var(--form-field-spacing);
      width: 100%;
      min-width: 0;
      max-width: 100%;
      color: var(--body-color);
      font-family: var(--body-font-family);
      font-size: var(--body-font-size);
      font-weight: var(--body-font-weight);
      font-style: var(--body-font-style);
      line-height: var(--body-line-height);
      letter-spacing: var(--body-letter-spacing);
      text-transform: var(--body-text-transform);
      align-self: start;
      animation: field-in 160ms var(--ease) both;
      transition: border-color 150ms ease, background 150ms ease, box-shadow 150ms ease, transform 160ms var(--ease);
    }

    .field.with-background,
    .headline-field.with-background,
    .field.spacer-field.with-background {
      --field-control-bg: var(--bg);
      background: var(--panel-2);
    }

    .field:hover {
      transform: translateY(-1px);
    }

    .field.no-outline {
      border-color: transparent;
      box-shadow: none;
    }

    .field.no-outline:hover,
    .headline-field:not(.with-outline):hover {
      transform: none;
    }

    .field.no-outline.invalid {
      border-color: rgba(134, 31, 65, 0.7);
    }

    .headline-field {
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      padding: var(--form-field-padding);
      display: grid;
      gap: var(--form-field-spacing);
      width: 100%;
      min-width: 0;
      max-width: 100%;
      color: var(--body-color);
      font-family: var(--body-font-family);
      font-size: var(--body-font-size);
      font-weight: var(--body-font-weight);
      font-style: var(--body-font-style);
      line-height: var(--body-line-height);
      letter-spacing: var(--body-letter-spacing);
      text-transform: var(--body-text-transform);
      align-self: start;
      animation: field-in 160ms var(--ease) both;
      transition: border-color 150ms ease, background 150ms ease, box-shadow 150ms ease, transform 160ms var(--ease);
    }

    .headline-field.with-outline {
      border-color: var(--line);
    }

    .headline-field.with-outline:hover {
      transform: translateY(-1px);
    }

    .headline-content,
    .headline-copy {
      display: grid;
      gap: var(--form-field-spacing);
      min-width: 0;
    }

    .headline-title {
      margin: 0;
      color: var(--heading-color);
      font-family: var(--heading-font-family);
      font-size: var(--heading-font-size);
      line-height: var(--heading-line-height);
      font-weight: var(--heading-font-weight);
      font-style: var(--heading-font-style);
      letter-spacing: var(--heading-letter-spacing);
      text-transform: var(--heading-text-transform);
      overflow-wrap: anywhere;
    }

    .headline-subhead {
      margin: 0;
      color: var(--description-color);
      font-family: var(--description-font-family);
      line-height: var(--description-line-height);
      font-size: var(--description-font-size);
      font-weight: var(--description-font-weight);
      font-style: var(--description-font-style);
      letter-spacing: var(--description-letter-spacing);
      text-transform: var(--description-text-transform);
      overflow-wrap: anywhere;
    }

    .field.invalid {
      border-color: rgba(134, 31, 65, 0.7);
      box-shadow: 0 0 0 3px rgba(134, 31, 65, 0.08);
    }

    .field-head {
      display: grid;
      gap: 4px;
    }

    .field-label {
      color: var(--label-color);
      font-family: var(--label-font-family);
      font-weight: var(--label-font-weight);
      line-height: var(--label-line-height);
      font-size: var(--label-font-size);
      font-style: var(--label-font-style);
      letter-spacing: var(--label-letter-spacing);
      text-transform: var(--label-text-transform);
    }

    .required-mark {
      color: var(--accent-2);
      margin-left: 3px;
    }

    .field-help {
      color: var(--description-color);
      font-family: var(--description-font-family);
      line-height: var(--description-line-height);
      font-size: var(--description-font-size);
      font-weight: var(--description-font-weight);
      font-style: var(--description-font-style);
      letter-spacing: var(--description-letter-spacing);
      text-transform: var(--description-text-transform);
    }

    .control,
    .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field-control-bg, var(--panel-2));
      color: var(--body-color);
      padding: 9px 10px;
      min-height: 40px;
      font-family: var(--body-font-family);
      font-size: var(--body-font-size);
      font-weight: var(--body-font-weight);
      font-style: var(--body-font-style);
      line-height: var(--body-line-height);
      letter-spacing: var(--body-letter-spacing);
      text-transform: var(--body-text-transform);
      outline: none;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .textarea {
      min-height: 104px;
      resize: vertical;
      line-height: 1.5;
    }

    .control:focus,
    .textarea:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(134, 31, 65, 0.12);
      background: #ffffff;
    }

    .choice-list {
      display: grid;
      gap: 8px;
    }

    .choice-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: var(--body-color);
      line-height: var(--body-line-height);
      font-size: inherit;
    }

    .choice-row input[type="checkbox"],
    .choice-row input[type="radio"] {
      width: 17px;
      height: 17px;
      margin-top: 1px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }

    .choice-row .control {
      flex: 1 1 auto;
      min-width: 0;
    }

    .choice-row [role="button"] {
      min-width: 0;
      overflow-wrap: anywhere;
      cursor: text;
    }

    .choice-row [role="button"]:focus-visible {
      border-radius: 4px;
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .choice-list > .button {
      justify-self: start;
      min-height: 34px;
      margin-top: 4px;
    }

    .poll-grid,
    .meter-grid,
    .star-grid {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .poll-option,
    .meter-option,
    .star-option {
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 0 10px;
      background: var(--field-control-bg, var(--panel-2));
      color: var(--body-color);
      cursor: pointer;
      font-size: inherit;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }

    .poll-option:hover,
    .meter-option:hover,
    .star-option:hover {
      transform: translateY(-1px);
      border-color: #cbc5b6;
      background: #ffffff;
    }

    .meter-option,
    .star-option {
      width: 40px;
      min-height: 40px;
      padding: 0;
    }

    .poll-option {
      min-height: 40px;
    }

    .poll-option.selected,
    .meter-option.selected,
    .star-option.selected {
      border-color: var(--accent);
      background: var(--accent-highlight);
      color: var(--accent);
      box-shadow: 0 4px 12px rgba(134, 31, 65, 0.08);
    }

    .star-option.selected i {
      font-weight: 900;
    }

    .range-wrap {
      display: grid;
      grid-template-columns: auto minmax(160px, 1fr) auto auto;
      align-items: center;
      gap: 10px;
      color: var(--body-color);
      font-size: inherit;
    }

    .linear-scale-control {
      position: relative;
      min-width: 160px;
      min-height: 40px;
      display: grid;
      align-items: center;
    }

    .linear-scale-track {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 8px;
      transform: translateY(-50%);
      border-radius: 999px;
      background: #d7d2cb;
      overflow: hidden;
      pointer-events: none;
    }

    .linear-scale-fill {
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      pointer-events: none;
    }

    .linear-scale-thumb {
      position: absolute;
      top: 50%;
      width: 18px;
      height: 18px;
      border: 2px solid var(--accent);
      border-radius: 999px;
      background: #ffffff;
      transform: translate(-50%, -50%);
      box-shadow: 0 3px 8px rgba(31, 31, 31, 0.13);
      pointer-events: none;
    }

    .linear-scale-native {
      position: absolute;
      inset: 0;
      width: 100%;
      min-height: 40px;
      opacity: 0;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .range-wrap input[type="range"] {
      width: 100%;
      min-height: 40px;
      accent-color: var(--accent);
    }

    .range-value {
      color: var(--ink);
      font-weight: 750;
      min-width: 36px;
      text-align: center;
    }

    .radar-wrap {
      display: grid;
      grid-template-columns: minmax(240px, 300px) minmax(260px, 340px);
      align-items: center;
      justify-content: center;
      gap: 34px;
      min-width: 0;
      max-width: 760px;
      margin: 0 auto;
    }

    .radar-wrap.point-mode {
      grid-template-columns: minmax(240px, 300px) minmax(260px, 340px);
    }

    .radar-point-inner {
      display: contents;
    }

    .radar-chart {
      width: min(300px, 100%);
      min-width: 0;
      justify-self: center;
      align-self: center;
      position: relative;
      z-index: 1;
      contain: layout;
    }

    .radar-chart svg {
      width: 100%;
      max-width: 300px;
      height: auto;
      display: block;
      margin: 0 auto;
      overflow: visible;
      touch-action: none;
    }

    .radar-grid polygon,
    .radar-grid line {
      fill: none;
      stroke: #c9c4bd;
      stroke-width: 1;
    }

    .radar-fill {
      fill: rgba(134, 31, 65, 0.12);
      stroke: var(--accent);
      stroke-width: 2;
    }

    .radar-point-line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-dasharray: 4 5;
    }

    .radar-free-hit {
      fill: transparent;
      cursor: pointer;
      pointer-events: all;
    }

    .radar-label {
      fill: var(--muted);
      font-size: 11px;
    }

    .radar-hit {
      fill: none;
      stroke: transparent;
      stroke-width: 24;
      cursor: pointer;
      pointer-events: stroke;
    }

    .radar-handle {
      fill: #ffffff;
      stroke: var(--accent);
      stroke-width: 2.4;
      cursor: grab;
      filter: drop-shadow(0 3px 6px rgba(31, 31, 31, 0.14));
      transition: fill 140ms ease, stroke-width 140ms ease;
    }

    .radar-handle:hover,
    .radar-handle:focus {
      fill: var(--accent-highlight);
      stroke-width: 3;
      outline: none;
    }

    .radar-handle:active {
      cursor: grabbing;
    }

    .radar-values {
      width: 100%;
      min-width: 0;
      max-width: 340px;
      display: grid;
      gap: 7px;
      justify-self: stretch;
      align-self: center;
      position: relative;
      z-index: 0;
    }

    .radar-values.point-readout {
      min-height: 124px;
      align-content: center;
    }

    .radar-value-row {
      display: grid;
      grid-template-columns: minmax(86px, max-content) minmax(0, 1fr);
      align-items: start;
      gap: 9px;
      color: var(--body-color);
      font-size: inherit;
      min-height: 36px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--field-control-bg, var(--panel-2));
    }

    .radar-values.point-readout .radar-value-row {
      grid-template-columns: 68px minmax(0, 1fr);
    }

    .radar-value-row span {
      min-width: 0;
      color: var(--body-color);
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .radar-value {
      min-width: 0;
      max-width: none;
      text-align: left;
      color: var(--body-color);
      font-weight: 750;
      line-height: 1.35;
      border-radius: 8px;
      background: #ffffff;
      padding: 2px 8px;
      overflow-wrap: anywhere;
      white-space: normal;
    }

    .field-error {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 700;
    }

    .link-preview {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      text-decoration: none;
      max-width: 100%;
      overflow-wrap: anywhere;
    }



    .calendar-preview,
    .calendar-control {
      --calendar-shell-radius: 14px;
      --calendar-cell-radius: 9px;
      --calendar-side-padding: 14px;
      --calendar-cell-height: 36px;
      display: grid;
      gap: 12px;
      min-width: 0;
      border: 0;
      border-radius: 8px;
      background: var(--field-control-bg, var(--panel-2));
      padding: 12px;
      box-shadow: none;
    }

    .calendar-preview.is-unboxed,
    .field.no-outline .calendar-control {
      border: 0;
      background: var(--field-control-bg, var(--panel-2));
      padding: 12px;
      box-shadow: none;
    }

    .calendar-frame {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--calendar-shell-radius);
      background: #ffffff;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(31, 31, 31, 0.04);
    }

    .calendar-preview-head,
    .calendar-nav {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: center;
      justify-items: center;
      gap: 8px;
      min-width: 0;
      border-radius: 0;
      background: #ffffff;
      padding: 14px var(--calendar-side-padding) 11px;
      position: relative;
      text-align: center;
    }

    .calendar-nav .calendar-month-label,
    .calendar-nav .calendar-month-input {
      grid-column: 1 / -1;
      grid-row: 1;
      padding: 0 92px;
    }

    .calendar-nav-buttons {
      grid-column: 1 / -1;
      grid-row: 1;
      justify-self: end;
      z-index: 1;
    }

    .calendar-month-label {
      min-width: 0;
      width: 100%;
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
      overflow: hidden;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calendar-month-input {
      min-height: 34px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      font: inherit;
      cursor: pointer;
    }

    .calendar-month-input:hover,
    .calendar-month-input:focus {
      border-color: var(--line);
      background: var(--panel-2);
      outline: none;
    }

    .calendar-range-summary {
      min-width: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 14px;
      padding: 0 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .calendar-range-summary span {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .calendar-range-summary b {
      margin-right: 4px;
      color: var(--ink);
      font-weight: 750;
    }

    .calendar-date-inputs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-items: start;
      min-width: 0;
    }

    .calendar-date-field {
      min-width: 0;
      display: grid;
      gap: 5px;
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
      box-shadow: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .calendar-date-field:focus-within {
      background: transparent;
      box-shadow: none;
    }

    .calendar-date-field span {
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 750;
      line-height: 1.2;
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 0;
    }

    .calendar-weekdays {
      padding: 0 var(--calendar-side-padding) 9px;
      background: #ffffff;
    }

    .calendar-grid {
      padding: 10px var(--calendar-side-padding) 14px;
      border: 0;
      border-radius: 0;
      background: #ffffff;
      box-shadow: none;
      overflow: visible;
    }

    .calendar-weekday {
      color: #9a9fa3;
      font-size: 10.5px;
      font-weight: 800;
      line-height: 1.2;
      text-align: center;
      user-select: none;
    }

    .calendar-day,
    .calendar-day-button {
      position: relative;
      z-index: 0;
      isolation: isolate;
      min-width: 0;
      min-height: var(--calendar-cell-height);
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 0;
      color: var(--ink);
      font-size: 12px;
      font-weight: 750;
      line-height: 1;
      background: transparent;
      font-variant-numeric: tabular-nums;
    }

    .calendar-day::before,
    .calendar-day-button::before {
      content: "";
      position: absolute;
      inset: 3px 0;
      z-index: -1;
      border-radius: var(--calendar-cell-radius);
      background: transparent;
      transition: background 160ms ease, box-shadow 160ms ease, transform 160ms ease, border-radius 160ms ease;
    }

    .calendar-day-number {
      position: relative;
      z-index: 1;
      display: inline-grid;
      place-items: center;
      min-width: 1.45em;
      pointer-events: none;
    }

    .calendar-day.is-outside,
    .calendar-day-button.is-outside {
      color: #a6a09a;
    }

    .calendar-day.is-range,
    .calendar-day-button.is-range {
      color: var(--accent);
    }

    .calendar-day.is-range::before,
    .calendar-day-button.is-range::before {
      background: var(--accent-highlight);
      border-radius: 0;
    }

    .calendar-day.is-range-start::before,
    .calendar-day-button.is-range-start::before {
      border-top-left-radius: var(--calendar-cell-radius);
      border-bottom-left-radius: var(--calendar-cell-radius);
    }

    .calendar-day.is-range-end::before,
    .calendar-day-button.is-range-end::before {
      border-top-right-radius: var(--calendar-cell-radius);
      border-bottom-right-radius: var(--calendar-cell-radius);
    }

    .calendar-day.is-boundary,
    .calendar-day-button.is-boundary {
      color: #ffffff;
    }

    .calendar-day.is-boundary::before,
    .calendar-day-button.is-boundary::before {
      background: var(--accent);
      border-radius: var(--calendar-cell-radius);
      box-shadow: 0 9px 16px -8px rgba(134, 31, 65, 0.54);
    }

    .calendar-day.is-milestone::after,
    .calendar-day-button.is-milestone::after {
      content: "";
      position: absolute;
      z-index: 2;
      left: 50%;
      bottom: 5px;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: var(--accent-2);
      transform: translateX(-50%);
    }

    .calendar-day.is-boundary.is-milestone::after,
    .calendar-day-button.is-boundary.is-milestone::after {
      background: #ffffff;
    }

    .calendar-day.is-milestone:hover,
    .calendar-day-button.is-milestone:hover,
    .calendar-day-button.is-milestone:focus-visible {
      z-index: 8;
    }

    .calendar-milestone-popover {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 7px);
      z-index: 5;
      width: max-content;
      min-width: 96px;
      max-width: 220px;
      display: grid;
      gap: 3px;
      padding: 7px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      box-shadow: 0 8px 18px rgba(31, 31, 31, 0.12);
      font-size: 11.5px;
      font-weight: 750;
      line-height: 1.3;
      text-align: left;
      white-space: normal;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 3px);
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .calendar-milestone-popover::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 100%;
      width: 7px;
      height: 7px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #ffffff;
      transform: translate(-50%, -4px) rotate(45deg);
    }

    .calendar-milestone-popover-line {
      position: relative;
      z-index: 1;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .calendar-day.is-milestone:hover .calendar-milestone-popover,
    .calendar-day-button.is-milestone:hover .calendar-milestone-popover,
    .calendar-day-button.is-milestone:focus-visible .calendar-milestone-popover {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .calendar-day-button {
      cursor: pointer;
      transition: color 160ms ease, transform 160ms ease;
    }

    .calendar-day-button:hover::before,
    .calendar-day-button:focus-visible::before {
      background: rgba(31, 31, 31, 0.07);
      transform: translateY(-1px);
    }

    .calendar-day-button.is-range:hover::before,
    .calendar-day-button.is-range:focus-visible::before {
      background: var(--accent-highlight);
    }

    .calendar-day-button.is-boundary:hover::before,
    .calendar-day-button.is-boundary:focus-visible::before {
      background: var(--accent);
      box-shadow: 0 9px 16px -8px rgba(134, 31, 65, 0.54);
    }

    .calendar-day-button:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: -2px;
    }

    .calendar-milestone-list,
    .calendar-milestone-editor {
      display: grid;
      gap: 7px;
      min-width: 0;
      padding-top: 10px;
      border-top: 1px solid rgba(215, 210, 203, 0.72);
    }

    .calendar-milestone-editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .calendar-milestone-empty {
      color: var(--muted);
      font-size: 12px;
    }

    .calendar-milestone-empty {
      border: 0;
      border-radius: 0;
      padding: 2px 1px;
      background: transparent;
    }

    .calendar-milestone-item {
      min-width: 0;
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      padding: 2px 1px;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      font-size: 12.5px;
    }

    .calendar-milestone-date {
      color: var(--accent-2);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .calendar-milestone-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calendar-milestone-row {
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr) auto;
      gap: 5px;
      align-items: center;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
    }


    .calendar-date-field .control {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 9px 10px;
      box-shadow: none;
    }

    .calendar-date-field .control:focus {
      background: #ffffff;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(134, 31, 65, 0.12);
    }

    .calendar-day-button.is-boundary,
    .calendar-day-button.is-milestone {
      cursor: grab;
    }

    .calendar-day-button.is-armed-boundary::before,
    .calendar-day-button.is-dragging::before {
      box-shadow: 0 0 0 3px rgba(134, 31, 65, 0.13), 0 9px 16px -8px rgba(134, 31, 65, 0.54);
    }

    .calendar-day-button.is-dragging {
      cursor: grabbing;
    }

    .calendar-nav-buttons {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .button.ghost {
      background: transparent;
    }

    .media-preview,
    .media-upload-preview {
      display: grid;
      gap: 8px;
      min-width: 0;
      color: var(--muted);
    }

    .media-content-wrap {
      display: flex;
      width: 100%;
      min-width: 0;
      box-sizing: border-box;
    }

    .media-visual {
      display: block;
      max-width: 100%;
      border: 0;
      border-radius: 8px;
      background: transparent;
      object-fit: contain;
    }

    .media-preview img.media-visual,
    .media-upload-preview img.media-visual,
    .media-preview video.media-visual,
    .media-upload-preview video.media-visual,
    .media-preview object.media-visual,
    .media-upload-preview object.media-visual {
      width: 100%;
    }

    .media-preview audio.media-visual,
    .media-upload-preview audio.media-visual {
      width: 100%;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .media-embed {
      width: 100%;
      min-height: 180px;
      border: 0;
      border-radius: 8px;
      background: transparent;
    }

    .media-placeholder {
      min-height: 78px;
      display: grid;
      place-items: center;
      border: 1px dashed #b8b2aa;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      color: var(--body-color);
      user-select: none;
    }

    .media-caption {
      margin: 0;
      color: var(--body-color);
      font-size: inherit;
      line-height: var(--body-line-height);
    }

    .media-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      overflow-wrap: anywhere;
    }

    .field.spacer-field {
      border-color: transparent;
      box-shadow: none;
      pointer-events: none;
      user-select: none;
    }

    .field.spacer-field.with-outline {
      border-color: var(--line);
    }

    .field.spacer-field:hover {
      transform: none;
    }

    .spacer-preview {
      min-height: 8px;
      display: flex;
      align-items: center;
      width: 100%;
      user-select: none;
    }

    .spacer-line {
      width: 100%;
      border: 0;
      border-top: 1px solid var(--line);
      margin: 0;
      pointer-events: none;
      user-select: none;
    }

    .empty {
      min-height: 360px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 22px;
      user-select: none;
      animation: field-in 160ms var(--ease) both;
    }

    .empty-inner {
      display: grid;
      gap: 8px;
      justify-items: center;
    }

    .empty-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #ffffff;
      background: #8b8f92;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes field-in {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 780px) {

      .runtime-shell,
      .runtime-shell.sidebar-collapsed {
        grid-template-columns: 1fr;
      }

      .block-middle {
        display: flex;
        flex-direction: column;
      }

      .block-left,
      .block-main,
      .block-right {
        width: 100%;
      }

      .runtime-sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 30;
        width: min(300px, calc(100vw - 48px));
        height: auto;
        max-height: none;
        display: block;
        overflow-x: hidden;
        overflow-y: auto;
        border-right: 1px solid var(--sidebar-line);
        border-bottom: 0;
        box-shadow: 12px 0 28px rgba(18, 18, 20, 0.22);
        transform: translateX(0);
        transition: transform 260ms var(--ease), box-shadow 180ms ease, border-color 180ms ease;
      }

      .runtime-sidebar-content {
        min-width: 0;
        min-height: calc(100vh - 28px);
        min-height: calc(100dvh - 28px);
        overflow: visible;
      }

      .icon-button.sidebar-expand-button {
        left: 10px;
        z-index: 31;
      }

      .runtime-shell.sidebar-collapsed .runtime-sidebar {
        border-right-color: var(--sidebar-line);
        transform: translateX(calc(-100% - 2px));
        box-shadow: none;
        pointer-events: none;
      }

      .stage {
        padding: max(10px, var(--form-page-margin));
      }

      .runtime-shell.sidebar-collapsed .stage {
        padding: max(10px, var(--form-page-margin));
        padding-top: max(60px, var(--form-page-margin));
      }

      .form-header {
        padding: 20px 16px;
      }

      .fields {
        padding: 10px;
      }

      .field {
        padding: 12px;
      }

      .range-wrap {
        grid-template-columns: 1fr;
      }

      .calendar-date-inputs,
      .calendar-milestone-row {
        grid-template-columns: 1fr;
      }

      .radar-wrap {
        grid-template-columns: 1fr;
        gap: 14px;
        max-width: 360px;
      }

      .radar-chart {
        width: min(300px, 100%);
      }

      .radar-values {
        width: 100%;
        max-width: none;
        justify-self: stretch;
      }

      .radar-value-row,
      .radar-values.point-readout .radar-value-row {
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .radar-values.point-readout .radar-value {
        max-width: 220px;
      }

      .runtime-export-bar {
        display: grid;
        grid-template-columns: minmax(92px, 0.7fr) minmax(0, 1.3fr);
      }

      .runtime-export-bar .select-wrap {
        width: auto;
        flex-basis: auto;
      }
    }



    /* Compact calendar/radar readouts. */
    .calendar-preview,
    .calendar-control {
      --calendar-shell-radius: 14px;
      --calendar-cell-radius: 8px;
      --calendar-side-padding: 12px;
      --calendar-cell-height: 32px;
      grid-template-columns: minmax(238px, 300px) minmax(248px, 340px);
      align-items: start;
      justify-content: center;
      gap: 28px;
      max-width: 760px;
      margin: 0 auto;
      border-radius: 0;
      background: transparent;
      padding: 0;
    }

    .calendar-preview.is-unboxed,
    .field.no-outline .calendar-control {
      background: transparent;
      padding: 0;
    }

    .calendar-frame {
      width: min(300px, 100%);
      justify-self: center;
      align-self: start;
      box-shadow: none;
    }

    .calendar-preview-head,
    .calendar-nav {
      padding: 13px var(--calendar-side-padding) 10px;
    }

    .calendar-nav .calendar-month-label,
    .calendar-nav .calendar-month-input {
      padding: 0 76px;
    }

    .calendar-weekdays {
      padding: 0 var(--calendar-side-padding) 8px;
    }

    .calendar-grid {
      padding: 8px var(--calendar-side-padding) 12px;
    }

    .radar-values,
    .calendar-properties {
      align-content: center;
      gap: 0;
    }

    .calendar-properties {
      width: 100%;
      max-width: 340px;
      display: grid;
      justify-self: stretch;
      align-self: center;
    }

    .radar-values {
      grid-template-columns: minmax(0, 1fr) auto;
      column-gap: 16px;
      row-gap: 4px;
    }

    .radar-values.point-readout {
      min-height: 0;
      grid-template-columns: 68px minmax(0, 1fr);
    }

    .calendar-range-summary,
    .calendar-milestone-list {
      display: grid;
      grid-template-columns: minmax(72px, max-content) minmax(0, 1fr);
      column-gap: 12px;
      row-gap: 4px;
      padding: 0;
      border: 0;
    }

    .calendar-date-inputs,
    .calendar-milestone-editor {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 4px;
      padding: 0;
      border: 0;
    }

    .calendar-milestone-list,
    .calendar-milestone-editor {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }

    .radar-value-row,
    .radar-values.point-readout .radar-value-row,
    .calendar-property-row,
    .calendar-milestone-item {
      display: contents;
    }

    .radar-value-row span,
    .radar-value,
    .calendar-property-row > span,
    .calendar-property-value,
    .calendar-milestone-date,
    .calendar-milestone-name {
      min-width: 0;
      padding: 3px 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .radar-value-row span,
    .calendar-property-row > span,
    .calendar-milestone-date,
    .calendar-date-field span,
    .calendar-property-heading,
    .calendar-milestone-editor-head .mini-label {
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 750;
    }

    .radar-value,
    .calendar-property-value,
    .calendar-milestone-name {
      color: var(--ink);
      font-weight: 750;
    }

    .radar-value {
      justify-self: end;
      text-align: right;
    }

    .calendar-property-heading,
    .calendar-milestone-editor-head {
      min-height: 0;
      margin: 10px 0 2px;
      padding: 0;
    }

    .calendar-property-heading,
    .calendar-milestone-empty {
      grid-column: 1 / -1;
    }

    .calendar-date-field,
    .calendar-milestone-row,
    .calendar-milestone-empty {
      min-width: 0;
      display: grid;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      padding: 4px 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .calendar-date-field {
      grid-template-columns: minmax(72px, max-content) minmax(0, 1fr) 28px;
    }

    .calendar-date-field .control {
      grid-column: 2 / -1;
    }

    .calendar-milestone-row {
      grid-template-columns: minmax(118px, 0.8fr) minmax(0, 1fr) 28px;
    }

    .calendar-date-field .control,
    .calendar-milestone-row .control,
    .choice-row .control {
      min-height: 30px;
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 2px 0;
      box-shadow: none;
      font-size: 13px;
    }

    .calendar-date-field .control[type="date"],
    .calendar-milestone-row .control[type="date"] {
      min-width: 0;
      width: 100%;
      padding-right: 30px;
    }

    .calendar-date-field .control:hover,
    .calendar-milestone-row .control:hover,
    .choice-row .control:hover {
      box-shadow: inset 0 -1px 0 var(--line);
    }

    .calendar-date-field .control:focus,
    .calendar-milestone-row .control:focus,
    .choice-row .control:focus {
      border-color: transparent;
      background: transparent;
      box-shadow: inset 0 -2px 0 var(--accent);
    }

    .calendar-date-field:focus-within,
    .calendar-milestone-row:focus-within {
      background: transparent;
      box-shadow: none;
    }

    .calendar-milestone-row .icon-button {
      width: 28px;
      height: 28px;
      min-height: 28px;
      border-color: transparent;
      background: transparent;
      box-shadow: none;
    }

    .calendar-milestone-row .icon-button:hover,
    .calendar-milestone-row .icon-button:focus-visible {
      border-color: rgba(179, 38, 30, 0.20);
      background: var(--danger-soft);
    }

    .calendar-milestone-editor > .button {
      justify-self: start;
      min-height: 34px;
      margin-top: 4px;
    }

    @media (max-width: 780px) {
      .calendar-preview,
      .calendar-control {
        grid-template-columns: 1fr;
        gap: 14px;
        max-width: 360px;
      }

      .calendar-properties {
        max-width: none;
      }

      .calendar-date-field {
        grid-template-columns: minmax(72px, max-content) minmax(0, 1fr) 28px;
      }

      .calendar-milestone-row {
        grid-template-columns: minmax(0, 1fr) 28px;
      }

      .calendar-milestone-row .control[type="date"] {
        grid-column: 1 / -1;
      }

      .calendar-milestone-row .icon-button {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
      }
    }

    @container (max-width: 560px) {
      .range-wrap {
        grid-template-columns: minmax(0, 1fr);
        justify-items: stretch;
      }

      .range-wrap > span,
      .range-value {
        justify-self: start;
        text-align: left;
      }

      .linear-scale-control {
        min-width: 0;
        width: 100%;
      }

      .radar-wrap,
      .radar-wrap.point-mode {
        grid-template-columns: minmax(0, 1fr);
        justify-content: stretch;
        gap: 14px;
        max-width: 100%;
      }

      .radar-chart {
        width: min(300px, 100%);
        max-width: 100%;
        justify-self: center;
      }

      .radar-values,
      .radar-values.point-readout {
        width: 100%;
        max-width: none;
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .calendar-preview,
      .calendar-control {
        grid-template-columns: minmax(0, 1fr);
        justify-content: stretch;
        gap: 14px;
        max-width: 100%;
      }

      .calendar-frame {
        width: min(300px, 100%);
        max-width: 100%;
      }

      .calendar-properties {
        max-width: none;
      }

      .calendar-nav {
        grid-template-columns: minmax(0, 1fr) auto;
        justify-items: start;
        text-align: left;
      }

      .calendar-nav .calendar-month-label,
      .calendar-nav .calendar-month-input {
        grid-column: 1;
        padding: 0;
        text-align: left;
      }

      .calendar-nav-buttons {
        grid-column: 2;
        justify-self: end;
      }

      .calendar-range-summary,
      .calendar-milestone-list {
        grid-template-columns: minmax(0, 1fr);
      }

      .calendar-date-field {
        grid-template-columns: minmax(0, 1fr);
      }

      .calendar-date-field .control {
        grid-column: 1 / -1;
      }

      .calendar-milestone-row {
        grid-template-columns: minmax(0, 1fr) 28px;
      }

      .calendar-milestone-row .control[type="date"] {
        grid-column: 1 / -1;
      }

      .calendar-milestone-row .icon-button {
        grid-column: 2;
        grid-row: 1;
        justify-self: end;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>

      }

      static clampValue(value, max) {
        const number = settingNumber(value, Number.NaN);
        return Number.isFinite(number) ? Math.max(RADAR_MIN_VALUE, Math.min(max, Math.round(number))) : null;
      }

      static values(values, axes, max) {
        const midpoint = Math.round(RADAR_MIN_VALUE + (max - RADAR_MIN_VALUE) / 2);
        const source = Array.isArray(values) ? values : DEFAULT_RADAR_VALUES;
        return axes.map((_, index) => RadarModel.clampValue(source[index], max) ?? midpoint);
      }

      static angle(value) {
        const number = settingNumber(value, DEFAULT_RADAR_POINT.angle);
        const wrapped = ((number % 360) + 360) % 360;
        return Math.round(wrapped * 100) / 100;
      }

      static pointValue(value, max) {
        const number = settingNumber(value, Number.NaN);
        return Number.isFinite(number) ? Math.round(Math.max(RADAR_MIN_VALUE, Math.min(max, number)) * 100) / 100 : null;
      }

      static point(point, max) {
        const source = point && typeof point === "object" && !Array.isArray(point) ? point : DEFAULT_RADAR_POINT;
        return {
          angle: RadarModel.angle(source.angle),
          value: RadarModel.pointValue(source.value, max) ?? RadarModel.pointValue(DEFAULT_RADAR_POINT.value, max) ?? RADAR_MIN_VALUE
        };
      }

      static scale(value, max) {
        return clamp(Number(value) / Math.max(1, max), 0, 1);
      }

      static vertex(index, count, center, radius) {
        const angle = -Math.PI / 2 + (Math.PI * 2 * index / count);
        return {
          x: Math.round((center + Math.cos(angle) * radius) * 100) / 100,
          y: Math.round((center + Math.sin(angle) * radius) * 100) / 100
        };
      }

      static polygon(values, max, center, radius) {
        return values.map((value, index) => {
          const point = RadarModel.vertex(index, values.length, center, radius * RadarModel.scale(value, max));
          return `${point.x},${point.y}`;
        }).join(" ");
      }

      static polar(angle, value, max, center, radius) {
        const radians = -Math.PI / 2 + (RadarModel.angle(angle) * Math.PI / 180);
        const scaled = RadarModel.scale(value, max);
        return {
          x: Math.round((center + Math.cos(radians) * radius * scaled) * 100) / 100,
          y: Math.round((center + Math.sin(radians) * radius * scaled) * 100) / 100
        };
      }

      static format(value) {
        const number = Number(value);
        if (!Number.isFinite(number)) return "";
        return Number.isInteger(number) ? String(number) : number.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
      }

      static angleDelta(a, b) {
        return Math.abs(((RadarModel.angle(a) - RadarModel.angle(b) + 540) % 360) - 180);
      }

      static nearestAxis(angle, axes) {
        const step = 360 / axes.length;
        const cleaned = RadarModel.angle(angle);
        const index = Math.round(cleaned / step) % axes.length;
        const axisAngle = RadarModel.angle(index * step);
        return { index, angle: axisAngle, delta: RadarModel.angleDelta(cleaned, axisAngle), label: axes[index] };
      }

      static describe(angle, axes) {
        const step = 360 / axes.length;
        const cleaned = RadarModel.angle(angle);
        const position = cleaned / step;
        const lower = Math.floor(position) % axes.length;
        const upper = (lower + 1) % axes.length;
        const blend = position - lower;
        if (blend < 0.06) return axes[lower];
        if (blend > 0.94) return axes[upper];
        return `${axes[lower]} / ${axes[upper]}`;
      }

      static snapPoint(rawPoint, axes, max, radius, snapState) {
        const state = snapState || { axisIndex: null, ringValue: null };
        let angle = RadarModel.angle(rawPoint.angle);
        let value = RadarModel.pointValue(rawPoint.value, max) ?? RADAR_MIN_VALUE;
        const distance = Math.max(0, Number(rawPoint.distance) || 0);
        const canAxisSnap = distance >= RADAR_AXIS_SNAP_MIN_RADIUS_PX;
        const step = 360 / axes.length;

        if (!canAxisSnap) {
          state.axisIndex = null;
        } else if (state.axisIndex !== null && state.axisIndex !== undefined) {
          const lockedAngle = RadarModel.angle(state.axisIndex * step);
          const lockedDelta = RadarModel.angleDelta(angle, lockedAngle);
          const lockedPerpendicularDistance = Math.abs(Math.sin(lockedDelta * Math.PI / 180) * distance);
          if (lockedPerpendicularDistance <= RADAR_AXIS_SNAP_EXIT_PX) {
            angle = lockedAngle;
          } else {
            state.axisIndex = null;
          }
        }

        if (canAxisSnap && (state.axisIndex === null || state.axisIndex === undefined)) {
          const nearest = RadarModel.nearestAxis(angle, axes);
          const perpendicularDistance = Math.abs(Math.sin(nearest.delta * Math.PI / 180) * distance);
          if (perpendicularDistance <= RADAR_AXIS_SNAP_ENTER_PX) {
            state.axisIndex = nearest.index;
            angle = nearest.angle;
          }
        }

        if (state.ringValue !== null && state.ringValue !== undefined) {
          const lockedRingRadius = radius * RadarModel.scale(state.ringValue, max);
          if (Math.abs(distance - lockedRingRadius) <= RADAR_RING_SNAP_EXIT_PX) {
            value = state.ringValue;
          } else {
            state.ringValue = null;
          }
        }

        if (state.ringValue === null || state.ringValue === undefined) {
          const nearestValue = clamp(Math.round((distance / radius) * max), RADAR_MIN_VALUE, max);
          const nearestRingRadius = radius * RadarModel.scale(nearestValue, max);
          if (Math.abs(distance - nearestRingRadius) <= RADAR_RING_SNAP_ENTER_PX) {
            state.ringValue = nearestValue;
            value = nearestValue;
          }
        }

        return RadarModel.point({ angle, value }, max);
      }

      static pointerSvgPoint(event) {
        const svg = event.currentTarget.ownerSVGElement || event.currentTarget.closest("svg");
        const matrix = svg?.getScreenCTM();
        if (!svg || !matrix) return null;
        const pointer = svg.createSVGPoint();
        pointer.x = event.clientX;
        pointer.y = event.clientY;
        return pointer.matrixTransform(matrix.inverse());
      }

      static dragMetrics(event) {
        const svg = event.currentTarget.ownerSVGElement || event.currentTarget.closest("svg");
        const rect = svg?.getBoundingClientRect();
        return svg && rect?.width && rect?.height ? { left: rect.left, top: rect.top, width: rect.width, height: rect.height, viewBoxWidth: 300, viewBoxHeight: 300 } : null;
      }

      static pointerSvgPointFromDrag(event, metrics) {
        return metrics ? {
          x: ((event.clientX - metrics.left) / metrics.width) * metrics.viewBoxWidth,
          y: ((event.clientY - metrics.top) / metrics.height) * metrics.viewBoxHeight
        } : null;
      }

      static valueFromPointer(event, index, count, max, center, radius) {
        const local = RadarModel.pointerSvgPoint(event);
        if (!local) return null;
        const edge = RadarModel.vertex(index, count, center, radius);
        const axisX = edge.x - center;
        const axisY = edge.y - center;
        const pointerX = local.x - center;
        const pointerY = local.y - center;
        const lengthSquared = axisX * axisX + axisY * axisY || 1;
        const scaled = clamp((pointerX * axisX + pointerY * axisY) / lengthSquared, 0, 1);
        return clamp(Math.round(scaled * max), RADAR_MIN_VALUE, max);
      }

      static pointFromPointer(event, axes, max, center, radius, snapState, dragMetrics) {
        const local = RadarModel.pointerSvgPointFromDrag(event, dragMetrics) || RadarModel.pointerSvgPoint(event);
        if (!local) return null;
        const pointerX = local.x - center;
        const pointerY = local.y - center;
        const distance = Math.sqrt(pointerX * pointerX + pointerY * pointerY);
        const scaled = clamp(distance / radius, RADAR_MIN_VALUE / max, 1);
        return RadarModel.snapPoint({
          angle: RadarModel.angle((Math.atan2(pointerY, pointerX) * 180 / Math.PI) + 90),
          value: scaled * max,
          distance
        }, axes, max, radius, snapState);
      }
    }

    function padDatePart(value) {
      return String(value).padStart(2, "0");
    }

    function isoFromDate(date) {
      return [date.getFullYear(), padDatePart(date.getMonth() + 1), padDatePart(date.getDate())].join("-");
    }

    function dateFromISO(value) {
      const text = String(value || "").trim();
      if (!/^\d{4}-\d{2}-\d{2}$/.test(text)) return null;
      const [year, month, day] = text.split("-").map(Number);
      const date = new Date(year, month - 1, day);
      if (date.getFullYear() !== year || date.getMonth() !== month - 1 || date.getDate() !== day) return null;
      return date;
    }

    function todayISO() {
      return isoFromDate(new Date());
    }

    function dateTime(value) {
      const date = dateFromISO(value);
      return date ? date.getTime() : null;
    }

    function readableDate(value) {
      const date = dateFromISO(value);
      return date ? date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) : "Not set";
    }

    function monthLabel(date) {
      return date.toLocaleDateString(undefined, { month: "long", year: "numeric" });
    }

    class CalendarModel {
      constructor(field) {
        Object.assign(this, field.settings);
      }

      static cleanDate(value) {
        const date = dateFromISO(value);
        return date ? isoFromDate(date) : "";
      }

      static milestones(items) {
        const source = Array.isArray(items) ? items : [];
        return source
          .map((item, index) => ({
            id: sanitizeId(item?.id || `milestone_${index + 1}`),
            date: CalendarModel.cleanDate(item?.date),
            label: String(item?.label || "").trim()
          }))
          .filter((item) => item.date || item.label)
          .sort((a, b) => (dateTime(a.date) ?? Number.MAX_SAFE_INTEGER) - (dateTime(b.date) ?? Number.MAX_SAFE_INTEGER) || a.label.localeCompare(b.label));
      }

      value(input) {
        const source = input && typeof input === "object" && !Array.isArray(input) ? input : {};
        let startDate = CalendarModel.cleanDate(source.startDate ?? this.startDate);
        let endDate = CalendarModel.cleanDate(source.endDate ?? this.endDate);
        if (startDate && endDate && dateTime(endDate) < dateTime(startDate)) [startDate, endDate] = [endDate, startDate];
        return {
          startDate,
          endDate,
          milestones: this.allowMilestones ? source.milestones === undefined ? this.milestones : CalendarModel.milestones(source.milestones) : []
        };
      }

      anchorDate(value = this) {
        return value.startDate || value.endDate || value.milestones.find((item) => item.date)?.date || todayISO();
      }

      milestonesForDate(iso, value = this) {
        return value.milestones.map((item, index) => ({ ...item, index })).filter((item) => item.date === iso);
      }

      milestoneDetails(items) {
        return items.map((item) => `${item.label} - ${readableDate(item.date)}`).join(" | ");
      }

      static monthKey(value) {
        const date = dateFromISO(value) || new Date();
        return `${date.getFullYear()}-${padDatePart(date.getMonth() + 1)}`;
      }

      static monthFromKey(key) {
        const [year, month] = String(key || "").split("-").map(Number);
        return Number.isFinite(year) && Number.isFinite(month) ? new Date(year, month - 1, 1) : new Date();
      }

      static shiftMonthKey(key, amount) {
        const date = CalendarModel.monthFromKey(key);
        date.setMonth(date.getMonth() + amount);
        return CalendarModel.monthKey(isoFromDate(date));
      }

      static gridDates(monthDate) {
        const first = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
        const start = new Date(first);
        start.setDate(first.getDate() - first.getDay());
        return Array.from({ length: 42 }, (_, index) => {
          const date = new Date(start);
          date.setDate(start.getDate() + index);
          return date;
        });
      }
    }

    function assertObject(value, name) {
      if (!value || typeof value !== "object" || Array.isArray(value)) throw new Error(`${name} must be an object.`);
      return value;
    }

    function assertString(value, name) {
      if (typeof value !== "string") throw new Error(`${name} must be a string.`);
    }

    function assertBoolean(value, name) {
      if (typeof value !== "boolean") throw new Error(`${name} must be a boolean.`);
    }

    function assertArray(value, name) {
      if (!Array.isArray(value)) throw new Error(`${name} must be an array.`);
    }

    function assertNumber(value, name) {
      if (typeof value !== "number" || !Number.isFinite(value)) throw new Error(`${name} must be a finite number.`);
    }

    function assertInteger(value, name) {
      assertNumber(value, name);
      if (!Number.isInteger(value)) throw new Error(`${name} must be an integer.`);
    }

    function assertExactKeys(value, keys, name) {
      keys.forEach((key) => {
        if (!(key in value)) throw new Error(`${name}.${key} is required.`);
      });
      Object.keys(value).forEach((key) => {
        if (!keys.includes(key)) throw new Error(`${name}.${key} is not supported.`);
      });
    }

    function assertOneOf(value, choices, name) {
      if (!choices.includes(value)) throw new Error(`${name} must be one of: ${choices.join(", ")}.`);
    }

    function assertNumberRange(value, name, min, max, integer = false) {
      if (integer) {
        assertInteger(value, name);
      } else {
        assertNumber(value, name);
      }
      if (value < min || value > max) throw new Error(`${name} must be between ${min} and ${max}.`);
    }

    function assertDateSetting(value, name) {
      assertString(value, name);
      if (value && !dateFromISO(value)) throw new Error(`${name} must be an ISO date string.`);
    }

    function assertHexColor(value, name) {
      assertString(value, name);
      hexColor(value);
    }

    function assertFontFamily(value, name) {
      assertString(value, name);
      fontFamilyValue(value);
    }

    function assertTypographyRole(style, key) {
      const name = `schema.settings.typography.${key}`;
      assertObject(style, name);
      assertExactKeys(style, TYPOGRAPHY_STYLE_KEYS, name);
      assertFontFamily(style.fontFamily, `${name}.fontFamily`);
      assertHexColor(style.color, `${name}.color`);
      assertNumberRange(style.size, `${name}.size`, 8, 96, true);
      assertNumberRange(style.weight, `${name}.weight`, 100, 1000, true);
      assertOneOf(style.style, ["normal", "italic"], `${name}.style`);
      assertNumberRange(style.lineHeight, `${name}.lineHeight`, 0.8, 3);
      assertNumberRange(style.letterSpacing, `${name}.letterSpacing`, 0, 12);

      Object.keys(DEFAULT_LAYOUT).forEach((key) => assertNumberRange(settings.layout[key], `schema.settings.layout.${key}`, 0, key === "fieldSpacing" ? 48 : 80, true));
      assertObject(settings.typography, "schema.settings.typography");
      assertExactKeys(settings.typography, TYPOGRAPHY_ROLE_KEYS, "schema.settings.typography");
      TYPOGRAPHY_ROLE_KEYS.forEach((key) => assertTypographyRole(settings.typography[key], key));

    function assertCalendarMilestones(items, name) {

    function assertRadarDefaults(values, axes, max, name) {

    function assertCssLength(value, name) {

    function assertSettingKeys(settings, keys, fieldType) {

    const FIELD_SCHEMA_VALIDATORS = {

    class FieldSchemaValidator {

    function schemaField(raw) {

          : OPTION_FIELD_TYPES.has(validator.field.type)

    function schemaContainer(raw, path) {
