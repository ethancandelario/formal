    function decodeSchemaToken(token) {
      const base64 = String(token || "").replace(/-/g, "+").replace(/_/g, "/");
      const padded = base64 + "=".repeat((4 - base64.length % 4) % 4);
      const binary = atob(padded);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return JSON.parse(new TextDecoder().decode(bytes));
    }

    function schemaTokenFromPath() {
      const segment = window.location.pathname.replace(/\/+$/g, "").split("/").pop() || "";
      if (!segment || segment.includes(".") || segment.length < 16) return "";
      return segment;
    }

    function inlineSchemaFromLocation() {
      try {
        const params = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(window.location.hash.slice(1));
        const token = params.get("s") || hashParams.get("s") || schemaTokenFromPath();
        if (token) return decodeSchemaToken(token);
        return null;
      } catch (error) {
        console.warn(error);
        return null;
      }
    }

    function embeddedSchemaFromDocument() {
      const element = document.getElementById(EMBEDDED_SCHEMA_ELEMENT_ID);
      if (!element) return null;

      const token = String(element.dataset.schemaToken || "").trim();
      if (token) return decodeSchemaToken(token);

      const json = String(element.textContent || "").trim();
      return json ? JSON.parse(json) : null;
    }

    const EXPORT_PAGE_WIDTH = 794;
    const EXPORT_PAGE_HEIGHT = 1123;
    const EXPORT_SCALE = 2;

    function exportElement(tag, className = "", text = "") {
      const element = document.createElement(tag);
      if (className) element.className = className;
      if (text !== "") element.textContent = text;
      return element;
    }

    function syncExportControlState(sourceRoot, cloneRoot) {
      const sourceControls = [...sourceRoot.querySelectorAll("input, textarea, select")];
      const cloneControls = [...cloneRoot.querySelectorAll("input, textarea, select")];
      sourceControls.forEach((source, index) => {
        const clone = cloneControls[index];
        if (!clone) return;

        if (source.tagName === "TEXTAREA") {
          clone.value = source.value;
          clone.textContent = source.value;
          return;
        }

        if (source.tagName === "SELECT") {
          clone.value = source.value;
          [...clone.options].forEach((option) => {
            option.selected = option.value === source.value;
            if (option.selected) option.setAttribute("selected", "");
            else option.removeAttribute("selected");
          });
          return;
        }

        if (source.type === "checkbox" || source.type === "radio") {
          clone.checked = source.checked;
          if (source.checked) clone.setAttribute("checked", "");
          else clone.removeAttribute("checked");
          return;
        }

        if (source.type !== "file") {
          clone.value = source.value;
          clone.setAttribute("value", source.value);
        }
      });
    }

    function syncExportMediaState(sourceRoot, cloneRoot) {
      const sourceMedia = [...sourceRoot.querySelectorAll("video, audio")];
      const cloneMedia = [...cloneRoot.querySelectorAll("video, audio")];
      sourceMedia.forEach((source, index) => {
        const clone = cloneMedia[index];
        if (!clone) return;
        try {
          clone.currentTime = Number.isFinite(source.currentTime) ? source.currentTime : 0;
        } catch (error) {
          // Some media elements cannot be seeked until metadata is available.
        }
        clone.pause?.();
      });
    }

    function exportImageSourceLooksLikeSvg(image) {
      const source = String(image.currentSrc || image.getAttribute("src") || "").trim();
      return /^data:image\/svg\+xml/i.test(source) || /\.svg(?:[?#]|$)/i.test(source);
    }

    function waitForExportImage(image) {
      if (!image) return Promise.resolve();
      if (image.decode) {
        return image.decode().catch(() => {
          if (image.complete) return;
          return new Promise((resolve) => {
            image.addEventListener("load", resolve, { once: true });
            image.addEventListener("error", resolve, { once: true });
          });
        });
      }
      if (image.complete) return Promise.resolve();
      return new Promise((resolve) => {
        image.addEventListener("load", resolve, { once: true });
        image.addEventListener("error", resolve, { once: true });
      });
    }

    function waitForExportLayout() {
      return new Promise((resolve) => {
        requestAnimationFrame(() => requestAnimationFrame(resolve));
      });
    }

    function decodeExportSvgDataUrl(source) {
      const commaIndex = source.indexOf(",");
      if (commaIndex < 0) return "";
      const header = source.slice(0, commaIndex).toLowerCase();
      const payload = source.slice(commaIndex + 1);
      try {
        if (header.includes(";base64")) return atob(payload);
        return decodeURIComponent(payload.replace(/\+/g, "%20"));
      } catch (error) {
        return "";
      }
    }

    async function loadExportSvgMarkup(source) {
      if (/^data:image\/svg\+xml/i.test(source)) return decodeExportSvgDataUrl(source);
      try {
        const response = await fetch(source, { mode: "cors", credentials: "same-origin" });
        if (!response.ok) return "";
        const type = response.headers.get("content-type") || "";
        if (type && !/svg|xml|text/i.test(type)) return "";
        return response.text();
      } catch (error) {
        return "";
      }
    }

    function importExportSvg(markup) {
      if (!markup) return null;
      const parsed = new DOMParser().parseFromString(markup, "image/svg+xml");
      if (parsed.querySelector("parsererror")) return null;
      const svg = parsed.documentElement;
      if (!svg || svg.nodeName.toLowerCase() !== "svg") return null;
      svg.querySelectorAll("script").forEach((script) => script.remove());
      return document.importNode(svg, true);
    }

    function inlineSvgSizeFromImage(image, inlineSvg) {
      const rect = image.getBoundingClientRect();
      let width = rect.width;
      let height = rect.height;
      const viewBox = String(inlineSvg.getAttribute("viewBox") || "").trim().split(/[\s,]+/).map(Number);
      const viewBoxWidth = viewBox.length === 4 && Number.isFinite(viewBox[2]) ? viewBox[2] : 0;
      const viewBoxHeight = viewBox.length === 4 && Number.isFinite(viewBox[3]) ? viewBox[3] : 0;
      const naturalWidth = image.naturalWidth || viewBoxWidth;
      const naturalHeight = image.naturalHeight || viewBoxHeight;

      if ((!height || height < 1) && width && naturalWidth && naturalHeight) {
        height = width * naturalHeight / naturalWidth;
      }

      if ((!width || width < 1) && height && naturalWidth && naturalHeight) {
        width = height * naturalWidth / naturalHeight;
      }

      return {
        width: Math.max(1, Math.round(width || naturalWidth || viewBoxWidth || 1)),
        height: Math.max(1, Math.round(height || naturalHeight || viewBoxHeight || 1))
      };
    }

    async function inlineExportSvgMediaImages(root) {
      const images = [...root.querySelectorAll("img.media-visual")].filter(exportImageSourceLooksLikeSvg);
      for (const image of images) {
        await waitForExportImage(image);
        const source = String(image.currentSrc || image.getAttribute("src") || "").trim();
        const inlineSvg = importExportSvg(await loadExportSvgMarkup(source));
        if (!inlineSvg) continue;

        const size = inlineSvgSizeFromImage(image, inlineSvg);
        const className = image.getAttribute("class") || "";
        const inlineStyle = image.getAttribute("style") || "";
        const alt = image.getAttribute("alt") || "";

        inlineSvg.setAttribute("class", className);
        inlineSvg.setAttribute("style", inlineStyle);
        inlineSvg.style.display = "block";
        inlineSvg.style.width = `${size.width}px`;
        inlineSvg.style.height = `${size.height}px`;
        inlineSvg.style.maxWidth = "100%";
        inlineSvg.style.maxHeight = "none";
        inlineSvg.style.overflow = "visible";
        inlineSvg.setAttribute("preserveAspectRatio", inlineSvg.getAttribute("preserveAspectRatio") || "xMidYMid meet");
        inlineSvg.setAttribute("focusable", "false");
        inlineSvg.setAttribute("data-export-inlined-svg", "true");
        if (alt) inlineSvg.setAttribute("aria-label", alt);
        else inlineSvg.setAttribute("aria-hidden", "true");

        image.replaceWith(inlineSvg);
      }
    }

    function prepareRuntimeExportNode(node) {
      node.classList.add("export-runtime-field");
      node.querySelectorAll("[id]").forEach((item) => item.removeAttribute("id"));
      node.querySelectorAll("[for]").forEach((item) => item.removeAttribute("for"));
      node.querySelectorAll(".calendar-nav-buttons, .calendar-milestone-editor > .button, .calendar-milestone-row .icon-button, .calendar-milestone-empty").forEach((item) => item.setAttribute("data-export-hidden", "true"));
      node.querySelectorAll("input[type='file']").forEach((item) => item.setAttribute("data-export-hidden", "true"));
      node.querySelectorAll("details").forEach((item) => item.open = true);
      return node;
    }

    function createExportPage(documentNode) {
      const page = exportElement("section", "export-page");
      page.append(exportElement("div", "export-page-content"));
      documentNode.append(page);
      return page;
    }

    function paginateExportNodes(exportDoc, fieldNodes) {
      exportDoc.documentNode.textContent = "";
      let page = createExportPage(exportDoc.documentNode);
      let content = page.querySelector(".export-page-content");

      fieldNodes.forEach((fieldNode) => {
        content.append(fieldNode);
        if (content.children.length > 1 && page.scrollHeight > EXPORT_PAGE_HEIGHT + 1) {
          fieldNode.remove();
          page = createExportPage(exportDoc.documentNode);
          content = page.querySelector(".export-page-content");
          content.append(fieldNode);
        }
      });

      exportDoc.pages = [...exportDoc.documentNode.querySelectorAll(".export-page")];
    }

    function buildRuntimeExportDocument(schema, captureNode) {
      if (!captureNode) throw new Error("Runtime capture node was not available.");
      const mount = exportElement("div", "export-mount");
      const documentNode = exportElement("div", "export-document");
      documentNode.setAttribute("style", themeStyle(schema));
      mount.append(documentNode);
      document.body.append(mount);

      const sourceFields = [...(captureNode.querySelector(".fields")?.children || [])];
      const fields = sourceFields.map((source) => {
        const clone = source.cloneNode(true);
        syncExportControlState(source, clone);
        syncExportMediaState(source, clone);
        return prepareRuntimeExportNode(clone);
      });
      if (!fields.length) fields.push(exportElement("div", "export-empty", "Blank form"));

      const exportDoc = { mount, documentNode, pages: [], fields };
      paginateExportNodes(exportDoc, fields);
      return exportDoc;
    }

    async function waitForExportAssets(root) {
      const images = [...root.querySelectorAll("img")];
      const media = [...root.querySelectorAll("video")];
      const frames = [...root.querySelectorAll("iframe")];

      await Promise.all(images.map(waitForExportImage));
      await inlineExportSvgMediaImages(root);
      await waitForExportLayout();

      await Promise.all([
        ...[...root.querySelectorAll("img")].map(waitForExportImage),
        ...media.map((item) => {
          if (item.readyState >= 2) return Promise.resolve();
          return new Promise((resolve) => {
            item.addEventListener("loadeddata", resolve, { once: true });
            item.addEventListener("error", resolve, { once: true });
            window.setTimeout(resolve, 1200);
          });
        }),
        ...frames.map((frame) => new Promise((resolve) => {
          frame.addEventListener("load", resolve, { once: true });
          window.setTimeout(resolve, 800);
        }))
      ]);
    }

    async function captureExportElement(element, theme) {
      return html2canvas(element, {
        scale: EXPORT_SCALE,
        backgroundColor: theme.bg,
        useCORS: true,
        logging: false,
        windowWidth: Math.max(element.scrollWidth || 0, EXPORT_PAGE_WIDTH),
        windowHeight: Math.max(element.scrollHeight || 0, EXPORT_PAGE_HEIGHT),
        scrollX: 0,
        scrollY: 0
      });
    }

    async function exportPdfFromDocument(exportDoc, schema, theme) {
      const pdfCtor = window.jspdf?.jsPDF;
      if (!pdfCtor) {
        window.alert("PDF export library did not load.");
        return;
      }

      const pdf = new pdfCtor("p", "pt", "a4");
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();
      for (let index = 0; index < exportDoc.pages.length; index += 1) {
        if (index > 0) pdf.addPage();
        const canvas = await captureExportElement(exportDoc.pages[index], theme);
        pdf.addImage(canvas.toDataURL("image/png"), "PNG", 0, 0, pageWidth, pageHeight);
      }
      pdf.save(safeFileName(schemaDisplayName(schema)) + ".pdf");
    }

    async function exportFormDocument(kind, schema, captureNode) {
      const theme = schema.settings.theme;
      const exportDoc = buildRuntimeExportDocument(schema, captureNode);
      try {
        if (document.fonts?.ready) await document.fonts.ready;
        await waitForExportAssets(exportDoc.mount);
        paginateExportNodes(exportDoc, exportDoc.fields);
        if (kind === "pdf") {
          await exportPdfFromDocument(exportDoc, schema, theme);
          return;
        }

        const canvas = await captureExportElement(exportDoc.documentNode, theme);
        const mime = kind === "jpg" ? "image/jpeg" : "image/png";
        downloadDataUrl(canvas.toDataURL(mime, 0.94), safeFileName(schemaDisplayName(schema)) + "." + kind);
      } finally {
        exportDoc.mount.remove();
      }
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      return /[",\r\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
    }

    function downloadBlob(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function exportCsv(schema, values) {
      const fields = schemaElements(schema).filter((field) => !NON_DATA_FIELD_TYPES.has(field.type));
      const rows = [
        fields.map((field) => csvEscape(fieldAccessibleName(field))),
        fields.map((field) => csvEscape(RuntimeFormModel.csvAnswer(field, values[field.id])))
      ];
      downloadBlob(new Blob([rows.map((row) => row.join(",")).join("\r\n") + "\r\n"], { type: "text/csv;charset=utf-8" }), safeFileName(schemaDisplayName(schema)) + ".csv");
    }

    function downloadDataUrl(dataUrl, fileName) {
      const link = document.createElement("a");
      link.href = dataUrl;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function initialRuntimeState() {
      return { schema: null, values: {}, invalidIds: new Set() };
    }

    function runtimeReducer(state, action) {
      switch (action.type) {
        case "load-schema": {
          const schema = schemaDocument(action.schema);
          return { schema, values: RuntimeFormModel.initialValues(schema), invalidIds: new Set() };
        }
        case "clear-schema":
          return initialRuntimeState();
        case "set-value": {
          const invalidIds = new Set(state.invalidIds);
          invalidIds.delete(action.id);
          return { ...state, values: { ...state.values, [action.id]: action.value }, invalidIds };
        }
        case "reset-values":
          return state.schema ? { ...state, values: RuntimeFormModel.initialValues(state.schema), invalidIds: new Set() } : state;
        case "set-invalid":
          return { ...state, invalidIds: action.invalidIds };
        default:
          return state;
      }
    }


    function RuntimeApp() {
      const [{ schema, values, invalidIds }, dispatchRuntime] = useReducer(runtimeReducer, null, initialRuntimeState);
      const [sidebarCollapsed, setSidebarCollapsed] = useState(true);
      const [exportFormat, setExportFormat] = useState("pdf");
      const [exporting, setExporting] = useState(false);
      const captureRef = useRef(null);

      function setLoadedSchema(nextSchema) {
        dispatchRuntime({ type: "load-schema", schema: nextSchema });
      }

      useEffect(() => {
        document.title = schema ? schemaDisplayName(schema) + " - Formal" : "Formal";
      }, [schema]);

      useEffect(() => {
        if (!schema) return;
        const theme = schema.settings.theme;
        const typography = typographySettings(schema.settings.typography, theme);
        ensureGoogleFontLoaded(theme.fontFamily);
        TYPOGRAPHY_ROLES.forEach((role) => ensureGoogleFontLoaded(typography[role.key].fontFamily));
      }, [schema]);

      useEffect(() => {
        async function bootstrap() {
          const params = new URLSearchParams(window.location.search);
          const schemaUrl = params.get("schema");
          const previewMode = params.get("preview") === "1";

          try {
            const embeddedSchema = embeddedSchemaFromDocument();
            if (embeddedSchema) {
              setLoadedSchema(embeddedSchema);
              return;
            }
          } catch (error) {
            console.error(error);
            window.alert("The embedded schema could not be loaded.");
            return;
          }

          const inlineSchema = inlineSchemaFromLocation();
          if (inlineSchema) {
            setLoadedSchema(inlineSchema);
            return;
          }

          if (previewMode) {
            try {
              const builderSchema = localStorage.getItem(BUILDER_STORAGE_KEY);
              if (builderSchema) {
                setLoadedSchema(JSON.parse(builderSchema));
                return;
              }
            } catch (error) {
              console.warn(error);
            }
          }

          if (schemaUrl) {
            try {
              const response = await fetch(schemaUrl);
              if (!response.ok) throw new Error("Unable to load schema");
              setLoadedSchema(await response.json());
              return;
            } catch (error) {
              console.error(error);
              window.alert("The schema URL could not be loaded.");
            }
          }

          dispatchRuntime({ type: "clear-schema" });
        }

        bootstrap();
      }, []);

      useEffect(() => {
        function prevent(event) {
          event.preventDefault();
        }

        async function drop(event) {
          event.preventDefault();
          const file = [...event.dataTransfer.files].find((item) => item.type === "application/json" || item.name.endsWith(".json"));
          if (!file) return;
          try {
            setLoadedSchema(JSON.parse(await file.text()));
          } catch (error) {
            window.alert("That JSON file could not be loaded.");
            console.error(error);
          }
        }

        document.addEventListener("dragover", prevent);
        document.addEventListener("drop", drop);
        return () => {
          document.removeEventListener("dragover", prevent);
          document.removeEventListener("drop", drop);
        };
      }, []);

      async function importSchema(event) {
        const file = event.currentTarget.files?.[0];
        if (!file) return;
        try {
          setLoadedSchema(JSON.parse(await file.text()));
        } catch (error) {
          window.alert("That JSON file could not be loaded.");
          console.error(error);
        } finally {
          event.currentTarget.value = "";
        }
      }

      function updateValue(id, value) {
        dispatchRuntime({ type: "set-value", id, value });
      }

      function resetForm() {
        if (!schema) return;
        dispatchRuntime({ type: "reset-values" });
      }

      function validateRequired() {
        if (!schema) return false;
        const invalid = RuntimeFormModel.invalidIds(schema, values);
        dispatchRuntime({ type: "set-invalid", invalidIds: invalid });
        if (invalid.size) {
          setTimeout(() => document.querySelector(".field.invalid")?.scrollIntoView({ behavior: "smooth", block: "center" }), 0);
          return false;
        }
        return true;
      }

      async function exportFilledForm(kind) {
        if (!schema || exporting || !validateRequired()) return;

        setExporting(true);
        try {
          if (kind === "csv") {
            exportCsv(schema, values);
            return;
          }
          await exportFormDocument(kind, schema, captureRef.current);
        } finally {
          setExporting(false);
        }
      }

      return html`
        <div class=${`runtime-shell${sidebarCollapsed ? " sidebar-collapsed" : ""}`}>
          <button class="icon-button sidebar-expand-button" type="button" title="Expand sidebar" aria-label="Expand sidebar" aria-hidden=${!sidebarCollapsed} tabIndex=${sidebarCollapsed ? 0 : -1} onClick=${() => setSidebarCollapsed(false)}>
            <${Icon} icon="fa-solid fa-chevron-right" />
          </button>

          <aside class="runtime-sidebar" aria-label="Runtime actions" aria-hidden=${sidebarCollapsed} inert=${sidebarCollapsed ? "" : null}>
            <div class="runtime-sidebar-content">
              <div>
                <div class="runtime-sidebar-head">
                  <button class="icon-button" type="button" title="Collapse sidebar" aria-label="Collapse sidebar" onClick=${() => setSidebarCollapsed(true)}>
                    <${Icon} icon="fa-solid fa-chevron-left" />
                  </button>
                </div>
                <div class="sidebar-actions">
                  <label class="button full" for="schemaFile"><${Icon} icon="fa-regular fa-folder-open" /><span>Open</span></label>
                  <input class="sr-only" id="schemaFile" type="file" accept="application/json,.json" onChange=${importSchema} />
                  <button class="button full" type="button" disabled=${!schema} onClick=${resetForm}><${Icon} icon="fa-solid fa-rotate-left" /><span>Reset</span></button>
                </div>
              </div>

            </div>
          </aside>

          <main class="stage" style=${schema ? themeStyle(schema) : ""}>
            <section class="capture" ref=${captureRef}>
              ${schema ? html`
                <div class="fields">
                  ${schema.blocks.length
            ? schema.blocks.map((block) => html`
                      <${RuntimeBlock}
                        key=${block.id}
                        block=${block}
                        values=${values}
                        invalidIds=${invalidIds}
                        onValue=${updateValue}
                      />
                    `)
            : html`<div class="empty"><strong>Blank form</strong></div>`}
                </div>
              ` : html`
                <div class="empty">
                  <div class="empty-inner">
                    <span class="empty-icon"><${Icon} icon="fa-regular fa-file-code" /></span>
                    <strong>No schema loaded</strong>
                  </div>
                </div>
              `}
            </section>
            <div class="runtime-export-bar" role="group" aria-label="Export filled form">
              <div class="select-wrap">
                <select class="select" id="exportFormat" value=${exportFormat} disabled=${!schema || exporting} onChange=${(event) => setExportFormat(event.currentTarget.value)}>
                  <option value="pdf">PDF</option>
                  <option value="png">PNG</option>
                  <option value="jpg">JPG</option>
                  <option value="csv">CSV</option>
                </select>
                <${Icon} icon="fa-solid fa-chevron-down" className="select-icon" />
              </div>
              <button class="button primary" type="button" data-export disabled=${!schema || exporting} onClick=${() => exportFilledForm(exportFormat)}>
                <span>${exporting ? "Preparing" : "Export"}</span>
              </button>
            </div>
          </main>
        </div>
      `;
    }

    render(html`<${RuntimeApp} />`, document.getElementById("app"));
  </script>
</body>

</html>
