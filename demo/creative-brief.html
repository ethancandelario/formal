    function assertUniqueMiddlePlacements(containers, path) {
      const seen = new Map();
      containers.forEach((container, index) => {
        if (!isMiddlePlacement(container.placement)) return;
        if (seen.has(container.placement)) throw new Error(`${path}.containers[${index}].placement duplicates middle slot "${container.placement}".`);
        seen.set(container.placement, index);
      });
    }

    function schemaBlock(raw, path) {
      const block = assertObject(raw, path);
      assertExactKeys(block, ["id", "containers"], path);
      assertString(block.id, `${path}.id`);
      assertArray(block.containers, `${path}.containers`);
      if (!block.containers.length) throw new Error(`${path}.containers must contain at least one container.`);
      block.containers.forEach((container, index) => schemaContainer(container, `${path}.containers[${index}]`));
      assertUniqueMiddlePlacements(block.containers, path);
      return block;
    }

    function schemaDocument(input) {
      const schema = assertObject(input, "schema");
      assertExactKeys(schema, ["createdAt", "updatedAt", "settings", "blocks"], "schema");
      assertString(schema.createdAt, "schema.createdAt");
      assertString(schema.updatedAt, "schema.updatedAt");
      assertObject(schema.settings, "schema.settings");
      assertExactKeys(schema.settings, ["name", "theme", "layout", "typography"], "schema.settings");
      assertString(schema.settings.name, "schema.settings.name");
      assertObject(schema.settings.theme, "schema.settings.theme");
      assertExactKeys(schema.settings.theme, Object.keys(DEFAULT_THEME), "schema.settings.theme");
      Object.keys(DEFAULT_THEME).forEach((key) => {
        if (key === "fontFamily") {
          assertFontFamily(schema.settings.theme[key], `schema.settings.theme.${key}`);
        } else {
          assertHexColor(schema.settings.theme[key], `schema.settings.theme.${key}`);
        }
      });
      assertAppearanceSettings(schema.settings);
      assertArray(schema.blocks, "schema.blocks");
      const seenBlockIds = new Set();
      const seenContainerIds = new Set();
      const seenElementIds = new Set();
      schema.blocks.forEach((block, blockIndex) => {
        schemaBlock(block, `schema.blocks[${blockIndex}]`);
        if (seenBlockIds.has(block.id)) throw new Error(`Duplicate block id: ${block.id}`);
        seenBlockIds.add(block.id);
        block.containers.forEach((container, containerIndex) => {
          if (seenContainerIds.has(container.id)) throw new Error(`Duplicate container id: ${container.id}`);
          seenContainerIds.add(container.id);
          container.elements.forEach((field, elementIndex) => {
            if (seenElementIds.has(field.id)) throw new Error(`Duplicate field id: ${field.id}`);
            seenElementIds.add(field.id);
            if (NON_DATA_FIELD_TYPES.has(field.type) && field.required) throw new Error(`schema.blocks[${blockIndex}].containers[${containerIndex}].elements[${elementIndex}].required must be false for ${field.type}.`);
          });
        });
      });
      return schema;
    }

    function schemaDisplayName(schema) {
      return String(schema.settings.name || "").trim() || DEFAULT_FORM_NAME;
    }

    class RuntimeFormModel {
      static initialValue(field) {
        if (field.type === "linear_scale") {
          const { min, max } = field.settings;
          return Math.round(min + (max - min) / 2);
        }
        if (field.type === "radar") return new RadarModel(field).initialValue();
        if (field.type === "calendar") return new CalendarModel(field).value({});
        return undefined;
      }

      static initialValues(schema) {
        return schemaElements(schema).reduce((values, field) => {
          const value = RuntimeFormModel.initialValue(field);
          if (value !== undefined) values[field.id] = value;
          return values;
        }, {});
      }

      static checkboxSelected(value) {
        if (Array.isArray(value)) return value;
        if (value && typeof value === "object" && Array.isArray(value.selected)) return value.selected;
        return [];
      }

      static isEmpty(field, value) {
        if (NON_DATA_FIELD_TYPES.has(field.type)) return false;
        if (field.type === "checkbox") return RuntimeFormModel.checkboxSelected(value).length === 0;
        if (Array.isArray(value)) return value.length === 0;
        if (field.type === "media_upload" && value && typeof value === "object") return !value.dataUrl;
        if (field.type === "calendar") return !value || !value.startDate || !value.endDate;
        return value === undefined || value === null || value === "";
      }

      static invalidIds(schema, values) {
        return new Set(schemaElements(schema).filter((field) => field.required && RuntimeFormModel.isEmpty(field, values[field.id])).map((field) => field.id));
      }

      static csvAnswer(field, value) {
        if (value === null || value === undefined || value === "") return "";
        if (field.type === "checkbox") return RuntimeFormModel.checkboxSelected(value).join("; ");
        if (field.type === "calendar" && value && typeof value === "object" && !Array.isArray(value)) {
          return [
            value.startDate ? `Start: ${value.startDate}` : "",
            value.endDate ? `End: ${value.endDate}` : "",
            ...(Array.isArray(value.milestones) ? value.milestones.filter((item) => item.date || item.label).map((item) => `${item.label || "Milestone"}: ${item.date || "No date"}`) : [])
          ].filter(Boolean).join("; ");
        }
        if (field.type === "radar") {
          if (Array.isArray(value)) return field.settings.axes.map((axis, index) => `${axis}: ${value[index] ?? ""}`).join("; ");
          if (value && typeof value === "object") return `Angle: ${RadarModel.format(value.angle)}; Value: ${RadarModel.format(value.value)}`;
        }
        if (field.type === "media_upload" && value && typeof value === "object") return value.name || value.type || (value.dataUrl ? "Uploaded file" : "");
        return typeof value === "object" ? JSON.stringify(value) : value;
      }
    }

    function safeFileName(value) {
      return String(value).trim().toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || "Untitled Form";
    }

    function longAnswerStyle(placeholder) {
      const text = String(placeholder || "");
      const estimatedRows = text
        .split(/\r?\n/)
        .reduce((rows, line) => rows + Math.max(1, Math.ceil(line.length / 58)), 0);
      const minHeight = Math.max(104, Math.min(280, 28 + Math.max(4, estimatedRows) * 21));
      return `min-height: ${minHeight}px;`;
    }

    function urlWithProtocol(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      if (/^https?:\/\//i.test(text)) return text;
      return "https://" + text;
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    class ChoiceSetting {
      constructor(name, options) {
        this.name = name;
        this.options = options;
        this.values = options.map((option) => option.value);
      }

      read(value) {
        if (!this.values.includes(value)) throw new Error(`Unsupported ${this.name}: ${value}`);
        return value;
      }
    }

    class AlignmentSetting extends ChoiceSetting {
      constructor(name, options) {
        super(name, options);
      }

      grid(value) {
        const option = this.option(value);
        return option.grid;
      }

      flex(value) {
        const option = this.option(value);
        return option.flex;
      }

      text(value) {
        const option = this.option(value);
        return option.text || "center";
      }

      objectPosition(value) {
        const option = this.option(value);
        return option.objectPosition || "center";
      }

      option(value) {
        const clean = this.read(value);
        return this.options.find((option) => option.value === clean);
      }
    }

    class SizeSetting extends ChoiceSetting {
      constructor(name) {
        super(name, [
          { value: "auto", label: "Auto" },
          { value: "stretch", label: "Stretch" }
        ]);
      }

      isStretch(value) {
        return this.read(value) === "stretch";
      }
    }

    const HORIZONTAL_ALIGNMENT = new AlignmentSetting("horizontal alignment", [
      { value: "left", label: "Left", grid: "start", flex: "flex-start", text: "left", objectPosition: "left" },
      { value: "center", label: "Center", grid: "center", flex: "center", text: "center", objectPosition: "center" },
      { value: "right", label: "Right", grid: "end", flex: "flex-end", text: "right", objectPosition: "right" }
    ]);
    const VERTICAL_ALIGNMENT = new AlignmentSetting("vertical alignment", [
      { value: "top", label: "Top", grid: "start", flex: "flex-start", objectPosition: "top" },
      { value: "center", label: "Center", grid: "center", flex: "center", objectPosition: "center" },
      { value: "bottom", label: "Bottom", grid: "end", flex: "flex-end", objectPosition: "bottom" }
    ]);
    const HORIZONTAL_SIZE = new SizeSetting("horizontal size");
    const VERTICAL_SIZE = new SizeSetting("vertical size");

    class ContainerLayoutModel {
      constructor(container) {
        this.horizontalAlignment = HORIZONTAL_ALIGNMENT.read(container.horizontalAlignment);
        this.verticalAlignment = VERTICAL_ALIGNMENT.read(container.verticalAlignment);
        this.horizontalSize = HORIZONTAL_SIZE.read(container.horizontalSize);
        this.verticalSize = VERTICAL_SIZE.read(container.verticalSize);
      }

      get style() {
        const horizontalStretch = HORIZONTAL_SIZE.isStretch(this.horizontalSize);
        const verticalStretch = VERTICAL_SIZE.isStretch(this.verticalSize);
        const horizontal = horizontalStretch ? "stretch" : HORIZONTAL_ALIGNMENT.grid(this.horizontalAlignment);
        const vertical = verticalStretch ? "stretch" : VERTICAL_ALIGNMENT.grid(this.verticalAlignment);
        const width = horizontalStretch ? "100%" : "max-content";
        const height = verticalStretch ? "100%" : "auto";
        return `justify-self: ${horizontal}; align-self: ${vertical}; justify-items: stretch; align-content: ${vertical}; width: ${width}; max-width: 100%; height: ${height}; box-sizing: border-box;`;
      }
    }

    class TextAlignmentModel {
      constructor(horizontal, vertical) {
        this.horizontal = HORIZONTAL_ALIGNMENT.read(horizontal);
        this.vertical = VERTICAL_ALIGNMENT.read(vertical);
      }

      get style() {
        return `display: flex; justify-content: ${HORIZONTAL_ALIGNMENT.flex(this.horizontal)}; align-items: ${VERTICAL_ALIGNMENT.flex(this.vertical)}; text-align: ${HORIZONTAL_ALIGNMENT.text(this.horizontal)};`;
      }
    }

    class HeadlineModel {
      constructor(field) {
        const settings = field.settings;
        this.field = field;
        this.headingHorizontalAlignment = HORIZONTAL_ALIGNMENT.read(settings.headingHorizontalAlignment);
        this.headingVerticalAlignment = VERTICAL_ALIGNMENT.read(settings.headingVerticalAlignment);
        this.descriptionHorizontalAlignment = HORIZONTAL_ALIGNMENT.read(settings.descriptionHorizontalAlignment);
        this.descriptionVerticalAlignment = VERTICAL_ALIGNMENT.read(settings.descriptionVerticalAlignment);
        this.showLabel = settings.showLabel;
        this.outline = settings.outline;
        this.background = settings.background;
      }

      textStyle(horizontalKey, verticalKey) {
        return new TextAlignmentModel(this[horizontalKey], this[verticalKey]).style;
      }
    }

    class MediaModel {
      constructor(field) {
        const settings = field.settings;
        const objectFit = settings.objectFit;
        if (!["contain", "cover", "fill", "scale-down"].includes(objectFit)) throw new Error(`Unsupported media fit: ${objectFit}`);
        this.field = field;
        this.sourceType = settings.sourceType;
        this.url = settings.url;
        this.dataUrl = settings.dataUrl;
        this.mimeType = settings.mimeType;
        this.fileName = settings.fileName;
        this.alt = settings.alt;
        this.caption = settings.caption;
        this.html = settings.html;
        this.iframeHeight = settings.iframeHeight;
        this.horizontalAlignment = HORIZONTAL_ALIGNMENT.read(settings.horizontalAlignment);
        this.verticalAlignment = VERTICAL_ALIGNMENT.read(settings.verticalAlignment);
        this.horizontalSize = HORIZONTAL_SIZE.read(settings.horizontalSize);
        this.scale = settings.scale;
        this.maxWidth = settings.maxWidth;
        this.maxHeight = settings.maxHeight;
        this.padding = settings.padding;
        this.objectFit = objectFit;
        this.outline = settings.outline;
        this.background = settings.background;
      }

      get source() {
        return this.sourceType === "file" ? this.dataUrl : this.url;
      }

      get kind() {
        if (this.sourceType === "html") return "html";
        const source = String(this.source || "").toLowerCase().split(/[?#]/)[0];
        const mime = String(this.mimeType || "").toLowerCase();
        if (mime.startsWith("image/") || source.startsWith("data:image/") || /\.(apng|avif|gif|jpe?g|png|svg|webp)$/i.test(source)) return "image";
        if (mime.startsWith("video/") || source.startsWith("data:video/") || /\.(mp4|m4v|mov|ogv|webm)$/i.test(source)) return "video";
        if (mime.startsWith("audio/") || source.startsWith("data:audio/") || /\.(aac|flac|m4a|mp3|oga|ogg|wav|webm)$/i.test(source)) return "audio";
        if (mime === "application/pdf" || source.startsWith("data:application/pdf") || /\.pdf$/i.test(source)) return "document";
        return "unknown";
      }

      get title() {
        return this.alt || this.fileName || this.field.label;
      }

      get alignmentStyle() {
        return `justify-content: ${HORIZONTAL_ALIGNMENT.flex(this.horizontalAlignment)}; align-items: ${VERTICAL_ALIGNMENT.flex(this.verticalAlignment)}; text-align: ${HORIZONTAL_ALIGNMENT.text(this.horizontalAlignment)}; padding: ${this.padding}px;`;
      }

      get audioStyle() {
        return HORIZONTAL_SIZE.isStretch(this.horizontalSize) ? "width: 100%;" : `width: ${this.scale}%; ${this.maxWidth ? `max-width: ${this.maxWidth};` : ""}`;
      }

      visualStyle(extra = "") {
        const width = HORIZONTAL_SIZE.isStretch(this.horizontalSize) ? "100%" : `${this.scale}%`;
        const maxWidth = !HORIZONTAL_SIZE.isStretch(this.horizontalSize) && this.maxWidth ? `max-width: ${this.maxWidth};` : "";
        const maxHeight = `max-height: ${this.maxHeight}px;`;
        const positionX = HORIZONTAL_ALIGNMENT.objectPosition(this.horizontalAlignment);
        const positionY = VERTICAL_ALIGNMENT.objectPosition(this.verticalAlignment);
        return `width: ${width}; ${maxWidth} ${maxHeight} object-fit: ${this.objectFit}; object-position: ${positionX} ${positionY}; ${extra}`.trim();
      }
    }

    function MediaPreview({ field }) {
      const media = new MediaModel(field);
      const source = media.source;
      const kind = media.kind;
      const visualStyle = media.visualStyle();

      if (kind === "html") {
        if (!media.html) return null;
        return html`
          <div class="media-preview">
            <div class="media-content-wrap" style=${media.alignmentStyle}>
              <iframe class="media-embed media-visual" title=${media.title} srcdoc=${media.html} sandbox="allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox" style=${media.visualStyle(`height: ${media.iframeHeight}px; max-height: none;`)}></iframe>
            </div>
            ${media.caption ? html`<p class="media-caption">${media.caption}</p>` : null}
          </div>
        `;
      }

      if (!source) return null;

      return html`
        <div class="media-preview">
          <div class="media-content-wrap" style=${media.alignmentStyle}>
            ${kind === "image" ? html`<img class="media-visual" src=${source} alt=${media.alt || ""} style=${visualStyle} />` : null}
            ${kind === "video" ? html`<video class="media-visual" src=${source} controls playsinline title=${media.title} style=${visualStyle}></video>` : null}
            ${kind === "audio" ? html`<audio class="media-visual" src=${source} controls title=${media.title} style=${media.audioStyle}></audio>` : null}
            ${kind === "document" ? html`<object class="media-visual" data=${source} type="application/pdf" title=${media.title} style=${media.visualStyle(`height: ${media.iframeHeight}px; max-height: none;`)}><a class="media-link" href=${source} target="_blank" rel="noreferrer"><${Icon} icon="fa-solid fa-arrow-up-right-from-square" /><span>${media.fileName || source}</span></a></object>` : null}
            ${kind === "unknown" ? html`<a class="media-link" href=${source} target="_blank" rel="noreferrer"><${Icon} icon="fa-solid fa-arrow-up-right-from-square" /><span>${media.fileName || source}</span></a>` : null}
          </div>
          ${media.caption ? html`<p class="media-caption">${media.caption}</p>` : null}
        </div>
      `;
    }

    function UploadedMediaPreview({ value, label }) {
      if (!value?.dataUrl) return null;
      return html`<${MediaPreview} field=${{ label, settings: { sourceType: "file", dataUrl: value.dataUrl, mimeType: value.type || "", fileName: value.name || "", alt: value.name || label, caption: value.name || "", html: "", iframeHeight: 260, horizontalAlignment: "center", verticalAlignment: "center", horizontalSize: "auto", scale: 100, maxWidth: "", maxHeight: 360, padding: 0, objectFit: "contain", showLabel: true, outline: true, background: false } }} />`;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function RadarChart({ axes, values, max, onValue }) {
      const labels = axes;
      const center = 150;
      const radius = 92;
      const current = RadarModel.values(values, labels, max);
      const polygon = RadarModel.polygon(current, max, center, radius);
      const handlePoints = current.map((value, index) => ({
        ...RadarModel.vertex(index, labels.length, center, radius * RadarModel.scale(value, max)),
        value
      }));

      function commitValue(index, nextValue) {
        if (!onValue) return;
        const next = [...current];
        next[index] = clamp(nextValue, RADAR_MIN_VALUE, max);
        onValue(next);
      }

      function updateFromPointer(event, index) {
        const nextValue = RadarModel.valueFromPointer(event, index, labels.length, max, center, radius);
        if (nextValue === null) return;
        commitValue(index, nextValue);
      }

      function handlePointerDown(event, index) {
        if (!onValue) return;
        event.preventDefault();
        event.currentTarget.setPointerCapture?.(event.pointerId);
        updateFromPointer(event, index);
      }

      function handlePointerMove(event, index) {
        if (!onValue || (event.buttons & 1) !== 1) return;
        updateFromPointer(event, index);
      }

      function handleKeyDown(event, index) {
        if (!onValue) return;
        const step = 1;
        const page = Math.max(step, Math.round((max - RADAR_MIN_VALUE) / 4));
        const keys = {
          ArrowUp: current[index] + step,
          ArrowRight: current[index] + step,
          ArrowDown: current[index] - step,
          ArrowLeft: current[index] - step,
          PageUp: current[index] + page,
          PageDown: current[index] - page,
          Home: RADAR_MIN_VALUE,
          End: max
        };
        if (!(event.key in keys)) return;
        event.preventDefault();
        commitValue(index, keys[event.key]);
      }

      return html`
        <svg viewBox="0 0 300 300" role="group" aria-label="Radar chart">
          <g class="radar-grid">
            ${[0.25, 0.5, 0.75, 1].map((scale) => html`
              <polygon points=${labels.map((_, index) => {
        const point = RadarModel.vertex(index, labels.length, center, radius * scale);
        return `${point.x},${point.y}`;
      }).join(" ")} />
            `)}
            ${labels.map((_, index) => {
        const point = RadarModel.vertex(index, labels.length, center, radius);
        return html`<line x1=${center} y1=${center} x2=${point.x} y2=${point.y} />`;
      })}
          </g>
          <polygon class="radar-fill" points=${polygon} />
          ${labels.map((_, index) => {
        const point = RadarModel.vertex(index, labels.length, center, radius);
        return html`
              <line
                class="radar-hit"
                x1=${center}
                y1=${center}
                x2=${point.x}
                y2=${point.y}
                aria-hidden="true"
                focusable="false"
                onPointerDown=${(event) => handlePointerDown(event, index)}
                onPointerMove=${(event) => handlePointerMove(event, index)}
              />
            `;
      })}
          ${handlePoints.map((point, index) => html`
            <circle
              class="radar-handle"
              cx=${point.x}
              cy=${point.y}
              r="6"
              role="slider"
              tabIndex="0"
              aria-label=${labels[index]}
              aria-valuemin=${RADAR_MIN_VALUE}
              aria-valuemax=${max}
              aria-valuenow=${point.value}
              onPointerDown=${(event) => handlePointerDown(event, index)}
              onPointerMove=${(event) => handlePointerMove(event, index)}
              onKeyDown=${(event) => handleKeyDown(event, index)}
            >
              <title>${labels[index]}: ${point.value}</title>
            </circle>
          `)}
          ${labels.map((label, index) => {
        const point = RadarModel.vertex(index, labels.length, center, radius + 24);
        const anchor = Math.abs(point.x - center) < 8 ? "middle" : point.x > center ? "start" : "end";
        return html`<text class="radar-label" x=${point.x} y=${point.y} text-anchor=${anchor} dominant-baseline="middle">${label}</text>`;
      })}
        </svg>
      `;
    }

    function RadarPointChart({ axes, point, max, onPoint }) {
      const labels = axes;
      const center = 150;
      const radius = 92;
      const snapRef = useRef({ axisIndex: null, ringValue: null });
      const dragMetricsRef = useRef(null);
      const dragPointRef = useRef(null);
      const [dragPoint, setDragPoint] = useState(null);
      const committed = RadarModel.point(point, max);
      const current = dragPoint ? RadarModel.point(dragPoint, max) : committed;
      const handlePoint = RadarModel.polar(current.angle, current.value, max, center, radius);
      const pointDescription = RadarModel.describe(current.angle, labels);

      function commitPoint(nextPoint) {
        if (!onPoint) return;
        const cleaned = RadarModel.point(nextPoint, max);
        if (cleaned.angle === committed.angle && cleaned.value === committed.value) return;
        onPoint(cleaned);
      }

      function previewPoint(nextPoint) {
        const cleaned = RadarModel.point(nextPoint, max);
        dragPointRef.current = cleaned;
        setDragPoint(cleaned);
      }

      function updateFromPointer(event) {
        const nextPoint = RadarModel.pointFromPointer(event, labels, max, center, radius, snapRef.current, dragMetricsRef.current);
        if (!nextPoint) return;
        previewPoint(nextPoint);
      }

      function handlePointerDown(event) {
        if (!onPoint) return;
        event.preventDefault();
        snapRef.current = { axisIndex: null, ringValue: null };
        dragMetricsRef.current = RadarModel.dragMetrics(event);
        event.currentTarget.setPointerCapture?.(event.pointerId);
        updateFromPointer(event);
      }

      function handlePointerMove(event) {
        if (!onPoint || (event.buttons & 1) !== 1) return;
        updateFromPointer(event);
      }

      function handlePointerUp() {
        if (dragPointRef.current) commitPoint(dragPointRef.current);
        dragPointRef.current = null;
        setDragPoint(null);
        snapRef.current = { axisIndex: null, ringValue: null };
        dragMetricsRef.current = null;
      }

      function handleKeyDown(event) {
        if (!onPoint) return;
        const valueStep = 1;
        const angleStep = event.shiftKey ? 15 : 5;
        const keys = {
          ArrowUp: { ...current, value: current.value + valueStep },
          ArrowDown: { ...current, value: current.value - valueStep },
          ArrowRight: { ...current, angle: current.angle + angleStep },
          ArrowLeft: { ...current, angle: current.angle - angleStep },
          PageUp: { ...current, value: current.value + Math.max(valueStep, Math.round((max - RADAR_MIN_VALUE) / 4)) },
          PageDown: { ...current, value: current.value - Math.max(valueStep, Math.round((max - RADAR_MIN_VALUE) / 4)) },
          Home: { ...current, value: RADAR_MIN_VALUE },
          End: { ...current, value: max }
        };
        if (!(event.key in keys)) return;
        event.preventDefault();
        commitPoint(keys[event.key]);
      }

      return html`
        <div class="radar-point-inner">
          <div class="radar-chart">
            <svg viewBox="0 0 300 300" role="group" aria-label="Radar single-node chart">
              <g class="radar-grid">
                ${[0.25, 0.5, 0.75, 1].map((scale) => html`
                  <polygon points=${labels.map((_, index) => {
        const point = RadarModel.vertex(index, labels.length, center, radius * scale);
        return `${point.x},${point.y}`;
      }).join(" ")} />
                `)}
                ${labels.map((_, index) => {
        const point = RadarModel.vertex(index, labels.length, center, radius);
        return html`<line x1=${center} y1=${center} x2=${point.x} y2=${point.y} />`;
      })}
              </g>
              <circle
                class="radar-free-hit"
                cx=${center}
                cy=${center}
                r=${radius}
                aria-hidden="true"
                focusable="false"
                onPointerDown=${handlePointerDown}
                onPointerMove=${handlePointerMove}
                onPointerUp=${handlePointerUp}
                onPointerCancel=${handlePointerUp}
              />
              <line class="radar-point-line" x1=${center} y1=${center} x2=${handlePoint.x} y2=${handlePoint.y} />

                class="radar-handle"
                cx=${handlePoint.x}
                cy=${handlePoint.y}

                role="slider"
                tabIndex="0"
                aria-label="Radar point"
                aria-valuemin=${RADAR_MIN_VALUE}
                aria-valuemax=${max}
                aria-valuenow=${RadarModel.format(current.value)}
                aria-valuetext=${`${pointDescription}: ${RadarModel.format(current.value)}`}
                onPointerDown=${handlePointerDown}
                onPointerMove=${handlePointerMove}
                onPointerUp=${handlePointerUp}
                onPointerCancel=${handlePointerUp}
                onKeyDown=${handleKeyDown}
              >
                <title>${pointDescription}: ${RadarModel.format(current.value)}</title>
              </circle>
              ${labels.map((label, index) => {
        const point = RadarModel.vertex(index, labels.length, center, radius + 24);
        const anchor = Math.abs(point.x - center) < 8 ? "middle" : point.x > center ? "start" : "end";
        return html`<text class="radar-label" x=${point.x} y=${point.y} text-anchor=${anchor} dominant-baseline="middle">${label}</text>`;
      })}
            </svg>
          </div>
          <div class="radar-values point-readout">
            <div class="radar-value-row">
              <span>Position</span>
              <output class="radar-value">${pointDescription}</output>
            </div>
            <div class="radar-value-row">
              <span>Value</span>
              <output class="radar-value">${RadarModel.format(current.value)}</output>
            </div>
          </div>
        </div>
      `;
    }

    function fieldLabelText(field) {
      return String(field?.label ?? "").trim();
    }

    function fieldAccessibleName(field) {
      return fieldLabelText(field) || fieldTypes[field?.type]?.label || "Field";
    }

    function FieldShell({ field, invalid, children }) {
      const visibleLabel = field.settings.showLabel ? fieldLabelText(field) : "";
      const labelId = visibleLabel ? field.id + "_label" : null;
      const helpId = field.description ? field.id + "_help" : null;
      const errorId = invalid ? field.id + "_error" : null;
      const hasHead = Boolean(visibleLabel || field.description);
      const typeClass = field.type ? ` ${String(field.type).replace(/_/g, "-")}-field` : "";
      const outlineClass = field.settings.outline ? "" : " no-outline";
      const backgroundClass = field.settings.background ? " with-background" : "";
      return html`
        <section class=${`field${typeClass}${outlineClass}${backgroundClass}${invalid ? " invalid" : ""}`} data-field-wrap=${field.id} aria-invalid=${invalid ? "true" : null} aria-describedby=${[helpId, errorId].filter(Boolean).join(" ") || null}>
          ${hasHead ? html`
            <div class="field-head">
              ${visibleLabel ? html`<label class="field-label" id=${labelId} for=${field.id}>${visibleLabel}${field.required ? html`<span class="required-mark">*</span>` : null}</label>` : null}
              ${field.description ? html`<div class="field-help" id=${helpId}>${field.description}</div>` : null}
            </div>
          ` : null}
          ${children}
          ${invalid ? html`<div class="field-error" id=${errorId} role="alert"><${Icon} icon="fa-solid fa-circle-exclamation" /><span>Required field</span></div>` : null}
        </section>
      `;
    }

    function CalendarInput({ field, value, invalid, onValue, labelProps, describedBy }) {
      const calendar = new CalendarModel(field);
      const current = calendar.value(value);
      const anchorDate = calendar.anchorDate(current);
      const [viewMonth, setViewMonth] = useState(() => CalendarModel.monthKey(anchorDate));
      const [draggingBoundary, setDraggingBoundary] = useState(null);
      const [draggingMilestoneIndex, setDraggingMilestoneIndex] = useState(null);
      const [armedBoundary, setArmedBoundary] = useState(null);
      const suppressClickRef = useRef(false);
      const dragMovedRef = useRef(false);
      const dragSourceIsoRef = useRef("");
      const monthDate = CalendarModel.monthFromKey(viewMonth);
      const month = monthDate.getMonth();
      const startTime = dateTime(current.startDate);
      const endTime = dateTime(current.endDate);
      const hasRange = startTime !== null && endTime !== null;
      const hasCompleteRange = Boolean(current.startDate && current.endDate);
      const rangeStart = hasRange ? Math.min(startTime, endTime) : startTime;
      const rangeEnd = hasRange ? Math.max(startTime, endTime) : endTime;

      useEffect(() => {
        if (anchorDate) setViewMonth(CalendarModel.monthKey(anchorDate));
      }, [anchorDate]);

      useEffect(() => {
        if (!draggingBoundary && draggingMilestoneIndex === null) return undefined;
        function stopDragging() {
          setDraggingBoundary(null);
          setDraggingMilestoneIndex(null);
          window.setTimeout(() => {
            suppressClickRef.current = false;
            dragMovedRef.current = false;
            dragSourceIsoRef.current = "";
          }, 0);
        }
        window.addEventListener("mouseup", stopDragging);
        return () => window.removeEventListener("mouseup", stopDragging);
      }, [draggingBoundary, draggingMilestoneIndex]);

      function commit(patch) {
        onValue(calendar.value({ ...current, ...patch }));
      }

      function updateStart(raw) {
        const startDate = CalendarModel.cleanDate(raw);
        let endDate = current.endDate;
        if (startDate && endDate && dateTime(endDate) < dateTime(startDate)) endDate = startDate;
        commit({ startDate, endDate });
      }

      function updateEnd(raw) {
        const endDate = CalendarModel.cleanDate(raw);
        let startDate = current.startDate;
        if (startDate && endDate && dateTime(endDate) < dateTime(startDate)) startDate = endDate;
        commit({ startDate, endDate });
      }

      function boundaryForDate(iso) {
        if (iso === current.startDate && iso === current.endDate) return "end";
        if (iso === current.startDate) return "start";
        if (iso === current.endDate) return "end";
        return "";
      }

      function dragBoundary(boundary, iso) {
        setViewMonth(CalendarModel.monthKey(iso));
        if (boundary === "start") {
          let endDate = current.endDate;
          if (endDate && dateTime(endDate) < dateTime(iso)) endDate = iso;
          commit({ startDate: iso, endDate });
        } else {
          let startDate = current.startDate || iso;
          if (dateTime(iso) < dateTime(startDate)) startDate = iso;
          commit({ startDate, endDate: iso });
        }
      }

      function dragMilestone(index, iso) {
        setViewMonth(CalendarModel.monthKey(iso));
        updateMilestone(index, { date: iso });
      }

      function markDragMove(iso) {
        if (iso === dragSourceIsoRef.current) return false;
        dragSourceIsoRef.current = iso;
        dragMovedRef.current = true;
        suppressClickRef.current = true;
        return true;
      }

      function pickDate(iso) {
        setViewMonth(CalendarModel.monthKey(iso));
        if (!current.startDate || current.endDate) {
          commit({ startDate: iso, endDate: "" });
          return;
        }
        if (dateTime(iso) < dateTime(current.startDate)) {
          commit({ startDate: iso, endDate: current.startDate });
        } else {
          commit({ endDate: iso });
        }
      }

      function updateMilestone(index, patch) {
        const milestones = current.milestones.map((item, itemIndex) => itemIndex === index ? { ...item, ...patch } : item);
        commit({ milestones });
      }

      function removeMilestone(index) {
        commit({ milestones: current.milestones.filter((_, itemIndex) => itemIndex !== index) });
      }

      function addMilestone(date = "") {
        commit({ milestones: [...current.milestones, { id: uid(), date: CalendarModel.cleanDate(date), label: "Milestone " + (current.milestones.length + 1) }] });
      }

      function handleDateClick(iso) {
        if (armedBoundary) {
          dragBoundary(armedBoundary, iso);
          setArmedBoundary(null);
          return;
        }
        if (!hasCompleteRange) {
          pickDate(iso);
          return;
        }
        if (calendar.allowMilestones) {
          addMilestone(iso);
          return;
        }
        pickDate(iso);
      }

      return html`
        <div class="calendar-control" role="group" ...${labelProps} aria-invalid=${invalid ? "true" : null} aria-required=${field.required ? "true" : null} aria-describedby=${describedBy}>
          <div class="calendar-frame">
            <div class="calendar-nav">
              <input class="calendar-month-label calendar-month-input" type="month" value=${viewMonth} aria-label="Calendar month" title=${monthLabel(monthDate)} onInput=${(event) => { if (event.currentTarget.value) setViewMonth(event.currentTarget.value); }} />
              <div class="calendar-nav-buttons">
                <button class="icon-button" type="button" title="Previous month" aria-label="Previous month" onClick=${() => setViewMonth(CalendarModel.shiftMonthKey(viewMonth, -1))}><${Icon} icon="fa-solid fa-chevron-left" /></button>
                <button class="icon-button" type="button" title="Next month" aria-label="Next month" onClick=${() => setViewMonth(CalendarModel.shiftMonthKey(viewMonth, 1))}><${Icon} icon="fa-solid fa-chevron-right" /></button>
              </div>
            </div>
            <div class="calendar-weekdays" aria-hidden="true">
              ${["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map((day) => html`<div class="calendar-weekday" key=${day}>${day}</div>`)}
            </div>
            <div class="calendar-grid">
            ${CalendarModel.gridDates(monthDate).map((date) => {
        const iso = isoFromDate(date);
        const time = date.getTime();
        const inRange = rangeStart !== null && rangeEnd !== null && time >= rangeStart && time <= rangeEnd;
        const isBoundary = iso === current.startDate || iso === current.endDate;
        const isRangeStart = inRange && (iso === current.startDate || date.getDay() === 0);
        const isRangeEnd = inRange && (iso === current.endDate || date.getDay() === 6);
        const isOutside = date.getMonth() !== month;
        const dayMilestones = calendar.milestonesForDate(iso, current);
        const milestoneDetails = calendar.milestoneDetails(dayMilestones);
        const milestoneIndex = dayMilestones[0]?.index ?? -1;
        const boundary = boundaryForDate(iso);
        return html`
                <button
                  class=${`calendar-day-button${isOutside ? " is-outside" : ""}${inRange ? " is-range" : ""}${isRangeStart ? " is-range-start" : ""}${isRangeEnd ? " is-range-end" : ""}${isBoundary ? " is-boundary" : ""}${armedBoundary === boundary && boundary ? " is-armed-boundary" : ""}${draggingBoundary === boundary && boundary && dragMovedRef.current ? " is-dragging" : ""}${draggingMilestoneIndex === milestoneIndex && milestoneIndex >= 0 && dragMovedRef.current ? " is-dragging" : ""}${dayMilestones.length ? " is-milestone" : ""}`}
                  type="button"
                  key=${iso}
                  onMouseDown=${(event) => {
            if (armedBoundary) return;
            if (boundary) {
              event.preventDefault();
              if ((event.shiftKey || event.ctrlKey || event.metaKey) && hasCompleteRange) {
                setArmedBoundary(boundary);
                setDraggingBoundary(null);
                setDraggingMilestoneIndex(null);
                suppressClickRef.current = true;
                return;
              }
              dragMovedRef.current = false;
              dragSourceIsoRef.current = iso;
              setDraggingBoundary(boundary);
              return;
            }
            if (calendar.allowMilestones && milestoneIndex >= 0) {
              event.preventDefault();
              dragMovedRef.current = false;
              dragSourceIsoRef.current = iso;
              setDraggingMilestoneIndex(milestoneIndex);
            }
          }}
                  onMouseEnter=${() => {
            if (draggingBoundary && markDragMove(iso)) dragBoundary(draggingBoundary, iso);
            if (draggingMilestoneIndex !== null && markDragMove(iso)) dragMilestone(draggingMilestoneIndex, iso);
          }}
                  onMouseUp=${() => {
            if (draggingBoundary && dragMovedRef.current) dragBoundary(draggingBoundary, iso);
            if (draggingMilestoneIndex !== null && dragMovedRef.current) dragMilestone(draggingMilestoneIndex, iso);
            setDraggingBoundary(null);
            setDraggingMilestoneIndex(null);
          }}
                  onClick=${() => {
            if (suppressClickRef.current) {
              suppressClickRef.current = false;
              dragMovedRef.current = false;
              dragSourceIsoRef.current = "";
              return;
            }
            handleDateClick(iso);
          }}
                  aria-label=${milestoneDetails ? `${readableDate(iso)}, ${milestoneDetails}` : boundary ? `Drag ${boundary} date, ${readableDate(iso)}` : readableDate(iso)}
                >
                  <span class="calendar-day-number">${date.getDate()}</span>
                  ${dayMilestones.length ? html`
                    <span class="calendar-milestone-popover" aria-hidden="true">
                      ${dayMilestones.map((item) => html`<span class="calendar-milestone-popover-line" key=${item.id || item.label || item.date}>${item.label || "Milestone"}</span>`)}
                    </span>
                  ` : null}
                </button>
              `;
      })}
            </div>
          </div>
          <div class="calendar-properties">
            <div class="calendar-date-inputs">
              <label class="calendar-date-field">
                <span>Start</span>
                <input class="control" type="date" value=${current.startDate} onInput=${(event) => updateStart(event.currentTarget.value)} />
              </label>
              <label class="calendar-date-field">
                <span>End</span>
                <input class="control" type="date" value=${current.endDate} onInput=${(event) => updateEnd(event.currentTarget.value)} />
              </label>
            </div>
            ${calendar.allowMilestones ? html`
              <div class="calendar-milestone-editor">
                <div class="calendar-milestone-editor-head">
                  <div class="mini-label">Milestones</div>
                </div>
                ${current.milestones.length ? current.milestones.map((item, index) => html`
                  <div class="calendar-milestone-row" key=${item.id || index}>
                    <input class="control" type="date" value=${item.date} aria-label=${`Milestone ${index + 1} date`} onInput=${(event) => updateMilestone(index, { date: event.currentTarget.value })} />
                    <input class="control" value=${item.label} placeholder="Milestone name" aria-label=${`Milestone ${index + 1} label`} onInput=${(event) => updateMilestone(index, { label: event.currentTarget.value })} />
                    <button class="icon-button danger" type="button" title="Remove milestone" aria-label="Remove milestone" onClick=${() => removeMilestone(index)}><${Icon} icon="fa-solid fa-xmark" /></button>
                  </div>
                `) : html`<div class="calendar-milestone-empty">No milestones yet.</div>`}
                <button class="button ghost" type="button" onClick=${() => addMilestone()}><${Icon} icon="fa-solid fa-plus" /><span>Add milestone</span></button>
              </div>
            ` : null}
          </div>
        </div>
      `;
    }

    class RuntimeFieldModel {
      constructor(field, invalid) {
        this.field = field;
        this.invalid = invalid;
        this.visibleLabel = field.settings.showLabel ? fieldLabelText(field) : "";
        this.accessibleName = fieldAccessibleName(field);
        this.describedBy = [field.description ? field.id + "_help" : null, invalid ? field.id + "_error" : null].filter(Boolean).join(" ") || null;
        this.labelledBy = this.visibleLabel ? field.id + "_label" : null;
      }

      get labelProps() {
        return this.labelledBy ? { "aria-labelledby": this.labelledBy } : { "aria-label": this.accessibleName };
      }

      get controlLabelProps() {
        return this.labelledBy ? { "aria-labelledby": this.labelledBy } : { "aria-label": this.accessibleName };
      }

      get inputProps() {
        return {
          id: this.field.id,
          class: "control",
          "aria-invalid": this.invalid ? "true" : null,
          "aria-required": this.field.required ? "true" : null,
          "aria-describedby": this.describedBy,
          ...(this.labelledBy ? {} : { "aria-label": this.accessibleName })
        };
      }

      get textareaProps() {
        return { ...this.inputProps, class: "textarea" };
      }

      shell(content, invalid = this.invalid) {
        return html`<${FieldShell} field=${this.field} invalid=${invalid}>${content}</${FieldShell}>`;
      }

      grouped(className, content) {
        return this.shell(html`<div class=${className} role="group" ...${this.labelProps} aria-invalid=${this.invalid ? "true" : null} aria-required=${this.field.required ? "true" : null} aria-describedby=${this.describedBy}>${content}</div>`);
      }
    }

    function renderHeadlineRuntimeField(model) {
      const field = model.field;
      const description = String(field.description || "").trim();
      const headline = new HeadlineModel(field);
      const hasCopy = model.visibleLabel || description;
      const titleNode = model.visibleLabel ? html`<h1 class="headline-title" style=${headline.textStyle("headingHorizontalAlignment", "headingVerticalAlignment")}>${model.visibleLabel}</h1>` : null;
      const descriptionNode = description ? html`<p class="headline-subhead" style=${headline.textStyle("descriptionHorizontalAlignment", "descriptionVerticalAlignment")}>${description}</p>` : null;
      const copyNode = hasCopy ? html`<div class="headline-copy">${titleNode}${descriptionNode}</div>` : null;
      if (!hasCopy) return null;
      return html`
        <section class=${`headline-field${headline.outline ? " with-outline" : ""}${headline.background ? " with-background" : ""}`} data-field-wrap=${field.id}>
          <div class="headline-content">${copyNode}</div>
        </section>
      `;
    }

    function renderTextInputRuntimeField(model, value, onValue) {
      const field = model.field;
      const inputType = field.type === "email" ? "email" : field.type === "number" ? "number" : "text";
      const inputValue = field.type === "number" ? value ?? "" : value || "";
      return model.shell(html`<input ...${model.inputProps} type=${inputType} value=${inputValue} placeholder=${field.placeholder} onInput=${(event) => onValue(event.currentTarget.value)} />`);
    }

    function renderLongAnswerRuntimeField(model, value, onValue) {
      const field = model.field;
      return model.shell(html`<textarea ...${model.textareaProps} value=${value || ""} placeholder=${field.placeholder} style=${longAnswerStyle(field.placeholder)} onInput=${(event) => onValue(event.currentTarget.value)}></textarea>`);
    }

    function renderCalendarRuntimeField(model, value, onValue) {
      return model.shell(html`<${CalendarInput} field=${model.field} value=${value} invalid=${model.invalid} onValue=${onValue} labelProps=${model.labelProps} describedBy=${model.describedBy} />`);
    }

    function renderMultipleChoiceRuntimeField(model, value, onValue) {
      const field = model.field;
      return model.grouped("choice-list", field.options.map((option) => html`
        <label class="choice-row" key=${option}>
          <input type="radio" name=${field.id} value=${option} checked=${value === option} onChange=${() => onValue(option)} />
          <span>${option}</span>
        </label>
      `));
    }

    function CheckboxRuntimeField({ model, value, onValue }) {
      const [editingOption, setEditingOption] = useState(null);
      const [optionDraft, setOptionDraft] = useState("");
      const editInputRef = useRef(null);
      const field = model.field;
      const editFocusKey = editingOption ? `${editingOption.kind}:${editingOption.index}:${editingOption.original}` : "";

      useEffect(() => {
        if (!editingOption) return undefined;
        const frame = window.requestAnimationFrame(() => {
          editInputRef.current?.focus();
          editInputRef.current?.select();
        });
        return () => window.cancelAnimationFrame(frame);
      }, [editFocusKey]);

      function cleanOptionLabel(label) {
        return String(label || "").trim().replace(/\s+/g, " ");
      }

      function optionMatches(first, second) {
        return String(first).toLowerCase() === String(second).toLowerCase();
      }

      function uniqueOptions(options) {
        return options.reduce((items, option) => {
          const label = cleanOptionLabel(option);
          if (label && !items.some((item) => optionMatches(item, label))) items.push(label);
          return items;
        }, []);
      }

      function isSchemaOption(label) {
        return field.options.some((option) => optionMatches(option, label));
      }

      const rawSelected = Array.isArray(value) ? value : Array.isArray(value?.selected) ? value.selected : [];
      const rawCustomOptions = value && typeof value === "object" && !Array.isArray(value) && Array.isArray(value.customOptions) ? value.customOptions : [];
      const customOptions = uniqueOptions([...rawCustomOptions, ...rawSelected.filter((option) => !isSchemaOption(option))]);
      const selected = uniqueOptions(rawSelected.map((option) => canonicalOption(option, customOptions)));

      function canonicalOption(label, customOptionList = customOptions, ignoredCustomIndex = -1) {
        return field.options.find((option) => optionMatches(option, label))
          || customOptionList.find((option, index) => index !== ignoredCustomIndex && optionMatches(option, label))
          || label;
      }

      function emitValue(nextSelected, nextCustomOptions = customOptions) {
        const cleanCustomOptions = uniqueOptions(nextCustomOptions).filter((option) => !isSchemaOption(option));
        const cleanSelected = uniqueOptions(nextSelected.map((option) => canonicalOption(option, cleanCustomOptions)));
        if (cleanCustomOptions.length || (value && typeof value === "object" && !Array.isArray(value))) {
          onValue({ selected: cleanSelected, customOptions: cleanCustomOptions });
          return;
        }
        onValue(cleanSelected);
      }

      function cancelEdit() {
        setEditingOption(null);
        setOptionDraft("");
      }

      function commitEdit() {
        if (!editingOption) return;
        const label = cleanOptionLabel(optionDraft);
        if (!label) {
          cancelEdit();
          return;
        }

        const customBase = editingOption.kind === "existing"
          ? customOptions.filter((_, index) => index !== editingOption.index)
          : customOptions;
        const nextOption = canonicalOption(label, customBase);
        const nextCustomOptions = isSchemaOption(nextOption) ? customBase : [...customBase, nextOption];
        const shouldSelect = editingOption.kind === "new" || selected.some((option) => optionMatches(option, editingOption.original));
        const withoutOriginal = editingOption.kind === "existing"
          ? selected.filter((item) => !optionMatches(item, editingOption.original))
          : selected;
        emitValue(shouldSelect && !withoutOriginal.some((option) => optionMatches(option, nextOption)) ? [...withoutOriginal, nextOption] : withoutOriginal, nextCustomOptions);
        cancelEdit();
      }

      function optionChecked(option, checked) {
        if (!checked && editingOption?.original === option) cancelEdit();
        if (checked && selected.some((item) => optionMatches(item, option))) return;
        emitValue(checked ? [...selected, option] : selected.filter((item) => !optionMatches(item, option)), customOptions);
      }

      function startNewOption() {
        setOptionDraft("");
        setEditingOption({ kind: "new", index: customOptions.length, original: "" });
      }

      function startExistingEdit(index, option) {
        setOptionDraft(option);
        setEditingOption({ kind: "existing", index, original: option });
      }

      function editTriggerKey(event, index, option) {
        if (event.key !== "Enter" && event.key !== " ") return;

      }

      function draftKey(event) {

          event.preventDefault();
          commitEdit();
        }
        if (event.key === "Escape") {
          event.preventDefault();
          cancelEdit();
        }
      }

      function editableCustomOption(option, index) {
        const editing = editingOption?.kind === "existing" && editingOption.index === index && editingOption.original === option;
        return html`
          <div class="choice-row" key=${`custom_${option}_${index}`}>
            <input type="checkbox" value=${option} checked=${selected.some((item) => optionMatches(item, option))} aria-label=${option} onChange=${(event) => optionChecked(option, event.currentTarget.checked)} />
            ${editing ? html`
              <input
                class="control"
                ref=${editInputRef}
                value=${optionDraft}
                placeholder="Custom option"
                aria-label=${`Edit ${option}`}
                onInput=${(event) => setOptionDraft(event.currentTarget.value)}
                onBlur=${commitEdit}
                onKeyDown=${draftKey}
              />
            ` : html`
              <span role="button" tabIndex="0" title="Edit option" aria-label=${`Edit ${option}`} onClick=${() => startExistingEdit(index, option)} onKeyDown=${(event) => editTriggerKey(event, index, option)}>${option}</span>
            `}
          </div>
        `;
      }

      function newOptionEditor() {
        if (editingOption?.kind !== "new") return null;
        return html`
          <div class="choice-row" key="new_custom_option">
            <input type="checkbox" checked=${true} aria-label="New option selected" onChange=${cancelEdit} />
            <input
              class="control"
              ref=${editInputRef}
              value=${optionDraft}
              placeholder="Custom option"
              aria-label=${`New ${model.accessibleName} option`}
              onInput=${(event) => setOptionDraft(event.currentTarget.value)}
              onBlur=${commitEdit}
              onKeyDown=${draftKey}
            />
          </div>
        `;
      }

      return model.grouped("choice-list", html`
        ${field.options.map((option, index) => html`
          <label class="choice-row" key=${`${option}_${index}`}>
            <input type="checkbox" value=${option} checked=${selected.some((item) => optionMatches(item, option))} onChange=${(event) => optionChecked(option, event.currentTarget.checked)} />
            <span>${option}</span>
          </label>
        `)}
        ${customOptions.map(editableCustomOption)}
        ${newOptionEditor()}
        ${field.settings.allowCustomOptions && !editingOption ? html`
          <button class="button ghost" type="button" data-export-hidden="true" title="Add option" aria-label="Add option" onClick=${startNewOption}>
            <${Icon} icon="fa-solid fa-plus" /><span>Add option</span>
          </button>
        ` : null}
      `);
    }

    function renderCheckboxRuntimeField(model, value, onValue) {
      return html`<${CheckboxRuntimeField} model=${model} value=${value} onValue=${onValue} />`;

    const RUNTIME_FIELD_RENDERERS = {
      headline: renderHeadlineRuntimeField,
      short_answer: renderTextInputRuntimeField,

      long_answer: renderLongAnswerRuntimeField,
      calendar: renderCalendarRuntimeField,
      multiple_choice: renderMultipleChoiceRuntimeField,
      checkbox: renderCheckboxRuntimeField,
      poll: renderPollRuntimeField,

      linear_scale: renderLinearScaleRuntimeField,

      radar: renderRadarRuntimeField,

    function RuntimeContainer({ container, values, invalidIds, onValue }) {

    function RuntimeContainerStack({ containers, className, values, invalidIds, onValue }) {

            <${RuntimeContainer}

    function RuntimeMiddleContainerRow({ layout, values, invalidIds, onValue }) {
      if (!layout.left.length && !layout.main.length && !layout.right.length) return null;
      return html`
        <div class=${`block-middle ${layout.middleLayout}`}>
          <${RuntimeContainerStack} containers=${layout.left} className="block-stack block-left" values=${values} invalidIds=${invalidIds} onValue=${onValue} />
          <${RuntimeContainerStack} containers=${layout.main} className="block-stack block-main" values=${values} invalidIds=${invalidIds} onValue=${onValue} />
          <${RuntimeContainerStack} containers=${layout.right} className="block-stack block-right" values=${values} invalidIds=${invalidIds} onValue=${onValue} />

    function RuntimeBlock({ block, values, invalidIds, onValue }) {
      const layout = blockContainerRegions(block);
      return html`
        <section class=${`form-block ${layout.middleLayout}`} data-block-id=${block.id}>
          <${RuntimeContainerStack} containers=${layout.top} className="block-stack block-top" values=${values} invalidIds=${invalidIds} onValue=${onValue} />
          <${RuntimeMiddleContainerRow} layout=${layout} values=${values} invalidIds=${invalidIds} onValue=${onValue} />
          <${RuntimeContainerStack} containers=${layout.bottom} className="block-stack block-bottom" values=${values} invalidIds=${invalidIds} onValue=${onValue} />
        </section>
