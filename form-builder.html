    class DragPayloadModel {
      static clampIndex(index, length) {
        const targetIndex = Number.isInteger(index) ? index : length;
        return Math.max(0, Math.min(targetIndex, length));
      }

      static key(payload) {
        if (payload?.kind === "new" && payload.type) return `new:${payload.type}`;
        if (["move", "split", "copy"].includes(payload?.kind) && payload.id) return `${payload.kind}:${payload.id}`;
        return "";
      }

      static parse(value) {
        const text = String(value || "");
        const index = text.indexOf(":");
        if (index < 0) return null;
        const kind = text.slice(0, index);
        const target = text.slice(index + 1);
        if (kind === "new" && target) return { kind, type: target };
        if (["move", "split", "copy"].includes(kind) && target) return { kind, id: target };
        return null;
      }

      static same(first, second) {
        const firstKey = DragPayloadModel.key(first);
        return Boolean(firstKey && firstKey === DragPayloadModel.key(second));
      }

      static dropEffect(payload) {
        return payload?.kind === "new" ? "copy" : "move";
      }

      static info(payload, fields, headlineId = null) {
        const field = payload?.id ? fields.find((item) => item.id === payload.id) || null : null;
        const splitMedia = field?.type === "headline" ? new HeadlineModel(field).mediaField : null;
        const providesMedia = payload?.kind === "new"
          ? payload.type === "media"
          : payload?.kind === "move"
            ? field?.type === "media"
            : payload?.kind === "split"
              ? Boolean(splitMedia)
              : false;
        const repositionsHeadlineCopy = payload?.kind === "copy" && payload.id === headlineId && Boolean(splitMedia);
        return { field, splitMedia, providesMedia, repositionsHeadlineCopy };
      }

      static canDropOnHeadline(payload, fields, headlineId) {
        const info = DragPayloadModel.info(payload, fields, headlineId);
        return info.providesMedia || info.repositionsHeadlineCopy;
      }

      static mediaFromPayload(payload, fields) {
        const info = DragPayloadModel.info(payload, fields);
        if (!info.providesMedia) return null;
        if (payload.kind === "new") return typeMeta("media").defaults.settings;
        if (payload.kind === "split") return info.splitMedia?.settings || null;
        return info.field?.settings || null;
      }

      static splitMediaIntoHeadline(schema, headlineId, payload, placement = "right") {
        const headline = schema.fields.find((field) => field.id === headlineId);
        const media = DragPayloadModel.mediaFromPayload(payload, schema.fields);
        if (!headline || headline.type !== "headline" || !media || (payload?.kind !== "split" && payload?.id === headlineId)) return schema;
        const fields = payload.kind === "move" ? schema.fields.filter((field) => field.id !== payload.id) : schema.fields;
        return {
          ...schema,
          fields: fields.map((field) => {
            if (field.id === headlineId) return { ...field, required: false, settings: { ...field.settings, mediaPlacement: placement, media: clone(media) } };
            if (payload.kind === "split" && field.id === payload.id) return { ...field, settings: { ...field.settings, media: null } };
            return field;
          })
        };
      }
    }

    function initialBuilderState() {
      const schema = loadInitialSchema();
      return { schema, selectedId: schema.fields[0]?.id || null, removingId: null };
    }

    function builderReducer(state, action) {
      switch (action.type) {
        case "replace-schema":
          return { schema: action.schema, selectedId: action.schema.fields[0]?.id || null, removingId: null };
        case "commit-schema":
          return { ...state, schema: action.schema, selectedId: action.selectedId ?? state.selectedId };
        case "patch-schema": {
          const schema = { ...state.schema, ...action.patch };
          if (action.patch.settings) schema.settings = { ...state.schema.settings, ...action.patch.settings };
          return { ...state, schema };
        }
        case "patch-field":
          return {
            ...state,
            schema: {
              ...state.schema,
              fields: state.schema.fields.map((field) => field.id === action.id
                ? { ...field, ...action.patch, settings: action.patch.settings ? { ...field.settings, ...action.patch.settings } : field.settings }
                : field)
            }
          };
        case "select-field":
          return state.selectedId === action.id ? state : { ...state, selectedId: action.id };
        case "insert-field": {
          const fields = [...state.schema.fields];
          fields.splice(DragPayloadModel.clampIndex(action.index, fields.length), 0, action.field);
          return { ...state, schema: { ...state.schema, fields }, selectedId: action.field.id };
        }
        case "move-field": {
          const from = state.schema.fields.findIndex((field) => field.id === action.id);
          const to = from + action.direction;
          return from < 0 || to < 0 || to >= state.schema.fields.length ? state : { ...state, schema: { ...state.schema, fields: reorder(state.schema.fields, from, to) } };
        }
        case "move-field-to-index": {
          const from = state.schema.fields.findIndex((field) => field.id === action.id);
          if (from < 0) return state;
          const insertionIndex = DragPayloadModel.clampIndex(action.index, state.schema.fields.length);
          const to = insertionIndex > from ? insertionIndex - 1 : insertionIndex;
          const boundedTo = Math.max(0, Math.min(to, state.schema.fields.length - 1));
          return boundedTo === from ? state : { ...state, schema: { ...state.schema, fields: reorder(state.schema.fields, from, boundedTo) } };
        }
        case "duplicate-field": {
          const index = state.schema.fields.findIndex((field) => field.id === action.id);
          if (index < 0) return state;
          const fields = [...state.schema.fields];
          fields.splice(index + 1, 0, action.copy);
          return { ...state, schema: { ...state.schema, fields }, selectedId: action.copy.id };
        }
        case "reset-field": {
          const source = state.schema.fields.find((field) => field.id === action.id);
          if (!source) return state;
          const reset = schemaField({ ...fieldFromType(source.type), id: action.id });
          return { ...state, schema: { ...state.schema, fields: state.schema.fields.map((field) => field.id === action.id ? reset : field) }, selectedId: action.id };
        }
        case "mark-removing":
          return state.removingId === action.id || !state.schema.fields.some((field) => field.id === action.id) ? state : { ...state, removingId: action.id };
        case "remove-field": {
          const index = state.schema.fields.findIndex((field) => field.id === action.id);
          if (index < 0) return { ...state, removingId: null };
          const fields = state.schema.fields.filter((field) => field.id !== action.id);
          const selectedId = state.selectedId === action.id ? fields[Math.min(index, fields.length - 1)]?.id || null : state.selectedId;
          return { ...state, schema: { ...state.schema, fields }, selectedId, removingId: null };
        }
        case "reposition-headline-copy":
          return {
            ...state,
            schema: {
              ...state.schema,
              fields: state.schema.fields.map((field) => field.id === action.headlineId && field.type === "headline" && new HeadlineModel(field).mediaField
                ? { ...field, settings: { ...field.settings, mediaPlacement: OPPOSITE_HEADLINE_PLACEMENT[action.placement] || "center" } }
                : field)
            },
            selectedId: action.headlineId
          };
        default:
          return state;
      }
    }

    function useBuilderActions({ stateRef, dragStateRef, dispatch, setDragState, setExportMenuOpen, fieldsRef, fieldRectsRef, dragPayloadRef, headlineDropRectRef }) {
      const current = () => stateRef.current;
      const currentSchema = () => current().schema;
      const replaceSchema = (schema) => dispatch({ type: "replace-schema", schema });
      const patchSchema = (patch) => dispatch({ type: "patch-schema", patch });
      const selectField = (id) => dispatch({ type: "select-field", id });

      function patchSelectedField(patch) {
        const id = current().selectedId;
        if (id) dispatch({ type: "patch-field", id, patch });
      }

      function addField(type, index = currentSchema().fields.length) {
        dispatch({ type: "insert-field", field: fieldFromType(type), index });
      }

      function snapshotFieldRects() {
        fieldRectsRef.current = new Map([...(fieldsRef.current?.querySelectorAll(".field-card") || [])].map((card) => [card.dataset.fieldId, card.getBoundingClientRect()]));
      }

      function moveField(id, direction) {
        const fields = currentSchema().fields;
        const index = fields.findIndex((field) => field.id === id);
        const nextIndex = index + direction;
        if (index < 0 || nextIndex < 0 || nextIndex >= fields.length) return;
        snapshotFieldRects();
        dispatch({ type: "move-field", id, direction });
      }

      function moveFieldToDropIndex(id, index) {
        const fields = currentSchema().fields;
        const from = fields.findIndex((field) => field.id === id);
        const insertionIndex = DragPayloadModel.clampIndex(index, fields.length);
        const to = insertionIndex > from ? insertionIndex - 1 : insertionIndex;
        const boundedTo = Math.max(0, Math.min(to, fields.length - 1));
        if (from < 0 || boundedTo === from) return;
        snapshotFieldRects();
        dispatch({ type: "move-field-to-index", id, index });
      }

      function duplicateField(id) {
        const source = currentSchema().fields.find((field) => field.id === id);
        if (!source) return;
        const copyLabel = String(source.label ?? "").trim() ? source.label + " copy" : "";
        dispatch({ type: "duplicate-field", id, copy: schemaField({ ...clone(source), id: uid(), label: copyLabel }) });
      }

      function resetField(id) {
        dispatch({ type: "reset-field", id });
      }

      function deleteField(id) {
        const { schema, removingId } = current();
        if (removingId === id || !schema.fields.some((field) => field.id === id)) return;
        dispatch({ type: "mark-removing", id });
        window.setTimeout(() => dispatch({ type: "remove-field", id }), 150);
      }

      function dragStateFor(payload) {
        const schema = currentSchema();
        if (payload.kind === "new") return { ...payload, index: schema.fields.length };
        if (payload.kind === "move") return { ...payload, index: schema.fields.findIndex((field) => field.id === payload.id) };
        const field = schema.fields.find((item) => item.id === payload.id);
        if (!field) return null;
        const placement = new HeadlineModel(field).mediaPlacement;
        return { ...payload, headlineId: payload.id, headlinePlacement: payload.kind === "copy" ? OPPOSITE_HEADLINE_PLACEMENT[placement] : placement };
      }

      function payloadFromEvent(event) {
        return dragPayloadRef.current || DragPayloadModel.parse(event.dataTransfer?.getData("text/plain"));
      }

      function beginDrag(event, payload) {
        const dragState = payload && dragStateFor(payload);
        if (!dragState) return;
        if (payload.kind === "copy" || payload.kind === "split") event.stopPropagation();
        dragPayloadRef.current = payload;
        event.dataTransfer.setData("text/plain", DragPayloadModel.key(payload));
        event.dataTransfer.effectAllowed = payload.kind === "new" ? "copy" : "move";
        const card = payload.kind === "move" ? event.currentTarget.closest(".field-card") : null;
        if (card) event.dataTransfer.setDragImage(card, 24, 24);
        setDragState(dragState);
      }

      function clearDragState() {
        dragPayloadRef.current = null;
        headlineDropRectRef.current = null;
        setDragState(null);
      }

      function insertionTargetFromPointer(clientY) {
        const list = fieldsRef.current;
        const cards = [...(list?.querySelectorAll(".field-card") || [])];
        const listRect = list?.getBoundingClientRect();
        if (!list || !listRect || !cards.length) {
          const top = list ? parseFloat(getComputedStyle(list).paddingTop) || 0 : 0;
          return { index: 0, y: top };
        }
        const rects = cards.map((card) => card.getBoundingClientRect());
        const gap = parseFloat(getComputedStyle(list).rowGap || getComputedStyle(list).gap) || 0;
        const yForIndex = (index) => {
          if (index <= 0) return Math.max(0, rects[0].top - listRect.top - gap / 2);
          if (index >= rects.length) return rects[rects.length - 1].bottom - listRect.top + gap / 2;
          return (rects[index - 1].bottom + rects[index].top) / 2 - listRect.top;
        };
        for (let index = 0; index < rects.length; index += 1) {
          const rect = rects[index];
          if (clientY < rect.top + rect.height / 2) return { index, y: Math.round(yForIndex(index)) };
        }
        return { index: rects.length, y: Math.round(yForIndex(rects.length)) };
      }

      function updateDropTarget(event) {
        const payload = payloadFromEvent(event);
        if (!payload || !["new", "move"].includes(payload.kind)) return;
        event.preventDefault();
        event.dataTransfer.dropEffect = DragPayloadModel.dropEffect(payload);
        const target = insertionTargetFromPointer(event.clientY);
        setDragState((state) => state && DragPayloadModel.same(state, payload) && state.index === target.index && state.y === target.y ? state : { ...payload, ...target });
      }

      function clearDropTarget(event) {
        if (event.relatedTarget && event.currentTarget.contains(event.relatedTarget)) return;
        setDragState((state) => state ? { ...state, index: null } : state);
      }

      function headlinePlacementFromPointer(event, headlineId) {
        let rect = headlineDropRectRef.current?.headlineId === headlineId ? headlineDropRectRef.current : null;
        if (!rect) {
          const measured = (event.currentTarget.querySelector(".field-card-body") || event.currentTarget).getBoundingClientRect();
          rect = headlineDropRectRef.current = { headlineId, left: measured.left, top: measured.top, width: measured.width, height: measured.height };
        }
        const x = rect.width ? (event.clientX - rect.left) / rect.width : 1;
        const y = rect.height ? (event.clientY - rect.top) / rect.height : 0.5;
        if (x < 0.28) return "left";
        if (x > 0.72) return "right";
        if (y < 0.30) return "top";
        if (y > 0.70) return "bottom";
        return "center";
      }

      function updateHeadlineDropTarget(event, headlineId) {
        const payload = payloadFromEvent(event);
        if (!DragPayloadModel.canDropOnHeadline(payload, currentSchema().fields, headlineId)) return;
        const headlinePlacement = headlinePlacementFromPointer(event, headlineId);
        event.preventDefault();
        event.stopPropagation();
        event.dataTransfer.dropEffect = DragPayloadModel.dropEffect(payload);
        setDragState((state) => state && DragPayloadModel.same(state, payload) && state.headlineId === headlineId && state.headlinePlacement === headlinePlacement ? state : { ...payload, index: null, y: null, headlineId, headlinePlacement });
      }

      function clearHeadlineDropTarget(event, headlineId) {
        if (event.relatedTarget && event.currentTarget.contains(event.relatedTarget)) return;
        const rect = event.currentTarget.getBoundingClientRect();
        const inside = event.clientX >= rect.left && event.clientX <= rect.right && event.clientY >= rect.top && event.clientY <= rect.bottom;
        if (inside) return;
        if (headlineDropRectRef.current?.headlineId === headlineId) headlineDropRectRef.current = null;
        setDragState((state) => state?.headlineId === headlineId ? { ...state, headlineId: null, headlinePlacement: null } : state);
      }

      function handleHeadlineDrop(event, headlineId) {
        const payload = payloadFromEvent(event);
        const schema = currentSchema();
        const info = DragPayloadModel.info(payload, schema.fields, headlineId);
        if (!info.providesMedia && !info.repositionsHeadlineCopy) return;
        event.preventDefault();
        event.stopPropagation();
        const placement = headlinePlacementFromPointer(event, headlineId);
        clearDragState();
        if (info.repositionsHeadlineCopy) {
          dispatch({ type: "reposition-headline-copy", headlineId, placement });
          return;
        }
        const nextSchema = DragPayloadModel.splitMediaIntoHeadline(schema, headlineId, payload, placement);
        if (nextSchema === schema) return;
        snapshotFieldRects();
        dispatch({ type: "commit-schema", schema: nextSchema, selectedId: headlineId });
      }

      function handleDrop(event) {
        event.preventDefault();
        const payload = payloadFromEvent(event);
        const target = Number.isInteger(dragStateRef.current?.index) ? dragStateRef.current : insertionTargetFromPointer(event.clientY);
        clearDragState();
        if (payload?.kind === "new") addField(payload.type, target.index);
        if (payload?.kind === "move") moveFieldToDropIndex(payload.id, target.index);
      }

      async function importSchema(event) {
        const file = event.currentTarget.files?.[0];
        if (!file) return;
        try {
          replaceSchema(schemaDocument(JSON.parse(await file.text())));
        } catch (error) {
          window.alert("That JSON file could not be loaded.");
          console.error(error);
        } finally {
          event.currentTarget.value = "";
        }
      }

      function downloadBlob(blob, fileName) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function exportSchema() {
        setExportMenuOpen(false);
        const schema = currentSchema();
        const output = schemaDocument(schema);
        downloadBlob(new Blob([JSON.stringify(output, null, 2)], { type: "application/json" }), safeFileName(formDisplayName(schema) || "form-schema") + ".json");
      }

      function runtimeHtmlWithSchema(runtimeHtml, output) {
        const token = encodeSchemaToken(output);
        const embeddedTag = `<script id="formal-embedded-schema" type="application/json" data-schema-token="${token}"><` + `/script>`;
        const slotPattern = /<script id="formal-embedded-schema" type="application\/json" data-schema-token="[^"]*"><\/script>/;
        if (!slotPattern.test(runtimeHtml)) throw new Error("Runtime embedded schema slot was not found.");
        return runtimeHtml.replace(slotPattern, embeddedTag);
      }

      async function exportRuntime() {
        setExportMenuOpen(false);
        const schema = currentSchema();
        const output = schemaDocument({ ...schema, updatedAt: new Date().toISOString() });
        try {
          const response = await fetch("form-runtime.html?standalone=" + Date.now(), { cache: "no-store" });
          if (!response.ok) throw new Error("Unable to load form-runtime.html");
          downloadBlob(new Blob([runtimeHtmlWithSchema(await response.text(), output)], { type: "text/html" }), safeFileName(formDisplayName(schema) || "form-runtime") + ".html");
        } catch (error) {
          console.error(error);
          window.alert("The runtime HTML could not be exported. Make sure form-runtime.html is available next to the builder.");
        }
      }

      function previewForm() {
        const previewSchema = schemaDocument({ ...currentSchema(), updatedAt: new Date().toISOString() });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(previewSchema));
        window.open("form-runtime.html?preview=1&refresh=" + Date.now() + "#s=" + encodeSchemaToken(previewSchema), "formalRuntimePreview");
      }

      function resetForm() {
        if (formHasContent(currentSchema()) && !window.confirm("Reset this form and clear all fields?")) return;
        replaceSchema(defaultSchema());
      }

      function patchTheme(patch) {
        const schema = currentSchema();
        patchSchema({ settings: { theme: { ...schema.settings.theme, ...patch } } });
      }

      function patchTypographyRole(key, value) {
        const schema = currentSchema();
        const typography = typographySettings(schema.settings.typography, schema.settings.theme);
        patchSchema({ settings: { typography: { ...typography, [key]: value } } });
      }

      function clearSelectionFromCanvas(event) {
        if (event.target?.closest?.(".field-card, button, a, input, textarea, select")) return;
        selectField(null);
      }

      return {
        addField,
        beginDrag,
        clearDragState,
        clearDropTarget,
        clearHeadlineDropTarget,
        clearSelectionFromCanvas,
        deleteField,
        duplicateField,
        exportRuntime,
        exportSchema,
        handleDrop,
        handleHeadlineDrop,
        importSchema,
        moveField,
        patchSchema,
        patchSelectedField,
        patchTheme,
        patchTypographyRole,
        previewForm,
        resetField,
        resetForm,
        selectField,
        updateDropTarget,
        updateHeadlineDropTarget
      };
    }

    function useStoredSchema(schema) {
      useEffect(() => {
        const next = { ...schema, updatedAt: new Date().toISOString() };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      }, [schema]);
    }

    function useDismissableLayer(open, ref, onDismiss) {
      const onDismissRef = useRef(onDismiss);
      useEffect(() => {
        onDismissRef.current = onDismiss;
      }, [onDismiss]);

      useEffect(() => {
        if (!open) return undefined;
        function handlePointerDown(event) {
          if (ref.current?.contains(event.target)) return;
          onDismissRef.current();
        }
        function handleKeyDown(event) {
          if (event.key === "Escape") onDismissRef.current();
        }
        window.addEventListener("pointerdown", handlePointerDown);
        window.addEventListener("keydown", handleKeyDown);
        return () => {
          window.removeEventListener("pointerdown", handlePointerDown);
          window.removeEventListener("keydown", handleKeyDown);
        };
      }, [open, ref]);
    }

    function useFieldListAnimation(fieldsRef, fieldRectsRef, fields) {
      useLayoutEffect(() => {
        const firstRects = fieldRectsRef.current;
        if (!firstRects) return;
        fieldRectsRef.current = null;
        fieldsRef.current?.querySelectorAll(".field-card").forEach((card) => {
          const first = firstRects.get(card.dataset.fieldId);
          if (!first) return;
          const last = card.getBoundingClientRect();
          const dx = first.left - last.left;
          const dy = first.top - last.top;
          if (dx || dy) card.animate([{ transform: `translate(${dx}px, ${dy}px)` }, { transform: "translate(0, 0)" }], { duration: 180, easing: "cubic-bezier(0.22, 1, 0.36, 1)" });
        });
      }, [fields]);
    }

    function BuilderApp() {
      const [builderState, dispatchBuilder] = useReducer(builderReducer, null, initialBuilderState);
      const { schema, selectedId, removingId } = builderState;
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
      const [dragState, setDragState] = useState(null);
      const [activeColorItem, setActiveColorItem] = useState(null);
      const [activeTypographyRole, setActiveTypographyRole] = useState(null);
      const [exportMenuOpen, setExportMenuOpen] = useState(false);
      const stateRef = useRef(builderState);
      const dragStateRef = useRef(dragState);
      const fieldsRef = useRef(null);
      const fieldRectsRef = useRef(null);
      const dragPayloadRef = useRef(null);
      const headlineDropRectRef = useRef(null);
      const exportMenuRef = useRef(null);

      stateRef.current = builderState;
      dragStateRef.current = dragState;

      const builder = useBuilderActions({ stateRef, dragStateRef, dispatch: dispatchBuilder, setDragState, setExportMenuOpen, fieldsRef, fieldRectsRef, dragPayloadRef, headlineDropRectRef });
      const selectedField = useMemo(() => schema.fields.find((field) => field.id === selectedId) || null, [schema.fields, selectedId]);

      useStoredSchema(schema);
      useDismissableLayer(exportMenuOpen, exportMenuRef, () => setExportMenuOpen(false));
      useFieldListAnimation(fieldsRef, fieldRectsRef, schema.fields);

      const formName = formDisplayName(schema);
      const theme = schema.settings.theme;
      const typography = typographySettings(schema.settings.typography, theme);
      const activeDropIndex = Number.isInteger(dragState?.index) ? dragState.index : null;
      const activeDropY = Number.isFinite(dragState?.y) ? dragState.y : null;
      const draggingFieldId = dragState?.kind === "move" ? dragState.id : null;
      const headlineDropId = dragState?.headlineId || null;
      const headlineDropPlacement = dragState?.headlinePlacement || null;
      const headlineDropKind = dragState?.headlineId ? dragState.kind : null;
      const listDragActive = dragState?.kind && activeDropIndex !== null;

      useEffect(() => {
        ensureGoogleFontLoaded(theme.fontFamily);
        TYPOGRAPHY_ROLES.forEach((role) => ensureGoogleFontLoaded(typography[role.key].fontFamily));
      }, [theme.fontFamily, typography.body.fontFamily, typography.heading.fontFamily, typography.description.fontFamily, typography.label.fontFamily]);

      return html`
        <div class="builder-root">
          <div class=${`shell${sidebarCollapsed ? " sidebar-collapsed" : ""}`}>
          <header class="topbar">
            <div class="toolbar-actions">
              <label class="icon-button" for="importSchema" title="Open schema" aria-label="Open schema"><${Icon} icon="fa-regular fa-folder-open" /></label>
              <input class="sr-only" id="importSchema" type="file" accept="application/json,.json" onChange=${builder.importSchema} />
              <button class="icon-button" type="button" title="Reset form" aria-label="Reset form" onClick=${builder.resetForm}><${Icon} icon="fa-solid fa-rotate-left" /></button>
              <input
                class="current-form-name"
                value=${formName}
                maxlength="120"
                title=${formName}
                placeholder="Untitled form"
                aria-label="Form title"
                onInput=${(event) => builder.patchSchema({ settings: { name: event.currentTarget.value } })}
              />
            </div>
            <div class="top-actions">
              <button class="icon-button" type="button" title="Preview form" aria-label="Preview form" onClick=${builder.previewForm}><${Icon} icon="fa-solid fa-play" /></button>
              <div class="export-menu-wrap" ref=${exportMenuRef}>
                <button
                  class="button primary"
                  type="button"
                  aria-haspopup="menu"
                  aria-expanded=${exportMenuOpen ? "true" : "false"}
                  aria-label="Export"
                  onClick=${() => setExportMenuOpen((open) => !open)}
                >
                  <span>Export</span><${Icon} icon="fa-solid fa-chevron-down" className="export-chevron" />
                </button>
                ${exportMenuOpen ? html`
                  <div class="export-menu" role="menu" aria-label="Export options">
                    <button class="export-menu-item" type="button" role="menuitem" onClick=${builder.exportSchema}>
                      <${Icon} icon="lucide-code-xml" /><span>Schema JSON</span>
                    </button>
                    <button class="export-menu-item" type="button" role="menuitem" onClick=${builder.exportRuntime}>
                      <${Icon} icon="lucide-package-open" /><span>Runtime HTML</span>
                    </button>
                  </div>
                ` : null}
              </div>
            </div>
          </header>

          <main class="workspace">
            <button class="icon-button sidebar-expand-button" type="button" title="Expand sidebar" aria-label="Expand sidebar" aria-hidden=${!sidebarCollapsed} tabIndex=${sidebarCollapsed ? 0 : -1} onClick=${() => setSidebarCollapsed(false)}>
              <${Icon} icon="fa-solid fa-chevron-right" />
            </button>

            <aside class="sidebar" aria-label="Form blocks" aria-hidden=${sidebarCollapsed} inert=${sidebarCollapsed ? "" : null}>
              <div class="sidebar-inner">
                <div class="sidebar-head">
                  <button class="icon-button" type="button" title="Collapse sidebar" aria-label="Collapse sidebar" onClick=${() => setSidebarCollapsed(true)}>
                    <${Icon} icon="fa-solid fa-chevron-left" />
                  </button>
                </div>
                <${Palette} onAdd=${builder.addField} onDragStart=${builder.beginDrag} onDragEnd=${builder.clearDragState} />
                <${SidebarSettings} schema=${schema} onSchemaChange=${builder.patchSchema} onOpenColor=${setActiveColorItem} onOpenTypography=${setActiveTypographyRole} />
              </div>
            </aside>

            <section class="canvas-shell" aria-label="Form canvas" style=${themeStyle(schema)} onClick=${builder.clearSelectionFromCanvas}>
              <article class="form-page">
                <div
                  class=${`fields-list${listDragActive ? " is-drag-target" : ""}`}
                  ref=${fieldsRef}
                  onDragOver=${builder.updateDropTarget}
                  onDragEnter=${builder.updateDropTarget}
                  onDragLeave=${builder.clearDropTarget}
                  onDrop=${builder.handleDrop}
                >
                  <${FieldListContent}
                    fields=${schema.fields}
                    selectedId=${selectedId}
                    removingId=${removingId}
                    draggingFieldId=${draggingFieldId}
                    headlineDropId=${headlineDropId}
                    headlineDropPlacement=${headlineDropPlacement}
                    headlineDropKind=${headlineDropKind}
                    onSelect=${builder.selectField}
                    onMove=${builder.moveField}
                    onDuplicate=${builder.duplicateField}
                    onReset=${builder.resetField}
                    onDelete=${builder.deleteField}
                    onFieldDragStart=${builder.beginDrag}
                    onFieldDragEnd=${builder.clearDragState}
                    onHeadlineDragOver=${builder.updateHeadlineDropTarget}
                    onHeadlineDragLeave=${builder.clearHeadlineDropTarget}
                    onHeadlineDrop=${builder.handleHeadlineDrop}
                    onHeadlineMediaDragStart=${builder.beginDrag}
                  />
                  ${listDragActive && activeDropY !== null ? html`<${DropIndicator} y=${activeDropY} />` : null}
                </div>
              </article>
            </section>

            <aside class="inspector" aria-label="Field settings">
              <${Inspector}
                schema=${schema}
                selectedField=${selectedField}
                onSchemaChange=${builder.patchSchema}
                onFieldChange=${builder.patchSelectedField}
              />
            </aside>
          </main>
        </div>

        ${activeColorItem ? html`
          <${ColorPickerModal}
            item=${activeColorItem}
            value=${theme[activeColorItem[0]]}
            defaultValue=${DEFAULT_THEME[activeColorItem[0]]}
            onChange=${(value) => builder.patchTheme({ [activeColorItem[0]]: value })}
            onClose=${() => setActiveColorItem(null)}
          />
        ` : null}

        ${activeTypographyRole ? html`
          <${CharacterStyleModal}
            role=${activeTypographyRole}
            value=${typography[activeTypographyRole.key]}
            defaultValue=${typographyRoleDefault(activeTypographyRole.key)}
            onChange=${(value) => builder.patchTypographyRole(activeTypographyRole.key, value)}
            onClose=${() => setActiveTypographyRole(null)}
          />
        ` : null}
      </div>
      `;
    }

    render(html`<${BuilderApp} />`, document.getElementById("app"));
  </script>
</body>

</html>
