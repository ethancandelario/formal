            <div class="property">
              <label for="mediaAlt">Alt text</label>
              <input class="control" id="mediaAlt" value=${settings.alt} onInput=${(event) => patchSettings({ alt: event.currentTarget.value })} />
            </div>
          ` : null}

          <div class="property">
            <label for="mediaCaption">Caption</label>
            <input class="control" id="mediaCaption" value=${settings.caption} onInput=${(event) => patchSettings({ caption: event.currentTarget.value })} />
          </div>

          <label class="toggle-row">
            <input type="checkbox" checked=${settings.outline} onChange=${(event) => patchSettings({ outline: event.currentTarget.checked })} />
            <span>Show section outline</span>
          </label>

          <div class="settings-grid">
            <div class="property">
              <label for="mediaHorizontalAlignment">Horizontal alignment</label>
              <select class="control" id="mediaHorizontalAlignment" value=${settings.horizontalAlignment} onChange=${(event) => patchSettings({ horizontalAlignment: event.currentTarget.value })}>
                <option value="left">Left</option>
                <option value="center">Center</option>
                <option value="right">Right</option>
                <option value="stretch">Stretch</option>
              </select>
            </div>
            <div class="property">
              <label for="mediaVerticalAlignment">Vertical alignment</label>
              <select class="control" id="mediaVerticalAlignment" value=${settings.verticalAlignment} onChange=${(event) => patchSettings({ verticalAlignment: event.currentTarget.value })}>
                <option value="top">Top</option>
                <option value="center">Center</option>
                <option value="bottom">Bottom</option>
              </select>
            </div>
          </div>

          <div class="settings-grid">
            <div class="property">
              <label for="mediaScale">Scale %</label>
              <input class="control" id="mediaScale" type="number" min="10" max="100" value=${settings.scale} disabled=${settings.horizontalAlignment === "stretch"} onInput=${(event) => patchSettings({ scale: event.currentTarget.value })} />
            </div>
            <div class="property">
              <label for="mediaMaxWidth">Max width</label>
              <input class="control" id="mediaMaxWidth" value=${settings.maxWidth} placeholder="640px" onInput=${(event) => patchSettings({ maxWidth: event.currentTarget.value })} />
            </div>
          </div>

          <div class="settings-grid">
            <div class="property">
              <label for="mediaMaxHeight">Max height</label>
              <input class="control" id="mediaMaxHeight" type="number" min="80" max="1600" value=${settings.maxHeight} onInput=${(event) => patchSettings({ maxHeight: event.currentTarget.value })} />
            </div>
            <div class="property">
              <label for="mediaObjectFit">Fit</label>
              <select class="control" id="mediaObjectFit" value=${settings.objectFit} onChange=${(event) => patchSettings({ objectFit: event.currentTarget.value })}>
                <option value="contain">Contain</option>
                <option value="cover">Cover</option>
                <option value="fill">Fill</option>
                <option value="scale-down">Scale down</option>
              </select>
            </div>
          </div>
        `;
      }

      if (field.type === "radar") {
        const rawSettings = field.settings || {};
        const axes = normalizeRadarAxes(rawSettings.axes);
        const mode = normalizeRadarMode(rawSettings.mode);
        const max = normalizeRadarMax(rawSettings.max);
        const settings = {
          mode,
          max,
          axes,
          defaultValues: normalizeRadarValues(rawSettings.defaultValues, axes, max),
          defaultPoint: normalizeRadarPoint(rawSettings.defaultPoint, max)
        };
        const displayAxes = Array.isArray(rawSettings.axes) && rawSettings.axes.length ? rawSettings.axes : axes;
        const displayValues = Array.isArray(rawSettings.defaultValues) ? rawSettings.defaultValues : settings.defaultValues;
        const rawDefaultPoint = rawSettings.defaultPoint && typeof rawSettings.defaultPoint === "object" && !Array.isArray(rawSettings.defaultPoint) ? rawSettings.defaultPoint : {};
        const displayDefaultPoint = {
          angle: Object.prototype.hasOwnProperty.call(rawDefaultPoint, "angle") ? rawDefaultPoint.angle : settings.defaultPoint.angle,
          value: Object.prototype.hasOwnProperty.call(rawDefaultPoint, "value") ? rawDefaultPoint.value : settings.defaultPoint.value
        };
        const displayMax = Object.prototype.hasOwnProperty.call(rawSettings, "max") ? rawSettings.max : settings.max;
        const midpoint = Math.round(RADAR_MIN_VALUE + (settings.max - RADAR_MIN_VALUE) / 2);

        function commitRadarSettings(patch) {
          onFieldChange({ settings: { ...rawSettings, ...patch } });
        }

        return html`
          <div class="property">
            <label for="radarMode">Mode</label>
            <select class="control" id="radarMode" value=${settings.mode} onChange=${(event) => commitRadarSettings({ mode: event.currentTarget.value })}>
              <option value="shape">Multi-node shape</option>
              <option value="point">Single node</option>
            </select>
          </div>
          <div class="property">
            <label for="radarMax">Maximum</label>
            <input class="control" id="radarMax" type="number" min=${RADAR_MIN_VALUE + 1} value=${displayMax} onInput=${(event) => commitRadarSettings({ max: event.currentTarget.value })} />
          </div>
          ${settings.mode === "point" ? html`
            <div class="settings-grid">
              <div class="property">
                <label for="radarDefaultAngle">Default angle</label>
                <input
                  class="control"
                  id="radarDefaultAngle"
                  type="number"
                  min="0"
                  max="359"
                  step="1"
                  value=${displayDefaultPoint.angle}
                  onInput=${(event) => commitRadarSettings({ defaultPoint: { ...rawDefaultPoint, angle: event.currentTarget.value } })}
                />
              </div>
              <div class="property">
                <label for="radarDefaultValue">Default value</label>
                <input
                  class="control"
                  id="radarDefaultValue"
                  type="number"
                  min=${RADAR_MIN_VALUE}
                  max=${settings.max}
                  step="0.1"
                  value=${displayDefaultPoint.value}
                  onInput=${(event) => commitRadarSettings({ defaultPoint: { ...rawDefaultPoint, value: event.currentTarget.value } })}
                />
              </div>
            </div>
            <div class="radar-mode-note">Default position: ${radarPointDescription(settings.defaultPoint.angle, axes)}</div>
          ` : null}
          <div class="property">
            <div class="mini-label">${settings.mode === "point" ? "Axes" : "Axes and placeholder values"}</div>
            ${displayAxes.map((axis, index) => html`
              <div class=${settings.mode === "point" ? "option-row radar-axis-only-row" : "option-row radar-axis-row"} key=${index}>
                <input
                  class="control"
                  value=${axis}
                  aria-label=${`Radar axis ${index + 1}`}
                  onInput=${(event) => {
            const nextAxes = [...displayAxes];
            nextAxes[index] = event.currentTarget.value;
            commitRadarSettings({ axes: nextAxes });
          }}
                />
                ${settings.mode === "shape" ? html`
                  <input
                    class="control"
                    type="number"
                    min=${RADAR_MIN_VALUE}
                    max=${settings.max}
                    value=${displayValues[index] ?? settings.defaultValues[index] ?? midpoint}
                    aria-label=${`Radar placeholder value ${index + 1}`}
                    onInput=${(event) => {
              const nextValues = [...displayValues];
              nextValues[index] = event.currentTarget.value;
              commitRadarSettings({ defaultValues: nextValues });
            }}
                  />
                ` : null}
                <button
                  class="icon-button danger"
                  type="button"
                  title="Remove axis"
                  aria-label="Remove axis"
                  onClick=${() => {
            const nextAxes = displayAxes.filter((_, itemIndex) => itemIndex !== index);
            const nextValues = displayValues.filter((_, itemIndex) => itemIndex !== index);
            commitRadarSettings({ axes: nextAxes.length ? nextAxes : ["Axis 1"], defaultValues: nextAxes.length ? nextValues : [midpoint] });
          }}
                >
                  <i class="fa-solid fa-xmark"></i>
                </button>
              </div>
            `)}
            <button class="button ghost" type="button" onClick=${() => commitRadarSettings({ axes: [...displayAxes, "Axis " + (displayAxes.length + 1)], defaultValues: [...displayValues, midpoint] })}>
              <i class="fa-solid fa-plus"></i><span>Add axis</span>
            </button>
          </div>
        `;
      }

      if (field.type === "spacer") {
        const settings = { ...normalizeSpacerSettings(field), ...(field.settings || {}) };
        const patchSettings = (patch) => onFieldChange({ required: false, description: "", settings: { ...(field.settings || {}), ...patch } });
        return html`
          <div class="property">
            <label for="spacerHeight">Height</label>
            <input class="control" id="spacerHeight" type="number" min="0" max="240" value=${settings.height} onInput=${(event) => patchSettings({ height: event.currentTarget.value })} />
          </div>
          <label class="toggle-row">
            <input type="checkbox" checked=${settings.showLine} onChange=${(event) => patchSettings({ showLine: event.currentTarget.checked })} />
            <span>Show line</span>
          </label>
          ${settings.showLine ? html`
            <div class="settings-grid">
              <div class="property">
                <label for="spacerLineThickness">Line thickness</label>
                <input class="control" id="spacerLineThickness" type="number" min="1" max="12" value=${settings.lineThickness} onInput=${(event) => patchSettings({ lineThickness: event.currentTarget.value })} />
              </div>
              <div class="property">
                <label for="spacerLineStyle">Line style</label>
                <select class="control" id="spacerLineStyle" value=${settings.lineStyle} onChange=${(event) => patchSettings({ lineStyle: event.currentTarget.value })}>
                  <option value="solid">Solid</option>
                  <option value="dashed">Dashed</option>
                  <option value="dotted">Dotted</option>
                </select>
              </div>
            </div>
          ` : null}
        `;
      }

      return null;
    }

    function BuilderApp() {
      const [schema, setSchema] = useState(loadInitialSchema);
      const [selectedId, setSelectedId] = useState(schema.fields[0]?.id || null);
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
      const [dragState, setDragState] = useState(null);
      const [removingId, setRemovingId] = useState(null);
      const [activeColorItem, setActiveColorItem] = useState(null);
      const [fontPickerOpen, setFontPickerOpen] = useState(false);
      const fieldsRef = useRef(null);
      const dragPayloadRef = useRef(null);
      const selectedField = useMemo(() => schema.fields.find((field) => field.id === selectedId) || null, [schema.fields, selectedId]);

      useEffect(() => {
        const next = { ...schema, updatedAt: new Date().toISOString() };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      }, [schema]);

      function updateSchema(patch) {
        setSchema((current) => {
          const next = { ...current, ...patch };
          if (patch.settings) next.settings = { ...(current.settings || {}), ...patch.settings };
          if (next.settings?.theme) next.settings = { ...(next.settings || {}), theme: normalizeTheme(next.settings.theme) };
          return next;
        });
      }

      function updatePrimaryHeadline(patch) {
        setSchema((current) => {
          const fields = [...current.fields];
          const index = fields.findIndex((field) => field.type === "headline");
          if (index >= 0) {
            fields[index] = normalizeField({ ...fields[index], ...patch });
          } else {
            fields.unshift(normalizeField({ id: uid(), type: "headline", ...patch }));
          }
          return { ...current, fields };
        });
      }

      function selectPrimaryHeadline() {
        const headline = primaryHeadlineField(schema);
        setSelectedId(headline?.id || null);
      }

      function updateField(id, patch) {
        setSchema((current) => ({
          ...current,
          fields: current.fields.map((field) => {
            if (field.id !== id) return field;
            return {
              ...field,
              ...patch,
              settings: patch.settings ? { ...(field.settings || {}), ...patch.settings } : field.settings
            };
          })
        }));
      }

      function addField(type, index = schema.fields.length) {
        const field = fieldFromType(type);
        setSchema((current) => {
          const fields = [...current.fields];
          fields.splice(clampDropIndex(index, fields.length), 0, field);
          return { ...current, fields };
        });
        setSelectedId(field.id);
      }

      function moveField(id, direction) {
        const index = schema.fields.findIndex((field) => field.id === id);
        const nextIndex = index + direction;
        if (index < 0 || nextIndex < 0 || nextIndex >= schema.fields.length) return;
        setSchema((current) => ({ ...current, fields: reorder(current.fields, index, nextIndex) }));
      }

      function duplicateField(id) {
        const index = schema.fields.findIndex((field) => field.id === id);
        if (index < 0) return;
        const source = schema.fields[index];
        const copyLabel = String(source.label ?? "").trim() ? source.label + " copy" : "";
        const copy = normalizeField({ ...clone(source), id: uid(), label: copyLabel });
        setSchema((current) => {
          const fields = [...current.fields];
          fields.splice(index + 1, 0, copy);
          return { ...current, fields };
        });
        setSelectedId(copy.id);
      }

      function deleteField(id) {
        const index = schema.fields.findIndex((field) => field.id === id);
        if (index < 0 || removingId === id) return;
        const fields = schema.fields.filter((field) => field.id !== id);
        const nextSelectedId = fields[Math.min(index, fields.length - 1)]?.id || null;
        setRemovingId(id);
        window.setTimeout(() => {
          setSchema((current) => ({ ...current, fields: current.fields.filter((field) => field.id !== id) }));
          setSelectedId((current) => current === id ? nextSelectedId : current);
          setRemovingId(null);
        }, 150);
      }

      function clampDropIndex(index, length) {
        const fallback = Number.isInteger(index) ? index : length;
        return Math.max(0, Math.min(fallback, length));
      }

      function sameDragPayload(first, second) {
        if (!first || !second || first.kind !== second.kind) return false;
        return first.kind === "new" ? first.type === second.type : first.id === second.id;
      }

      function payloadFromEvent(event) {
        if (dragPayloadRef.current) return dragPayloadRef.current;
        const payload = event.dataTransfer?.getData("text/plain") || "";
        if (payload.startsWith("new:")) return { kind: "new", type: payload.slice(4) };
        if (payload.startsWith("move:")) return { kind: "move", id: payload.slice(5) };
        return null;
      }

      function insertionIndexFromPointer(clientY) {
        const cards = [...(fieldsRef.current?.querySelectorAll(".field-card") || [])];
        for (let index = 0; index < cards.length; index += 1) {
          const rect = cards[index].getBoundingClientRect();
          if (clientY < rect.top + rect.height / 2) return index;
        }
        return cards.length;
      }

      function beginPaletteDrag(event, type) {
        const payload = { kind: "new", type };
        dragPayloadRef.current = payload;
        event.dataTransfer.setData("text/plain", "new:" + type);
        event.dataTransfer.effectAllowed = "copy";
        setDragState({ ...payload, index: schema.fields.length });
      }

      function beginFieldDrag(event, id) {
        const payload = { kind: "move", id };
        dragPayloadRef.current = payload;
        event.dataTransfer.setData("text/plain", "move:" + id);
        event.dataTransfer.effectAllowed = "move";
        const card = event.currentTarget.closest(".field-card");
        if (card) event.dataTransfer.setDragImage(card, 24, 24);
        setDragState({ ...payload, index: schema.fields.findIndex((field) => field.id === id) });
      }

      function clearDragState() {
        dragPayloadRef.current = null;
        setDragState(null);
      }

      function updateDropTarget(event) {
        const payload = payloadFromEvent(event);
        if (!payload) return;
        event.preventDefault();
        event.dataTransfer.dropEffect = payload.kind === "new" ? "copy" : "move";
        const index = insertionIndexFromPointer(event.clientY);
        setDragState((current) => {
          if (current && sameDragPayload(current, payload) && current.index === index) return current;
          return { ...payload, index };
        });
      }

      function clearDropTarget(event) {
        if (event.relatedTarget && event.currentTarget.contains(event.relatedTarget)) return;
        setDragState((current) => current ? { ...current, index: null } : current);
      }

      function moveFieldToDropIndex(id, index) {
        setSchema((current) => {
          const from = current.fields.findIndex((field) => field.id === id);
          if (from < 0) return current;
          const insertionIndex = clampDropIndex(index, current.fields.length);
          const to = insertionIndex > from ? insertionIndex - 1 : insertionIndex;
          const boundedTo = Math.max(0, Math.min(to, current.fields.length - 1));
          if (boundedTo === from) return current;
          return { ...current, fields: reorder(current.fields, from, boundedTo) };
        });
      }

      function handleDrop(event) {
        event.preventDefault();
        const payload = payloadFromEvent(event);
        const index = Number.isInteger(dragState?.index) ? dragState.index : insertionIndexFromPointer(event.clientY);
        clearDragState();
        if (!payload) return;
        if (payload.kind === "new") addField(payload.type, index);
        if (payload.kind === "move") moveFieldToDropIndex(payload.id, index);
      }

      async function importSchema(event) {
        const file = event.currentTarget.files?.[0];
        if (!file) return;
        try {
          const text = await file.text();
          const imported = normalizeSchema(JSON.parse(text));
          setSchema(imported);
          setSelectedId(imported.fields[0]?.id || null);
        } catch (error) {
          window.alert("That JSON file could not be loaded.");
          console.error(error);
        } finally {
          event.currentTarget.value = "";
        }
      }

      function exportSchema() {
        const output = normalizeSchema(schema);
        const blob = new Blob([JSON.stringify(output, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = safeFileName(formDisplayName(schema) || "form-schema") + ".json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function previewForm() {
        const previewSchema = normalizeSchema({ ...schema, updatedAt: new Date().toISOString() });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(previewSchema));
        const hash = "#s=" + encodeSchemaToken(previewSchema);
        window.open("form-runtime.html?preview=1&refresh=" + Date.now() + hash, "formalRuntimePreview");
      }

      function resetForm() {
        const hasContent = formHasContent(schema);
        const confirmed = !hasContent || window.confirm("Reset this form and clear all fields?");
        if (!confirmed) return;
        const next = defaultSchema();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
        setSchema(next);
        setSelectedId(next.fields[0]?.id || null);
        setRemovingId(null);
      }

      const formName = formDisplayName(schema);
      const theme = normalizeTheme(schema?.settings?.theme);
      const activeDropIndex = Number.isInteger(dragState?.index) ? dragState.index : null;
      const draggingFieldId = dragState?.kind === "move" ? dragState.id : null;
      const listDragActive = dragState?.kind && activeDropIndex !== null;

      useEffect(() => {
        ensureGoogleFontLoaded(theme.fontFamily);
      }, [theme.fontFamily]);

      function patchTheme(patch) {
        updateSchema({ settings: { ...(schema.settings || {}), theme: normalizeTheme({ ...theme, ...patch }) } });
      }

      function patchColor(key, value) {
        patchTheme({ [key]: cleanColor(value, theme[key] || DEFAULT_THEME[key] || DEFAULT_THEME.accent) });
      }

      return html`
        <div class="builder-root">
          <div class=${`shell${sidebarCollapsed ? " sidebar-collapsed" : ""}`}>
          <header class="topbar">
            <div class="toolbar-actions">
              <label class="icon-button" for="importSchema" title="Open schema" aria-label="Open schema"><i class="fa-regular fa-folder-open"></i></label>
              <input class="sr-only" id="importSchema" type="file" accept="application/json,.json" onChange=${importSchema} />
              <button class="icon-button" type="button" title="Reset form" aria-label="Reset form" onClick=${resetForm}><i class="fa-solid fa-rotate-left"></i></button>
              <input
                class="current-form-name"
                value=${formName}
                maxlength="120"
                title=${formName}
                placeholder="Untitled form"
                aria-label="Form title"
                onFocus=${selectPrimaryHeadline}
                onInput=${(event) => updatePrimaryHeadline({ label: event.currentTarget.value })}
              />
            </div>
            <div class="top-actions">
              <button class="icon-button" type="button" title="Preview form" aria-label="Preview form" onClick=${previewForm}><i class="fa-solid fa-play"></i></button>
              <button class="button primary" type="button" aria-label="Export schema" onClick=${exportSchema}><i class="fa-solid fa-download"></i><span>Export</span></button>
            </div>
          </header>

          <main class="workspace">
            <button class="icon-button sidebar-expand-button" type="button" title="Expand sidebar" aria-label="Expand sidebar" aria-hidden=${!sidebarCollapsed} tabIndex=${sidebarCollapsed ? 0 : -1} onClick=${() => setSidebarCollapsed(false)}>
              <i class="fa-solid fa-chevron-right"></i>
            </button>

            <aside class="sidebar" aria-label="Form blocks" aria-hidden=${sidebarCollapsed} inert=${sidebarCollapsed ? "" : null}>
              <div class="sidebar-inner">
                <div class="sidebar-head">
                  <button class="icon-button" type="button" title="Collapse sidebar" aria-label="Collapse sidebar" onClick=${() => setSidebarCollapsed(true)}>
                    <i class="fa-solid fa-chevron-left"></i>
                  </button>
                </div>
                <${Palette} onAdd=${addField} onDragStart=${beginPaletteDrag} onDragEnd=${clearDragState} />
                <${SidebarSettings} schema=${schema} onSchemaChange=${updateSchema} onOpenColor=${setActiveColorItem} onOpenFont=${() => setFontPickerOpen(true)} />
              </div>
            </aside>

            <section class="canvas-shell" aria-label="Form canvas" style=${themeStyle(schema)}>
              <article class="form-page">
                <div
                  class=${`fields-list${listDragActive ? " is-drag-target" : ""}`}
                  ref=${fieldsRef}
                  onDragOver=${updateDropTarget}
                  onDragEnter=${updateDropTarget}
                  onDragLeave=${clearDropTarget}
                  onDrop=${handleDrop}
                >
                  <${FieldListContent}
                    fields=${schema.fields}
                    selectedId=${selectedId}
                    removingId=${removingId}
                    draggingFieldId=${draggingFieldId}
                    dropIndex=${activeDropIndex}
                    onSelect=${setSelectedId}
                    onMove=${moveField}
                    onDuplicate=${duplicateField}
                    onDelete=${deleteField}
                    onFieldDragStart=${beginFieldDrag}
                    onFieldDragEnd=${clearDragState}
                  />
                </div>
              </article>
            </section>

            <aside class="inspector" aria-label="Field settings">
              <${Inspector}
                schema=${schema}
                selectedField=${selectedField}
                onSchemaChange=${updateSchema}
                onFieldChange=${(patch) => selectedField && updateField(selectedField.id, patch)}
              />
            </aside>
          </main>
        </div>

        ${activeColorItem ? html`
          <${ColorPickerModal}
            item=${activeColorItem}
            value=${theme[activeColorItem[0]]}
            defaultValue=${DEFAULT_THEME[activeColorItem[0]]}
            onChange=${(value) => patchColor(activeColorItem[0], value)}
            onClose=${() => setActiveColorItem(null)}
          />
        ` : null}

        ${fontPickerOpen ? html`
          <${FontPickerModal}
            value=${theme.fontFamily}
            onChange=${(value) => patchTheme({ fontFamily: value })}
            onClose=${() => setFontPickerOpen(false)}
          />
        ` : null}
      </div>
      `;
    }

    render(html`<${BuilderApp} />`, document.getElementById("app"));
  </script>
</body>

</html>
