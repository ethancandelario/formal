            <button class="field-type" type="button" aria-pressed=${selected} aria-label=${selectLabel} draggable=${true} onDragStart=${(event) => onDragStart(event, { kind: "move", id: block.id })} onDragEnd=${onDragEnd} onClick=${() => primary && onSelect(primary.id)}>
              <${Icon} icon=${meta.icon} /><span>${meta.name}</span>
            </button>
            <div class="field-tools">
              <${IconButton} icon="fa-solid fa-arrow-up" title="Move up" onClick=${() => onMove(-1)} />
              <${IconButton} icon="fa-solid fa-arrow-down" title="Move down" onClick=${() => onMove(1)} />
              <${IconButton} icon="fa-solid fa-rotate-left" title="Reset properties" onClick=${onReset} />
              <${IconButton} icon="fa-regular fa-copy" title="Duplicate" onClick=${onDuplicate} />
              <${IconButton} className="danger" icon="fa-regular fa-trash-can" title="Delete" onClick=${onDelete} />
            </div>
          </div>
          <div class="field-card-body" role="button" tabIndex="0" aria-pressed=${selected} aria-label=${selectLabel} onKeyDown=${handleSelectKey}>
            <${BlockPreview}
              block=${block}
              selectedId=${selectedId}
              selectedContainerId=${selectedContainerId}
              draggingElementId=${draggingElementId}
              containerDropId=${containerDropId}
              containerDropIndex=${containerDropIndex}
              containerDropY=${containerDropY}
              containerDropHeight=${containerDropHeight}
              dropPlacement=${blockDropPlacement}
              dropActive=${blockDropActive}
              onSelectElement=${onSelect}
              onSelectContainer=${onSelectContainer}
              onDuplicateContainer=${onDuplicateContainer}
              onResetContainer=${onResetContainer}
              onDeleteContainer=${onDeleteContainer}
              onMoveElement=${onMoveElement}
              onMoveElementOut=${onMoveElementOut}
              onDuplicateElement=${onDuplicateElement}
              onDeleteElement=${onDeleteElement}
              onElementDragStart=${onDragStart}
              onElementDragEnd=${onDragEnd}
              onContainerDragStart=${onDragStart}
              onContainerDragEnd=${onDragEnd}
              onContainerDragOver=${onContainerDragOver}
              onContainerDragLeave=${onContainerDragLeave}
              onContainerDrop=${onContainerDrop}
            />
          </div>
        </article>
      `;
    }

    class FieldSettingsEditor {
      constructor(field, onFieldChange) {
        Object.assign(this, { field, onFieldChange });
      }

      patch = (patch, extras = {}) => {
        this.onFieldChange({ ...extras, settings: { ...this.field.settings, ...patch } });
      };

      patchNonData = (patch, extras = {}) => {
        this.patch(patch, { required: false, ...extras });
      };

      patchChrome = (key, value) => {
        const extras = NON_REQUIRED_FIELD_TYPES.has(this.field.type) ? { required: false } : {};
        this.patch({ [key]: value }, extras);
      };

      updateListItem = (key, index, patch) => {
        const items = this.field.settings[key].map((item, itemIndex) => itemIndex === index ? { ...item, ...patch } : item);
        this.patch({ [key]: items });
      };

      removeListItem = (key, index) => {
        this.patch({ [key]: this.field.settings[key].filter((_, itemIndex) => itemIndex !== index) });
      };

      appendListItem = (key, item) => {
        this.patch({ [key]: [...this.field.settings[key], item] });
      };
    }

    function normalizedOption(option) {
      if (Array.isArray(option)) return { value: option[0], label: option[1] };
      if (typeof option === "string") return { value: option, label: option };
      if (typeof option === "number") return { value: option, label: option };
      return option;
    }

    function replaceItem(items, index, value) {
      return items.map((item, itemIndex) => itemIndex === index ? value : item);
    }

    function PropertyFrame({ id, label, className = "property", content }) {
      return html`
        <div class=${className}>
          ${label ? id ? html`<label for=${id}>${label}</label>` : html`<label>${label}</label>` : null}
          ${content}
        </div>
      `;
    }

    function InputProperty({ id, label, value, onInput, type = "text", className = "property", controlClass = "control", inputProps = {} }) {
      return html`
        <${PropertyFrame}
          id=${id}
          label=${label}
          className=${className}
          content=${html`<input class=${controlClass} id=${id} type=${type} value=${value} onInput=${onInput} ...${inputProps} />`}
        />
      `;
    }

    function TextareaProperty({ id, label, value, onInput, className = "property", controlClass = "textarea", inputProps = {} }) {
      return html`
        <${PropertyFrame}
          id=${id}
          label=${label}
          className=${className}
          content=${html`<textarea class=${controlClass} id=${id} value=${value} onInput=${onInput} ...${inputProps}></textarea>`}
        />
      `;
    }

    function SelectProperty({ id, label, value, options, onChange, className = "property", controlClass = "control" }) {
      return html`
        <${PropertyFrame}
          id=${id}
          label=${label}
          className=${className}
          content=${html`
            <select class=${controlClass} id=${id} value=${value} onChange=${onChange}>
              ${options.map((option) => {
                const item = normalizedOption(option);
                return html`<option value=${item.value} key=${item.value}>${item.label}</option>`;
              })}
            </select>
          `}
        />
      `;
    }

    function ToggleRow({ checked, onChange, label }) {
      return html`
        <label class="toggle-row">
          <input type="checkbox" checked=${checked} onChange=${onChange} />
          <span>${label}</span>
        </label>
      `;
    }

    function SegmentedProperty({ label, value, options, onChange, ariaLabel = label, className = "property" }) {
      return html`
        <${PropertyFrame}
          label=${label}
          className=${className}
          content=${html`
            <div class="character-segmented" role="group" aria-label=${ariaLabel}>
              ${options.map((option) => {
                const item = normalizedOption(option);
                return html`<button class=${value === item.value ? "active" : ""} type="button" key=${item.value} onClick=${() => onChange(item.value)}>${item.label}</button>`;
              })}
            </div>
          `}
        />
      `;
    }

    function RemoveRowButton({ title, onClick }) {
      return html`<${IconButton} className="danger" icon="fa-solid fa-xmark" title=${title} onClick=${onClick} />`;
    }

    function EditableList({ title, titleClassName = "", items, rowClassName = "option-row", itemKey = (_, index) => index, renderItem, onRemove, removeTitle = "Remove item", emptyText = "", emptyClass = "calendar-milestone-empty", addLabel, onAdd }) {
      const titleNode = title
        ? titleClassName
          ? html`<div class=${titleClassName}><div class="mini-label">${title}</div></div>`
          : html`<div class="mini-label">${title}</div>`
        : null;

      return html`
        <div class="property">
          ${titleNode}
          ${items.length ? items.map((item, index) => {
            const className = typeof rowClassName === "function" ? rowClassName(item, index) : rowClassName;
            return html`
              <div class=${className} key=${itemKey(item, index)}>
                ${renderItem(item, index)}
                ${onRemove ? html`<${RemoveRowButton} title=${typeof removeTitle === "function" ? removeTitle(item, index) : removeTitle} onClick=${() => onRemove(item, index)} />` : null}
              </div>
            `;
          }) : emptyText ? html`<div class=${emptyClass}>${emptyText}</div>` : null}
          ${addLabel && onAdd ? html`
            <button class="button ghost" type="button" onClick=${onAdd}>
              <${Icon} icon="fa-solid fa-plus" /><span>${addLabel}</span>
            </button>
          ` : null}
        </div>
      `;
    }

    function SettingInput({ id, label, settings, setting, editor, method = "patch", type = "text", coerce = (value) => value, inputProps = {}, extras }) {
      return html`
        <${InputProperty}
          id=${id}
          label=${label}
          type=${type}
          value=${settings[setting]}
          onInput=${(event) => editor[method]({ [setting]: coerce(event.currentTarget.value) }, extras)}
          inputProps=${inputProps}
        />
      `;
    }

    function SettingSelect({ id, label, settings, setting, editor, method = "patch", options, extras }) {
      return html`
        <${SelectProperty}
          id=${id}
          label=${label}
          value=${settings[setting]}
          options=${options}
          onChange=${(event) => editor[method]({ [setting]: event.currentTarget.value }, extras)}
        />
      `;
    }

    function SettingToggle({ label, settings, setting, editor, method = "patch", extras }) {
      return html`<${ToggleRow} checked=${settings[setting]} onChange=${(event) => editor[method]({ [setting]: event.currentTarget.checked }, extras)} label=${label} />`;
    }

    function controlConfig(control) {
      if (control.length === 2) return { id: control[0], setting: control[0], label: control[1] };
      if (control.length === 3 && Array.isArray(control[2])) return { id: control[0], setting: control[0], label: control[1], options: control[2] };
      const [id, setting, label, detail = "text", coerceOrProps, props] = control;
      const config = { id, setting, label };
      if (Array.isArray(detail)) config.options = detail;
      else config.type = detail;
      if (typeof coerceOrProps === "function") config.coerce = coerceOrProps;
      else if (coerceOrProps) config.inputProps = coerceOrProps;
      if (props) config.inputProps = props;
      return config;
    }

    function SettingControl({ control, settings, editor, method = "patch", extras }) {
      const config = controlConfig(control);
      return config.options
        ? html`<${SettingSelect} ...${config} settings=${settings} editor=${editor} method=${method} extras=${extras} />`
        : html`<${SettingInput} ...${config} settings=${settings} editor=${editor} method=${method} extras=${extras} />`;
    }

    function SettingsGrid({ controls, settings, editor, method = "patch", extras }) {
      return html`
        <div class="settings-grid">
          ${controls.map((control) => html`<${SettingControl} key=${control[0]} control=${control} settings=${settings} editor=${editor} method=${method} extras=${extras} />`)}
        </div>
      `;
    }

    function Inspector({ schema, selectedField, selectedBlock, selectedContainer, onSchemaChange, onFieldChange, onContainerChange }) {
      if (!selectedField) {
        if (selectedContainer) return html`
          <h2 class="panel-title"><${Icon} icon="lucide-component" /><span>Sub-block</span></h2>
          <div class="property-stack">
            <${ContainerLayoutSettings} container=${selectedContainer} onContainerChange=${onContainerChange} />
          </div>
        `;
        if (selectedBlock) return html`
          <h2 class="panel-title"><${Icon} icon="lucide-component" /><span>Block</span></h2>
          <div class="property-stack">
            <div class="radar-mode-note">Select a sub-block to edit its layout.</div>
          </div>
        `;
        return html`
          <h2 class="panel-title"><${Icon} icon="fa-solid fa-sliders" /><span>Form Details</span></h2>
          <div class="property-stack">
            <${InputProperty} id="formName" label="Title" value=${formDisplayName(schema)} onInput=${(event) => onSchemaChange({ settings: { ...schema.settings, name: event.currentTarget.value } })} inputProps=${{ placeholder: "Untitled form" }} />
            <div class="radar-mode-note">Select a block to edit its settings.</div>
          </div>
        `;
      }

      const meta = typeMeta(selectedField?.type);
      return html`
        <h2 class="panel-title"><${Icon} icon=${meta.icon} /><span>${meta.name}</span></h2>
        <div class="property-stack">
          ${selectedField.type !== "spacer" ? html`
            <${InputProperty} id="fieldLabel" label=${selectedField.type === "headline" ? "Heading" : "Label"} value=${selectedField.label} onInput=${(event) => onFieldChange({ label: event.currentTarget.value })} />
            <${TextareaProperty} id="fieldDescription" label=${selectedField.type === "headline" ? "Subhead" : "Description"} value=${selectedField.description} onInput=${(event) => onFieldChange({ description: event.currentTarget.value })} />
          ` : null}
          <${PlaceholderSettings} field=${selectedField} onFieldChange=${onFieldChange} />
          <${OptionSettings} field=${selectedField} onFieldChange=${onFieldChange} />
          <${TypeSettings} field=${selectedField} onFieldChange=${onFieldChange} />
          <${OutlineSettings} field=${selectedField} onFieldChange=${onFieldChange} />
          ${!NON_REQUIRED_FIELD_TYPES.has(selectedField.type) ? html`
            <${ToggleRow} checked=${selectedField.required} onChange=${(event) => onFieldChange({ required: event.currentTarget.checked })} label="Required" />
          ` : null}
        </div>
      `;
    }

    function ContainerLayoutSettings({ container, onContainerChange }) {
      if (!container) return null;
      const idPrefix = `container_${container.id}`;
      return html`
        <div class="mini-label">Sub-block layout</div>
        <div class="settings-grid">
          ${CONTAINER_LAYOUT_CONTROLS.map(([key, label, options]) => html`
            <${SelectProperty} key=${key} id=${`${idPrefix}_${key}`} label=${label} value=${container[key]} options=${options} onChange=${(event) => onContainerChange({ [key]: event.currentTarget.value })} />
          `)}
        </div>
      `;
    }

    function OutlineSettings({ field, onFieldChange }) {
      const editor = new FieldSettingsEditor(field, onFieldChange);
      return html`
        <${ToggleRow} checked=${field.settings.showLabel} onChange=${(event) => editor.patchChrome("showLabel", event.currentTarget.checked)} label="Show label" />
        <${ToggleRow} checked=${field.settings.outline} onChange=${(event) => editor.patchChrome("outline", event.currentTarget.checked)} label="Show outline" />
        <${ToggleRow} checked=${field.settings.background} onChange=${(event) => editor.patchChrome("background", event.currentTarget.checked)} label="Show background" />
      `;
    }

    function PlaceholderSettings({ field, onFieldChange }) {
      if (!PLACEHOLDER_FIELD_TYPES.has(field.type)) return null;
      return html`<${InputProperty} id="fieldPlaceholder" label="Placeholder" value=${field.placeholder} onInput=${(event) => onFieldChange({ placeholder: event.currentTarget.value })} />`;
    }

    function OptionSettings({ field, onFieldChange }) {
      if (!OPTION_FIELD_TYPES.has(field.type)) return null;
      const options = field.options;
      return html`
        <${EditableList}
          title="Options"
          items=${options}
          addLabel=${"Add option"}
          onAdd=${() => onFieldChange({ options: [...options, "Option " + (options.length + 1)] })}
          removeTitle="Remove option"
          onRemove=${(_, index) => onFieldChange({ options: options.filter((__, itemIndex) => itemIndex !== index) })}
          renderItem=${(option, index) => html`
              <input
                class="control"
                value=${option}
                aria-label=${`Option ${index + 1}`}
                onInput=${(event) => onFieldChange({ options: replaceItem(options, index, event.currentTarget.value) })}
              />
          `}
        />
          ${field.type === "checkbox" ? html`
            <${ToggleRow} checked=${field.settings.allowCustomOptions} onChange=${(event) => onFieldChange({ settings: { ...field.settings, allowCustomOptions: event.currentTarget.checked } })} label="Allow custom options" />
          ` : null}
      `;
    }

    function MediaSettingsControls({ field, onFieldChange, editor = new FieldSettingsEditor(field, onFieldChange) }) {
        const settings = field.settings;
        const fileInputId = field.id + "_mediaFile";

        return html`
          <${SettingSelect} id="mediaSourceType" label="Source" settings=${settings} setting="sourceType" editor=${editor} method="patchNonData" options=${MEDIA_SOURCE_OPTIONS} />

          ${settings.sourceType === "url" ? html`
            <${InputProperty} id="mediaUrl" label="Media URL" value=${settings.url} onInput=${(event) => editor.patchNonData({ url: event.currentTarget.value, dataUrl: "", fileName: "", mimeType: "" })} inputProps=${{ placeholder: "https://example.com/media.mp4" }} />
          ` : null}

          ${settings.sourceType === "file" ? html`
            <div class="property">
              <label for=${fileInputId}>Media file</label>
              <input
                class="control"
                id=${fileInputId}
                type="file"
                accept="image/*,video/*,audio/*,.svg,.pdf,.ai,.eps"
                onChange=${async (event) => {
              const file = event.currentTarget.files?.[0];
              if (!file) return;
              editor.patchNonData({
                sourceType: "file",
                dataUrl: await readFileAsDataUrl(file),
                mimeType: file.type || "",
                fileName: file.name || "",
                url: "",
                html: ""
              });
              event.currentTarget.value = "";
            }}
              />
              ${settings.fileName ? html`<div class="media-file-note">${settings.fileName}</div>` : null}
            </div>
          ` : null}

          ${settings.sourceType === "html" ? html`
            <${TextareaProperty} id="mediaHtml" label="HTML" value=${settings.html} onInput=${(event) => editor.patchNonData({ html: event.currentTarget.value, url: "", dataUrl: "", fileName: "", mimeType: "" })} inputProps=${{ placeholder: "<div>Embedded content</div>" }} />
            <${SettingInput} id="mediaIframeHeight" label="HTML height" type="number" settings=${settings} setting="iframeHeight" editor=${editor} method="patchNonData" coerce=${Number} inputProps=${{ min: 120, max: 1200 }} />
          ` : null}

          ${settings.sourceType !== "html" ? html`
            <${SettingInput} id="mediaAlt" label="Alt text" settings=${settings} setting="alt" editor=${editor} method="patchNonData" />
          ` : null}

          <${SettingInput} id="mediaCaption" label="Caption" settings=${settings} setting="caption" editor=${editor} method="patchNonData" />

          <${SettingsGrid} controls=${MEDIA_LAYOUT_CONTROLS.slice(0, 2)} settings=${settings} editor=${editor} method="patchNonData" />

          <${SettingsGrid} controls=${[
            ["mediaHorizontalSize", "horizontalSize", "Horizontal size", HORIZONTAL_SIZE.options],
            ["mediaScale", "scale", "Width %", "number", Number, { min: 10, max: 100, disabled: settings.horizontalSize === "stretch" }]
          ]} settings=${settings} editor=${editor} method="patchNonData" />

          <${SettingsGrid} controls=${[
            ["mediaMaxWidth", "maxWidth", "Max width", "text", { placeholder: "640px" }],
            ["mediaMaxHeight", "maxHeight", "Max height", "number", Number, { min: 80, max: 1600 }]
          ]} settings=${settings} editor=${editor} method="patchNonData" />

          <${SettingsGrid} controls=${[
            ["mediaPadding", "padding", "Padding", "number", Number, { min: 0, max: 120 }],
            ["mediaObjectFit", "objectFit", "Object fit", MEDIA_OBJECT_FIT_OPTIONS]
          ]} settings=${settings} editor=${editor} method="patchNonData" />
        `;
    }

    function HeadlineSettingsControls({ field, editor }) {
      const headline = new HeadlineModel(field);
      return html`
        <${SettingsGrid} controls=${HEADLINE_ALIGNMENT_CONTROLS} settings=${headline} editor=${editor} method="patchNonData" />
      `;
    }

    function MoodMeterSettingsControls({ field, editor }) {
      const settings = field.settings;
      return html`
        <${SettingsGrid} controls=${[["minLabel", "Low label"], ["maxLabel", "High label"]]} settings=${settings} editor=${editor} />
      `;
    }

    function LinearScaleSettingsControls({ field, editor }) {
      const settings = field.settings;
      return html`
        <${SettingsGrid} controls=${[
          ["scaleMin", "min", "Minimum", "number", Number],
          ["scaleMax", "max", "Maximum", "number", Number],
          ["scaleMinLabel", "minLabel", "Low label"],
          ["scaleMaxLabel", "maxLabel", "High label"]
        ]} settings=${settings} editor=${editor} />
      `;
    }

    function StarRatingSettingsControls({ field, editor }) {
      return html`<${SettingInput} id="starMax" label="Stars" type="number" settings=${field.settings} setting="max" editor=${editor} coerce=${Number} inputProps=${{ min: 3, max: 10 }} />`;
    }

    function CalendarSettingsControls({ field, editor }) {
      const settings = field.settings;
      return html`
        <${SettingsGrid} controls=${[
          ["calendarStartDate", "startDate", "Default start date", "date"],
          ["calendarEndDate", "endDate", "Default end date", "date"]
        ]} settings=${settings} editor=${editor} />
        <${SettingToggle} settings=${settings} setting="allowMilestones" editor=${editor} label="Allow milestones" />
        ${settings.allowMilestones ? html`
          <${EditableList}
            title="Milestones"
            titleClassName="calendar-milestone-editor-head"
            items=${settings.milestones}
            rowClassName="calendar-milestone-row"
            itemKey=${(item, index) => item.id || index}
            emptyText="No milestones yet."
            addLabel="Add milestone"
            onAdd=${() => editor.appendListItem("milestones", { id: uid(), date: "", label: "Milestone " + (settings.milestones.length + 1) })}
            removeTitle="Remove milestone"
            onRemove=${(_, index) => editor.removeListItem("milestones", index)}
            renderItem=${(item, index) => html`
                <input class="control" type="date" value=${item.date} aria-label=${`Milestone ${index + 1} date`} onInput=${(event) => editor.updateListItem("milestones", index, { date: event.currentTarget.value })} />
                <input class="control" value=${item.label} placeholder="Milestone name" aria-label=${`Milestone ${index + 1} label`} onInput=${(event) => editor.updateListItem("milestones", index, { label: event.currentTarget.value })} />
            `}
          />
        ` : null}
      `;
    }

    function MediaUploadSettingsControls({ field, editor }) {
      return html`<${SettingInput} id="mediaUploadAccept" label="Accepted types" settings=${field.settings} setting="accept" editor=${editor} inputProps=${{ placeholder: "image/*,video/*,audio/*,.svg,.pdf" }} />`;
    }

    function RadarSettingsControls({ field, editor }) {
      const rawSettings = field.settings;
      const radar = new RadarModel(field);
      const settings = { mode: radar.mode, max: radar.max, axes: radar.axes, defaultValues: radar.values, defaultPoint: radar.point };
      const displayAxes = rawSettings.axes;
      const displayValues = rawSettings.defaultValues;
      const rawDefaultPoint = rawSettings.defaultPoint;
      const midpoint = radar.midpoint;

      return html`
        <${SettingSelect} id="radarMode" label="Mode" settings=${settings} setting="mode" editor=${editor} options=${RADAR_MODE_OPTIONS} />
        <${SettingInput} id="radarMax" label="Maximum" type="number" settings=${rawSettings} setting="max" editor=${editor} coerce=${Number} inputProps=${{ min: RADAR_MIN_VALUE + 1 }} />
        ${settings.mode === "point" ? html`
          <div class="settings-grid">
            <${InputProperty} id="radarDefaultAngle" label="Default angle" type="number" value=${rawDefaultPoint.angle} onInput=${(event) => editor.patch({ defaultPoint: { ...rawDefaultPoint, angle: Number(event.currentTarget.value) } })} inputProps=${{ min: 0, max: 359, step: 1 }} />
            <${InputProperty} id="radarDefaultValue" label="Default value" type="number" value=${rawDefaultPoint.value} onInput=${(event) => editor.patch({ defaultPoint: { ...rawDefaultPoint, value: Number(event.currentTarget.value) } })} inputProps=${{ min: RADAR_MIN_VALUE, max: settings.max, step: 0.1 }} />
          </div>
          <div class="radar-mode-note">Default position: ${RadarModel.describe(settings.defaultPoint.angle, settings.axes)}</div>
        ` : null}
        <${EditableList}
          title=${settings.mode === "point" ? "Axes" : "Axes and placeholder values"}
          items=${displayAxes}
          rowClassName=${settings.mode === "point" ? "option-row radar-axis-only-row" : "option-row radar-axis-row"}
          addLabel="Add axis"
          onAdd=${() => editor.patch({ axes: [...displayAxes, "Axis " + (displayAxes.length + 1)], defaultValues: [...displayValues, midpoint] })}
          removeTitle="Remove axis"
          onRemove=${(_, index) => {
            const nextAxes = displayAxes.filter((__, itemIndex) => itemIndex !== index);
            const nextValues = displayValues.filter((__, itemIndex) => itemIndex !== index);
            editor.patch({ axes: nextAxes.length ? nextAxes : ["Axis 1"], defaultValues: nextAxes.length ? nextValues : [midpoint] });
          }}
          renderItem=${(axis, index) => html`
              <input
                class="control"
                value=${axis}
                aria-label=${`Radar axis ${index + 1}`}
                onInput=${(event) => editor.patch({ axes: replaceItem(displayAxes, index, event.currentTarget.value) })}
              />
              ${settings.mode === "shape" ? html`
                <input
                  class="control"
                  type="number"
                  min=${RADAR_MIN_VALUE}
                  max=${settings.max}
                  value=${displayValues[index]}
                  aria-label=${`Radar placeholder value ${index + 1}`}
                  onInput=${(event) => editor.patch({ defaultValues: replaceItem(displayValues, index, Number(event.currentTarget.value)) })}
                />
              ` : null}
          `}
        />
      `;
    }

    function SpacerSettingsControls({ field, editor }) {
      const settings = field.settings;
      const extras = { description: "" };
      return html`
        <${SettingInput} id="spacerHeight" label="Height" type="number" settings=${settings} setting="height" editor=${editor} method="patchNonData" coerce=${Number} extras=${extras} inputProps=${{ min: 0, max: 240 }} />
        <${SettingToggle} settings=${settings} setting="showLine" editor=${editor} method="patchNonData" extras=${extras} label="Show line" />
        ${settings.showLine ? html`
          <${SettingsGrid} controls=${[
            ["spacerLineThickness", "lineThickness", "Line thickness", "number", Number, { min: 1, max: 12 }],
            ["spacerLineStyle", "lineStyle", "Line style", SPACER_LINE_STYLE_OPTIONS]
          ]} settings=${settings} editor=${editor} method="patchNonData" extras=${extras} />
        ` : null}
      `;
    }

    const FIELD_SETTINGS_COMPONENTS = {
      headline: HeadlineSettingsControls,
      mood_meter: MoodMeterSettingsControls,
      linear_scale: LinearScaleSettingsControls,
      star_rating: StarRatingSettingsControls,
      calendar: CalendarSettingsControls,
      media_upload: MediaUploadSettingsControls,
      media: MediaSettingsControls,
      radar: RadarSettingsControls,
      spacer: SpacerSettingsControls
    };

    function TypeSettings({ field, onFieldChange }) {
      const Settings = FIELD_SETTINGS_COMPONENTS[field.type];
      return Settings ? html`<${Settings} field=${field} onFieldChange=${onFieldChange} editor=${new FieldSettingsEditor(field, onFieldChange)} />` : null;
    }

    class DragPayloadModel {
      static clampIndex(index, length) {
        const targetIndex = Number.isInteger(index) ? index : length;
        return Math.max(0, Math.min(targetIndex, length));
      }

      static key(payload) {
        if (payload?.kind === "new" && payload.type) return `new:${payload.type}`;
        if (payload?.kind === "move" && payload.id) return `move:${payload.id}`;
        if (payload?.kind === "container" && payload.sourceBlockId && payload.containerId) return `container:${payload.sourceBlockId}:${payload.containerId}`;
        if (payload?.kind === "element" && payload.sourceBlockId && payload.sourceContainerId && payload.elementId) return `element:${payload.sourceBlockId}:${payload.sourceContainerId}:${payload.elementId}`;
        return "";
      }

      static parse(value) {
        const text = String(value || "");
        const index = text.indexOf(":");
        if (index < 0) return null;
        const kind = text.slice(0, index);
        const target = text.slice(index + 1);
        if (kind === "new" && target) return { kind, type: target };
        if (kind === "move" && target) return { kind, id: target };
        if (kind === "container") {
          const [sourceBlockId, containerId] = target.split(":");
          if (sourceBlockId && containerId) return { kind, sourceBlockId, containerId };
        }
        if (kind === "element") {
          const [sourceBlockId, sourceContainerId, elementId] = target.split(":");
          if (sourceBlockId && sourceContainerId && elementId) return { kind, sourceBlockId, sourceContainerId, elementId };
        }
        return null;
      }

      static same(first, second) {
        const firstKey = DragPayloadModel.key(first);
        return Boolean(firstKey && firstKey === DragPayloadModel.key(second));
      }

      static dropEffect(payload) {
        return payload?.kind === "new" ? "copy" : "move";
      }

      static singleElementBlock(block) {
        const containers = blockContainers(block);
        if (containers.length !== 1) return null;
        const elements = containerElements(containers[0]);
        return elements.length === 1 ? elements[0] : null;
      }

      static elementFromPayload(payload, blocks) {
        if (payload?.kind === "new" && fieldTypes.some((item) => item.type === payload.type)) return elementFromType(payload.type);
        if (payload?.kind === "move") {
          const sourceBlock = blocks.find((block) => block.id === payload.id);
          const sourceElement = DragPayloadModel.singleElementBlock(sourceBlock);
          return sourceElement ? clone(sourceElement) : null;
        }
        if (payload?.kind === "element") {
          const source = elementLocation({ blocks }, payload.elementId);
          return source ? clone(source.element) : null;
        }
        return null;
      }

      static canDropOnBlock(payload, blocks, blockId) {
        if (payload?.kind === "new") return fieldTypes.some((item) => item.type === payload.type);
        if (payload?.kind === "container") return payload.sourceBlockId === blockId && blocks.some((block) => block.id === blockId && block.containers.some((container) => container.id === payload.containerId));
        if (payload?.kind === "element") return blocks.some((block) => block.id === blockId) && Boolean(elementLocation({ blocks }, payload.elementId));
        if (payload?.kind === "move" && payload.id !== blockId) return Boolean(DragPayloadModel.singleElementBlock(blocks.find((block) => block.id === payload.id)));
        return false;
      }

      static canDropOnContainer(payload, blocks, blockId, containerId) {
        const targetBlock = blocks.find((block) => block.id === blockId);
        const hasTarget = targetBlock && blockContainers(targetBlock).some((container) => container.id === containerId);
        if (!hasTarget) return false;
        if (payload?.kind === "new") return fieldTypes.some((item) => item.type === payload.type);
        if (payload?.kind === "element") return Boolean(elementLocation({ blocks }, payload.elementId));
        if (payload?.kind === "move" && payload.id !== blockId) return Boolean(DragPayloadModel.singleElementBlock(blocks.find((block) => block.id === payload.id)));
        return false;
      }

      static moveContainer(schema, blockId, payload, placement) {
        if (!DragPayloadModel.canDropOnBlock(payload, schema.blocks, blockId)) return null;
        let selectedId = null;
        let selectedContainerId = null;
        const blocks = schema.blocks.map((block) => {
          if (block.id !== blockId) return block;
          const containers = ContainerPlacementModel.move(block.containers, payload.containerId, placement);
          const selectedContainer = containers.find((container) => container.id === payload.containerId) || null;
          selectedId = null;
          selectedContainerId = selectedContainer?.id || null;
          return { ...block, containers };
        });
        return { schema: { ...schema, blocks }, selectedId, selectedContainerId };
      }

      static addElementToBlock(schema, blockId, payload, placement = "right") {
        if (!DragPayloadModel.canDropOnBlock(payload, schema.blocks, blockId)) return null;
        const element = DragPayloadModel.elementFromPayload(payload, schema.blocks);
        if (!element) return null;
        const container = containerFromElements([schemaField(element)], placement);
        if (payload.kind === "element") {
          let inserted = false;
          const blocks = schema.blocks.flatMap((block) => {
            if (block.id === blockId) {
              const containers = blockContainers(block).flatMap((item) => {
                if (item.id !== payload.sourceContainerId) return [item];
                const elements = containerElements(item).filter((field) => field.id !== payload.elementId);
                return elements.length ? [{ ...item, elements }] : [];
              });
              inserted = true;
              return [{ ...block, containers: ContainerPlacementModel.insert(containers, container, placement) }];
            }
            if (block.id !== payload.sourceBlockId) return [block];
            const containers = blockContainers(block).flatMap((item) => {
              if (item.id !== payload.sourceContainerId) return [item];
              const elements = containerElements(item).filter((field) => field.id !== payload.elementId);
              return elements.length ? [{ ...item, elements }] : [];
            });
            return containers.length ? [{ ...block, containers }] : [];
          });
          return inserted ? { schema: { ...schema, blocks }, selectedId: element.id, selectedContainerId: container.id } : null;
        }
        const sourceBlockId = payload.kind === "move" ? payload.id : null;
        const blocks = schema.blocks
          .filter((block) => block.id !== sourceBlockId)
          .map((block) => {
            if (block.id !== blockId) return block;
            return { ...block, containers: ContainerPlacementModel.insert(block.containers, container, placement) };
        });
        return { schema: { ...schema, blocks }, selectedId: element.id, selectedContainerId: container.id };
      }

      static addElementToContainer(schema, blockId, containerId, payload, index = null) {
        if (!DragPayloadModel.canDropOnContainer(payload, schema.blocks, blockId, containerId)) return null;
        const element = DragPayloadModel.elementFromPayload(payload, schema.blocks);
        if (!element) return null;
        if (payload.kind === "element") return DragPayloadModel.moveElementToContainer(schema, containerId, payload, index);
        const target = containerLocation(schema, containerId);
        if (!target) return null;
        const insertionIndex = DragPayloadModel.clampIndex(index, containerElements(target.container).length);
        const sourceBlockId = payload.kind === "move" ? payload.id : null;
        let inserted = false;
        const blocks = schema.blocks
          .filter((block) => block.id !== sourceBlockId)
          .map((block) => {
            if (block.id !== blockId) return block;
            return {
              ...block,
              containers: block.containers.map((container) => {
                if (container.id !== containerId) return container;
                inserted = true;
                return { ...container, elements: insertAt(containerElements(container), insertionIndex, schemaField(element)) };
              })
            };
          });
        return inserted ? { schema: { ...schema, blocks }, selectedId: element.id, selectedContainerId: containerId } : null;
      }

      static moveElementToContainer(schema, containerId, payload, index = null) {
        const source = elementLocation(schema, payload.elementId);
        const target = containerLocation(schema, containerId);
        if (!source || !target) return null;
        const element = schemaField(clone(source.element));
        let insertionIndex = DragPayloadModel.clampIndex(index, containerElements(target.container).length);
        if (source.container.id === containerId && source.elementIndex < insertionIndex) insertionIndex -= 1;
        const blocks = schema.blocks.flatMap((block) => {
          let changed = false;
          const containers = blockContainers(block).flatMap((container) => {
            const isSource = container.id === source.container.id;
            const isTarget = container.id === containerId;
            if (!isSource && !isTarget) return [container];
            changed = true;
            let elements = containerElements(container);
            if (isSource) elements = elements.filter((field) => field.id !== payload.elementId);
            if (isTarget) elements = insertAt(elements, insertionIndex, element);
            return elements.length ? [{ ...container, elements }] : [];
          });
          if (!changed) return [block];
          return containers.length ? [{ ...block, containers }] : [];
        });
        return { schema: { ...schema, blocks }, selectedId: element.id, selectedContainerId: containerId };
      }

      static moveElementToIndex(schema, payload, index) {
        const source = elementLocation(schema, payload.elementId);
        if (!source) return null;
        const element = schemaField(clone(source.element));
        const block = { id: uid("block"), containers: [containerFromElements([element])] };
        const blocks = removeElementFromBlocks(schema.blocks, source.container.id, payload.elementId);
        const sourceBlockStillExists = blocks.some((item) => item.id === source.block.id);
        const rawIndex = DragPayloadModel.clampIndex(index, blocks.length);
        const insertionIndex = !sourceBlockStillExists && source.blockIndex < rawIndex ? rawIndex - 1 : rawIndex;
        blocks.splice(DragPayloadModel.clampIndex(insertionIndex, blocks.length), 0, block);
        return { schema: { ...schema, blocks }, selectedId: element.id, selectedContainerId: block.containers[0].id };
      }
    }

    function initialBuilderState() {
      const schema = loadInitialSchema();
      return { schema, selectedId: firstBlockElement(schema.blocks[0])?.id || null, selectedContainerId: null, removingId: null };
    }

    function builderReducer(state, action) {
      switch (action.type) {
        case "replace-schema":
          return { schema: action.schema, selectedId: firstBlockElement(action.schema.blocks[0])?.id || null, selectedContainerId: null, removingId: null };
        case "commit-schema":
          return { ...state, schema: action.schema, selectedId: action.selectedId ?? state.selectedId, selectedContainerId: action.selectedContainerId === undefined ? state.selectedContainerId : action.selectedContainerId };
        case "patch-schema": {
          const schema = { ...state.schema, ...action.patch };
          if (action.patch.settings) schema.settings = { ...state.schema.settings, ...action.patch.settings };
          return { ...state, schema };
        }
        case "patch-field":
          return {
            ...state,
            schema: {
              ...state.schema,
              blocks: state.schema.blocks.map((block) => ({
                ...block,
                containers: block.containers.map((container) => ({
                  ...container,
                  elements: container.elements.map((field) => field.id === action.id
                    ? { ...field, ...action.patch, settings: action.patch.settings ? { ...field.settings, ...action.patch.settings } : field.settings }
                    : field)
                }))
              }))
            }
          };
        case "patch-container": {
          const patch = action.patch || {};
          const hasPlacementPatch = Object.prototype.hasOwnProperty.call(patch, "placement");
          return {
            ...state,
            schema: {
              ...state.schema,
              blocks: state.schema.blocks.map((block) => {
                if (!block.containers.some((container) => container.id === action.id)) return block;
                if (!hasPlacementPatch) {
                  return {
                    ...block,
                    containers: block.containers.map((container) => container.id === action.id ? { ...container, ...patch } : container)
                  };
                }
                const containers = block.containers.map((container) => container.id === action.id ? { ...container, ...patch, placement: container.placement } : container);
                return { ...block, containers: ContainerPlacementModel.move(containers, action.id, patch.placement) };
              })
            }
          };
        }
        case "select-field":
          return state.selectedId === action.id && state.selectedContainerId === (action.containerId || null) ? state : { ...state, selectedId: action.id, selectedContainerId: action.containerId || null };
        case "select-container":
          return state.selectedId === null && state.selectedContainerId === action.containerId ? state : { ...state, selectedId: null, selectedContainerId: action.containerId };
        case "insert-field": {
          const blocks = [...state.schema.blocks];
          blocks.splice(DragPayloadModel.clampIndex(action.index, blocks.length), 0, action.block);
          return { ...state, schema: { ...state.schema, blocks }, selectedId: firstBlockElement(action.block)?.id || state.selectedId, selectedContainerId: null };
        }
        case "insert-element": {
          const element = schemaField(action.element);
          let inserted = false;
          const blocks = state.schema.blocks.map((block) => ({
            ...block,
            containers: block.containers.map((container) => {
              if (container.id !== action.containerId) return container;
              inserted = true;
              return { ...container, elements: [...containerElements(container), element] };
            })
          }));
          return inserted ? { ...state, schema: { ...state.schema, blocks }, selectedId: element.id, selectedContainerId: action.containerId } : state;
        }
        case "move-field": {
          const from = state.schema.blocks.findIndex((block) => block.id === action.id);
          const to = from + action.direction;
          return from < 0 || to < 0 || to >= state.schema.blocks.length ? state : { ...state, schema: { ...state.schema, blocks: reorder(state.schema.blocks, from, to) } };
        }
        case "move-element": {
          const location = elementLocation(state.schema, action.elementId);
          if (!location || location.container.id !== action.containerId) return state;
          const to = location.elementIndex + action.direction;
          if (to < 0 || to >= containerElements(location.container).length) return state;
          const blocks = state.schema.blocks.map((block) => block.id === location.block.id
            ? {
              ...block,
              containers: block.containers.map((container) => container.id === action.containerId
                ? { ...container, elements: reorder(containerElements(container), location.elementIndex, to) }
                : container)
            }
            : block);
          return { ...state, schema: { ...state.schema, blocks }, selectedId: action.elementId, selectedContainerId: action.containerId };
        }
        case "move-field-to-index": {
          const from = state.schema.blocks.findIndex((block) => block.id === action.id);
          if (from < 0) return state;
          const insertionIndex = DragPayloadModel.clampIndex(action.index, state.schema.blocks.length);
          const to = insertionIndex > from ? insertionIndex - 1 : insertionIndex;
          const boundedTo = Math.max(0, Math.min(to, state.schema.blocks.length - 1));
          return boundedTo === from ? state : { ...state, schema: { ...state.schema, blocks: reorder(state.schema.blocks, from, boundedTo) } };
        }
        case "duplicate-field": {
          const index = state.schema.blocks.findIndex((block) => block.id === action.id);
          if (index < 0) return state;
          const blocks = [...state.schema.blocks];
          blocks.splice(index + 1, 0, action.copy);
          return { ...state, schema: { ...state.schema, blocks }, selectedId: firstBlockElement(action.copy)?.id || state.selectedId, selectedContainerId: null };
        }
        case "duplicate-element": {
          const location = elementLocation(state.schema, action.elementId);
          if (!location || location.container.id !== action.containerId) return state;
          const copy = cloneElementWithNewId(location.element);
          const blocks = state.schema.blocks.map((block) => block.id === location.block.id
            ? {
              ...block,
              containers: block.containers.map((container) => container.id === action.containerId
                ? {
                  ...container,
                  elements: [
                    ...containerElements(container).slice(0, location.elementIndex + 1),
                    copy,
                    ...containerElements(container).slice(location.elementIndex + 1)
                  ]
                }
                : container)
            }
            : block);
          return { ...state, schema: { ...state.schema, blocks }, selectedId: copy.id, selectedContainerId: action.containerId };
        }
        case "reset-field": {
          const source = state.schema.blocks.find((block) => block.id === action.id);
          if (!source) return state;
          const reset = { ...source, containers: source.containers.map(resetContainer) };
          return { ...state, schema: { ...state.schema, blocks: state.schema.blocks.map((block) => block.id === action.id ? reset : block) }, selectedId: firstBlockElement(reset)?.id || state.selectedId, selectedContainerId: null };
        }
        case "mark-removing":
          return state.removingId === action.id || !state.schema.blocks.some((block) => block.id === action.id) ? state : { ...state, removingId: action.id };
        case "remove-field": {
          const index = state.schema.blocks.findIndex((block) => block.id === action.id);
          if (index < 0) return { ...state, removingId: null };
          const blocks = state.schema.blocks.filter((block) => block.id !== action.id);
          const removedSelected = selectedBlockId(state.schema, state.selectedId) === action.id || blockForContainer(state.schema, state.selectedContainerId)?.id === action.id;
          const selectedId = removedSelected ? firstBlockElement(blocks[Math.min(index, blocks.length - 1)])?.id || null : state.selectedId;
          return { ...state, schema: { ...state.schema, blocks }, selectedId, selectedContainerId: removedSelected ? null : state.selectedContainerId, removingId: null };
        }
        case "move-element-out": {
          const location = elementLocation(state.schema, action.elementId);
          if (!location || location.container.id !== action.containerId) return state;
          const newContainer = containerFromElements([schemaField(clone(location.element))]);
          const newBlock = { id: uid("block"), containers: [newContainer] };
          const blocks = removeElementFromBlocks(state.schema.blocks, action.containerId, action.elementId);
          const sourceBlockIndex = blocks.findIndex((block) => block.id === location.block.id);
          const insertionIndex = sourceBlockIndex >= 0 ? sourceBlockIndex + 1 : Math.min(location.blockIndex, blocks.length);
          blocks.splice(insertionIndex, 0, newBlock);
          return { ...state, schema: { ...state.schema, blocks }, selectedId: action.elementId, selectedContainerId: newContainer.id };
        }
        case "delete-element": {
          const location = elementLocation(state.schema, action.elementId);
          if (!location || location.container.id !== action.containerId) return state;
          const blocks = removeElementFromBlocks(state.schema.blocks, action.containerId, action.elementId);
          let nextSelectedId = state.selectedId;
          let nextSelectedContainerId = state.selectedContainerId;
          if (state.selectedId === action.elementId || state.selectedContainerId === action.containerId) {
            const remainingContainer = containerById({ blocks }, action.containerId);
            const nextSibling = remainingContainer ? containerElements(remainingContainer)[Math.min(location.elementIndex, containerElements(remainingContainer).length - 1)] : null;
            if (nextSibling) {
              nextSelectedId = nextSibling.id;
              nextSelectedContainerId = action.containerId;
            } else {
              const nextBlock = blocks[Math.min(location.blockIndex, blocks.length - 1)] || blocks[blocks.length - 1] || null;
              const nextElement = firstBlockElement(nextBlock);
              const selection = nextElement ? selectionForElement({ ...state.schema, blocks }, nextElement.id) : { selectedId: null, selectedContainerId: null };
              nextSelectedId = selection.selectedId;
              nextSelectedContainerId = selection.selectedContainerId;
            }
          }
          return { ...state, schema: { ...state.schema, blocks }, selectedId: nextSelectedId, selectedContainerId: nextSelectedContainerId };
        }
        case "duplicate-container": {
          let copy = null;
          const blocks = state.schema.blocks.map((block) => {
            if (block.id !== action.blockId) return block;
            const index = block.containers.findIndex((container) => container.id === action.containerId);
            if (index < 0) return block;
            const source = block.containers[index];
            copy = { ...cloneContainerWithNewIds(source), placement: ContainerPlacementModel.placementForCopy(block.containers, source.placement) };
            const containers = [...block.containers];
            containers.splice(index + 1, 0, copy);
            return { ...block, containers };
          });
          return copy ? { ...state, schema: { ...state.schema, blocks }, selectedId: null, selectedContainerId: copy.id } : state;
        }
        case "reset-container":
          return {
            ...state,
            schema: {
              ...state.schema,
              blocks: state.schema.blocks.map((block) => block.id === action.blockId
                ? { ...block, containers: block.containers.map((container) => container.id === action.containerId ? resetContainer(container) : container) }
                : block)
            },
            selectedId: state.selectedId
          };
        case "delete-container": {
          let nextSelectedId = state.selectedId;
          let nextSelectedContainerId = state.selectedContainerId;
          const blocks = state.schema.blocks.flatMap((block) => {
            if (block.id !== action.blockId) return [block];
            const removing = block.containers.find((container) => container.id === action.containerId);
            const containers = block.containers.filter((container) => container.id !== action.containerId);
            if (removing && (action.containerId === state.selectedContainerId || containerElements(removing).some((element) => element.id === state.selectedId))) {
              nextSelectedId = firstBlockElement({ containers })?.id || null;
              nextSelectedContainerId = null;
            }
            return containers.length ? [{ ...block, containers }] : [];
          });
          return { ...state, schema: { ...state.schema, blocks }, selectedId: nextSelectedId, selectedContainerId: nextSelectedContainerId };
        }
        default:
          return state;
      }
    }

    function useBuilderActions({ stateRef, dragStateRef, dispatch, setDragState, setExportMenuOpen, fieldsRef, fieldCardRefs, fieldRectsRef, dragPayloadRef, blockDropRectRef }) {
      const current = () => stateRef.current;
      const currentSchema = () => current().schema;
      const replaceSchema = (schema) => dispatch({ type: "replace-schema", schema });
      const patchSchema = (patch) => dispatch({ type: "patch-schema", patch });
      const selectField = (id, containerId = null) => dispatch({ type: "select-field", id, containerId });
      const selectContainer = (containerId) => dispatch({ type: "select-container", containerId });
      const fieldCardEntries = () => currentSchema().blocks
        .map((block) => [block.id, fieldCardRefs.current.get(block.id)])
        .filter(([, card]) => card);

      function patchSelectedField(patch) {
        const id = current().selectedId;
        if (id) dispatch({ type: "patch-field", id, patch });
      }

      function patchSelectedContainer(patch) {
        const state = current();
        const container = state.selectedContainerId ? containerById(currentSchema(), state.selectedContainerId) : null;
        if (container) dispatch({ type: "patch-container", id: container.id, patch });
      }

      function addField(type, index = null) {
        const explicitIndex = Number.isInteger(index);
        const selectedContainerId = current().selectedContainerId;
        if (!explicitIndex && selectedContainerId) {
          dispatch({ type: "insert-element", containerId: selectedContainerId, element: elementFromType(type) });
          return;
        }
        dispatch({ type: "insert-field", block: blockFromType(type), index: explicitIndex ? index : currentSchema().blocks.length });
      }

      function snapshotFieldRects() {
        fieldRectsRef.current = new Map(fieldCardEntries().map(([id, card]) => [id, card.getBoundingClientRect()]));
      }

      function moveField(id, direction) {
        const blocks = currentSchema().blocks;
        const index = blocks.findIndex((block) => block.id === id);
        const nextIndex = index + direction;
        if (index < 0 || nextIndex < 0 || nextIndex >= blocks.length) return;
        snapshotFieldRects();
        dispatch({ type: "move-field", id, direction });
      }

      function moveFieldToDropIndex(id, index) {
        const blocks = currentSchema().blocks;
        const from = blocks.findIndex((block) => block.id === id);
        const insertionIndex = DragPayloadModel.clampIndex(index, blocks.length);
        const to = insertionIndex > from ? insertionIndex - 1 : insertionIndex;
        const boundedTo = Math.max(0, Math.min(to, blocks.length - 1));
        if (from < 0 || boundedTo === from) return;
        snapshotFieldRects();
        dispatch({ type: "move-field-to-index", id, index });
      }

      function duplicateField(id) {
        const source = currentSchema().blocks.find((block) => block.id === id);
        if (!source) return;
        dispatch({ type: "duplicate-field", id, copy: cloneBlockWithNewIds(source) });
      }

      function moveElement(containerId, elementId, direction) {
        dispatch({ type: "move-element", containerId, elementId, direction });
      }

      function moveElementOut(containerId, elementId) {
        dispatch({ type: "move-element-out", containerId, elementId });
      }

      function duplicateElement(containerId, elementId) {
        dispatch({ type: "duplicate-element", containerId, elementId });
      }

      function deleteElement(containerId, elementId) {
        dispatch({ type: "delete-element", containerId, elementId });
      }

      function resetField(id) {
        dispatch({ type: "reset-field", id });
      }

      function deleteField(id) {
        const { schema, removingId } = current();
        if (removingId === id || !schema.blocks.some((block) => block.id === id)) return;
