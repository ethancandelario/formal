<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formal Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f5f2;
      --panel: #ffffff;
      --panel-2: #f4f2ef;
      --ink: #1f1f1f;
      --muted: #5f6366;
      --line: #d7d2cb;
      --sidebar: #2f3033;
      --sidebar-2: #383a3d;
      --sidebar-line: #4a4d50;
      --accent: #861f41;
      --accent-2: #ca4f00;
      --accent-highlight: #f3e8ed;
      --success: #2e7d32;
      --warning: #946200;
      --danger: #b3261e;
      --success-soft: rgba(46, 125, 50, 0.12);
      --warning-soft: rgba(148, 98, 0, 0.12);
      --danger-soft: rgba(179, 38, 30, 0.12);
      --shadow: 0 12px 28px rgba(31, 31, 31, 0.07);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --focus-ring: rgba(134, 31, 65, 0.28);
      --form-font-family: "Roboto", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --body-font-family: var(--form-font-family);
      --body-color: var(--ink);
      --body-font-size: 14px;
      --body-font-weight: 400;
      --body-font-style: normal;
      --body-line-height: 1.45;
      --body-letter-spacing: 0px;
      --body-text-transform: none;
      --form-page-margin: 20px;
      --form-page-padding: 16px;
      --form-field-spacing: 10px;
      --form-field-padding: 16px;
      --heading-font-family: var(--form-font-family);
      --heading-color: var(--ink);
      --heading-font-size: 26px;
      --heading-font-weight: 750;
      --heading-font-style: normal;
      --heading-line-height: 1.2;
      --heading-letter-spacing: 0px;
      --heading-text-transform: none;
      --description-font-family: var(--form-font-family);
      --description-color: var(--muted);
      --description-font-size: 14px;
      --description-font-weight: 400;
      --description-font-style: normal;
      --description-line-height: 1.5;
      --description-letter-spacing: 0px;
      --description-text-transform: none;
      --label-font-family: var(--form-font-family);
      --label-color: var(--ink);
      --label-font-size: 16px;
      --label-font-weight: 700;
      --label-font-style: normal;
      --label-line-height: 1.35;
      --label-letter-spacing: 0px;
      --label-text-transform: none;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--form-font-family);
      font-size: 15px;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
    }

    .shell {
      height: 100vh;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 52px minmax(0, 1fr);
      overflow: hidden;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .toolbar-actions,
    .top-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .top-actions {
      justify-content: flex-end;
    }

    .topbar .icon-button {
      background: transparent;
      border-color: transparent;
      color: var(--muted);
    }

    .topbar .icon-button:hover {
      background: var(--panel-2);
      border-color: var(--line);
      color: var(--ink);
    }

    .topbar .button.primary {
      min-width: 86px;
    }

    .export-menu-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .export-menu {
      position: absolute;
      top: calc(100% + 7px);
      right: 0;
      z-index: 60;
      width: min(236px, calc(100vw - 20px));
      display: grid;
      gap: 4px;
      padding: 6px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 14px 34px rgba(31, 31, 31, 0.16);
      animation: menu-in 120ms var(--ease) both;
    }

    .export-menu-item {
      width: 100%;
      min-height: 42px;
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      padding: 7px 8px;
      border-radius: 7px;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
      font-size: 12.5px;
      font-weight: 750;
      line-height: 1.2;
    }

    .export-menu-item:hover,
    .export-menu-item:focus-visible {
      background: var(--panel-2);
      outline: none;
    }

    .export-menu-item .svg-icon {
      color: var(--accent);
      justify-self: center;
    }

    .current-form-name {
      min-width: 0;
      width: auto;
      min-width: 10ch;
      max-width: min(30vw, 280px);
      field-sizing: content;
      height: 40px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      padding: 0 8px;
      color: var(--ink);
      font-size: 12.5px;
      font-weight: 750;
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .current-form-name:hover,
    .current-form-name:focus {
      background: var(--panel-2);
      border-color: var(--line);
      outline: none;
    }

    .current-form-name:focus {
      background: #ffffff;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(134, 31, 65, 0.12);
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 260px minmax(380px, 1fr) 330px;
      overflow: hidden;
      position: relative;
      transition: grid-template-columns 240ms var(--ease);
    }

    .shell.sidebar-collapsed .workspace {
      grid-template-columns: 56px minmax(380px, 1fr) 330px;
    }

    .sidebar,
    .inspector {
      height: 100%;
      min-height: 0;
    }

    .sidebar {
      background: var(--sidebar);
      color: #f7f5f2;
      border-right: 1px solid var(--sidebar-line);
      padding: 14px 10px;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      transition: padding 240ms var(--ease), border-color 180ms ease;
    }

    .sidebar-inner {
      min-width: 240px;
      transition: opacity 150ms ease, transform 240ms var(--ease);
      will-change: opacity, transform;
    }

    .shell.sidebar-collapsed .sidebar {
      padding-left: 8px;
      padding-right: 8px;
      border-right-color: var(--sidebar-line);
      overflow: hidden;
    }

    .shell.sidebar-collapsed .sidebar-inner {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-14px);
    }

    .icon-button.sidebar-expand-button {
      position: absolute;
      top: 14px;
      left: 8px;
      z-index: 16;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-10px) scale(0.96);
      box-shadow: 0 8px 18px rgba(31, 31, 31, 0.12);
      background: var(--sidebar-2);
      border-color: var(--sidebar-line);
      color: #f4f2ef;
      transition: opacity 150ms ease, transform 240ms var(--ease), background 160ms ease, border-color 160ms ease;
    }

    .icon-button.sidebar-expand-button:hover {
      background: #424548;
      border-color: #666a6d;
      color: #ffffff;
    }

    .shell.sidebar-collapsed .sidebar-expand-button {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0) scale(1);
    }

    .shell.sidebar-collapsed .canvas-shell {
      padding-left: 20px;
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      margin-bottom: 12px;
      padding: 0 2px;
    }

    .sidebar-title {
      font-size: 11.5px;
      color: #d7d2cb;
      letter-spacing: 0;
      font-weight: 700;
    }

    .sidebar-section {
      display: grid;
      gap: 10px;
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(215, 210, 203, 0.16);
    }

    .sidebar-section:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: 0;
    }

    .sidebar-section-title {
      color: #d7d2cb;
      font-size: 11.5px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .palette-group {
      display: grid;
      gap: 8px;
      padding-top: 10px;
      margin-top: 2px;
      border-top: 1px solid rgba(215, 210, 203, 0.12);
    }

    .palette-group:first-of-type {
      padding-top: 0;
      margin-top: 0;
      border-top: 0;
    }

    .palette-group-title {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #bfc3c6;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: none;
    }

    .palette-group-title::after {
      content: "";
      height: 1px;
      flex: 1 1 auto;
      background: rgba(215, 210, 203, 0.10);
    }

    .sidebar-settings {
      display: grid;
      gap: 12px;
    }

    .theme-color-groups {
      display: grid;
      gap: 10px;
    }

    .theme-color-group {
      display: grid;
      gap: 6px;
      padding-top: 8px;
      border-top: 1px solid rgba(215, 210, 203, 0.10);
    }

    .theme-color-group:first-child {
      padding-top: 0;
      border-top: 0;
    }

    .theme-color-group-title {
      color: #bfc3c6;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .theme-color-list {
      display: grid;
      gap: 6px;
    }

    .theme-color-token {
      width: 100%;
      min-height: 38px;
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr) auto;
      align-items: center;
      gap: 7px;
      padding: 5px;
      border: 1px solid var(--sidebar-line);
      border-radius: 8px;
      background: var(--sidebar-2);
      color: #f4f2ef;
      cursor: pointer;
      text-align: left;
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .theme-color-token:hover,
    .theme-color-token:focus-visible {
      background: #424548;
      border-color: #666a6d;
    }

    .theme-color-token:focus-visible,
    .typography-token:focus-visible,
    .sidebar-control:focus-visible,
    .modal-close-button:focus-visible,
    .theme-modal input:focus-visible,
    .theme-modal select:focus-visible,
    .theme-modal button:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.34);
      outline-offset: 2px;
    }

    .theme-swatch {
      width: 28px;
      height: 28px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 7px;
      background: var(--swatch-color);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    .theme-color-label {
      min-width: 0;
      color: #f4f2ef;
      font-size: 12px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .theme-color-value {
      color: #bfc3c6;
      font-size: 11.5px;
      font-variant-numeric: tabular-nums;
      text-transform: uppercase;
    }

    .sidebar-control {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--sidebar-line);
      border-radius: 7px;
      background: var(--sidebar-2);
      color: #f4f2ef;
      padding: 6px 7px;
      font: inherit;
      font-size: 12.5px;
      outline: none;
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .sidebar-control:hover,
    .sidebar-control:focus {
      background: #303235;
      border-color: #666a6d;
    }

    .typography-token-list {
      display: grid;
      gap: 8px;
    }

    .typography-token {
      width: 100%;
      min-height: 62px;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid var(--sidebar-line);
      border-radius: 8px;
      background: var(--sidebar-2);
      color: #f4f2ef;
      cursor: pointer;
      text-align: left;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .typography-token:hover {
      background: #424548;
      border-color: #666a6d;
    }

    .typography-token-icon {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border: 1px solid var(--sidebar-line);
      border-radius: 8px;
      background: #303235;
      color: #ffffff;
    }

    .typography-token-main {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .typography-token-label {
      color: #f4f2ef;
      font-size: 12.5px;
      font-weight: 750;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .typography-token-sample,
    .typography-token-meta {
      color: #bfc3c6;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .typography-token-swatch {
      width: 24px;
      height: 24px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 7px;
      background: var(--swatch-color);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    .theme-modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(18, 18, 20, 0.56);
      backdrop-filter: blur(6px);
    }

    .theme-modal {
      width: min(92vw, 460px);
      max-height: min(88vh, 720px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      border: 1px solid var(--sidebar-line);
      border-radius: 10px;
      background: #2f3033;
      color: #f4f2ef;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
      overflow: hidden;
    }

    .theme-modal.wide {
      width: min(92vw, 620px);
    }

    .theme-modal.character-modal {
      width: min(94vw, 780px);
    }

    .theme-modal-head,
    .theme-modal-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid var(--sidebar-line);
      background: #303235;
    }

    .theme-modal-foot {
      border-top: 1px solid var(--sidebar-line);
      border-bottom: 0;
      justify-content: flex-end;
    }

    .theme-modal-title {
      margin: 0;
      font-size: 14px;
      line-height: 1.35;
      font-weight: 800;
    }

    .theme-modal-subtitle {
      margin: 2px 0 0;
      color: #bfc3c6;
      font-size: 12px;
      line-height: 1.35;
    }

    .theme-modal-body {
      min-height: 0;
      display: grid;
      gap: 14px;
      padding: 14px;
      overflow: auto;
    }

    .theme-modal-picker {
      display: grid;
      justify-items: center;
      min-height: 220px;
    }

    .theme-color-picker-ui {
      width: 220px;
      min-height: 220px;
      display: grid;
      place-items: center;
    }

    .theme-picker-unavailable {
      min-height: 58px;
      display: grid;
      place-items: center;
      color: #bfc3c6;
      font-size: 12px;
      text-align: center;
    }

    .color-input-grid,
    .rgb-input-grid {
      display: grid;
      gap: 8px;
    }

    .rgb-input-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .theme-modal-field {
      display: grid;
      gap: 5px;
    }

    .theme-modal-field label {
      color: #d7d2cb;
      font-size: 11.5px;
      font-weight: 700;
    }

    .theme-modal input,
    .theme-modal select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--sidebar-line);
      border-radius: 8px;
      background: #383a3d;
      color: #f4f2ef;
      padding: 8px 9px;
      outline: none;
      font: inherit;
      font-size: 13px;
    }

    .theme-modal input:hover,
    .theme-modal input:focus,
    .theme-modal select:hover,
    .theme-modal select:focus {
      background: #303235;
      border-color: #666a6d;
    }

    .character-modal-body {
      grid-template-columns: minmax(220px, 0.86fr) minmax(280px, 1fr);
      align-items: start;
      gap: 16px;
    }

    .character-preview-pane,
    .character-controls {
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .character-preview-surface {
      min-height: 150px;
      display: grid;
      align-content: center;
      padding: 16px;
      border: 1px solid var(--sidebar-line);
      border-radius: 8px;
      background: #ffffff;
      overflow: auto;
    }

    .character-preview-text {
      display: block;
      overflow-wrap: anywhere;
    }

    .character-color-row {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .character-color-chip {
      min-height: 112px;
      border: 1px solid var(--sidebar-line);
      border-radius: 8px;
      background: var(--swatch-color);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.10);
    }

    .character-field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .character-segmented {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--sidebar-line);
      border-radius: 8px;
      background: #303235;
    }

    .character-segmented button {
      min-height: 30px;
      border-radius: 6px;
      background: transparent;
      color: #d7d2cb;
      cursor: pointer;
      font-size: 12px;
      font-weight: 750;
    }

    .character-segmented button.active {
      background: #4a4d50;
      color: #ffffff;
    }

    .font-option-list.compact {
      max-height: 178px;
      overflow: auto;
      padding-right: 2px;
    }

    .theme-modal .button {
      border-color: var(--sidebar-line);
      background: #383a3d;
      color: #f4f2ef;
    }

    .theme-modal .button:hover {
      background: #424548;
      border-color: #666a6d;
      color: #ffffff;
    }

    .theme-modal .button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .theme-modal .button.primary:hover {
      background: #6f1936;
      border-color: #6f1936;
      color: #ffffff;
    }

    .modal-close-button {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border: 1px solid var(--sidebar-line);
      border-radius: 8px;
      background: #383a3d;
      color: #f4f2ef;
      cursor: pointer;
    }

    .font-search-wrap {
      display: grid;
      gap: 6px;
    }

    .font-option-list {
      display: grid;
      gap: 8px;
    }

    .font-option-card {
      width: 100%;
      display: grid;
      gap: 4px;
      padding: 10px;
      border: 1px solid var(--sidebar-line);
      border-radius: 8px;
      background: #383a3d;
      color: #f4f2ef;
      cursor: pointer;
      text-align: left;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .font-option-card:hover,
    .font-option-card.selected {
      background: #424548;
      border-color: #777c80;
    }

    .font-option-card.selected {
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.07);
    }

    .font-option-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .font-option-status {
      color: #bfc3c6;
      font-size: 11.5px;
      white-space: nowrap;
    }

    .font-option-title {
      font-size: 13px;
      font-weight: 800;
    }

    .font-option-sample {
      color: #d7d2cb;
      font-size: 18px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .font-option-empty {
      min-height: 80px;
      display: grid;
      place-items: center;
      color: #bfc3c6;
      border: 1px dashed var(--sidebar-line);
      border-radius: 8px;
      font-size: 12.5px;
    }

    .sidebar-property {
      display: grid;
      gap: 6px;
    }

    .sidebar-property label {
      color: #d7d2cb;
      font-size: 11.5px;
      font-weight: 700;
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .palette-block {
      cursor: grab;
      user-select: none;
      min-height: 84px;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid var(--sidebar-line);
      background: var(--sidebar-2);
      color: #ffffff;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 8px;
      text-align: center;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .palette-block:hover {
      border-color: #666a6d;
      background: #424548;
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .palette-block:focus-visible {
      border-color: #777c80;
      background: #424548;
      outline: 2px solid rgba(255, 255, 255, 0.34);
      outline-offset: 2px;
    }

    .palette-block:active {
      cursor: grabbing;
      transform: translateY(0);
    }

    .palette-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      border: 1px solid #4a4d50;
      background: #303235;
      color: #ffffff;
      font-size: 16px;
    }

    .palette-label {
      font-size: 11.5px;
      line-height: 1.35;
      font-weight: 700;
      color: #f4f2ef;
    }

    .canvas-shell {
      min-height: 0;
      overflow: auto;
      padding: var(--form-page-margin);
      background: var(--bg);
      font-family: var(--form-font-family);
      transition: padding 240ms var(--ease);
    }

    .form-page {
      max-width: 840px;
      margin: 0 auto var(--form-page-margin);
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 8px;
      overflow: hidden;
    }

    .form-meta {
      padding: 24px 28px 22px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
      position: relative;
      transition: background 160ms ease, box-shadow 160ms ease;
    }

    .form-meta::after {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      pointer-events: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .form-meta:hover::after {
      border-color: rgba(31, 31, 31, 0.08);
    }

    .form-meta.selected {
      background: #fffdfb;
      box-shadow: inset 0 1px 0 rgba(134, 31, 65, 0.04);
    }

    .form-meta.selected::after {
      border-color: rgba(134, 31, 65, 0.28);
      box-shadow: 0 0 0 3px rgba(134, 31, 65, 0.07);
    }

    .title-input,
    .description-input {
      width: calc(100% + 24px);
      border: 1px solid transparent;
      background: transparent;
      color: var(--ink);
      border-radius: 8px;
      padding: 8px 12px;
      margin: 0 -12px;
    }

    .title-input {
      color: var(--heading-color);
      font-family: var(--heading-font-family);
      font-size: var(--heading-font-size);
      line-height: var(--heading-line-height);
      font-weight: var(--heading-font-weight);
      font-style: var(--heading-font-style);
      letter-spacing: var(--heading-letter-spacing);
      text-transform: var(--heading-text-transform);
    }

    .description-input {
      min-height: 68px;
      color: var(--description-color);
      font-family: var(--description-font-family);
      line-height: var(--description-line-height);
      resize: vertical;
      font-size: var(--description-font-size);
      font-weight: var(--description-font-weight);
      font-style: var(--description-font-style);
      letter-spacing: var(--description-letter-spacing);
      text-transform: var(--description-text-transform);
    }

    .title-input:hover,
    .description-input:hover,
    .title-input:focus,
    .description-input:focus,
    .control:hover,
    .control:focus,
    .textarea:hover,
    .textarea:focus {
      border-color: var(--line);
      outline: none;
      background: #ffffff;
    }

    .title-input:focus,
    .description-input:focus,
    .control:focus,
    .textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(134, 31, 65, 0.12);
    }

    .fields-list {
      display: grid;
      gap: var(--form-field-spacing);
      padding: var(--form-page-padding);
      min-height: 280px;
      align-content: start;
      grid-auto-rows: max-content;
      position: relative;
      transition: background 160ms ease, outline-color 160ms ease;
    }

    .fields-list.is-drag-target {
      outline: 1px dashed rgba(134, 31, 65, 0.16);
      outline-offset: -10px;
      background: rgba(134, 31, 65, 0.018);
    }

    .drop-indicator {
      position: absolute;
      left: var(--form-page-padding);
      right: var(--form-page-padding);
      top: var(--drop-y, 0px);
      z-index: 4;
      height: 8px;
      display: flex;
      align-items: center;
      pointer-events: none;
      transform: translateY(-50%);
      transition: top 90ms var(--ease), opacity 70ms ease;
    }

    .drop-indicator::before {
      content: "";
      width: 100%;
      height: 1px;
      border-radius: 999px;
      background: rgba(134, 31, 65, 0.42);
    }

    .field-card {
      border: 1px solid var(--line);
      background: #ffffff;
      border-radius: 8px;
      padding: 0;
      box-shadow: 0 8px 20px rgba(31, 31, 31, 0.045);
      cursor: grab;
      position: relative;
      align-self: start;
      transition: border-color 150ms ease, box-shadow 150ms ease, transform 160ms var(--ease), opacity 140ms ease;
      overflow: hidden;
      animation: card-in 160ms var(--ease) both;
    }

    .field-card:hover {
      transform: translateY(-1px);
      border-color: #cbc5b6;
      box-shadow: 0 10px 22px rgba(31, 31, 31, 0.06);
    }

    .field-card.selected {
      border-color: rgba(134, 31, 65, 0.36);
      background: #fffdfb;
      box-shadow: 0 12px 26px rgba(31, 31, 31, 0.08), 0 0 0 3px rgba(134, 31, 65, 0.07);
    }

    .field-card.removing {
      animation: card-out 130ms var(--ease) forwards;
      pointer-events: none;
    }

    .field-card.is-dragging {
      opacity: 0.46;
      transform: scale(0.995);
      box-shadow: none;
    }

    .field-card:active {
      cursor: grabbing;
    }

    .field-card-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 10px 10px 0;
    }

    .field-type {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      width: fit-content;
      min-height: 40px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 750;
      letter-spacing: 0;
      background: transparent;
      border: 0;
      padding: 7px 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease;
    }

    .field-card.selected .field-type {
      background: var(--accent-highlight);
      color: var(--accent);
    }

    .field-tools {
      display: flex;
      align-items: center;
      gap: 3px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 130ms ease;
    }

    .field-card:hover .field-tools,
    .field-card:focus-within .field-tools {
      opacity: 1;
      pointer-events: auto;
    }

    .field-card-body {
      padding: 8px var(--form-field-padding) var(--form-field-padding);
      border-radius: 0 0 8px 8px;
      color: var(--body-color);
      font-family: var(--body-font-family);
      font-size: var(--body-font-size);
      font-weight: var(--body-font-weight);
      font-style: var(--body-font-style);
      line-height: var(--body-line-height);
      letter-spacing: var(--body-letter-spacing);
      text-transform: var(--body-text-transform);
    }

    .field-card.with-background .field-card-body {
      margin: 8px 10px 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
    }

    .field-type:focus-visible,
    .field-card-body:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .field-label {
      margin: 0 0 5px;
      color: var(--label-color);
      font-family: var(--label-font-family);
      font-size: var(--label-font-size);
      line-height: var(--label-line-height);
      font-weight: var(--label-font-weight);
      font-style: var(--label-font-style);
      letter-spacing: var(--label-letter-spacing);
      text-transform: var(--label-text-transform);
    }

    .required-mark {
      color: var(--accent-2);
      margin-left: 3px;
    }

    .field-help {
      margin: 0 0 10px;
      color: var(--description-color);
      font-family: var(--description-font-family);
      line-height: var(--description-line-height);
      font-size: var(--description-font-size);
      font-weight: var(--description-font-weight);
      font-style: var(--description-font-style);
      letter-spacing: var(--description-letter-spacing);
      text-transform: var(--description-text-transform);
    }

    .headline-preview {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .headline-preview-title {
      margin: 0;
      color: var(--heading-color);
      font-family: var(--heading-font-family);
      font-size: var(--heading-font-size);
      line-height: var(--heading-line-height);
      font-weight: var(--heading-font-weight);
      font-style: var(--heading-font-style);
      letter-spacing: var(--heading-letter-spacing);
      text-transform: var(--heading-text-transform);
      overflow-wrap: anywhere;
    }

    .headline-preview-subhead {
      margin: 0;
      color: var(--description-color);
      font-family: var(--description-font-family);
      line-height: var(--description-line-height);
      font-size: var(--description-font-size);
      font-weight: var(--description-font-weight);
      font-style: var(--description-font-style);
      letter-spacing: var(--description-letter-spacing);
      text-transform: var(--description-text-transform);
      overflow-wrap: anywhere;
    }

    .headline-preview-placeholder {
      color: #8b8f92;
    }

    .headline-copy {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .headline-preview.has-media.media-left,
    .headline-preview.has-media.media-right {
      grid-template-columns: minmax(0, 1fr) minmax(180px, 0.72fr);
      align-items: center;
      gap: 16px;
    }

    .headline-media {
      min-width: 0;
    }

    .headline-preview.media-left .headline-media {
      order: -1;
    }

    .field-card.is-split-target .headline-preview {
      position: relative;
    }

    .headline-drop-preview {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .headline-drop-preview.media-top .headline-drop-media-slot {
      inset: 0 0 calc(50% + 6px) 0;
    }

    .headline-drop-preview.media-left .headline-drop-media-slot {
      inset: 0 calc(50% + 8px) 0 0;
    }

    .headline-drop-preview.media-center .headline-drop-media-slot {
      inset: 25% 14%;
    }

    .headline-drop-preview.media-right .headline-drop-media-slot {
      inset: 0 0 0 calc(50% + 8px);
    }

    .headline-drop-preview.media-bottom .headline-drop-media-slot {
      inset: calc(50% + 6px) 0 0 0;
    }

    .headline-preview.is-replacing-media .headline-media {
      visibility: hidden;
    }

    .headline-drop-media-slot {
      position: absolute;
      min-height: 78px;
      min-width: 0;
      border: 1px dashed #b8b2aa;
      border-radius: 8px;
      background: var(--panel-2);
      padding: 12px;
      color: var(--muted);
      user-select: none;
    }

    .headline-drop-copy-slot {
      position: absolute;
      display: grid;
      align-content: center;
      gap: 7px;
      min-width: 0;
      padding: 10px;
      pointer-events: none;
    }

    .headline-drop-copy-slot::before,
    .headline-drop-copy-slot::after {
      content: "";
      height: 5px;
      width: min(76%, 180px);
      border-radius: 999px;
      background: rgba(95, 99, 102, 0.28);
    }

    .headline-drop-copy-slot::after {
      width: min(54%, 130px);
    }

    .headline-drop-copy-slot.copy-top {
      inset: 0 0 calc(50% + 6px) 0;
    }

    .headline-drop-copy-slot.copy-bottom {
      inset: calc(50% + 6px) 0 0 0;
    }

    .headline-drop-copy-slot.copy-left {
      inset: 0 calc(50% + 8px) 0 0;
    }

    .headline-drop-copy-slot.copy-right {
      inset: 0 0 0 calc(50% + 8px);
    }

    .headline-drop-copy-slot.copy-center {
      display: none;
    }

    .headline-media.is-draggable,
    .headline-copy.is-draggable,
    .headline-preview-title.is-draggable,
    .headline-preview-subhead.is-draggable {
      cursor: grab;
    }

    .headline-media.is-draggable:active,
    .headline-copy.is-draggable:active,
    .headline-preview-title.is-draggable:active,
    .headline-preview-subhead.is-draggable:active {
      cursor: grabbing;
    }

    .preview-line,
    .preview-box {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 8px;
      color: var(--body-color);
    }

    .preview-line {
      height: 38px;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }

    .preview-box {
      min-height: 88px;
      padding: 9px 10px;
    }

    .choice-preview {
      display: grid;
      gap: 7px;
    }

    .choice-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--body-color);
    }

    .choice-dot,
    .choice-square {
      width: 16px;
      height: 16px;
      border: 1.5px solid #8b938d;
      flex: 0 0 auto;
    }

    .choice-dot {
      border-radius: 999px;
    }

    .choice-square {
      border-radius: 4px;
    }

    .pill-preview,
    .meter-preview,
    .star-preview,
    .scale-preview {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--body-color);
      flex-wrap: wrap;
    }

    .pill-preview span {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 8px;
      padding: 7px 9px;
      font-size: inherit;
      color: var(--body-color);
    }

    .scale-track {
      height: 8px;
      min-width: 220px;
      flex: 1 1 220px;
      border-radius: 999px;
      background: #b8b2aa;
    }

    .radar-preview {
      display: grid;
      grid-template-columns: 130px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      padding: 10px;
    }

    .radar-preview svg {
      width: 130px;
      height: 130px;
      display: block;
    }

    .radar-grid polygon,
    .radar-grid line {
      fill: none;
      stroke: #c9c4bd;
      stroke-width: 1;
    }

    .radar-fill {
      fill: rgba(134, 31, 65, 0.12);
      stroke: var(--accent);
      stroke-width: 2;
    }

    .radar-point-line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-dasharray: 4 5;
    }

    .radar-point-node {
      fill: #ffffff;
      stroke: var(--accent);
      stroke-width: 2.4;
    }

    .radar-axis-list {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .radar-axis-list span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--body-color);
      font-size: inherit;
    }



    .calendar-preview,
    .calendar-control {
      --calendar-shell-radius: 14px;
      --calendar-cell-radius: 9px;
      --calendar-side-padding: 14px;
      --calendar-cell-height: 36px;
      display: grid;
      gap: 12px;
      min-width: 0;
      border: 0;
      border-radius: 8px;
      background: var(--panel-2);
      padding: 12px;
      box-shadow: none;
    }

    .calendar-preview.is-unboxed {
      border: 0;
      background: var(--panel-2);
      padding: 12px;
      box-shadow: none;
    }

    .calendar-frame {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--calendar-shell-radius);
      background: #ffffff;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(31, 31, 31, 0.04);
    }

    .calendar-preview-head,
    .calendar-nav {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: center;
      justify-items: center;
      gap: 8px;
      min-width: 0;
      border-radius: 0;
      background: #ffffff;
      padding: 14px var(--calendar-side-padding) 11px;
      position: relative;
      text-align: center;
    }

    .calendar-nav .calendar-month-label,
    .calendar-nav .calendar-month-input {
      grid-column: 1 / -1;
      grid-row: 1;
      padding: 0 92px;
    }

    .calendar-nav-buttons {
      grid-column: 1 / -1;
      grid-row: 1;
      justify-self: end;
      z-index: 1;
    }

    .calendar-month-label {
      min-width: 0;
      width: 100%;
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.2;
      overflow: hidden;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calendar-month-input {
      min-height: 34px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      font: inherit;
      cursor: pointer;
    }

    .calendar-month-input:hover,
    .calendar-month-input:focus {
      border-color: var(--line);
      background: var(--panel-2);
      outline: none;
    }

    .calendar-range-summary {
      min-width: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 4px 14px;
      padding: 0 2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .calendar-range-summary span {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .calendar-range-summary b {
      margin-right: 4px;
      color: var(--ink);
      font-weight: 750;
    }

    .calendar-date-inputs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      align-items: start;
      min-width: 0;
    }

    .calendar-date-field {
      min-width: 0;
      display: grid;
      gap: 5px;
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
      box-shadow: none;
      transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .calendar-date-field:focus-within {
      background: transparent;
      box-shadow: none;
    }

    .calendar-date-field span {
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 750;
      line-height: 1.2;
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 0;
    }

    .calendar-weekdays {
      padding: 0 var(--calendar-side-padding) 9px;
      background: #ffffff;
    }

    .calendar-grid {
      padding: 10px var(--calendar-side-padding) 14px;
      border: 0;
      border-radius: 0;
      background: #ffffff;
      box-shadow: none;
      overflow: visible;
    }

    .calendar-weekday {
      color: #9a9fa3;
      font-size: 10.5px;
      font-weight: 800;
      line-height: 1.2;
      text-align: center;
      user-select: none;
    }

    .calendar-day,
    .calendar-day-button {
      position: relative;
      z-index: 0;
      isolation: isolate;
      min-width: 0;
      min-height: var(--calendar-cell-height);
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 0;
      color: var(--ink);
      font-size: 12px;
      font-weight: 750;
      line-height: 1;
      background: transparent;
      font-variant-numeric: tabular-nums;
    }

    .calendar-day::before,
    .calendar-day-button::before {
      content: "";
      position: absolute;
      inset: 3px 0;
      z-index: -1;
      border-radius: var(--calendar-cell-radius);
      background: transparent;
      transition: background 160ms ease, box-shadow 160ms ease, transform 160ms ease, border-radius 160ms ease;
    }

    .calendar-day-number {
      position: relative;
      z-index: 1;
      display: inline-grid;
      place-items: center;
      min-width: 1.45em;
      pointer-events: none;
    }

    .calendar-day.is-outside,
    .calendar-day-button.is-outside {
      color: #a6a09a;
    }

    .calendar-day.is-range,
    .calendar-day-button.is-range {
      color: var(--accent);
    }

    .calendar-day.is-range::before,
    .calendar-day-button.is-range::before {
      background: var(--accent-highlight);
      border-radius: 0;
    }

    .calendar-day.is-range-start::before,
    .calendar-day-button.is-range-start::before {
      border-top-left-radius: var(--calendar-cell-radius);
      border-bottom-left-radius: var(--calendar-cell-radius);
    }

    .calendar-day.is-range-end::before,
    .calendar-day-button.is-range-end::before {
      border-top-right-radius: var(--calendar-cell-radius);
      border-bottom-right-radius: var(--calendar-cell-radius);
    }

    .calendar-day.is-boundary,
    .calendar-day-button.is-boundary {
      color: #ffffff;
    }

    .calendar-day.is-boundary::before,
    .calendar-day-button.is-boundary::before {
      background: var(--accent);
      border-radius: var(--calendar-cell-radius);
      box-shadow: 0 9px 16px -8px rgba(134, 31, 65, 0.54);
    }

    .calendar-day.is-milestone::after,
    .calendar-day-button.is-milestone::after {
      content: "";
      position: absolute;
      z-index: 2;
      left: 50%;
      bottom: 5px;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: var(--accent-2);
      transform: translateX(-50%);
    }

    .calendar-day.is-boundary.is-milestone::after,
    .calendar-day-button.is-boundary.is-milestone::after {
      background: #ffffff;
    }

    .calendar-day.is-milestone:hover,
    .calendar-day-button.is-milestone:hover,
    .calendar-day-button.is-milestone:focus-visible {
      z-index: 8;
    }

    .calendar-milestone-popover {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 7px);
      z-index: 5;
      width: max-content;
      min-width: 96px;
      max-width: 220px;
      display: grid;
      gap: 3px;
      padding: 7px 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      box-shadow: 0 8px 18px rgba(31, 31, 31, 0.12);
      font-size: 11.5px;
      font-weight: 750;
      line-height: 1.3;
      text-align: left;
      white-space: normal;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 3px);
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .calendar-milestone-popover::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 100%;
      width: 7px;
      height: 7px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #ffffff;
      transform: translate(-50%, -4px) rotate(45deg);
    }

    .calendar-milestone-popover-line {
      position: relative;
      z-index: 1;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .calendar-day.is-milestone:hover .calendar-milestone-popover,
    .calendar-day-button.is-milestone:hover .calendar-milestone-popover,
    .calendar-day-button.is-milestone:focus-visible .calendar-milestone-popover {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .calendar-day-button {
      cursor: pointer;
      transition: color 160ms ease, transform 160ms ease;
    }

    .calendar-day-button:hover::before,
    .calendar-day-button:focus-visible::before {
      background: rgba(31, 31, 31, 0.07);
      transform: translateY(-1px);
    }

    .calendar-day-button.is-range:hover::before,
    .calendar-day-button.is-range:focus-visible::before {
      background: var(--accent-highlight);
    }

    .calendar-day-button.is-boundary:hover::before,
    .calendar-day-button.is-boundary:focus-visible::before {
      background: var(--accent);
      box-shadow: 0 9px 16px -8px rgba(134, 31, 65, 0.54);
    }

    .calendar-day-button:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: -2px;
    }

    .calendar-milestone-list,
    .calendar-milestone-editor {
      display: grid;
      gap: 7px;
      min-width: 0;
      padding-top: 10px;
      border-top: 1px solid rgba(215, 210, 203, 0.72);
    }

    .calendar-milestone-editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .calendar-milestone-empty {
      color: var(--muted);
      font-size: 12px;
    }

    .calendar-milestone-empty {
      border: 0;
      border-radius: 0;
      padding: 2px 1px;
      background: transparent;
    }

    .calendar-milestone-item {
      min-width: 0;
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      padding: 2px 1px;
      border-radius: 0;
      background: transparent;
      color: var(--muted);
      font-size: 12.5px;
    }

    .calendar-milestone-date {
      color: var(--accent-2);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .calendar-milestone-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calendar-milestone-row {
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr) auto;
      gap: 5px;
      align-items: center;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .media-preview {
      display: grid;
      gap: 8px;
      min-width: 0;
      color: var(--muted);
    }

    .media-content-wrap {
      display: flex;
      width: 100%;
      min-width: 0;
    }

    .media-visual {
      display: block;
      max-width: 100%;
      border: 0;
      border-radius: 8px;
      background: transparent;
      object-fit: contain;
    }

    .media-preview img.media-visual,
    .media-preview video.media-visual,
    .media-preview object.media-visual {
      width: 100%;
    }

    .media-preview audio.media-visual {
      width: 100%;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .media-embed {
      width: 100%;
      min-height: 180px;
      border: 0;
      border-radius: 8px;
      background: transparent;
    }

    .media-placeholder {
      min-height: 78px;
      display: grid;
      place-items: center;
      border: 1px dashed #b8b2aa;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      color: var(--body-color);
      user-select: none;
    }

    .media-caption {
      margin: 0;
      color: var(--body-color);
      font-size: inherit;
      line-height: var(--body-line-height);
    }

    .media-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      overflow-wrap: anywhere;
    }

    .media-file-note {
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .spacer-preview {
      min-height: 8px;
      display: flex;
      align-items: center;
      width: 100%;
      user-select: none;
    }

    .spacer-line {
      width: 100%;
      border: 0;
      border-top: 1px solid var(--line);
      margin: 0;
      pointer-events: none;
      user-select: none;
    }

    .field-card-body .spacer-preview {
      margin: 2px 0;
    }

    .empty-state {
      min-height: 260px;
      display: grid;
      place-items: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #ffffff;
      user-select: none;
    }

    .inspector {
      border-left: 1px solid var(--line);
      background: #f4f2ef;
      padding: 16px;
      position: sticky;
      top: 52px;
      align-self: start;
      max-height: calc(100vh - 52px);
      overflow: auto;
      overscroll-behavior: contain;
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 800;
      margin: 0 0 14px;
    }

    .property-stack {
      display: grid;
      gap: 12px;
    }

    .property {
      display: grid;
      gap: 6px;
    }

    .property label,
    .mini-label {
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .control,
    .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      padding: 9px 10px;
      min-height: 40px;
      font-size: 14px;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .textarea {
      min-height: 80px;
      resize: vertical;
      line-height: 1.45;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      font-size: 13.5px;
    }

    .toggle-row input {
      width: 17px;
      height: 17px;
      accent-color: var(--accent);
    }

    .option-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 5px;
      align-items: center;
    }

    .radar-axis-row {
      grid-template-columns: minmax(0, 1fr) 82px auto;
    }

    .radar-axis-only-row {
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .radar-mode-note {
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .button,
    .icon-button {
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--line);
      color: var(--ink);
      background: #ffffff;
      min-height: 40px;
      padding: 0 10px;
      cursor: pointer;
      text-decoration: none;
      font-size: 12px;
      font-weight: 750;
      line-height: 1;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .button:hover,
    .icon-button:hover {
      background: var(--panel-2);
      border-color: #cbc5b6;
    }

    .button:focus-visible,
    .icon-button:focus-visible,
    .control:focus-visible,
    .textarea:focus-visible,
    .title-input:focus-visible,
    .description-input:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .button:active,
    .icon-button:active {
      transform: translateY(1px);
    }

    .button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .button.primary:hover {
      background: #6f1936;
      border-color: #6f1936;
    }

    .button.ghost {
      background: transparent;
    }

    .icon-button {
      width: 40px;
      padding: 0;
      flex: 0 0 auto;
    }

    .icon-button.danger {
      color: var(--danger);
    }

    .icon-button.danger:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: var(--danger-soft);
    }

    .sidebar .icon-button {
      border-color: var(--sidebar-line);
      color: #f4f2ef;
      background: #383a3d;
    }

    .sidebar .icon-button:hover {
      background: #424548;
    }

    .sidebar-theme-reset {
      width: 100%;
      justify-content: flex-start;
      border-color: var(--sidebar-line);
      background: var(--sidebar-2);
      color: #f4f2ef;
    }

    .sidebar-theme-reset .svg-icon,
    .sidebar-theme-reset span {
      color: inherit;
    }

    .sidebar-theme-reset:hover {
      background: #424548;
      border-color: #666a6d;
      color: #ffffff;
    }

    .svg-icon {
      width: 1em;
      height: 1em;
      display: block;
      flex: 0 0 1em;
      overflow: visible;
      fill: currentColor;
    }

    .svg-icon path {
      fill: currentColor;
    }

    .palette-icon .svg-icon {
      width: 16px;
      height: 16px;
    }

    .field-type .svg-icon,
    .panel-title .svg-icon {
      width: 1.08em;
      height: 1.08em;
    }

    .svg-icon-stroke {
      fill: none;
    }

    .svg-icon-stroke path,
    .svg-icon-radar polygon,
    .svg-icon-radar line,
    .svg-icon-radar circle {
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .svg-icon-radar polygon,
    .svg-icon-radar line,
    .svg-icon-radar circle {
      stroke-width: 1.8;
    }

    .svg-icon-radar circle {
      fill: currentColor;
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes card-out {
      to {
        opacity: 0;
        transform: translateY(-6px) scale(0.985);
      }
    }

    @keyframes indicator-in {
      from {
        opacity: 0;
        transform: scaleX(0.96);
      }

      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    @keyframes menu-in {
      from {
        opacity: 0;
        transform: translateY(-4px) scale(0.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1100px) {
      .workspace {
        grid-template-columns: 82px minmax(360px, 1fr) 300px;
      }

      .shell.sidebar-collapsed .workspace {
        grid-template-columns: 56px minmax(360px, 1fr) 300px;
      }

      .sidebar {
        padding: 14px 8px;
      }

      .sidebar-inner {
        min-width: 62px;
      }

      .sidebar-head {
        justify-content: flex-start;
      }

      .sidebar-title,
      .palette-label,
      .palette-group-title,
      .sidebar-section-title,
      .sidebar-settings {
        display: none;
      }

      .palette {
        grid-template-columns: 1fr;
      }

      .shell.sidebar-collapsed .canvas-shell {
        padding-left: var(--form-page-margin);
      }
    }

    @media (max-width: 900px) {
      .shell {
        height: auto;
        min-height: auto;
        grid-template-rows: auto auto;
        overflow: visible;
      }

      .topbar {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 6px;
        min-height: 56px;
        padding: 8px 10px;
        position: sticky;
      }

      .toolbar-actions,
      .top-actions {
        flex-wrap: nowrap;
      }

      .top-actions {
        justify-content: flex-end;
      }

      .current-form-name {
        flex: 1 1 auto;
        width: auto;
        min-width: 72px;
        max-width: 100%;
      }

      .workspace,
      .shell.sidebar-collapsed .workspace {
        grid-template-columns: 1fr;
        overflow: visible;
      }

      .inspector,
      .canvas-shell {
        overflow: visible;
      }

      .sidebar {
        position: fixed;
        top: 56px;
        left: 0;
        bottom: 0;
        z-index: 30;
        width: min(320px, calc(100vw - 48px));
        height: auto;
        display: block;
        padding: 12px;
        overflow-x: hidden;
        overflow-y: auto;
        border-right: 1px solid var(--sidebar-line);
        border-bottom: 0;
        box-shadow: 12px 0 28px rgba(18, 18, 20, 0.22);
        transform: translateX(0);
        transition: transform 260ms var(--ease), box-shadow 180ms ease, border-color 180ms ease;
      }

      .sidebar-inner {
        min-width: 0;
        overflow: visible;
      }

      .icon-button.sidebar-expand-button {
        position: fixed;
        top: 68px;
        left: 14px;
        z-index: 31;
      }

      .sidebar-section {
        gap: 8px;
        padding-bottom: 12px;
        margin-bottom: 12px;
      }

      .palette-group {
        gap: 6px;
        padding-top: 8px;
      }

      .shell.sidebar-collapsed .sidebar {
        padding: 12px;
        border-right-color: var(--sidebar-line);
        transform: translateX(calc(-100% - 2px));
        box-shadow: none;
        pointer-events: none;
      }

      .palette,
      .shell.sidebar-collapsed .palette {
        grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
        gap: 6px;
      }

      .palette-block {
        min-height: 46px;
        padding: 5px;
        gap: 0;
      }

      .palette-icon {
        width: 32px;
        height: 32px;
        font-size: 15px;
      }

      .sidebar-title,
      .sidebar-section-title {
        display: block;
      }

      .palette-label {
        display: none;
      }

      .palette-group-title {
        display: flex;
      }

      .sidebar-settings {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: start;
        gap: 10px;
      }

      .theme-color-groups {
        grid-column: 1 / -1;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: start;
        gap: 10px;
      }

      .theme-color-group {
        padding-top: 0;
        border-top: 0;
      }

      .theme-color-list {
        gap: 5px;
      }

      .theme-color-token {
        min-height: 34px;
        grid-template-columns: 26px minmax(0, 1fr);
        gap: 6px;
        padding: 4px;
      }

      .theme-swatch {
        width: 24px;
        height: 24px;
      }

      .theme-color-value {
        display: none;
      }

      .character-modal-body {
        grid-template-columns: 1fr;
      }

      .character-color-row {
        grid-template-columns: 1fr;
      }

      .sidebar-theme-reset {
        min-height: 42px;
        align-self: end;
        justify-content: center;
      }

      .canvas-shell {
        padding: max(12px, var(--form-page-margin));
      }

      .shell.sidebar-collapsed .canvas-shell {
        padding: max(12px, var(--form-page-margin));
        padding-top: max(60px, var(--form-page-margin));
      }

      .inspector {
        border-left: 0;
        border-top: 1px solid var(--line);
        position: static;
        height: auto;
        max-height: none;
      }
    }

    @media (max-width: 520px) {
      .topbar .button.primary {
        width: 40px;
        min-width: 40px;
        padding: 0;
      }

      .topbar .button.primary span {
        display: none;
      }

      .topbar .button.primary .export-chevron {
        display: none;
      }

      .calendar-date-inputs,
      .calendar-milestone-row {
        grid-template-columns: 1fr;
      }
    }



    /* Compact calendar/radar readouts. */

    .calendar-control {
      --calendar-shell-radius: 14px;
      --calendar-cell-radius: 8px;
      --calendar-side-padding: 12px;
      --calendar-cell-height: 32px;
      grid-template-columns: minmax(238px, 300px) minmax(248px, 340px);
      align-items: start;
      justify-content: center;
      gap: 28px;
      max-width: 760px;
      margin: 0 auto;
      border-radius: 0;
      background: transparent;
      padding: 0;
    }

    .calendar-preview.is-unboxed,
    .field.no-outline .calendar-control {
      background: transparent;
      padding: 0;
    }

    .calendar-frame {
      width: min(300px, 100%);
      justify-self: center;
      align-self: start;
      box-shadow: none;
    }

    .calendar-preview-head,
    .calendar-nav {
      padding: 13px var(--calendar-side-padding) 10px;
    }

    .calendar-nav .calendar-month-label,
    .calendar-nav .calendar-month-input {
      padding: 0 76px;
    }

    .calendar-weekdays {
      padding: 0 var(--calendar-side-padding) 8px;

    .calendar-grid {

    .calendar-properties {

    .calendar-properties {

      max-width: 340px;
      display: grid;
      justify-self: stretch;
      align-self: center;

    .radar-values {
      grid-template-columns: minmax(0, 1fr) auto;
      column-gap: 16px;
      row-gap: 4px;
    }

    .radar-values.point-readout {
      min-height: 0;
      grid-template-columns: 68px minmax(0, 1fr);
    }

    .calendar-range-summary,
    .calendar-milestone-list {
      display: grid;
      grid-template-columns: minmax(72px, max-content) minmax(0, 1fr);

      row-gap: 4px;
      padding: 0;
      border: 0;

    .calendar-date-inputs,
    .calendar-milestone-editor {

      grid-template-columns: minmax(0, 1fr);

    .calendar-milestone-list,

    .radar-value-row span,
    .calendar-property-row > span,
    .calendar-milestone-date,
    .calendar-date-field span,
    .calendar-property-heading,
    .calendar-milestone-editor-head .mini-label {
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 750;
    }

    .radar-value,
    .calendar-property-value,
    .calendar-milestone-name {

    .radar-value {

    .calendar-property-heading,

    .calendar-date-field,

    .calendar-date-field {

    .calendar-date-field .control {

    .calendar-date-field .control,

    .calendar-date-field .control:hover,
    .calendar-milestone-row .control:hover {

    .calendar-date-field .control:focus,
    .calendar-milestone-row .control:focus {
      border-color: transparent;
      background: transparent;
      box-shadow: inset 0 -2px 0 var(--accent);
    }

    .calendar-date-field:focus-within,
    .calendar-milestone-row:focus-within {
      background: transparent;
      box-shadow: none;
    }

    .calendar-milestone-row .icon-button {
      width: 28px;
      height: 28px;
      min-height: 28px;
      border-color: transparent;

    function uid() {
      return "field_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function typeMeta(type) {
      const meta = fieldTypes.find((item) => item.type === type);
      if (!meta) throw new Error(`Unsupported field type: ${type}`);
      return meta;
    }

    function fieldFromType(type) {
      const meta = typeMeta(type);
      return { id: uid(), type: meta.type, ...clone(meta.defaults) };
    }

    function defaultSchema() {
      return {
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        settings: { name: DEFAULT_FORM_NAME, theme: clone(DEFAULT_THEME), layout: clone(DEFAULT_LAYOUT), typography: clone(DEFAULT_TYPOGRAPHY) },
        fields: []
      };
    }

    function hexColor(value) {
      const text = String(value).trim();
      if (!/^#[0-9a-f]{6}$/i.test(text)) throw new Error("Expected a #rrggbb color.");
      return text;
    }

    function fontFamilyValue(value) {
      const text = String(value).trim();
      if (!text || !/^[a-zA-Z0-9_\-\s"',.()]+$/.test(text)) throw new Error("Expected a valid font-family value.");
      return text;
    }

    function unquoteFontName(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      return text.replace(/^['"]|['"]$/g, "").trim();
    }

    function fontNameFromStack(value) {
      const first = fontFamilyValue(value).split(",")[0] || "";
      const name = unquoteFontName(first);
      return /^(ui-sans-serif|system-ui|-apple-system|BlinkMacSystemFont)$/i.test(name) ? "System UI" : name || "Roboto";
    }

    function fontOptionByFamily(value) {
      const stack = fontFamilyValue(value);
      const family = fontNameFromStack(stack);
      return { family, name: family, stack, system: family === "System UI" };
    }

    function googleFontCategoryStack(category) {
      const clean = String(category || "").toLowerCase();
      if (clean.includes("serif") && !clean.includes("sans")) return 'ui-serif, Georgia, Cambria, "Times New Roman", Times, serif';
      if (clean.includes("mono")) return 'ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace';
      if (clean.includes("display") || clean.includes("handwriting")) return 'ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      return 'ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    }

    function quoteFontName(value) {
      return `"${String(value || "").replace(/["\\]/g, "").trim()}"`;
    }

    function googleFontStack(family, category) {
      return `${quoteFontName(family)}, ${googleFontCategoryStack(category)}`;
    }

    function googleFontParam(family) {
      return encodeURIComponent(String(family || "").trim()).replace(/%20/g, "+");
    }

    function googleFontFamilyFromStack(value) {
      const family = fontNameFromStack(value);
      return family && family !== "System UI" ? family : "";
    }

    function ensureGoogleFontLoaded(value) {
      const family = googleFontFamilyFromStack(value);
      if (!family) return;
      const id = `google-font-${family.toLowerCase().replace(/[^a-z0-9]+/g, "-")}`;
      if (document.getElementById(id)) return;
      const link = document.createElement("link");
      link.id = id;
      link.rel = "stylesheet";
      link.href = `https://fonts.googleapis.com/css2?family=${googleFontParam(family)}:wght@400;500;700;900&display=swap`;
      document.head.appendChild(link);
    }

    function googleFontCatalogItems(payload) {
      const items = Array.isArray(payload) ? payload : Array.isArray(payload?.items) ? payload.items : [];
      const seen = new Set();
      return items
        .map((item) => ({ family: String(item?.family || "").trim(), category: String(item?.category || "") }))
        .filter((item) => {
          if (!item.family || seen.has(item.family)) return false;
          seen.add(item.family);
          return true;
        });
    }

    function fetchGoogleFontCatalog() {
      if (!googleFontCatalogPromise) {
        googleFontCatalogPromise = fetch(GOOGLE_FONT_METADATA_URL)
          .then((response) => {

          .then(googleFontCatalogItems);

    function typographyRoleDefault(key, theme = DEFAULT_THEME) {
      const role = TYPOGRAPHY_ROLES.find((item) => item.key === key);

      return {
        ...base,
        fontFamily: theme?.fontFamily || base.fontFamily,
        color: theme?.[role.colorSource] || base.color

    function isPlainObject(value) {

    function typographyRoleSettings(value, key, theme = DEFAULT_THEME) {
      const defaults = typographyRoleDefault(key, theme);
      const source = isPlainObject(value) ? value : {};
      return TYPOGRAPHY_STYLE_KEYS.reduce((settings, styleKey) => {
        settings[styleKey] = source[styleKey] ?? defaults[styleKey];
        return settings;

    function typographySettings(input, theme = DEFAULT_THEME) {
      const source = isPlainObject(input) ? input : {};
      return TYPOGRAPHY_ROLES.reduce((settings, role) => {
        settings[role.key] = typographyRoleSettings(source[role.key], role.key, theme);

    function typographyStyle(style, { includeSize = true, includeColor = true } = {}) {
      return [
        `font-family: ${style.fontFamily}`,
        includeColor ? `color: ${style.color}` : "",
        includeSize ? `font-size: ${style.size}px` : "",
        `font-weight: ${style.weight}`,

    function typographySummary(style) {
      return `${fontNameFromStack(style.fontFamily)} / ${style.size}px / ${style.weight}`;

    function themeStyle(schema) {
      const theme = schema.settings.theme;
      const layout = schema.settings.layout;
      const type = typographySettings(schema.settings.typography, theme);
      return [
        `--bg: ${theme.bg}`,

    function hexToRgba(hex, alpha) {
      const value = parseInt(hexColor(hex).slice(1), 16);
      const r = (value >> 16) & 255;
      const g = (value >> 8) & 255;
      const b = value & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function clampByte(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return null;
      return Math.max(0, Math.min(255, Math.round(number)));
    }

    function hexToRgb(hex) {
      const value = parseInt(hexColor(hex).slice(1), 16);
      return {
        r: (value >> 16) & 255,
        g: (value >> 8) & 255,
        b: value & 255
