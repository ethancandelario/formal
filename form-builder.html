<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Form Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --bg: #f7f5f2;
      --panel: #ffffff;
      --panel-2: #f4f2ef;
      --ink: #1f1f1f;
      --muted: #5f6366;
      --line: #d7d2cb;
      --sidebar: #2f3033;
      --sidebar-2: #383a3d;
      --sidebar-line: #4a4d50;
      --accent: #861f41;
      --accent-2: #ca4f00;
      --accent-soft: #f3e8ed;
      --success: #2e7d32;
      --warning: #946200;
      --danger: #b3261e;
      --success-soft: rgba(46, 125, 50, 0.12);
      --warning-soft: rgba(148, 98, 0, 0.12);
      --danger-soft: rgba(179, 38, 30, 0.12);
      --shadow: 0 12px 28px rgba(31, 31, 31, 0.07);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --focus-ring: rgba(134, 31, 65, 0.28);
      --form-font-family: "Roboto", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--form-font-family);
      font-size: 15px;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
    }

    .shell {
      height: 100vh;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 52px minmax(0, 1fr);
      overflow: hidden;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .toolbar-actions,
    .top-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .top-actions {
      justify-content: flex-end;
    }

    .topbar .icon-button {
      background: transparent;
      border-color: transparent;
      color: var(--muted);
    }

    .topbar .icon-button:hover {
      background: var(--panel-2);
      border-color: var(--line);
      color: var(--ink);
    }

    .topbar .button.primary {
      min-width: 86px;
    }

    .current-form-name {
      min-width: 0;
      width: auto;
      min-width: 10ch;
      max-width: min(30vw, 280px);
      field-sizing: content;
      height: 40px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      padding: 0 8px;
      color: var(--ink);
      font-size: 12.5px;
      font-weight: 750;
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .current-form-name:hover,
    .current-form-name:focus {
      background: var(--panel-2);
      border-color: var(--line);
      outline: none;
    }

    .current-form-name:focus {
      background: #ffffff;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(134, 31, 65, 0.12);
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 260px minmax(380px, 1fr) 330px;
      overflow: hidden;
      position: relative;
      transition: grid-template-columns 240ms var(--ease);
    }

    .shell.sidebar-collapsed .workspace {
      grid-template-columns: 56px minmax(380px, 1fr) 330px;
    }

    .sidebar,
    .inspector {
      height: 100%;
      min-height: 0;
    }

    .sidebar {
      background: var(--sidebar);
      color: #f7f5f2;
      border-right: 1px solid var(--sidebar-line);
      padding: 14px 10px;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      transition: padding 240ms var(--ease), border-color 180ms ease;
    }

    .sidebar-inner {
      min-width: 240px;
      transition: opacity 150ms ease, transform 240ms var(--ease);
      will-change: opacity, transform;
    }

    .shell.sidebar-collapsed .sidebar {
      padding-left: 8px;
      padding-right: 8px;
      border-right-color: var(--sidebar-line);
      overflow: hidden;
    }

    .shell.sidebar-collapsed .sidebar-inner {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-14px);
    }

    .icon-button.sidebar-expand-button {
      position: absolute;
      top: 14px;
      left: 8px;
      z-index: 16;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-10px) scale(0.96);
      box-shadow: 0 8px 18px rgba(31, 31, 31, 0.12);
      background: var(--sidebar-2);
      border-color: var(--sidebar-line);
      color: #f4f2ef;
      transition: opacity 150ms ease, transform 240ms var(--ease), background 160ms ease, border-color 160ms ease;
    }

    .icon-button.sidebar-expand-button:hover {
      background: #424548;
      border-color: #666a6d;
      color: #ffffff;
    }

    .shell.sidebar-collapsed .sidebar-expand-button {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0) scale(1);
    }

    .shell.sidebar-collapsed .canvas-shell {
      padding-left: 20px;
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 12px;
      padding: 0 2px;
    }

    .sidebar-title {
      font-size: 11.5px;
      color: #d7d2cb;
      letter-spacing: 0;
      font-weight: 700;
    }

    .sidebar-section {
      display: grid;
      gap: 10px;
      padding-bottom: 16px;
      margin-bottom: 16px;
      border-bottom: 1px solid rgba(215, 210, 203, 0.16);
    }

    .sidebar-section:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: 0;
    }

    .sidebar-section-title {
      color: #d7d2cb;
      font-size: 11.5px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .palette-group {
      display: grid;
      gap: 8px;
      padding-top: 10px;
      margin-top: 2px;
      border-top: 1px solid rgba(215, 210, 203, 0.12);
    }

    .palette-group:first-of-type {
      padding-top: 0;
      margin-top: 0;
      border-top: 0;
    }

    .palette-group-title {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #bfc3c6;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: none;
    }

    .palette-group-title::after {
      content: "";
      height: 1px;
      flex: 1 1 auto;
      background: rgba(215, 210, 203, 0.10);
    }

    .sidebar-settings {
      display: grid;
      gap: 12px;
    }

    .theme-color-groups {
      display: grid;
      gap: 10px;
    }

    .theme-color-group {
      display: grid;
      gap: 6px;
      padding-top: 8px;
      border-top: 1px solid rgba(215, 210, 203, 0.10);
    }

    .theme-color-group:first-child {
      padding-top: 0;
      border-top: 0;
    }

    .theme-color-group-title {
      color: #bfc3c6;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .theme-color-list {
      display: grid;
      gap: 6px;
    }

    .theme-color-token {
      width: 100%;
      min-height: 38px;
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr) auto;
      align-items: center;
      gap: 7px;
      padding: 5px;
      border: 1px solid var(--sidebar-line);
      border-radius: 8px;
      background: var(--sidebar-2);
      color: #f4f2ef;
      cursor: pointer;
      text-align: left;
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .theme-color-token:hover,
    .theme-color-token:focus-visible {
      background: #424548;
      border-color: #666a6d;
    }

    .theme-color-token:focus-visible,
    .sidebar-control:focus-visible,
    .font-picker-button:focus-visible,
    .modal-close-button:focus-visible,
    .theme-modal input:focus-visible,
    .theme-modal button:focus-visible {
      outline: 2px solid rgba(255, 255, 255, 0.34);
      outline-offset: 2px;
    }

    .theme-swatch {
      width: 28px;
      height: 28px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 7px;
      background: var(--swatch-color);
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    .theme-color-label {
      min-width: 0;
      color: #f4f2ef;
      font-size: 12px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .theme-color-value {
      color: #bfc3c6;
      font-size: 11.5px;
      font-variant-numeric: tabular-nums;
      text-transform: uppercase;
    }

    .sidebar-control {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--sidebar-line);
      border-radius: 7px;
      background: var(--sidebar-2);
      color: #f4f2ef;
      padding: 6px 7px;
      font: inherit;
      font-size: 12.5px;
      outline: none;
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .sidebar-control:hover,
    .sidebar-control:focus {
      background: #303235;
      border-color: #666a6d;
    }

    .font-picker-button {
      width: 100%;
      min-height: 58px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--sidebar-line);
      border-radius: 8px;
      background: var(--sidebar-2);
      color: #f4f2ef;
      cursor: pointer;
      text-align: left;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .font-picker-button:hover {
      background: #424548;
      border-color: #666a6d;
    }

    .font-picker-summary {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .font-picker-name {
      font-size: 12.5px;
      font-weight: 750;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .font-picker-preview {
      color: #bfc3c6;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .theme-modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(18, 18, 20, 0.56);
      backdrop-filter: blur(6px);
    }

    .theme-modal {
      width: min(92vw, 460px);
      max-height: min(88vh, 720px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      border: 1px solid var(--sidebar-line);
      border-radius: 10px;
      background: #2f3033;
      color: #f4f2ef;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
      overflow: hidden;
    }

    .theme-modal.wide {
      width: min(92vw, 620px);
    }

    .theme-modal-head,
    .theme-modal-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid var(--sidebar-line);
      background: #303235;
    }

    .theme-modal-foot {
      border-top: 1px solid var(--sidebar-line);
      border-bottom: 0;
      justify-content: flex-end;
    }

    .theme-modal-title {
      margin: 0;
      font-size: 14px;
      line-height: 1.35;
      font-weight: 800;
    }

    .theme-modal-subtitle {
      margin: 2px 0 0;
      color: #bfc3c6;
      font-size: 12px;
      line-height: 1.35;
    }

    .theme-modal-body {
      min-height: 0;
      display: grid;
      gap: 14px;
      padding: 14px;
      overflow: auto;
    }

    .theme-modal-picker {
      display: grid;
      justify-items: center;
      min-height: 220px;
    }

    .theme-color-picker-ui {
      width: 220px;
      min-height: 220px;
      display: grid;
      place-items: center;
    }

    .theme-picker-fallback {
      min-height: 58px;
      display: grid;
      place-items: center;
      color: #bfc3c6;
      font-size: 12px;
      text-align: center;
    }

    .color-input-grid,
    .rgb-input-grid {
      display: grid;
      gap: 8px;
    }

    .rgb-input-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .theme-modal-field {
      display: grid;
      gap: 5px;
    }

    .theme-modal-field label {
      color: #d7d2cb;
      font-size: 11.5px;
      font-weight: 700;
    }

    .theme-modal input {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--sidebar-line);
      border-radius: 8px;
      background: #383a3d;
      color: #f4f2ef;
      padding: 8px 9px;
      outline: none;
      font: inherit;
      font-size: 13px;
    }

    .theme-modal input:hover,
    .theme-modal input:focus {
      background: #303235;
      border-color: #666a6d;
    }

    .theme-modal .button {
      border-color: var(--sidebar-line);
      background: #383a3d;
      color: #f4f2ef;
    }

    .theme-modal .button:hover {
      background: #424548;
      border-color: #666a6d;
      color: #ffffff;
    }

    .theme-modal .button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .theme-modal .button.primary:hover {
      background: #6f1936;
      border-color: #6f1936;
      color: #ffffff;
    }

    .modal-close-button {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border: 1px solid var(--sidebar-line);
      border-radius: 8px;
      background: #383a3d;
      color: #f4f2ef;
      cursor: pointer;
    }

    .font-search-wrap {
      display: grid;
      gap: 6px;
    }

    .font-option-list {
      display: grid;
      gap: 8px;
    }

    .font-option-card {
      width: 100%;
      display: grid;
      gap: 4px;
      padding: 10px;
      border: 1px solid var(--sidebar-line);
      border-radius: 8px;
      background: #383a3d;
      color: #f4f2ef;
      cursor: pointer;
      text-align: left;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .font-option-card:hover,
    .font-option-card.selected {
      background: #424548;
      border-color: #777c80;
    }

    .font-option-card.selected {
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.07);
    }

    .font-option-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .font-option-status {
      color: #bfc3c6;
      font-size: 11.5px;
      white-space: nowrap;
    }

    .font-option-title {
      font-size: 13px;
      font-weight: 800;
    }

    .font-option-sample {
      color: #d7d2cb;
      font-size: 18px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .font-option-empty {
      min-height: 80px;
      display: grid;
      place-items: center;
      color: #bfc3c6;
      border: 1px dashed var(--sidebar-line);
      border-radius: 8px;
      font-size: 12.5px;
    }

    .sidebar-property {
      display: grid;
      gap: 6px;
    }

    .sidebar-property label {
      color: #d7d2cb;
      font-size: 11.5px;
      font-weight: 700;
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .palette-block {
      cursor: grab;
      user-select: none;
      min-height: 84px;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid var(--sidebar-line);
      background: var(--sidebar-2);
      color: #ffffff;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 8px;
      text-align: center;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .palette-block:hover {
      border-color: #666a6d;
      background: #424548;
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .palette-block:focus-visible {
      border-color: #777c80;
      background: #424548;
      outline: 2px solid rgba(255, 255, 255, 0.34);
      outline-offset: 2px;
    }

    .palette-block:active {
      cursor: grabbing;
      transform: translateY(0);
    }

    .palette-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      border: 1px solid #4a4d50;
      background: #303235;
      color: #ffffff;
      font-size: 16px;
    }

    .palette-label {
      font-size: 11.5px;
      line-height: 1.35;
      font-weight: 700;
      color: #f4f2ef;
    }

    .canvas-shell {
      min-height: 0;
      overflow: auto;
      padding: 20px;
      background: var(--bg);
      font-family: var(--form-font-family);
      transition: padding 240ms var(--ease);
    }

    .form-page {
      max-width: 840px;
      margin: 0 auto 40px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 8px;
      overflow: hidden;
    }

    .form-meta {
      padding: 24px 28px 22px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
      position: relative;
      transition: background 160ms ease, box-shadow 160ms ease;
    }

    .form-meta::after {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      pointer-events: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .form-meta:hover::after {
      border-color: rgba(31, 31, 31, 0.08);
    }

    .form-meta.selected {
      background: #fffdfb;
      box-shadow: inset 0 1px 0 rgba(134, 31, 65, 0.04);
    }

    .form-meta.selected::after {
      border-color: rgba(134, 31, 65, 0.28);
      box-shadow: 0 0 0 3px rgba(134, 31, 65, 0.07);
    }

    .title-input,
    .description-input {
      width: calc(100% + 24px);
      border: 1px solid transparent;
      background: transparent;
      color: var(--ink);
      border-radius: 8px;
      padding: 8px 12px;
      margin: 0 -12px;
    }

    .title-input {
      font-size: 26px;
      line-height: 1.2;
      font-weight: 750;
    }

    .description-input {
      min-height: 68px;
      color: var(--muted);
      line-height: 1.5;
      resize: vertical;
      font-size: 14px;
    }

    .title-input:hover,
    .description-input:hover,
    .title-input:focus,
    .description-input:focus,
    .control:hover,
    .control:focus,
    .textarea:hover,
    .textarea:focus {
      border-color: var(--line);
      outline: none;
      background: #ffffff;
    }

    .title-input:focus,
    .description-input:focus,
    .control:focus,
    .textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(134, 31, 65, 0.12);
    }

    .fields-list {
      display: grid;
      gap: 10px;
      padding: 16px;
      min-height: 280px;
      align-content: start;
      grid-auto-rows: max-content;
      transition: background 160ms ease, outline-color 160ms ease;
    }

    .fields-list.is-drag-target {
      outline: 1px dashed rgba(134, 31, 65, 0.16);
      outline-offset: -10px;
      background: rgba(134, 31, 65, 0.018);
    }

    .drop-indicator {
      position: relative;
      height: 8px;
      display: flex;
      align-items: center;
      pointer-events: none;
      animation: indicator-in 120ms var(--ease) both;
    }

    .drop-indicator::before {
      content: "";
      width: 100%;
      height: 1px;
      border-radius: 999px;
      background: rgba(134, 31, 65, 0.42);
    }

    .field-card {
      border: 1px solid var(--line);
      background: #ffffff;
      border-radius: 8px;
      padding: 0;
      box-shadow: 0 8px 20px rgba(31, 31, 31, 0.045);
      cursor: pointer;
      position: relative;
      align-self: start;
      transition: border-color 150ms ease, box-shadow 150ms ease, transform 160ms var(--ease), opacity 140ms ease;
      overflow: hidden;
      animation: card-in 160ms var(--ease) both;
    }

    .field-card:hover {
      transform: translateY(-1px);
      border-color: #cbc5b6;
      box-shadow: 0 10px 22px rgba(31, 31, 31, 0.06);
    }

    .field-card.selected {
      border-color: rgba(134, 31, 65, 0.36);
      background: linear-gradient(180deg, rgba(134, 31, 65, 0.035), #ffffff 92px);
      box-shadow: 0 12px 26px rgba(31, 31, 31, 0.08), 0 0 0 3px rgba(134, 31, 65, 0.07);
    }

    .field-card.removing {
      animation: card-out 130ms var(--ease) forwards;
      pointer-events: none;
    }

    .field-card.is-dragging {
      opacity: 0.46;
      transform: scale(0.995);
      box-shadow: none;
    }

    .field-card-head {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 10px 10px 0;
    }

    .drag-handle {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: transparent;
      cursor: grab;
    }

    .field-type {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      width: fit-content;
      min-height: 40px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 750;
      letter-spacing: 0;
      background: transparent;
      border: 0;
      padding: 7px 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease;
    }

    .field-card.selected .field-type {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .field-card.selected .drag-handle {
      color: var(--accent);
    }

    .field-tools {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .field-card-body {
      padding: 8px 16px 16px 58px;
      border-radius: 0 0 8px 8px;
    }

    .field-type:focus-visible,
    .field-card-body:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .field-label {
      margin: 0 0 5px;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 700;
    }

    .required-mark {
      color: var(--accent-2);
      margin-left: 3px;
    }

    .field-help {
      margin: 0 0 10px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 13px;
    }

    .headline-preview {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .headline-preview-title {
      margin: 0;
      color: var(--ink);
      font-size: 26px;
      line-height: 1.2;
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    .headline-preview-description {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .headline-preview-placeholder {
      color: #8b8f92;
    }

    .preview-line,
    .preview-box {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 8px;
      color: #747b73;
    }

    .preview-line {
      height: 38px;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }

    .preview-box {
      min-height: 88px;
      padding: 9px 10px;
    }

    .choice-preview {
      display: grid;
      gap: 7px;
    }

    .choice-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }

    .choice-dot,
    .choice-square {
      width: 16px;
      height: 16px;
      border: 1.5px solid #8b938d;
      flex: 0 0 auto;
    }

    .choice-dot {
      border-radius: 999px;
    }

    .choice-square {
      border-radius: 4px;
    }

    .pill-preview,
    .meter-preview,
    .star-preview,
    .scale-preview {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .pill-preview span {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 8px;
      padding: 7px 9px;
      font-size: 13px;
      color: var(--muted);
    }

    .scale-track {
      height: 8px;
      min-width: 220px;
      flex: 1 1 220px;
      border-radius: 999px;
      background: #b8b2aa;
    }

    .radar-preview {
      display: grid;
      grid-template-columns: 130px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      padding: 10px;
    }

    .radar-preview svg {
      width: 130px;
      height: 130px;
      display: block;
    }

    .radar-grid polygon,
    .radar-grid line {
      fill: none;
      stroke: #c9c4bd;
      stroke-width: 1;
    }

    .radar-fill {
      fill: rgba(134, 31, 65, 0.12);
      stroke: var(--accent);
      stroke-width: 2;
    }

    .radar-point-line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-dasharray: 4 5;
    }

    .radar-point-node {
      fill: #ffffff;
      stroke: var(--accent);
      stroke-width: 2.4;
    }

    .radar-axis-list {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .radar-axis-list span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12.5px;
    }



    .calendar-preview,
    .calendar-control {
      display: grid;
      gap: 10px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      padding: 10px;
    }

    .calendar-preview-head,
    .calendar-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .calendar-month-label {
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calendar-preview-dates,
    .calendar-date-inputs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .calendar-date-chip,
    .calendar-date-field {
      min-width: 0;
      display: grid;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 8px;
    }

    .calendar-date-chip span,
    .calendar-date-field span {
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 750;
    }

    .calendar-date-chip strong {
      min-width: 0;
      color: var(--ink);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 3px;
    }

    .calendar-weekday {
      color: var(--muted);
      font-size: 10.5px;
      font-weight: 800;
      text-align: center;
      user-select: none;
    }

    .calendar-day,
    .calendar-day-button {
      position: relative;
      min-width: 0;
      min-height: 30px;
      display: grid;
      place-items: center;
      border: 1px solid transparent;
      border-radius: 7px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      background: #ffffff;
      font-variant-numeric: tabular-nums;
    }

    .calendar-day.is-outside,
    .calendar-day-button.is-outside {
      color: #a6a09a;
      background: rgba(255, 255, 255, 0.54);
    }

    .calendar-day.is-range,
    .calendar-day-button.is-range {
      border-color: rgba(134, 31, 65, 0.16);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .calendar-day.is-boundary,
    .calendar-day-button.is-boundary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .calendar-day.is-milestone::after,
    .calendar-day-button.is-milestone::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 4px;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: var(--accent-2);
      transform: translateX(-50%);
    }

    .calendar-milestone-list,
    .calendar-milestone-editor {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .calendar-milestone-editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .calendar-milestone-empty {
      color: var(--muted);
      font-size: 12px;
    }

    .calendar-milestone-empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.52);
    }

    .calendar-milestone-item {
      min-width: 0;
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 12.5px;
    }

    .calendar-milestone-date {
      color: var(--accent-2);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .calendar-milestone-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calendar-milestone-row {
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr) auto;
      gap: 5px;
      align-items: center;
    }

    .media-preview {
      display: grid;
      gap: 8px;
      min-width: 0;
      color: var(--muted);
    }

    .media-content-wrap {
      display: flex;
      width: 100%;
      min-width: 0;
    }

    .media-visual {
      display: block;
      max-width: 100%;
      border: 0;
      border-radius: 8px;
      background: transparent;
      object-fit: contain;
    }

    .media-preview img.media-visual,
    .media-preview video.media-visual,
    .media-preview object.media-visual {
      width: 100%;
    }

    .media-preview audio.media-visual {
      width: 100%;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .media-embed {
      width: 100%;
      min-height: 180px;
      border: 0;
      border-radius: 8px;
      background: transparent;
    }

    .media-placeholder {
      min-height: 78px;
      display: grid;
      place-items: center;
      border: 1px dashed #b8b2aa;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      color: var(--muted);
      user-select: none;
    }

    .media-caption {
      margin: 0;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .media-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      overflow-wrap: anywhere;
    }

    .media-file-note {
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .spacer-preview {
      min-height: 8px;
      display: flex;
      align-items: center;
      width: 100%;
      user-select: none;
    }

    .spacer-line {
      width: 100%;
      border: 0;
      border-top: 1px solid var(--line);
      margin: 0;
      pointer-events: none;
      user-select: none;
    }

    .field-card-body .spacer-preview {
      margin: 2px 0;
    }

    .empty-state {
      min-height: 260px;
      display: grid;
      place-items: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #ffffff;
      user-select: none;
    }

    .inspector {
      border-left: 1px solid var(--line);
      background: #f4f2ef;
      padding: 16px;
      position: sticky;
      top: 52px;
      align-self: start;
      max-height: calc(100vh - 52px);
      overflow: auto;
      overscroll-behavior: contain;
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 800;
      margin: 0 0 14px;
    }

    .property-stack {
      display: grid;
      gap: 12px;
    }

    .property {
      display: grid;
      gap: 6px;
    }

    .property label,
    .mini-label {
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .control,
    .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      padding: 9px 10px;
      min-height: 40px;
      font-size: 14px;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .textarea {
      min-height: 80px;
      resize: vertical;
      line-height: 1.45;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      font-size: 13.5px;
    }

    .toggle-row input {
      width: 17px;
      height: 17px;
      accent-color: var(--accent);
    }

    .option-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 5px;
      align-items: center;
    }

    .radar-axis-row {
      grid-template-columns: minmax(0, 1fr) 82px auto;
    }

    .radar-axis-only-row {
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .radar-mode-note {
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .button,
    .icon-button {
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--line);
      color: var(--ink);
      background: #ffffff;
      min-height: 40px;
      padding: 0 10px;
      cursor: pointer;
      text-decoration: none;
      font-size: 12px;
      font-weight: 750;
      line-height: 1;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .button:hover,
    .icon-button:hover {
      background: var(--panel-2);
      border-color: #cbc5b6;
    }

    .button:focus-visible,
    .icon-button:focus-visible,
    .control:focus-visible,
    .textarea:focus-visible,
    .title-input:focus-visible,
    .description-input:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .button:active,
    .icon-button:active {
      transform: translateY(1px);
    }

    .button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .button.primary:hover {
      background: #6f1936;
      border-color: #6f1936;
    }

    .button.ghost {
      background: transparent;
    }

    .icon-button {
      width: 40px;
      padding: 0;
      flex: 0 0 auto;
    }

    .icon-button.danger {
      color: var(--danger);
    }

    .icon-button.danger:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: var(--danger-soft);
    }

    .sidebar .icon-button {
      border-color: var(--sidebar-line);
      color: #f4f2ef;
      background: #383a3d;
    }

    .sidebar .icon-button:hover {
      background: #424548;
    }

    .sidebar-theme-reset {
      width: 100%;
      justify-content: flex-start;
      border-color: var(--sidebar-line);
      background: var(--sidebar-2);
      color: #f4f2ef;
    }

    .sidebar-theme-reset i,
    .sidebar-theme-reset span {
      color: inherit;
    }

    .sidebar-theme-reset:hover {
      background: #424548;
      border-color: #666a6d;
      color: #ffffff;
    }

    .custom-radar-icon,
    .custom-lucide-icon {
      width: 1em;
      height: 1em;
      display: block;
      flex: 0 0 1em;
      overflow: hidden;
    }

    .palette-icon .custom-radar-icon,
    .palette-icon .custom-lucide-icon {
      width: 16px;
      height: 16px;
    }

    .field-type .custom-radar-icon,
    .field-type .custom-lucide-icon,
    .panel-title .custom-radar-icon,
    .panel-title .custom-lucide-icon {
      width: 1.08em;
      height: 1.08em;
    }

    .custom-radar-icon polygon,
    .custom-radar-icon line,
    .custom-radar-icon circle {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .custom-radar-icon circle {
      fill: currentColor;
    }

    .custom-lucide-icon path {
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes card-out {
      to {
        opacity: 0;
        transform: translateY(-6px) scale(0.985);
      }
    }

    @keyframes indicator-in {
      from {
        opacity: 0;
        transform: scaleX(0.96);
      }

      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1100px) {
      .workspace {
        grid-template-columns: 82px minmax(360px, 1fr) 300px;
      }

      .shell.sidebar-collapsed .workspace {
        grid-template-columns: 56px minmax(360px, 1fr) 300px;
      }

      .sidebar {
        padding: 14px 8px;
      }

      .sidebar-inner {
        min-width: 62px;
      }

      .sidebar-head {
        justify-content: flex-end;
      }

      .sidebar-title,
      .palette-label,
      .palette-group-title,
      .sidebar-section-title,
      .sidebar-settings {
        display: none;
      }

      .palette {
        grid-template-columns: 1fr;
      }

      .shell.sidebar-collapsed .canvas-shell {
        padding-left: 20px;
      }
    }

    @media (max-width: 900px) {
      .shell {
        height: auto;
        min-height: auto;
        overflow: visible;
      }

      .topbar {
        grid-template-columns: 1fr;
        gap: 7px;
        padding: 10px;
        position: static;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .current-form-name {
        flex: 1 1 180px;
        width: auto;
        max-width: 100%;
      }

      .workspace,
      .shell.sidebar-collapsed .workspace {
        grid-template-columns: 1fr;
        overflow: visible;
      }

      .sidebar,
      .inspector,
      .canvas-shell {
        overflow: visible;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--sidebar-line);
        display: grid;
        grid-template-rows: 1fr;
        overflow: hidden;
        transition: grid-template-rows 260ms var(--ease), padding 240ms var(--ease), border-color 180ms ease;
      }

      .sidebar-inner {
        min-width: 0;
        overflow: hidden;
      }

      .shell.sidebar-collapsed .sidebar {
        grid-template-rows: 0fr;
        padding-top: 0;
        padding-bottom: 0;
        border-bottom-color: transparent;
        border-right-color: transparent;
        overflow: hidden;
      }

      .palette,
      .shell.sidebar-collapsed .palette {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .palette-label,
      .sidebar-title,
      .sidebar-section-title {
        display: block;
      }

      .palette-group-title {
        display: flex;
      }

      .sidebar-settings {
        display: grid;
      }

      .canvas-shell {
        padding: 12px;
      }

      .shell.sidebar-collapsed .canvas-shell {
        padding: 60px 12px 12px;
      }

      .inspector {
        border-left: 0;
        border-top: 1px solid var(--line);
        position: static;
        height: auto;
        max-height: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>

    let googleFontCatalogPromise = null;
    const THEME_COLOR_GROUPS = [

    function verticalFlexValue(value) {
      if (value === "top") return "flex-start";
      if (value === "bottom") return "flex-end";
      return "center";
    }

    function textAlignValue(value) {
      if (value === "left" || value === "right") return value;
      return "center";
    }

    function headlineSettings(field) {
      const settings = field?.settings || {};
      return {
        headingHorizontalAlignment: normalizeHorizontalAlignment(settings.headingHorizontalAlignment, ["left", "center", "right"], "left"),
        headingVerticalAlignment: normalizeVerticalAlignment(settings.headingVerticalAlignment || "top"),
        descriptionHorizontalAlignment: normalizeHorizontalAlignment(settings.descriptionHorizontalAlignment, ["left", "center", "right"], "left"),
        descriptionVerticalAlignment: normalizeVerticalAlignment(settings.descriptionVerticalAlignment || "top"),
        outline: settings.outline === true
      };
    }

    function mediaSettings(field) {
      const settings = field?.settings || {};
      const height = clampMediaNumber(settings.iframeHeight, 260, 120, 1200);
      const horizontalAlignment = normalizeHorizontalAlignment(settings.horizontalAlignment, ["left", "center", "right", "stretch"]);
      const verticalAlignment = normalizeVerticalAlignment(settings.verticalAlignment);
      const fits = new Set(["contain", "cover", "fill", "scale-down"]);
      const objectFit = fits.has(settings.objectFit) ? settings.objectFit : "contain";
      return {
        sourceType: settings.sourceType || "url",
        url: String(settings.url || ""),
        dataUrl: String(settings.dataUrl || ""),
        mimeType: String(settings.mimeType || ""),
        fileName: String(settings.fileName || ""),
        alt: String(settings.alt || ""),
        caption: String(settings.caption || ""),
        html: String(settings.html || ""),
        iframeHeight: height,
        horizontalAlignment,
        verticalAlignment,
        scale: clampMediaNumber(settings.scale, 100, 10, 100),
        maxWidth: cleanMediaDimension(settings.maxWidth),
        maxHeight: clampMediaNumber(settings.maxHeight, 360, 80, 1600),
        objectFit,
        outline: settings.outline === true
      };
    }

    function mediaSource(settings) {
      return settings.sourceType === "file" ? settings.dataUrl : settings.url;
    }

    function mediaKind(settings) {
      if (settings.sourceType === "html") return "html";
      const source = mediaSource(settings).toLowerCase().split(/[?#]/)[0];
      const mime = settings.mimeType.toLowerCase();
      if (mime.startsWith("image/") || source.startsWith("data:image/") || /\.(apng|avif|gif|jpe?g|png|svg|webp)$/i.test(source)) return "image";
      if (mime.startsWith("video/") || source.startsWith("data:video/") || /\.(mp4|m4v|mov|ogv|webm)$/i.test(source)) return "video";
      if (mime.startsWith("audio/") || source.startsWith("data:audio/") || /\.(aac|flac|m4a|mp3|oga|ogg|wav|webm)$/i.test(source)) return "audio";
      if (mime === "application/pdf" || source.startsWith("data:application/pdf") || /\.pdf$/i.test(source)) return "document";
      return "unknown";
    }

    function objectPositionX(value) {
      if (value === "left") return "left";
      if (value === "right") return "right";
      return "center";
    }

    function objectPositionY(value) {
      if (value === "top") return "top";
      if (value === "bottom") return "bottom";
      return "center";
    }

    function headlineTextStyle(settings, horizontalKey, verticalKey) {
      const horizontal = settings[horizontalKey];
      const vertical = settings[verticalKey];
      return `display: flex; justify-content: ${horizontalFlexValue(horizontal)}; align-items: ${verticalFlexValue(vertical)}; text-align: ${textAlignValue(horizontal)};`;
    }

    function mediaAlignmentStyle(settings) {
      const horizontal = settings.horizontalAlignment;
      const vertical = settings.verticalAlignment;
      const justify = horizontal === "stretch" ? "stretch" : horizontalFlexValue(horizontal);
      return `justify-content: ${justify}; align-items: ${verticalFlexValue(vertical)}; text-align: ${textAlignValue(horizontal)};`;
    }

    function mediaVisualStyle(settings, extra = "") {
      const width = settings.horizontalAlignment === "stretch" ? "100%" : `${settings.scale}%`;
      const maxWidth = settings.maxWidth ? `max-width: ${settings.maxWidth};` : "";
      const maxHeight = `max-height: ${settings.maxHeight}px;`;
      const objectPosition = `object-position: ${objectPositionX(settings.horizontalAlignment)} ${objectPositionY(settings.verticalAlignment)};`;
      return `width: ${width}; ${maxWidth} ${maxHeight} object-fit: ${settings.objectFit}; ${objectPosition} ${extra}`.trim();
    }

    function MediaPreview({ field }) {
      const settings = mediaSettings(field);
      const source = mediaSource(settings);
      const kind = mediaKind(settings);
      const title = settings.alt || settings.fileName || field.label || "Media";
      const wrapStyle = mediaAlignmentStyle(settings);
      const visualStyle = mediaVisualStyle(settings);

      if (kind === "html") {
        return html`

      return html`

          <div class="media-content-wrap" style=${wrapStyle}>
            ${kind === "image" ? html`<img class="media-visual" src=${source} alt=${settings.alt || ""} style=${visualStyle} />` : null}
            ${kind === "video" ? html`<video class="media-visual" src=${source} controls playsinline title=${title} style=${visualStyle}></video>` : null}
            ${kind === "audio" ? html`<audio class="media-visual" src=${source} controls title=${title} style=${settings.horizontalAlignment === "stretch" ? "width: 100%;" : `width: ${settings.scale}%; ${settings.maxWidth ? `max-width: ${settings.maxWidth};` : ""}`}></audio>` : null}
            ${kind === "document" ? html`<object class="media-visual" data=${source} type="application/pdf" title=${title} style=${mediaVisualStyle(settings, `height: ${settings.iframeHeight}px; max-height: none;`)}><a class="media-link" href=${source} target="_blank" rel="noreferrer"><i class="fa-solid fa-arrow-up-right-from-square"></i><span>${settings.fileName || source}</span></a></object>` : null}
            ${kind === "unknown" ? html`<a class="media-link" href=${source} target="_blank" rel="noreferrer"><i class="fa-solid fa-arrow-up-right-from-square"></i><span>${settings.fileName || source}</span></a>` : null}
          </div>
          ${settings.caption ? html`<p class="media-caption">${settings.caption}</p>` : null}
        </div>
      `;
    }

    function radarPoint(index, count, center, radius) {
      const angle = -Math.PI / 2 + (Math.PI * 2 * index / count);
      return {
        x: Math.round((center + Math.cos(angle) * radius) * 100) / 100,
        y: Math.round((center + Math.sin(angle) * radius) * 100) / 100
      };
    }

    function radarValueScale(value, max) {
      return Math.max(0, Math.min(1, Number(value) / Math.max(1, max)));
    }

    function radarPoints(values, max, center, radius) {
      return values.map((value, index) => {
        const point = radarPoint(index, values.length, center, radius * radarValueScale(value, max));
        return `${point.x},${point.y}`;
      }).join(" ");
    }

    function radarPointFromPolar(angle, value, max, center, radius) {
      const radians = -Math.PI / 2 + (normalizeRadarAngle(angle) * Math.PI / 180);
      const scaled = radarValueScale(value, max);
      return {
        x: Math.round((center + Math.cos(radians) * radius * scaled) * 100) / 100,
        y: Math.round((center + Math.sin(radians) * radius * scaled) * 100) / 100
      };
    }

    function formatRadarNumber(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return "";
      return Number.isInteger(number) ? String(number) : number.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
    }

    function nearestRadarAxis(angle, axes) {
      const labels = normalizeRadarAxes(axes);
      const step = 360 / labels.length;
      const index = Math.round(normalizeRadarAngle(angle) / step) % labels.length;
      return labels[index];
    }

    function radarPointDescription(angle, axes) {
      const labels = normalizeRadarAxes(axes);
      const step = 360 / labels.length;
      const normalized = normalizeRadarAngle(angle);
      const position = normalized / step;
      const lower = Math.floor(position) % labels.length;
      const upper = (lower + 1) % labels.length;
      const blend = position - lower;
      if (blend < 0.06) return labels[lower];
      if (blend > 0.94) return labels[upper];
      return `${labels[lower]} ↔ ${labels[upper]}`;
    }

    function RadarPreview({ field }) {
      const axes = normalizeRadarAxes(field.settings?.axes);
      const mode = normalizeRadarMode(field.settings?.mode);
      const max = normalizeRadarMax(field.settings?.max);
      const center = 65;
      const radius = 44;
      const values = normalizeRadarValues(field.settings?.defaultValues, axes, max);
      const point = normalizeRadarPoint(field.settings?.defaultPoint, max);
      const polygon = radarPoints(values, max, center, radius);
      const pointPosition = radarPointFromPolar(point.angle, point.value, max, center, radius);

      return html`
        <div class="radar-preview">
          <svg viewBox="0 0 130 130" role="img" aria-label=${mode === "point" ? "Radar single-node preview" : "Radar preview"}>
            <g class="radar-grid">
              ${[0.35, 0.7, 1].map((scale) => html`
                <polygon points=${axes.map((_, index) => {
        const gridPoint = radarPoint(index, axes.length, center, radius * scale);
        return `${gridPoint.x},${gridPoint.y}`;
      }).join(" ")} />
              `)}
              ${axes.map((_, index) => {
        const gridPoint = radarPoint(index, axes.length, center, radius);
        return html`<line x1=${center} y1=${center} x2=${gridPoint.x} y2=${gridPoint.y} />`;
      })}
            </g>
            ${mode === "point" ? html`
              <line class="radar-point-line" x1=${center} y1=${center} x2=${pointPosition.x} y2=${pointPosition.y} />
              <circle class="radar-point-node" cx=${pointPosition.x} cy=${pointPosition.y} r="5" />
            ` : html`<polygon class="radar-fill" points=${polygon} />`}
          </svg>
          <div class="radar-axis-list">
            ${mode === "point" ? html`
              <span>Single node</span>
              <span>${radarPointDescription(point.angle, axes)}: ${formatRadarNumber(point.value)}</span>
            ` : axes.map((axis, index) => html`<span key=${`${axis}-${index}`}>${axis}: ${values[index]}</span>`)}
          </div>
        </div>
      `;
    }

    function CalendarPreview({ field }) {
      const settings = normalizeCalendarSettings(field);
      const startDate = settings.startDate || todayISO();
      const endDate = settings.endDate || addDays(startDate, 7);
      const startTime = dateTime(startDate);
      const endTime = dateTime(endDate);
      const rangeStart = Math.min(startTime, endTime);
      const rangeEnd = Math.max(startTime, endTime);
      const monthDate = monthStartFromDate(startDate || endDate);
      const month = monthDate.getMonth();
      const milestoneDates = new Set(settings.milestones.map((item) => item.date).filter(Boolean));
      const milestones = settings.milestones.filter((item) => item.date || item.label);

      return html`
        <div class="calendar-preview">
          <div class="calendar-preview-dates">
            <div class="calendar-date-chip"><span>Start</span><strong>${readableDate(startDate)}</strong></div>

          <div class="calendar-weekdays" aria-hidden="true">
            ${["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map((day) => html`<div class="calendar-weekday" key=${day}>${day}</div>`)}
          </div>
          <div class="calendar-grid" aria-hidden="true">
            ${calendarGridDates(monthDate).map((date) => {
              const iso = isoFromDate(date);
              const time = date.getTime();
              const inRange = time >= rangeStart && time <= rangeEnd;
              const isBoundary = iso === startDate || iso === endDate;
              const isOutside = date.getMonth() !== month;
              const isMilestone = milestoneDates.has(iso);
              return html`<div class=${`calendar-day${isOutside ? " is-outside" : ""}${inRange ? " is-range" : ""}${isBoundary ? " is-boundary" : ""}${isMilestone ? " is-milestone" : ""}`} key=${iso}>${date.getDate()}</div>`;
            })}
          </div>
          ${settings.allowMilestones && milestones.length ? html`
            <div class="calendar-milestone-list">
              ${milestones.map((item) => html`
                <div class="calendar-milestone-item" key=${item.id}>

                  <span class="calendar-milestone-name">${item.label || "Milestone"}</span>
                </div>
              `)}
            </div>
          ` : null}
        </div>
      `;

    function IroColorPicker({ color, onChange, width = 220 }) {
      const mountRef = useRef(null);
      const pickerRef = useRef(null);
      const changeRef = useRef(onChange);

      useEffect(() => {
        changeRef.current = onChange;
      }, [onChange]);

      useEffect(() => {
        if (!mountRef.current || !window.iro) return;
        mountRef.current.innerHTML = "";
        const picker = new window.iro.ColorPicker(mountRef.current, {
          width,
          color,
          borderWidth: 1,
          borderColor: "#4a4d50"
        });
        picker.on("input:change", (picked) => {
          changeRef.current(picked.hexString);
        });
        pickerRef.current = picker;
        return () => {
          if (mountRef.current) mountRef.current.innerHTML = "";
          pickerRef.current = null;
        };
      }, []);

      useEffect(() => {
        if (!pickerRef.current) return;
        const next = cleanColor(color, DEFAULT_THEME.accent);
        if (pickerRef.current.color.hexString.toLowerCase() !== next.toLowerCase()) {
          pickerRef.current.color.hexString = next;
        }
      }, [color]);

      if (!window.iro) {
        return html`<div class="theme-picker-fallback">Color picker unavailable. Use the color fields below.</div>`;
      }

      return html`<div class="theme-color-picker-ui" ref=${mountRef}></div>`;
    }

    function ColorPickerModal({ item, value, defaultValue, onChange, onClose }) {
      const [, label] = item;
      const [hexDraft, setHexDraft] = useState(value);
      const [rgbDraft, setRgbDraft] = useState(hexToRgb(value));

      useEffect(() => {
        setHexDraft(value);
        setRgbDraft(hexToRgb(value));
      }, [value]);

      useEffect(() => {
        function handleKeyDown(event) {
          if (event.key === "Escape") onClose();
        }
        document.addEventListener("keydown", handleKeyDown);
        return () => document.removeEventListener("keydown", handleKeyDown);
      }, [onClose]);

      function applyHex(raw) {
        setHexDraft(raw);
        const next = hexCandidate(raw);
        if (next) onChange(next);
      }

      function updateRgb(channel, raw) {
        const next = { ...rgbDraft, [channel]: raw };
        setRgbDraft(next);
        const r = clampByte(next.r);
        const g = clampByte(next.g);
        const b = clampByte(next.b);
        if (r === null || g === null || b === null) return;
        onChange(rgbToHex(r, g, b));
      }

      return html`
        <div class="theme-modal-backdrop" role="presentation" onMouseDown=${(event) => { if (event.target === event.currentTarget) onClose(); }}>
          <section class="theme-modal" role="dialog" aria-modal="true" aria-label=${`Edit ${label} color`} onMouseDown=${(event) => event.stopPropagation()}>
            <div class="theme-modal-head">
              <div>
                <h2 class="theme-modal-title">${label}</h2>
                <p class="theme-modal-subtitle">${value.toUpperCase()}</p>
              </div>
              <button class="modal-close-button" type="button" onClick=${onClose} aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
            </div>

    function FontPickerModal({ value, onChange, onClose }) {
      const [query, setQuery] = useState("");
      const [catalog, setCatalog] = useState([]);
      const [catalogState, setCatalogState] = useState("idle");
      const current = fontOptionByFamily(value);
      const normalizedQuery = query.trim().toLowerCase();
      const hasSearch = normalizedQuery.length > 0;
      const matchingFonts = useMemo(() => {
        if (!hasSearch) return [];
        const source = catalog.length ? catalog : [];
        const matches = source.filter((font) => font.family.toLowerCase().includes(normalizedQuery));
        const systemMatch = SYSTEM_FONT_OPTION.family.toLowerCase().includes(normalizedQuery);
        const options = systemMatch ? [SYSTEM_FONT_OPTION, ...matches] : matches;
        return options.slice(0, GOOGLE_FONT_PREVIEW_LIMIT);
      }, [catalog, hasSearch, normalizedQuery]);

      useEffect(() => {
        if (!hasSearch) {
          setCatalogState("idle");
          return undefined;
        }
        if (catalog.length) {
          setCatalogState("ready");
          return undefined;
        }
        let cancelled = false;
        setCatalogState("loading");
        fetchGoogleFontCatalog()
          .then((items) => {
            if (cancelled) return;
            setCatalog(items);
            setCatalogState(items.length ? "ready" : "error");
          })
          .catch((error) => {
            console.warn(error);
            if (!cancelled) setCatalogState("error");
          });
        return () => {
          cancelled = true;
        };
      }, [catalog.length, hasSearch]);

      useEffect(() => {
        matchingFonts.forEach((font) => {
          if (!font.system) ensureGoogleFontLoaded(googleFontStack(font.family, font.category));
        });
      }, [matchingFonts]);

      useEffect(() => {
        ensureGoogleFontLoaded(value);
      }, [value]);

      useEffect(() => {
        function handleKeyDown(event) {
          if (event.key === "Escape") onClose();
        }
        document.addEventListener("keydown", handleKeyDown);
        return () => document.removeEventListener("keydown", handleKeyDown);
      }, [onClose]);

      return html`
        <div class="theme-modal-backdrop" role="presentation" onMouseDown=${(event) => { if (event.target === event.currentTarget) onClose(); }}>
          <section class="theme-modal wide" role="dialog" aria-modal="true" aria-label="Choose font" onMouseDown=${(event) => event.stopPropagation()}>
            <div class="theme-modal-head">
              <div>
                <h2 class="theme-modal-title">Typeface</h2>
                <p class="theme-modal-subtitle">Current: ${current.name}</p>
              </div>
              <button class="modal-close-button" type="button" onClick=${onClose} aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="theme-modal-body">
              <div class="font-search-wrap">
                <label class="sr-only" for="fontSearch">Search fonts</label>
                <input id="fontSearch" value=${query} placeholder="Search Google Fonts" onInput=${(event) => setQuery(event.currentTarget.value)} />
              </div>
              <div class="font-option-list">
                ${matchingFonts.length ? matchingFonts.map((font) => {
                  const stack = font.system ? font.stack : googleFontStack(font.family, font.category);
                  const selected = stack === current.stack;
                  return html`
                    <button
                      class=${`font-option-card${selected ? " selected" : ""}`}
                      type="button"
                      key=${font.family}
                      style=${`font-family: ${stack};`}
                      onClick=${() => onChange(stack)}
                    >
                      <span class="font-option-title-row">
                        <span class="font-option-title">${font.family}</span>
                        ${selected ? html`<span class="font-option-status">Selected</span>` : null}
                      </span>
                      <span class="font-option-sample">The quick brown fox jumps over the lazy dog.</span>
                    </button>
                  `;
                }) : html`<div class="font-option-empty">${!hasSearch ? "Search to browse fonts." : catalogState === "loading" ? "Loading fonts..." : catalogState === "error" ? "Font catalog unavailable." : "No matching fonts."}</div>`}
              </div>
            </div>
            <div class="theme-modal-foot">
              <button class="button" type="button" onClick=${() => onChange(DEFAULT_THEME.fontFamily)}>Use default</button>
              <button class="button primary" type="button" onClick=${onClose}>Done</button>
            </div>
          </section>
        </div>
      `;
    }

    function SidebarSettings({ schema, onSchemaChange, onOpenColor, onOpenFont }) {

    function DropIndicator() {
      return html`<div class="drop-indicator" aria-hidden="true"></div>`;
    }

    function FieldListContent({ fields, selectedId, removingId, draggingFieldId, dropIndex, onSelect, onMove, onDuplicate, onDelete, onFieldDragStart, onFieldDragEnd }) {
      const hasDropIndex = Number.isInteger(dropIndex);
      if (!fields.length) {
        return html`
          ${hasDropIndex && dropIndex === 0 ? html`<${DropIndicator} key="drop-0" />` : null}
          <div class="empty-state"><span>Add some blocks from the sidebar!</span></div>
        `;
      }

      const nodes = [];
      if (hasDropIndex && dropIndex === 0) nodes.push(html`<${DropIndicator} key="drop-0" />`);
      fields.forEach((field, index) => {
        nodes.push(html`
          <${FieldCard}
            key=${field.id}
            field=${field}
            selected=${field.id === selectedId}
            removing=${field.id === removingId}
            dragging=${field.id === draggingFieldId}
            onSelect=${() => onSelect(field.id)}
            onMove=${(direction) => onMove(field.id, direction)}
            onDuplicate=${() => onDuplicate(field.id)}
            onDelete=${() => onDelete(field.id)}
            onDragStart=${(event) => onFieldDragStart(event, field.id)}
            onDragEnd=${onFieldDragEnd}
          />
        `);
        if (hasDropIndex && dropIndex === index + 1) {
          nodes.push(html`<${DropIndicator} key=${`drop-${index + 1}`} />`);
        }
      });
      return nodes;
    }

    function FieldCard({ field, selected, removing, dragging, onSelect, onMove, onDuplicate, onDelete, onDragStart, onDragEnd }) {
      const meta = fieldMeta(field);
      const visibleLabel = String(field.label ?? "").trim();
      const selectLabel = `Select ${visibleLabel || meta.name} field`;
      function handleCardClick(event) {
        const target = event.target;
        if (target?.closest?.("button, a, input, textarea, select")) return;
        onSelect();
      }

      function handleSelectKey(event) {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        onSelect();
      }

      return html`
        <article class=${`field-card${selected ? " selected" : ""}${removing ? " removing" : ""}${dragging ? " is-dragging" : ""}`} data-field-id=${field.id} onClick=${handleCardClick}>
          <div class="field-card-head">
            <span class="drag-handle" title="Drag to reorder" aria-hidden="true" draggable=${true} onDragStart=${onDragStart} onDragEnd=${onDragEnd}>
              <i class="fa-solid fa-grip-vertical"></i>
            </span>
            <button class="field-type" type="button" aria-pressed=${selected} aria-label=${selectLabel} onClick=${onSelect}>
              <${Icon} icon=${meta.icon} /><span>${meta.name}</span>
            </button>
            <div class="field-tools">
              <button class="icon-button" type="button" onClick=${() => onMove(-1)} title="Move up" aria-label="Move up"><i class="fa-solid fa-arrow-up"></i></button>
              <button class="icon-button" type="button" onClick=${() => onMove(1)} title="Move down" aria-label="Move down"><i class="fa-solid fa-arrow-down"></i></button>
              <button class="icon-button" type="button" onClick=${onDuplicate} title="Duplicate" aria-label="Duplicate"><i class="fa-regular fa-copy"></i></button>
              <button class="icon-button danger" type="button" onClick=${onDelete} title="Delete" aria-label="Delete"><i class="fa-regular fa-trash-can"></i></button>
            </div>
          </div>
          <div class="field-card-body" role="button" tabIndex="0" aria-pressed=${selected} aria-label=${selectLabel} onKeyDown=${handleSelectKey}>
            ${["headline", "spacer"].includes(field.type) ? html`
              <${FieldPreview} field=${field} />
            ` : html`
              ${visibleLabel ? html`<div class="field-label">${visibleLabel}${field.required ? html`<span class="required-mark">*</span>` : null}</div>` : null}
              ${field.description ? html`<p class="field-help">${field.description}</p>` : null}
              <${FieldPreview} field=${field} />
            `}
          </div>
        </article>
      `;
    }

    function Inspector({ schema, selectedField, onSchemaChange, onFieldChange }) {
      if (!selectedField) {
        return html`
          <h2 class="panel-title"><i class="fa-solid fa-sliders"></i><span>Form Settings</span></h2>
          <div class="property-stack">
            <div class="radar-mode-note">Select a block to edit its settings. Form-wide palette and font settings are in the sidebar.</div>
          </div>
        `;
      }

      const meta = fieldMeta(selectedField);
      return html`
        <h2 class="panel-title"><${Icon} icon=${meta.icon} /><span>${meta.name}</span></h2>
        <div class="property-stack">
          ${selectedField.type !== "spacer" ? html`
            <div class="property">
              <label for="fieldLabel">${selectedField.type === "headline" ? "Heading" : "Label"}</label>
              <input class="control" id="fieldLabel" value=${selectedField.label} onInput=${(event) => onFieldChange({ label: event.currentTarget.value })} />
            </div>
            <div class="property">
              <label for="fieldDescription">Description</label>
              <textarea class="textarea" id="fieldDescription" value=${selectedField.description} onInput=${(event) => onFieldChange({ description: event.currentTarget.value })}></textarea>

          <${PlaceholderSettings} field=${selectedField} onFieldChange=${onFieldChange} />
          <${OptionSettings} field=${selectedField} onFieldChange=${onFieldChange} />
          <${TypeSettings} field=${selectedField} onFieldChange=${onFieldChange} />
          ${!["headline", "media", "spacer"].includes(selectedField.type) ? html`
            <label class="toggle-row">
              <input type="checkbox" checked=${selectedField.required} onChange=${(event) => onFieldChange({ required: event.currentTarget.checked })} />
              <span>Required</span>
            </label>
          ` : null}
        </div>
      `;
    }

    function PlaceholderSettings({ field, onFieldChange }) {
      if (!["short_answer", "long_answer", "email", "number", "link"].includes(field.type)) return null;
      return html`
        <div class="property">
          <label for="fieldPlaceholder">Placeholder</label>
          <input class="control" id="fieldPlaceholder" value=${field.placeholder || ""} onInput=${(event) => onFieldChange({ placeholder: event.currentTarget.value })} />
        </div>
      `;
    }

    function OptionSettings({ field, onFieldChange }) {
      if (!["multiple_choice", "checkbox", "poll"].includes(field.type)) return null;
      const options = field.options || [];
      return html`
        <div class="property">
          <div class="mini-label">Options</div>
          ${options.map((option, index) => html`
            <div class="option-row" key=${index}>
              <input
                class="control"
                value=${option}
                aria-label=${`Option ${index + 1}`}
                onInput=${(event) => {
          const next = [...options];
          next[index] = event.currentTarget.value;
          onFieldChange({ options: next });
        }}
              />
              <button
                class="icon-button danger"
                type="button"
                title="Remove option"
                aria-label="Remove option"
                onClick=${() => onFieldChange({ options: options.filter((_, itemIndex) => itemIndex !== index).length ? options.filter((_, itemIndex) => itemIndex !== index) : ["Option 1"] })}
              >
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>
          `)}
          <button class="button ghost" type="button" onClick=${() => onFieldChange({ options: [...options, "Option " + (options.length + 1)] })}>
            <i class="fa-solid fa-plus"></i><span>Add option</span>
          </button>
        </div>
      `;
    }

    function TypeSettings({ field, onFieldChange }) {
      if (field.type === "headline") {
        const settings = headlineSettings(field);

        return html`
          <div class="settings-grid">
            <div class="property">

              <select class="control" id="headingHorizontalAlignment" value=${settings.headingHorizontalAlignment} onChange=${(event) => patchSettings({ headingHorizontalAlignment: event.currentTarget.value })}>

                <option value="center">Center</option>
                <option value="right">Right</option>
              </select>
            </div>
            <div class="property">
              <label for="headingVerticalAlignment">Heading vertical</label>
              <select class="control" id="headingVerticalAlignment" value=${settings.headingVerticalAlignment} onChange=${(event) => patchSettings({ headingVerticalAlignment: event.currentTarget.value })}>
                <option value="top">Top</option>
                <option value="center">Center</option>

              </select>

            <div class="property">
              <label for="descriptionHorizontalAlignment">Description horizontal</label>

                <option value="left">Left</option>
                <option value="center">Center</option>

              </select>
            </div>
            <div class="property">

              <select class="control" id="descriptionVerticalAlignment" value=${settings.descriptionVerticalAlignment} onChange=${(event) => patchSettings({ descriptionVerticalAlignment: event.currentTarget.value })}>
                <option value="top">Top</option>
                <option value="center">Center</option>
                <option value="bottom">Bottom</option>
              </select>
            </div>
          </div>
          <label class="toggle-row">
            <input type="checkbox" checked=${settings.outline} onChange=${(event) => patchSettings({ outline: event.currentTarget.checked })} />
            <span>Show section outline</span>
          </label>
        `;
      }

      if (field.type === "mood_meter") {
        return html`
          <div class="settings-grid">
            <div class="property">
              <label for="minLabel">Low label</label>
              <input class="control" id="minLabel" value=${field.settings?.minLabel || ""} onInput=${(event) => onFieldChange({ settings: { ...field.settings, minLabel: event.currentTarget.value } })} />
            </div>
            <div class="property">
              <label for="maxLabel">High label</label>
              <input class="control" id="maxLabel" value=${field.settings?.maxLabel || ""} onInput=${(event) => onFieldChange({ settings: { ...field.settings, maxLabel: event.currentTarget.value } })} />
            </div>
          </div>
        `;

      if (field.type === "linear_scale") {

        return html`
          <div class="settings-grid">
            <div class="property">
              <label for="scaleMin">Minimum</label>
              <input class="control" id="scaleMin" type="number" value=${settings.min} onInput=${(event) => onFieldChange({ settings: { ...(field.settings || {}), min: event.currentTarget.value } })} />
            </div>
            <div class="property">
              <label for="scaleMax">Maximum</label>
              <input class="control" id="scaleMax" type="number" value=${settings.max} onInput=${(event) => onFieldChange({ settings: { ...(field.settings || {}), max: event.currentTarget.value } })} />
            </div>
            <div class="property">
              <label for="scaleMinLabel">Low label</label>
              <input class="control" id="scaleMinLabel" value=${settings.minLabel || ""} onInput=${(event) => onFieldChange({ settings: { ...(field.settings || {}), minLabel: event.currentTarget.value } })} />
            </div>
            <div class="property">
              <label for="scaleMaxLabel">High label</label>
              <input class="control" id="scaleMaxLabel" value=${settings.maxLabel || ""} onInput=${(event) => onFieldChange({ settings: { ...(field.settings || {}), maxLabel: event.currentTarget.value } })} />
            </div>

      if (field.type === "star_rating") {

          </div>

      }



      if (field.type === "calendar") {
        const normalized = normalizeCalendarSettings(field);
        const settings = {
          ...normalized,
          ...(field.settings || {}),
          milestones: Array.isArray(field.settings?.milestones) ? field.settings.milestones : normalized.milestones
        };
        const patchSettings = (patch) => onFieldChange({ settings: { ...(field.settings || {}), ...patch } });
        const updateMilestone = (index, patch) => {
          const milestones = settings.milestones.map((item, itemIndex) => itemIndex === index ? { ...item, ...patch } : item);

        const removeMilestone = (index) => patchSettings({ milestones: settings.milestones.filter((_, itemIndex) => itemIndex !== index) });
        return html`

              <button class="button ghost" type="button" onClick=${() => patchSettings({ milestones: [...settings.milestones, { id: uid(), date: settings.startDate || todayISO(), label: "Milestone " + (settings.milestones.length + 1) }] })}>

          </div>
        `;
      }

      if (field.type === "media") {
        const normalized = mediaSettings(field);
        const settings = { ...normalized, ...(field.settings || {}) };
        const patchSettings = (patch) => onFieldChange({ required: false, settings: { ...(field.settings || {}), ...patch } });

              <input
                class="control"
                id=${fileInputId}

                accept="image/*,video/*,audio/*,.svg,.pdf,.ai,.eps"
                onChange=${async (event) => {
              const file = event.currentTarget.files?.[0];
              if (!file) return;
              patchSettings({
                sourceType: "file",
                dataUrl: await readFileAsDataUrl(file),
                mimeType: file.type || "",
                fileName: file.name || "",
                url: "",
                html: ""
              });
              event.currentTarget.value = "";
            }}
              />
              ${settings.fileName ? html`<div class="media-file-note">${settings.fileName}</div>` : null}
            </div>
          ` : null}

          ${settings.sourceType === "html" ? html`
            <div class="property">
              <label for="mediaHtml">HTML</label>
              <textarea class="textarea" id="mediaHtml" value=${settings.html} placeholder="<div>Embedded content</div>" onInput=${(event) => patchSettings({ html: event.currentTarget.value, url: "", dataUrl: "", fileName: "", mimeType: "" })}></textarea>

              <label for="mediaIframeHeight">HTML height</label>
