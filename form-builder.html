<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Form Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --bg: #f7f5f2;
      --panel: #ffffff;
      --panel-2: #f4f2ef;
      --ink: #1f1f1f;
      --muted: #5f6366;
      --line: #d7d2cb;
      --sidebar: #2f3033;
      --sidebar-2: #383a3d;
      --sidebar-line: #4a4d50;
      --accent: #861f41;
      --accent-2: #ca4f00;
      --accent-soft: #f3e8ed;
      --danger: #861f41;
      --shadow: 0 12px 28px rgba(31, 31, 31, 0.07);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --focus-ring: rgba(134, 31, 65, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Roboto", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 52px minmax(0, 1fr);
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .toolbar-actions,
    .top-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .top-actions {
      justify-content: flex-end;
    }

    .topbar .icon-button {
      background: transparent;
      border-color: transparent;
      color: var(--muted);
    }

    .topbar .icon-button:hover {
      background: var(--panel-2);
      border-color: var(--line);
      color: var(--ink);
    }

    .topbar .button.primary {
      min-width: 86px;
    }

    .current-form-name {
      min-width: 0;
      width: auto;
      min-width: 10ch;
      max-width: min(30vw, 280px);
      field-sizing: content;
      height: 40px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      padding: 0 8px;
      color: var(--ink);
      font-size: 12.5px;
      font-weight: 750;
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .current-form-name:hover,
    .current-form-name:focus {
      background: var(--panel-2);
      border-color: var(--line);
      outline: none;
    }

    .current-form-name:focus {
      background: #ffffff;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(134, 31, 65, 0.12);
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 260px minmax(380px, 1fr) 330px;
      overflow: hidden;
      position: relative;
      transition: grid-template-columns 240ms var(--ease);
    }

    .shell.sidebar-collapsed .workspace {
      grid-template-columns: 56px minmax(380px, 1fr) 330px;
    }

    .sidebar,
    .inspector {
      min-height: 0;
    }

    .sidebar {
      background: var(--sidebar);
      color: #f7f5f2;
      border-right: 1px solid var(--sidebar-line);
      padding: 14px 10px;
      overflow-x: hidden;
      overflow-y: auto;
      transition: padding 240ms var(--ease), border-color 180ms ease;
    }

    .sidebar-inner {
      min-width: 240px;
      transition: opacity 150ms ease, transform 240ms var(--ease);
      will-change: opacity, transform;
    }

    .shell.sidebar-collapsed .sidebar {
      padding-left: 8px;
      padding-right: 8px;
      border-right-color: var(--sidebar-line);
      overflow: hidden;
    }

    .shell.sidebar-collapsed .sidebar-inner {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-14px);
    }

    .icon-button.sidebar-expand-button {
      position: absolute;
      top: 14px;
      left: 8px;
      z-index: 16;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-10px) scale(0.96);
      box-shadow: 0 8px 18px rgba(31, 31, 31, 0.12);
      background: var(--sidebar-2);
      border-color: var(--sidebar-line);
      color: #f4f2ef;
      transition: opacity 150ms ease, transform 240ms var(--ease), background 160ms ease, border-color 160ms ease;
    }

    .icon-button.sidebar-expand-button:hover {
      background: #424548;
      border-color: #666a6d;
      color: #ffffff;
    }

    .shell.sidebar-collapsed .sidebar-expand-button {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0) scale(1);
    }

    .shell.sidebar-collapsed .canvas-shell {
      padding-left: 20px;
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
      padding: 0 2px;
    }

    .sidebar-title {
      font-size: 11.5px;
      color: #d7d2cb;
      letter-spacing: 0;
      font-weight: 700;
    }

    .palette {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .palette-block {
      cursor: grab;
      user-select: none;
      min-height: 84px;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid var(--sidebar-line);
      background: var(--sidebar-2);
      color: #ffffff;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 8px;
      text-align: center;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .palette-block:hover {
      border-color: #666a6d;
      background: #424548;
      transform: translateY(-1px);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .palette-block:focus-visible {
      border-color: #777c80;
      background: #424548;
      outline: 2px solid rgba(255, 255, 255, 0.34);
      outline-offset: 2px;
    }

    .palette-block:active {
      cursor: grabbing;
      transform: translateY(0);
    }

    .palette-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      border: 1px solid #4a4d50;
      background: #303235;
      color: #ffffff;
      font-size: 16px;
    }

    .palette-label {
      font-size: 11.5px;
      line-height: 1.35;
      font-weight: 700;
      color: #f4f2ef;
    }

    .canvas-shell {
      min-height: 0;
      overflow: auto;
      padding: 20px;
      background: var(--bg);
      transition: padding 240ms var(--ease);
    }

    .form-page {
      max-width: 840px;
      margin: 0 auto 40px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 8px;
      overflow: hidden;
    }

    .form-meta {
      padding: 24px 28px 22px;
      border-bottom: 1px solid var(--line);
      background: #ffffff;
      position: relative;
      transition: background 160ms ease, box-shadow 160ms ease;
    }

    .form-meta::after {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid transparent;
      border-radius: 8px;
      pointer-events: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .form-meta:hover::after {
      border-color: rgba(31, 31, 31, 0.08);
    }

    .form-meta.selected {
      background: #fffdfb;
      box-shadow: inset 0 1px 0 rgba(134, 31, 65, 0.04);
    }

    .form-meta.selected::after {
      border-color: rgba(134, 31, 65, 0.28);
      box-shadow: 0 0 0 3px rgba(134, 31, 65, 0.07);
    }

    .title-input,
    .description-input {
      width: calc(100% + 24px);
      border: 1px solid transparent;
      background: transparent;
      color: var(--ink);
      border-radius: 8px;
      padding: 8px 12px;
      margin: 0 -12px;
    }

    .title-input {
      font-size: 26px;
      line-height: 1.2;
      font-weight: 750;
    }

    .description-input {
      min-height: 68px;
      color: var(--muted);
      line-height: 1.5;
      resize: vertical;
      font-size: 14px;
    }

    .title-input:hover,
    .description-input:hover,
    .title-input:focus,
    .description-input:focus,
    .control:hover,
    .control:focus,
    .textarea:hover,
    .textarea:focus {
      border-color: var(--line);
      outline: none;
      background: #ffffff;
    }

    .title-input:focus,
    .description-input:focus,
    .control:focus,
    .textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(134, 31, 65, 0.12);
    }

    .fields-list {
      display: grid;
      gap: 10px;
      padding: 16px;
      min-height: 280px;
      align-content: start;
      grid-auto-rows: max-content;
    }

    .fields-list.drag-over {
      outline: 2px dashed rgba(134, 31, 65, 0.35);
      outline-offset: -10px;
      background: rgba(134, 31, 65, 0.035);
    }

    .field-card {
      border: 1px solid var(--line);
      background: #ffffff;
      border-radius: 8px;
      padding: 0;
      box-shadow: 0 8px 20px rgba(31, 31, 31, 0.045);
      cursor: pointer;
      position: relative;
      align-self: start;
      transition: border-color 150ms ease, box-shadow 150ms ease, transform 160ms var(--ease), opacity 140ms ease;
      overflow: hidden;
      animation: card-in 160ms var(--ease) both;
    }

    .field-card:hover {
      transform: translateY(-1px);
      border-color: #cbc5b6;
      box-shadow: 0 10px 22px rgba(31, 31, 31, 0.06);
    }

    .field-card.selected {
      border-color: rgba(134, 31, 65, 0.36);
      background: linear-gradient(180deg, rgba(134, 31, 65, 0.035), #ffffff 92px);
      box-shadow: 0 12px 26px rgba(31, 31, 31, 0.08), 0 0 0 3px rgba(134, 31, 65, 0.07);
    }

    .field-card.removing {
      animation: card-out 130ms var(--ease) forwards;
      pointer-events: none;
    }

    .field-card-ghost {
      opacity: 0.38;
      box-shadow: none;
    }

    .field-card-head {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 10px 10px 0;
    }

    .drag-handle {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: transparent;
      cursor: grab;
    }

    .field-type {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      width: fit-content;
      min-height: 40px;
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 750;
      letter-spacing: 0;
      background: transparent;
      border: 0;
      padding: 7px 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease;
    }

    .field-card.selected .field-type {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .field-card.selected .drag-handle {
      color: var(--accent);
    }

    .field-tools {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .field-card-body {
      padding: 8px 16px 16px 58px;
      border-radius: 0 0 8px 8px;
    }

    .field-type:focus-visible,
    .field-card-body:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .field-label {
      margin: 0 0 5px;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 700;
    }

    .required-mark {
      color: var(--accent-2);
      margin-left: 3px;
    }

    .field-help {
      margin: 0 0 10px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 13px;
    }

    .headline-preview {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .headline-preview-title {
      margin: 0;
      color: var(--ink);
      font-size: 26px;
      line-height: 1.2;
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    .headline-preview-description {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .headline-preview-placeholder {
      color: #8b8f92;
    }

    .preview-line,
    .preview-box {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 8px;
      color: #747b73;
    }

    .preview-line {
      height: 38px;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }

    .preview-box {
      min-height: 88px;
      padding: 9px 10px;
    }

    .choice-preview {
      display: grid;
      gap: 7px;
    }

    .choice-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }

    .choice-dot,
    .choice-square {
      width: 16px;
      height: 16px;
      border: 1.5px solid #8b938d;
      flex: 0 0 auto;
    }

    .choice-dot {
      border-radius: 999px;
    }

    .choice-square {
      border-radius: 4px;
    }

    .pill-preview,
    .meter-preview,
    .star-preview,
    .scale-preview {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .pill-preview span {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 8px;
      padding: 7px 9px;
      font-size: 13px;
      color: var(--muted);
    }

    .scale-track {
      height: 8px;
      min-width: 220px;
      flex: 1 1 220px;
      border-radius: 999px;
      background: #b8b2aa;
    }

    .radar-preview {
      display: grid;
      grid-template-columns: 130px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      padding: 10px;
    }

    .radar-preview svg {
      width: 130px;
      height: 130px;
      display: block;
    }

    .radar-grid polygon,
    .radar-grid line {
      fill: none;
      stroke: #c9c4bd;
      stroke-width: 1;
    }

    .radar-fill {
      fill: rgba(134, 31, 65, 0.12);
      stroke: var(--accent);
      stroke-width: 2;
    }

    .radar-point-line {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-dasharray: 4 5;
    }

    .radar-point-node {
      fill: #ffffff;
      stroke: var(--accent);
      stroke-width: 2.4;
    }

    .radar-axis-list {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .radar-axis-list span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12.5px;
    }

    .media-preview {
      display: grid;
      gap: 8px;
      min-width: 0;
      color: var(--muted);
    }

    .media-content-wrap {
      display: flex;
      width: 100%;
      min-width: 0;
    }

    .media-visual {
      display: block;
      max-width: 100%;
      border: 0;
      border-radius: 8px;
      background: transparent;
      object-fit: contain;
    }

    .media-preview img.media-visual,
    .media-preview video.media-visual,
    .media-preview object.media-visual {
      width: 100%;
    }

    .media-preview audio.media-visual {
      width: 100%;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .media-embed {
      width: 100%;
      min-height: 180px;
      border: 0;
      border-radius: 8px;
      background: transparent;
    }

    .media-placeholder {
      min-height: 78px;
      display: grid;
      place-items: center;
      border: 1px dashed #b8b2aa;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
      color: var(--muted);
      user-select: none;
    }

    .media-caption {
      margin: 0;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .media-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      overflow-wrap: anywhere;
    }

    .media-file-note {
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .empty-state {
      min-height: 260px;
      display: grid;
      place-items: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #ffffff;
      user-select: none;
    }

    .inspector {
      border-left: 1px solid var(--line);
      background: #f4f2ef;
      padding: 16px;
      overflow: auto;
    }

    .panel-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 800;
      margin: 0 0 14px;
    }

    .property-stack {
      display: grid;
      gap: 12px;
    }

    .property {
      display: grid;
      gap: 6px;
    }

    .property label,
    .mini-label {
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 750;
      letter-spacing: 0;
    }

    .control,
    .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      padding: 9px 10px;
      min-height: 40px;
      font-size: 14px;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .textarea {
      min-height: 80px;
      resize: vertical;
      line-height: 1.45;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--ink);
      font-size: 13.5px;
    }

    .toggle-row input {
      width: 17px;
      height: 17px;
      accent-color: var(--accent);
    }

    .option-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 5px;
      align-items: center;
    }

    .radar-axis-row {
      grid-template-columns: minmax(0, 1fr) 82px auto;
    }

    .radar-axis-only-row {
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .radar-mode-note {
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .button,
    .icon-button {
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--line);
      color: var(--ink);
      background: #ffffff;
      min-height: 40px;
      padding: 0 10px;
      cursor: pointer;
      text-decoration: none;
      font-size: 12px;
      font-weight: 750;
      line-height: 1;
      transition: background 160ms ease, border-color 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .button:hover,
    .icon-button:hover {
      background: var(--panel-2);
      border-color: #cbc5b6;
    }

    .button:focus-visible,
    .icon-button:focus-visible,
    .control:focus-visible,
    .textarea:focus-visible,
    .title-input:focus-visible,
    .description-input:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }

    .button:active,
    .icon-button:active {
      transform: translateY(1px);
    }

    .button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #ffffff;
    }

    .button.primary:hover {
      background: #6f1936;
      border-color: #6f1936;
    }

    .button.ghost {
      background: transparent;
    }

    .icon-button {
      width: 40px;
      padding: 0;
      flex: 0 0 auto;
    }

    .icon-button.danger {
      color: var(--danger);
    }

    .sidebar .icon-button {
      border-color: var(--sidebar-line);
      color: #f4f2ef;
      background: #383a3d;
    }

    .sidebar .icon-button:hover {
      background: #424548;
    }

    .custom-radar-icon,
    .custom-lucide-icon {
      width: 1em;
      height: 1em;
      display: block;
      flex: 0 0 1em;
      overflow: hidden;
    }

    .palette-icon .custom-radar-icon,
    .palette-icon .custom-lucide-icon {
      width: 16px;
      height: 16px;
    }

    .field-type .custom-radar-icon,
    .field-type .custom-lucide-icon,
    .panel-title .custom-radar-icon,
    .panel-title .custom-lucide-icon {
      width: 1.08em;
      height: 1.08em;
    }

    .custom-radar-icon polygon,
    .custom-radar-icon line,
    .custom-radar-icon circle {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .custom-radar-icon circle {
      fill: currentColor;
    }

    .custom-lucide-icon path {
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @keyframes card-in {
      from {
        opacity: 0;
        transform: translateY(8px) scale(0.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes card-out {
      to {
        opacity: 0;
        transform: translateY(-6px) scale(0.985);
      }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1100px) {
      .workspace {
        grid-template-columns: 82px minmax(360px, 1fr) 300px;
      }

      .shell.sidebar-collapsed .workspace {
        grid-template-columns: 56px minmax(360px, 1fr) 300px;
      }

      .sidebar {
        padding: 14px 8px;
      }

      .sidebar-inner {
        min-width: 62px;
      }

      .sidebar-head {
        justify-content: center;
      }

      .sidebar-title,
      .palette-label {
        display: none;
      }

      .palette {
        grid-template-columns: 1fr;
      }

      .shell.sidebar-collapsed .canvas-shell {
        padding-left: 20px;
      }
    }

    @media (max-width: 900px) {
      .shell {
        min-height: auto;
      }

      .topbar {
        grid-template-columns: 1fr;
        gap: 7px;
        padding: 10px;
        position: static;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .current-form-name {
        flex: 1 1 180px;
        width: auto;
        max-width: 100%;
      }

      .workspace,
      .shell.sidebar-collapsed .workspace {
        grid-template-columns: 1fr;
        overflow: visible;
      }

      .sidebar,
      .inspector,
      .canvas-shell {
        overflow: visible;
      }

      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--sidebar-line);
        display: grid;
        grid-template-rows: 1fr;
        overflow: hidden;
        transition: grid-template-rows 260ms var(--ease), padding 240ms var(--ease), border-color 180ms ease;
      }

      .sidebar-inner {
        min-width: 0;
        overflow: hidden;
      }

      .shell.sidebar-collapsed .sidebar {
        grid-template-rows: 0fr;
        padding-top: 0;
        padding-bottom: 0;
        border-bottom-color: transparent;
        border-right-color: transparent;
        overflow: hidden;
      }

      .palette,
      .shell.sidebar-collapsed .palette {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .palette-label,
      .sidebar-title {
        display: block;
      }

      .canvas-shell {
        padding: 12px;
      }

      .shell.sidebar-collapsed .canvas-shell {
        padding: 60px 12px 12px;
      }

      .inspector {
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script type="module">
    import { h, render } from "https://esm.sh/preact@10.23.1";
    import { useEffect, useMemo, useRef, useState } from "https://esm.sh/preact@10.23.1/hooks";
    import htm from "https://esm.sh/htm@3.1.1";
    import Sortable from "https://esm.sh/sortablejs@1.15.2";

    const html = htm.bind(h);
    const STORAGE_KEY = "formal.builder.schema";
    const RADAR_MIN_VALUE = 1;
    const DEFAULT_RADAR_AXES = ["formal", "reserved", "vibrant", "casual"];
    const DEFAULT_RADAR_MAX = 5;
    const DEFAULT_RADAR_VALUES = [3, 3, 3, 3];
    const DEFAULT_RADAR_POINT = { angle: 0, value: 3 };

    const fieldTypes = [
      { type: "headline", name: "Headline", icon: "lucide-heading", defaults: { label: "Untitled form", description: "", settings: { headingHorizontalAlignment: "left", headingVerticalAlignment: "top", descriptionHorizontalAlignment: "left", descriptionVerticalAlignment: "top" } } },
      { type: "short_answer", name: "Short answer", icon: "fa-solid fa-align-left", defaults: { label: "Short answer", description: "", required: false, placeholder: "Type a short answer" } },
      { type: "long_answer", name: "Long answer", icon: "fa-solid fa-align-justify", defaults: { label: "Long answer", description: "", required: false, placeholder: "Type a longer response" } },
      { type: "multiple_choice", name: "Multiple choice", icon: "fa-solid fa-list-ul", defaults: { label: "Multiple choice", description: "", required: false, options: ["Option 1", "Option 2", "Option 3"] } },
      { type: "checkbox", name: "Checkbox", icon: "fa-regular fa-square-check", defaults: { label: "Checkbox", description: "", required: false, options: ["Option 1", "Option 2"] } },
      { type: "email", name: "Email", icon: "fa-regular fa-envelope", defaults: { label: "Email", description: "", required: false, placeholder: "name@example.com" } },
      { type: "number", name: "Number", icon: "fa-solid fa-hashtag", defaults: { label: "Number", description: "", required: false, placeholder: "0" } },
      { type: "poll", name: "Poll", icon: "fa-solid fa-chart-simple", defaults: { label: "Poll", description: "", required: false, options: ["Yes", "No", "Maybe"] } },
      { type: "mood_meter", name: "Mood meter", icon: "fa-regular fa-face-smile", defaults: { label: "Mood meter", description: "", required: false, settings: { minLabel: "Low", maxLabel: "High" } } },
      { type: "linear_scale", name: "Linear scale", icon: "fa-solid fa-sliders", defaults: { label: "Linear scale", description: "", required: false, settings: { min: 1, max: 10, minLabel: "Low", maxLabel: "High" } } },
      { type: "star_rating", name: "Star rating", icon: "fa-regular fa-star", defaults: { label: "Star rating", description: "", required: false, settings: { max: 5 } } },
      { type: "radar", name: "Radar", icon: "radar-graph", defaults: { label: "Radar", description: "", required: false, settings: { mode: "shape", max: DEFAULT_RADAR_MAX, axes: DEFAULT_RADAR_AXES, defaultValues: DEFAULT_RADAR_VALUES, defaultPoint: DEFAULT_RADAR_POINT } } },
      { type: "media_upload", name: "Media upload", icon: "lucide-upload", defaults: { label: "Media upload", description: "", required: false, settings: { accept: "image/*,video/*,audio/*,.svg,.pdf" } } },
      { type: "media", name: "Media", icon: "fa-regular fa-file-video", defaults: { label: "Media", description: "", required: false, settings: { sourceType: "url", url: "", dataUrl: "", mimeType: "", fileName: "", alt: "", caption: "", html: "", iframeHeight: 260, horizontalAlignment: "center", verticalAlignment: "center", scale: 100, maxWidth: "", maxHeight: 360, objectFit: "contain", outline: true } } },
      { type: "link", name: "Link", icon: "fa-solid fa-link", defaults: { label: "Link", description: "", required: false, placeholder: "https://example.com" } }
    ];

    function uid() {
      return "field_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function typeMeta(type) {
      return fieldTypes.find((item) => item.type === type) || fieldTypes[0];
    }

    function fieldFromType(type) {
      const meta = typeMeta(type);
      return { id: uid(), type: meta.type, ...clone(meta.defaults) };
    }

    function defaultSchema() {
      return {
        version: 4,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        fields: [fieldFromType("headline")]
      };
    }

    function sanitizeId(value) {
      const clean = String(value || "").replace(/[^a-zA-Z0-9_-]/g, "_");
      return clean || uid();
    }

    function uniqueId(value, seen) {
      const base = sanitizeId(value);
      let next = base;
      let count = 2;
      while (seen.has(next)) {
        next = base + "_" + count;
        count += 1;
      }
      seen.add(next);
      return next;
    }

    function normalizeRadarAxes(axes) {
      const source = Array.isArray(axes) ? axes : DEFAULT_RADAR_AXES;
      const normalized = source.map((axis) => String(axis || "").trim()).filter(Boolean);
      return normalized.length ? normalized : DEFAULT_RADAR_AXES;
    }

    function normalizeRadarMode(mode) {
      return mode === "point" ? "point" : "shape";
    }

    function normalizeRadarMax(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return DEFAULT_RADAR_MAX;
      return Math.max(RADAR_MIN_VALUE + 1, Math.round(number));
    }

    function clampRadarValue(value, max) {
      const number = Number(value);
      if (!Number.isFinite(number)) return null;
      return Math.max(RADAR_MIN_VALUE, Math.min(max, Math.round(number)));
    }

    function normalizeRadarValues(values, axes, max) {
      const midpoint = Math.round(RADAR_MIN_VALUE + (max - RADAR_MIN_VALUE) / 2);
      const source = Array.isArray(values) ? values : [];
      return axes.map((_, index) => clampRadarValue(source[index], max) ?? midpoint);
    }

    function normalizeRadarAngle(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return DEFAULT_RADAR_POINT.angle;
      const wrapped = ((number % 360) + 360) % 360;
      return Math.round(wrapped * 100) / 100;
    }

    function clampRadarPointValue(value, max) {
      const number = Number(value);
      if (!Number.isFinite(number)) return null;
      return Math.round(Math.max(RADAR_MIN_VALUE, Math.min(max, number)) * 100) / 100;
    }

    function normalizeRadarPoint(point, max) {
      const source = point && typeof point === "object" && !Array.isArray(point) ? point : DEFAULT_RADAR_POINT;
      return {
        angle: normalizeRadarAngle(source.angle),
        value: clampRadarPointValue(source.value, max) ?? clampRadarPointValue(DEFAULT_RADAR_POINT.value, max) ?? RADAR_MIN_VALUE
      };
    }

    function fieldMeta(field) {
      return typeMeta(field?.type);
    }

    function normalizeField(raw) {
      const meta = typeMeta(raw?.type);
      const base = { id: uid(), type: meta.type, ...clone(meta.defaults) };
      const next = { ...base, ...raw };
      next.id = sanitizeId(next.id || uid());
      next.type = meta.type;
      next.label = Object.prototype.hasOwnProperty.call(raw || {}, "label") ? String(raw.label ?? "") : String(meta.defaults.label || meta.name);
      next.description = String(next.description || "");
      next.required = Boolean(next.required);

      if ("placeholder" in base || "placeholder" in next) next.placeholder = String(next.placeholder || "");
      if ("options" in base || Array.isArray(next.options)) {
        next.options = Array.isArray(next.options) && next.options.length ? next.options.map(String) : clone(base.options || ["Option 1"]);
      }

      next.settings = { ...(base.settings || {}), ...(next.settings || {}) };
      if (next.type === "radar") {
        const mode = normalizeRadarMode(next.settings.mode);
        const max = normalizeRadarMax(next.settings.max);
        const axes = normalizeRadarAxes(next.settings.axes);
        next.settings = {
          mode,
          max,
          axes,
          defaultValues: normalizeRadarValues(next.settings.defaultValues, axes, max),
          defaultPoint: normalizeRadarPoint(next.settings.defaultPoint, max)
        };
      }

      if (next.type === "headline") {
        next.required = false;
        next.placeholder = "";
        next.options = [];
        next.settings = headlineSettings(next);
      }

      if (next.type === "media_upload") {
        next.settings = { accept: "image/*,video/*,audio/*,.svg,.pdf", ...next.settings };
      }

      if (next.type === "media") {
        next.required = false;
        next.settings = mediaSettings(next);
      }

      return next;
    }

    function normalizeSchema(input) {
      const next = defaultSchema();
      next.version = 4;
      next.createdAt = input?.createdAt || new Date().toISOString();
      next.updatedAt = input?.updatedAt || new Date().toISOString();
      const seenIds = new Set();
      next.fields = Array.isArray(input?.fields)
        ? input.fields.map(normalizeField).map((field) => {
          field.id = uniqueId(field.id, seenIds);
          return field;
        })
        : [];
      return next;
    }

    function primaryHeadlineField(schema) {
      return schema?.fields?.find((field) => field.type === "headline") || null;
    }

    function formDisplayName(schema) {
      const headline = primaryHeadlineField(schema);
      return String(headline?.label || "").trim() || "Untitled form";
    }

    function formHasContent(schema) {
      return (schema.fields || []).some((field) => {
        if (field.type !== "headline") return true;
        return String(field.label || "").trim() !== "Untitled form" || String(field.description || "").trim();
      });
    }

    function loadInitialSchema() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return normalizeSchema(JSON.parse(saved));
      } catch (error) {
        console.warn(error);
      }
      return defaultSchema();
    }

    function safeFileName(value) {
      return String(value).trim().toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || "form-schema";
    }

    function encodeSchemaToken(schema) {
      const bytes = new TextEncoder().encode(JSON.stringify(schema));
      let binary = "";
      bytes.forEach((byte) => {
        binary += String.fromCharCode(byte);
      });
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    function reorder(list, from, to) {
      const next = [...list];
      const [item] = next.splice(from, 1);
      next.splice(to, 0, item);
      return next;
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function clampMediaNumber(value, fallback, min, max) {
      const number = Number(value);
      if (!Number.isFinite(number)) return fallback;
      return Math.max(min, Math.min(max, number));
    }

    function cleanMediaDimension(value) {
      const text = String(value ?? "").trim();
      if (!text) return "";
      if (/^\d+(?:\.\d+)?(?:px|%|rem|em|vw|vh)$/i.test(text)) return text;
      if (/^\d+(?:\.\d+)?$/.test(text)) return text + "px";
      return "";
    }

    function normalizeHorizontalAlignment(value, allowed = ["left", "center", "right"], fallback = "center") {
      return allowed.includes(value) ? value : fallback;
    }

    function normalizeVerticalAlignment(value) {
      return ["top", "center", "bottom"].includes(value) ? value : "center";
    }

    function horizontalFlexValue(value) {
      if (value === "left") return "flex-start";
      if (value === "right") return "flex-end";
      return "center";
    }

    function verticalFlexValue(value) {
      if (value === "top") return "flex-start";
      if (value === "bottom") return "flex-end";
      return "center";
    }

    function textAlignValue(value) {
      if (value === "left" || value === "right") return value;
      return "center";
    }

    function headlineSettings(field) {
      const settings = field?.settings || {};
      return {
        headingHorizontalAlignment: normalizeHorizontalAlignment(settings.headingHorizontalAlignment, ["left", "center", "right"], "left"),
        headingVerticalAlignment: normalizeVerticalAlignment(settings.headingVerticalAlignment || "top"),
        descriptionHorizontalAlignment: normalizeHorizontalAlignment(settings.descriptionHorizontalAlignment, ["left", "center", "right"], "left"),
        descriptionVerticalAlignment: normalizeVerticalAlignment(settings.descriptionVerticalAlignment || "top")
      };
    }

    function mediaSettings(field) {
      const settings = field?.settings || {};
      const height = clampMediaNumber(settings.iframeHeight, 260, 120, 1200);
      const horizontalAlignment = normalizeHorizontalAlignment(settings.horizontalAlignment, ["left", "center", "right", "stretch"]);
      const verticalAlignment = normalizeVerticalAlignment(settings.verticalAlignment);
      const fits = new Set(["contain", "cover", "fill", "scale-down"]);
      const objectFit = fits.has(settings.objectFit) ? settings.objectFit : "contain";
      return {
        sourceType: settings.sourceType || "url",
        url: String(settings.url || ""),
        dataUrl: String(settings.dataUrl || ""),
        mimeType: String(settings.mimeType || ""),
        fileName: String(settings.fileName || ""),
        alt: String(settings.alt || ""),
        caption: String(settings.caption || ""),
        html: String(settings.html || ""),
        iframeHeight: height,
        horizontalAlignment,
        verticalAlignment,
        scale: clampMediaNumber(settings.scale, 100, 10, 100),
        maxWidth: cleanMediaDimension(settings.maxWidth),
        maxHeight: clampMediaNumber(settings.maxHeight, 360, 80, 1600),
        objectFit,
        outline: settings.outline !== false
      };
    }

    function mediaSource(settings) {
      return settings.sourceType === "file" ? settings.dataUrl : settings.url;
    }

    function mediaKind(settings) {
      if (settings.sourceType === "html") return "html";
      const source = mediaSource(settings).toLowerCase().split(/[?#]/)[0];
      const mime = settings.mimeType.toLowerCase();
      if (mime.startsWith("image/") || source.startsWith("data:image/") || /\.(apng|avif|gif|jpe?g|png|svg|webp)$/i.test(source)) return "image";
      if (mime.startsWith("video/") || source.startsWith("data:video/") || /\.(mp4|m4v|mov|ogv|webm)$/i.test(source)) return "video";
      if (mime.startsWith("audio/") || source.startsWith("data:audio/") || /\.(aac|flac|m4a|mp3|oga|ogg|wav|webm)$/i.test(source)) return "audio";
      if (mime === "application/pdf" || source.startsWith("data:application/pdf") || /\.pdf$/i.test(source)) return "document";
      return "unknown";
    }

    function objectPositionX(value) {
      if (value === "left") return "left";
      if (value === "right") return "right";
      return "center";
    }

    function objectPositionY(value) {
      if (value === "top") return "top";
      if (value === "bottom") return "bottom";
      return "center";
    }

    function headlineTextStyle(settings, horizontalKey, verticalKey) {
      const horizontal = settings[horizontalKey];
      const vertical = settings[verticalKey];
      return `display: flex; justify-content: ${horizontalFlexValue(horizontal)}; align-items: ${verticalFlexValue(vertical)}; text-align: ${textAlignValue(horizontal)};`;
    }

    function mediaAlignmentStyle(settings) {
      const horizontal = settings.horizontalAlignment;
      const vertical = settings.verticalAlignment;
      const justify = horizontal === "stretch" ? "stretch" : horizontalFlexValue(horizontal);
      return `justify-content: ${justify}; align-items: ${verticalFlexValue(vertical)}; text-align: ${textAlignValue(horizontal)};`;
    }

    function mediaVisualStyle(settings, extra = "") {
      const width = settings.horizontalAlignment === "stretch" ? "100%" : `${settings.scale}%`;
      const maxWidth = settings.maxWidth ? `max-width: ${settings.maxWidth};` : "";
      const maxHeight = `max-height: ${settings.maxHeight}px;`;
      const objectPosition = `object-position: ${objectPositionX(settings.horizontalAlignment)} ${objectPositionY(settings.verticalAlignment)};`;
      return `width: ${width}; ${maxWidth} ${maxHeight} object-fit: ${settings.objectFit}; ${objectPosition} ${extra}`.trim();
    }

    function MediaPreview({ field }) {
      const settings = mediaSettings(field);
      const source = mediaSource(settings);
      const kind = mediaKind(settings);
      const title = settings.alt || settings.fileName || field.label || "Media";
      const wrapStyle = mediaAlignmentStyle(settings);
      const visualStyle = mediaVisualStyle(settings);

      if (kind === "html") {
        return html`
          <div class="media-preview">
            <div class="media-content-wrap" style=${wrapStyle}>
              ${settings.html
            ? html`<iframe class="media-embed media-visual" title=${title} srcdoc=${settings.html} sandbox="allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox" style=${mediaVisualStyle(settings, `height: ${settings.iframeHeight}px; max-height: none;`)}></iframe>`
            : html`<div class="media-placeholder" style=${settings.horizontalAlignment === "stretch" ? "width: 100%;" : ""}>Embedded HTML</div>`}
            </div>
            ${settings.caption ? html`<p class="media-caption">${settings.caption}</p>` : null}
          </div>
        `;
      }

      if (!source) {
        return html`<div class="media-preview"><div class="media-placeholder">No media selected</div></div>`;
      }

      return html`
        <div class="media-preview">
          <div class="media-content-wrap" style=${wrapStyle}>
            ${kind === "image" ? html`<img class="media-visual" src=${source} alt=${settings.alt || ""} style=${visualStyle} />` : null}
            ${kind === "video" ? html`<video class="media-visual" src=${source} controls playsinline title=${title} style=${visualStyle}></video>` : null}
            ${kind === "audio" ? html`<audio class="media-visual" src=${source} controls title=${title} style=${settings.horizontalAlignment === "stretch" ? "width: 100%;" : `width: ${settings.scale}%; ${settings.maxWidth ? `max-width: ${settings.maxWidth};` : ""}`}></audio>` : null}
            ${kind === "document" ? html`<object class="media-visual" data=${source} type="application/pdf" title=${title} style=${mediaVisualStyle(settings, `height: ${settings.iframeHeight}px; max-height: none;`)}><a class="media-link" href=${source} target="_blank" rel="noreferrer"><i class="fa-solid fa-arrow-up-right-from-square"></i><span>${settings.fileName || source}</span></a></object>` : null}
            ${kind === "unknown" ? html`<a class="media-link" href=${source} target="_blank" rel="noreferrer"><i class="fa-solid fa-arrow-up-right-from-square"></i><span>${settings.fileName || source}</span></a>` : null}
          </div>
          ${settings.caption ? html`<p class="media-caption">${settings.caption}</p>` : null}
        </div>
      `;
    }

    function RadarGraphIcon() {
      return html`
    <svg
      class="custom-radar-icon"
      viewBox="72 72 880 880"
      aria-hidden="true"
    >
      <path
        fill="currentColor"
        d="M926.8 397.1l-396-288a31.81 31.81 0 0 0-37.6 0l-396 288a31.99 31.99 0 0 0-11.6 35.8l151.3 466a32 32 0 0 0 30.4 22.1h489.5c13.9 0 26.1-8.9 30.4-22.1l151.3-466c4.2-13.2-.5-27.6-11.7-35.8zM838.6 417l-98.5 32-200-144.7V199.9L838.6 417zM466 567.2l-89.1 122.3-55.2-169.2L466 567.2zm-116.3-96.8L484 373.3v140.8l-134.3-43.7zM512 599.2l93.9 128.9H418.1L512 599.2zm28.1-225.9l134.2 97.1L540.1 514V373.3zM558 567.2l144.3-46.9-55.2 169.2L558 567.2zm-74-367.3v104.4L283.9 449l-98.5-32L484 199.9zM169.3 470.8l86.5 28.1 80.4 246.4-53.8 73.9-113.1-348.4zM327.1 853l50.3-69h269.3l50.3 69H327.1zm414.5-33.8l-53.8-73.9 80.4-246.4 86.5-28.1-113.1 348.4z"
      />
    </svg>
  `;
    }

    function RadarPointIcon() {
      return html`
        <svg class="custom-radar-icon" viewBox="0 0 24 24" aria-hidden="true">
          <polygon points="12 3.5 20 9.5 17 20 7 20 4 9.5"></polygon>
          <line x1="12" y1="3.5" x2="12" y2="12"></line>
          <line x1="20" y1="9.5" x2="12" y2="12"></line>
          <line x1="17" y1="20" x2="12" y2="12"></line>
          <line x1="7" y1="20" x2="12" y2="12"></line>
          <line x1="4" y1="9.5" x2="12" y2="12"></line>
          <circle cx="15.5" cy="10.8" r="2.15"></circle>
        </svg>
      `;
    }

    function HeadingIcon() {
      return html`
        <svg class="custom-lucide-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 12h12"></path>
          <path d="M6 20V4"></path>
          <path d="M18 20V4"></path>
        </svg>
      `;
    }

    function UploadIcon() {
      return html`
        <svg class="custom-lucide-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 3v12"></path>
          <path d="m17 8-5-5-5 5"></path>
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        </svg>
      `;
    }

    function Icon({ icon }) {
      if (icon === "radar-graph") return html`<${RadarGraphIcon} />`;
      if (icon === "lucide-heading") return html`<${HeadingIcon} />`;
      if (icon === "lucide-upload") return html`<${UploadIcon} />`;
      return html`<i class=${icon} aria-hidden="true"></i>`;
    }

    function radarPoint(index, count, center, radius) {
      const angle = -Math.PI / 2 + (Math.PI * 2 * index / count);
      return {
        x: Math.round((center + Math.cos(angle) * radius) * 100) / 100,
        y: Math.round((center + Math.sin(angle) * radius) * 100) / 100
      };
    }

    function radarValueScale(value, max) {
      return Math.max(0, Math.min(1, Number(value) / Math.max(1, max)));
    }

    function radarPoints(values, max, center, radius) {
      return values.map((value, index) => {
        const point = radarPoint(index, values.length, center, radius * radarValueScale(value, max));
        return `${point.x},${point.y}`;
      }).join(" ");
    }

    function radarPointFromPolar(angle, value, max, center, radius) {
      const radians = -Math.PI / 2 + (normalizeRadarAngle(angle) * Math.PI / 180);
      const scaled = radarValueScale(value, max);
      return {
        x: Math.round((center + Math.cos(radians) * radius * scaled) * 100) / 100,
        y: Math.round((center + Math.sin(radians) * radius * scaled) * 100) / 100
      };
    }

    function formatRadarNumber(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return "";
      return Number.isInteger(number) ? String(number) : number.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
    }

    function nearestRadarAxis(angle, axes) {
      const labels = normalizeRadarAxes(axes);
      const step = 360 / labels.length;
      const index = Math.round(normalizeRadarAngle(angle) / step) % labels.length;
      return labels[index];
    }

    function radarPointDescription(angle, axes) {
      const labels = normalizeRadarAxes(axes);
      const step = 360 / labels.length;
      const normalized = normalizeRadarAngle(angle);
      const position = normalized / step;
      const lower = Math.floor(position) % labels.length;
      const upper = (lower + 1) % labels.length;
      const blend = position - lower;
      if (blend < 0.06) return labels[lower];
      if (blend > 0.94) return labels[upper];
      return `${labels[lower]} ↔ ${labels[upper]}`;
    }

    function RadarPreview({ field }) {
      const axes = normalizeRadarAxes(field.settings?.axes);
      const mode = normalizeRadarMode(field.settings?.mode);
      const max = normalizeRadarMax(field.settings?.max);
      const center = 65;
      const radius = 44;
      const values = normalizeRadarValues(field.settings?.defaultValues, axes, max);
      const point = normalizeRadarPoint(field.settings?.defaultPoint, max);
      const polygon = radarPoints(values, max, center, radius);
      const pointPosition = radarPointFromPolar(point.angle, point.value, max, center, radius);

      return html`
        <div class="radar-preview">
          <svg viewBox="0 0 130 130" role="img" aria-label=${mode === "point" ? "Radar single-node preview" : "Radar preview"}>
            <g class="radar-grid">
              ${[0.35, 0.7, 1].map((scale) => html`
                <polygon points=${axes.map((_, index) => {
        const gridPoint = radarPoint(index, axes.length, center, radius * scale);
        return `${gridPoint.x},${gridPoint.y}`;
      }).join(" ")} />
              `)}
              ${axes.map((_, index) => {
        const gridPoint = radarPoint(index, axes.length, center, radius);
        return html`<line x1=${center} y1=${center} x2=${gridPoint.x} y2=${gridPoint.y} />`;
      })}
            </g>
            ${mode === "point" ? html`
              <line class="radar-point-line" x1=${center} y1=${center} x2=${pointPosition.x} y2=${pointPosition.y} />
              <circle class="radar-point-node" cx=${pointPosition.x} cy=${pointPosition.y} r="5" />
            ` : html`<polygon class="radar-fill" points=${polygon} />`}
          </svg>
          <div class="radar-axis-list">
            ${mode === "point" ? html`
              <span>Single node</span>
              <span>${radarPointDescription(point.angle, axes)}: ${formatRadarNumber(point.value)}</span>
            ` : axes.map((axis, index) => html`<span key=${`${axis}-${index}`}>${axis}: ${values[index]}</span>`)}
          </div>
        </div>
      `;
    }

    function HeadlinePreview({ field }) {
      const title = String(field.label || "").trim();
      const description = String(field.description || "").trim();
      const settings = headlineSettings(field);
      return html`
        <div class="headline-preview">
          <h1 class=${`headline-preview-title${title ? "" : " headline-preview-placeholder"}`} style=${headlineTextStyle(settings, "headingHorizontalAlignment", "headingVerticalAlignment")}>${title || "Untitled form"}</h1>
          ${description ? html`<p class="headline-preview-description" style=${headlineTextStyle(settings, "descriptionHorizontalAlignment", "descriptionVerticalAlignment")}>${description}</p>` : null}
        </div>
      `;
    }

    function FieldPreview({ field }) {
      const options = field.options || [];
      switch (field.type) {
        case "headline":
          return html`<${HeadlinePreview} field=${field} />`;
        case "short_answer":
        case "email":
        case "number":
        case "link":
          return html`<div class="preview-line">${field.placeholder || ""}</div>`;
        case "long_answer":
          return html`<div class="preview-box">${field.placeholder || ""}</div>`;
        case "multiple_choice":
          return html`<div class="choice-preview">${options.map((option) => html`<div class="choice-row" key=${option}><span class="choice-dot"></span><span>${option}</span></div>`)}</div>`;
        case "checkbox":
          return html`<div class="choice-preview">${options.map((option) => html`<div class="choice-row" key=${option}><span class="choice-square"></span><span>${option}</span></div>`)}</div>`;
        case "poll":
          return html`<div class="pill-preview">${options.map((option) => html`<span key=${option}>${option}</span>`)}</div>`;
        case "mood_meter":
          return html`
            <div class="meter-preview">
              <span>${field.settings?.minLabel || "Low"}</span>
              <i class="fa-regular fa-face-angry"></i>
              <i class="fa-regular fa-face-frown"></i>
              <i class="fa-regular fa-face-meh"></i>
              <i class="fa-regular fa-face-smile"></i>
              <i class="fa-regular fa-face-laugh"></i>
              <span>${field.settings?.maxLabel || "High"}</span>
            </div>
          `;
        case "linear_scale":
          return html`
            <div class="scale-preview">
              <span>${field.settings?.minLabel || "Low"}</span>
              <span class="scale-track"></span>
              <span>${field.settings?.maxLabel || "High"}</span>
            </div>
          `;
        case "star_rating":
          return html`<div class="star-preview">${Array.from({ length: Number(field.settings?.max) || 5 }, (_, index) => html`<i class="fa-regular fa-star" key=${index}></i>`)}</div>`;
        case "radar":
          return html`<${RadarPreview} field=${field} />`;
        case "media_upload":
          return html`<div class="preview-line">Image, video, or audio file</div>`;
        case "media":
          return html`<${MediaPreview} field=${field} />`;
        default:
          return html`<div class="preview-line"></div>`;
      }
    }

    function Palette({ onAdd }) {
      return html`
        <div class="palette">
          ${fieldTypes.map((item) => html`
            <button
              class="palette-block"
              type="button"
              draggable=${true}
              title=${item.name}
              aria-label=${`Add ${item.name}`}
              key=${item.type}
              onClick=${() => onAdd(item.type)}
              onDragStart=${(event) => {
          event.dataTransfer.setData("text/plain", "new:" + item.type);
          event.dataTransfer.effectAllowed = "copy";
        }}
            >
              <span class="palette-icon"><${Icon} icon=${item.icon} /></span>
              <span class="palette-label">${item.name}</span>
            </button>
          `)}
        </div>
      `;
    }

    function FieldCard({ field, selected, removing, onSelect, onMove, onDuplicate, onDelete }) {
      const meta = fieldMeta(field);
      const visibleLabel = String(field.label ?? "").trim();
      const selectLabel = `Select ${visibleLabel || meta.name} field`;
      function handleCardClick(event) {
        const target = event.target;
        if (target?.closest?.("button, a, input, textarea, select")) return;
        onSelect();
      }

      function handleSelectKey(event) {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        onSelect();
      }

      return html`
        <article class=${`field-card${selected ? " selected" : ""}${removing ? " removing" : ""}`} data-field-id=${field.id} onClick=${handleCardClick}>
          <div class="field-card-head">
            <span class="drag-handle" title="Drag to reorder" aria-hidden="true">
              <i class="fa-solid fa-grip-vertical"></i>
            </span>
            <button class="field-type" type="button" aria-pressed=${selected} aria-label=${selectLabel} onClick=${onSelect}>
              <${Icon} icon=${meta.icon} /><span>${meta.name}</span>
            </button>
            <div class="field-tools">
              <button class="icon-button" type="button" onClick=${() => onMove(-1)} title="Move up" aria-label="Move up"><i class="fa-solid fa-arrow-up"></i></button>
              <button class="icon-button" type="button" onClick=${() => onMove(1)} title="Move down" aria-label="Move down"><i class="fa-solid fa-arrow-down"></i></button>
              <button class="icon-button" type="button" onClick=${onDuplicate} title="Duplicate" aria-label="Duplicate"><i class="fa-regular fa-copy"></i></button>
              <button class="icon-button danger" type="button" onClick=${onDelete} title="Delete" aria-label="Delete"><i class="fa-regular fa-trash-can"></i></button>
            </div>
          </div>
          <div class="field-card-body" role="button" tabIndex="0" aria-pressed=${selected} aria-label=${selectLabel} onKeyDown=${handleSelectKey}>
            ${field.type === "headline" ? html`
              <${FieldPreview} field=${field} />
            ` : html`
              ${visibleLabel ? html`<div class="field-label">${visibleLabel}${field.required ? html`<span class="required-mark">*</span>` : null}</div>` : null}
              ${field.description ? html`<p class="field-help">${field.description}</p>` : null}
              <${FieldPreview} field=${field} />
            `}
          </div>
        </article>
      `;
    }

    function Inspector({ schema, selectedField, onSchemaChange, onFieldChange }) {
      if (!selectedField) {
        return html`
          <h2 class="panel-title"><i class="fa-solid fa-sliders"></i><span>Form Settings</span></h2>
          <div class="property-stack">
            <div class="radar-mode-note">Select a block to edit its settings. The form headline is now a normal reorderable block.</div>
          </div>
        `;
      }

      const meta = fieldMeta(selectedField);
      return html`
        <h2 class="panel-title"><${Icon} icon=${meta.icon} /><span>${meta.name}</span></h2>
        <div class="property-stack">
          <div class="property">
            <label for="fieldLabel">${selectedField.type === "headline" ? "Heading" : "Label"}</label>
            <input class="control" id="fieldLabel" value=${selectedField.label} onInput=${(event) => onFieldChange({ label: event.currentTarget.value })} />
          </div>
          <div class="property">
            <label for="fieldDescription">Description</label>
            <textarea class="textarea" id="fieldDescription" value=${selectedField.description} onInput=${(event) => onFieldChange({ description: event.currentTarget.value })}></textarea>
          </div>
          <${PlaceholderSettings} field=${selectedField} onFieldChange=${onFieldChange} />
          <${OptionSettings} field=${selectedField} onFieldChange=${onFieldChange} />
          <${TypeSettings} field=${selectedField} onFieldChange=${onFieldChange} />
          ${!["headline", "media"].includes(selectedField.type) ? html`
            <label class="toggle-row">
              <input type="checkbox" checked=${selectedField.required} onChange=${(event) => onFieldChange({ required: event.currentTarget.checked })} />
              <span>Required</span>
            </label>
          ` : null}
        </div>
      `;
    }

    function PlaceholderSettings({ field, onFieldChange }) {
      if (!["short_answer", "long_answer", "email", "number", "link"].includes(field.type)) return null;
      return html`
        <div class="property">
          <label for="fieldPlaceholder">Placeholder</label>
          <input class="control" id="fieldPlaceholder" value=${field.placeholder || ""} onInput=${(event) => onFieldChange({ placeholder: event.currentTarget.value })} />
        </div>
      `;
    }

    function OptionSettings({ field, onFieldChange }) {
      if (!["multiple_choice", "checkbox", "poll"].includes(field.type)) return null;
      const options = field.options || [];
      return html`
        <div class="property">
          <div class="mini-label">Options</div>
          ${options.map((option, index) => html`
            <div class="option-row" key=${index}>
              <input
                class="control"
                value=${option}
                aria-label=${`Option ${index + 1}`}
                onInput=${(event) => {
          const next = [...options];
          next[index] = event.currentTarget.value;
          onFieldChange({ options: next });
        }}
              />
              <button
                class="icon-button danger"
                type="button"
                title="Remove option"
                aria-label="Remove option"
                onClick=${() => onFieldChange({ options: options.filter((_, itemIndex) => itemIndex !== index).length ? options.filter((_, itemIndex) => itemIndex !== index) : ["Option 1"] })}
              >
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>
          `)}
          <button class="button ghost" type="button" onClick=${() => onFieldChange({ options: [...options, "Option " + (options.length + 1)] })}>
            <i class="fa-solid fa-plus"></i><span>Add option</span>
          </button>
        </div>
      `;
    }

    function TypeSettings({ field, onFieldChange }) {
      if (field.type === "headline") {
        const settings = headlineSettings(field);
        const patchSettings = (patch) => onFieldChange({ required: false, settings: { ...settings, ...patch } });
        return html`
          <div class="settings-grid">
            <div class="property">
              <label for="headingHorizontalAlignment">Heading horizontal</label>
              <select class="control" id="headingHorizontalAlignment" value=${settings.headingHorizontalAlignment} onChange=${(event) => patchSettings({ headingHorizontalAlignment: event.currentTarget.value })}>
                <option value="left">Left</option>
                <option value="center">Center</option>
                <option value="right">Right</option>
              </select>
            </div>
            <div class="property">
              <label for="headingVerticalAlignment">Heading vertical</label>
              <select class="control" id="headingVerticalAlignment" value=${settings.headingVerticalAlignment} onChange=${(event) => patchSettings({ headingVerticalAlignment: event.currentTarget.value })}>
                <option value="top">Top</option>
                <option value="center">Center</option>
                <option value="bottom">Bottom</option>
              </select>
            </div>
            <div class="property">
              <label for="descriptionHorizontalAlignment">Description horizontal</label>
              <select class="control" id="descriptionHorizontalAlignment" value=${settings.descriptionHorizontalAlignment} onChange=${(event) => patchSettings({ descriptionHorizontalAlignment: event.currentTarget.value })}>
                <option value="left">Left</option>
                <option value="center">Center</option>
                <option value="right">Right</option>
              </select>
            </div>
            <div class="property">
              <label for="descriptionVerticalAlignment">Description vertical</label>
              <select class="control" id="descriptionVerticalAlignment" value=${settings.descriptionVerticalAlignment} onChange=${(event) => patchSettings({ descriptionVerticalAlignment: event.currentTarget.value })}>
                <option value="top">Top</option>
                <option value="center">Center</option>
                <option value="bottom">Bottom</option>
              </select>
            </div>
          </div>
        `;
      }

      if (field.type === "mood_meter") {
        return html`
          <div class="settings-grid">
            <div class="property">
              <label for="minLabel">Low label</label>
              <input class="control" id="minLabel" value=${field.settings?.minLabel || ""} onInput=${(event) => onFieldChange({ settings: { ...field.settings, minLabel: event.currentTarget.value } })} />
            </div>
            <div class="property">
              <label for="maxLabel">High label</label>
              <input class="control" id="maxLabel" value=${field.settings?.maxLabel || ""} onInput=${(event) => onFieldChange({ settings: { ...field.settings, maxLabel: event.currentTarget.value } })} />
            </div>
          </div>
        `;
      }

      if (field.type === "linear_scale") {
        return html`
          <div class="settings-grid">
            <div class="property">
              <label for="scaleMin">Minimum</label>
              <input class="control" id="scaleMin" type="number" value=${field.settings?.min ?? 1} onInput=${(event) => onFieldChange({ settings: { ...field.settings, min: Number(event.currentTarget.value) } })} />
            </div>
            <div class="property">
              <label for="scaleMax">Maximum</label>
              <input class="control" id="scaleMax" type="number" value=${field.settings?.max ?? 10} onInput=${(event) => onFieldChange({ settings: { ...field.settings, max: Number(event.currentTarget.value) } })} />
            </div>
            <div class="property">
              <label for="scaleMinLabel">Low label</label>
              <input class="control" id="scaleMinLabel" value=${field.settings?.minLabel || ""} onInput=${(event) => onFieldChange({ settings: { ...field.settings, minLabel: event.currentTarget.value } })} />
            </div>
            <div class="property">
              <label for="scaleMaxLabel">High label</label>
              <input class="control" id="scaleMaxLabel" value=${field.settings?.maxLabel || ""} onInput=${(event) => onFieldChange({ settings: { ...field.settings, maxLabel: event.currentTarget.value } })} />
            </div>
          </div>
        `;
      }

      if (field.type === "star_rating") {
        return html`
          <div class="property">
            <label for="starMax">Stars</label>
            <input class="control" id="starMax" type="number" min="3" max="10" value=${field.settings?.max || 5} onInput=${(event) => onFieldChange({ settings: { ...field.settings, max: Number(event.currentTarget.value) } })} />
          </div>
        `;
      }

      if (field.type === "media_upload") {
        const settings = { accept: "image/*,video/*,audio/*,.svg,.pdf", ...(field.settings || {}) };
        return html`
          <div class="property">
            <label for="mediaUploadAccept">Accepted types</label>
            <input class="control" id="mediaUploadAccept" value=${settings.accept || ""} placeholder="image/*,video/*,audio/*,.svg,.pdf" onInput=${(event) => onFieldChange({ settings: { ...settings, accept: event.currentTarget.value } })} />
          </div>
        `;
      }

      if (field.type === "media") {
        const settings = mediaSettings(field);
        const patchSettings = (patch) => onFieldChange({ required: false, settings: { ...settings, ...patch } });
        const fileInputId = field.id + "_mediaFile";

        return html`
          <div class="property">
            <label for="mediaSourceType">Source</label>
            <select class="control" id="mediaSourceType" value=${settings.sourceType} onChange=${(event) => patchSettings({ sourceType: event.currentTarget.value })}>
              <option value="url">URL</option>
              <option value="file">File</option>
              <option value="html">HTML</option>
            </select>
          </div>

          ${settings.sourceType === "url" ? html`
            <div class="property">
              <label for="mediaUrl">Media URL</label>
              <input class="control" id="mediaUrl" value=${settings.url} placeholder="https://example.com/media.mp4" onInput=${(event) => patchSettings({ url: event.currentTarget.value, dataUrl: "", fileName: "", mimeType: "" })} />
