    }

    function rgbToHex(r, g, b) {
      return "#" + [r, g, b].map((value) => clampByte(value)).map((value) => value.toString(16).padStart(2, "0")).join("");
    }

    function hexCandidate(value) {
      const text = String(value || "").trim();
      const withHash = text.startsWith("#") ? text : "#" + text;
      return /^#[0-9a-f]{6}$/i.test(withHash) ? withHash : "";
    }



    function padDatePart(value) {
      return String(value).padStart(2, "0");
    }

    function isoFromDate(date) {
      return [date.getFullYear(), padDatePart(date.getMonth() + 1), padDatePart(date.getDate())].join("-");
    }

    function dateFromISO(value) {
      const text = String(value || "").trim();
      if (!/^\d{4}-\d{2}-\d{2}$/.test(text)) return null;
      const [year, month, day] = text.split("-").map(Number);
      const date = new Date(year, month - 1, day);
      if (date.getFullYear() !== year || date.getMonth() !== month - 1 || date.getDate() !== day) return null;
      return date;
    }

    function todayISO() {
      return isoFromDate(new Date());
    }

    function dateTime(value) {
      const date = dateFromISO(value);
      return date ? date.getTime() : null;
    }

    function readableDate(value) {
      const date = dateFromISO(value);
      return date ? date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) : "Not set";
    }

    function monthLabel(date) {
      return date.toLocaleDateString(undefined, { month: "long", year: "numeric" });
    }

    class CalendarModel {
      constructor(field) {
        Object.assign(this, field.settings);
      }

      get anchorDate() {
        return this.startDate || this.endDate || this.milestones.find((item) => item.date)?.date || todayISO();
      }

      get monthDate() {
        const date = dateFromISO(this.anchorDate) || new Date();
        return new Date(date.getFullYear(), date.getMonth(), 1);
      }

      get visibleMilestones() {
        return this.milestones.filter((item) => item.date || item.label);
      }

      milestonesForDate(iso) {
        return this.milestones.filter((item) => item.date === iso);
      }

      static gridDates(monthDate) {
        const first = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
        const start = new Date(first);
        start.setDate(first.getDate() - first.getDay());
        return Array.from({ length: 42 }, (_, index) => {
          const date = new Date(start);
          date.setDate(start.getDate() + index);
          return date;
        });
      }
    }

    function settingNumber(value, defaultValue) {
      const text = String(value ?? "").trim();
      if (!text) return defaultValue;
      const number = Number(text);
      return Number.isFinite(number) ? number : defaultValue;
    }

    class RadarModel {
      constructor(field) {
        const settings = field.settings || field;
        this.mode = settings.mode === "point" ? "point" : "shape";
        this.max = settingNumber(settings.max, DEFAULT_RADAR_MAX);
        this.axes = Array.isArray(settings.axes) && settings.axes.length ? settings.axes : DEFAULT_RADAR_AXES;
        this.defaultValues = settings.defaultValues;
        this.defaultPoint = settings.defaultPoint;
      }

      get midpoint() {
        return Math.round(RADAR_MIN_VALUE + (this.max - RADAR_MIN_VALUE) / 2);
      }

      get values() {
        return RadarModel.values(this.defaultValues, this.axes, this.max);
      }

      get point() {
        return RadarModel.point(this.defaultPoint, this.max);
      }

      static clampValue(value, max) {
        const number = settingNumber(value, Number.NaN);
        return Number.isFinite(number) ? Math.max(RADAR_MIN_VALUE, Math.min(max, Math.round(number))) : null;
      }

      static values(values, axes, max) {
        const midpoint = Math.round(RADAR_MIN_VALUE + (max - RADAR_MIN_VALUE) / 2);
        const source = Array.isArray(values) ? values : [];
        return axes.map((_, index) => RadarModel.clampValue(source[index], max) ?? midpoint);
      }

      static angle(value) {
        const number = settingNumber(value, DEFAULT_RADAR_POINT.angle);
        const wrapped = ((number % 360) + 360) % 360;
        return Math.round(wrapped * 100) / 100;
      }

      static pointValue(value, max) {
        const number = settingNumber(value, Number.NaN);
        return Number.isFinite(number) ? Math.round(Math.max(RADAR_MIN_VALUE, Math.min(max, number)) * 100) / 100 : null;
      }

      static point(point, max) {
        const source = point && typeof point === "object" && !Array.isArray(point) ? point : DEFAULT_RADAR_POINT;
        return {
          angle: RadarModel.angle(source.angle),
          value: RadarModel.pointValue(source.value, max) ?? RadarModel.pointValue(DEFAULT_RADAR_POINT.value, max) ?? RADAR_MIN_VALUE
        };
      }

      static scale(value, max) {
        return Math.max(0, Math.min(1, Number(value) / Math.max(1, max)));
      }

      static vertex(index, count, center, radius) {
        const angle = -Math.PI / 2 + (Math.PI * 2 * index / count);
        return {
          x: Math.round((center + Math.cos(angle) * radius) * 100) / 100,
          y: Math.round((center + Math.sin(angle) * radius) * 100) / 100
        };
      }

      static polygon(values, max, center, radius) {
        return values.map((value, index) => {
          const point = RadarModel.vertex(index, values.length, center, radius * RadarModel.scale(value, max));
          return `${point.x},${point.y}`;
        }).join(" ");
      }

      static polar(angle, value, max, center, radius) {
        const radians = -Math.PI / 2 + (RadarModel.angle(angle) * Math.PI / 180);
        const scaled = RadarModel.scale(value, max);
        return {
          x: Math.round((center + Math.cos(radians) * radius * scaled) * 100) / 100,
          y: Math.round((center + Math.sin(radians) * radius * scaled) * 100) / 100
        };
      }

      static format(value) {
        const number = Number(value);
        if (!Number.isFinite(number)) return "";
        return Number.isInteger(number) ? String(number) : number.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
      }

      static describe(angle, axes) {
        const step = 360 / axes.length;
        const cleaned = RadarModel.angle(angle);
        const position = cleaned / step;
        const lower = Math.floor(position) % axes.length;
        const upper = (lower + 1) % axes.length;
        const blend = position - lower;
        if (blend < 0.06) return axes[lower];
        if (blend > 0.94) return axes[upper];
        return `${axes[lower]} / ${axes[upper]}`;
      }
    }

    function assertObject(value, name) {
      if (!value || typeof value !== "object" || Array.isArray(value)) throw new Error(`${name} must be an object.`);
      return value;
    }

    function assertString(value, name) {
      if (typeof value !== "string") throw new Error(`${name} must be a string.`);
    }

    function assertBoolean(value, name) {
      if (typeof value !== "boolean") throw new Error(`${name} must be a boolean.`);
    }

    function assertArray(value, name) {
      if (!Array.isArray(value)) throw new Error(`${name} must be an array.`);
    }

    function assertNumber(value, name) {
      if (typeof value !== "number" || !Number.isFinite(value)) throw new Error(`${name} must be a finite number.`);
    }

    function assertInteger(value, name) {
      assertNumber(value, name);
      if (!Number.isInteger(value)) throw new Error(`${name} must be an integer.`);
    }

    function assertExactKeys(value, keys, name) {
      keys.forEach((key) => {
        if (!(key in value)) throw new Error(`${name}.${key} is required.`);
      });
      Object.keys(value).forEach((key) => {
        if (!keys.includes(key)) throw new Error(`${name}.${key} is not supported.`);
      });
    }

    function assertOneOf(value, choices, name) {
      if (!choices.includes(value)) throw new Error(`${name} must be one of: ${choices.join(", ")}.`);
    }

    function assertNumberRange(value, name, min, max, integer = false) {
      if (integer) {
        assertInteger(value, name);
      } else {
        assertNumber(value, name);
      }
      if (value < min || value > max) throw new Error(`${name} must be between ${min} and ${max}.`);
    }

    function assertDateSetting(value, name) {
      assertString(value, name);
      if (value && !dateFromISO(value)) throw new Error(`${name} must be an ISO date string.`);
    }

    function assertHexColor(value, name) {
      assertString(value, name);
      hexColor(value);
    }

    function assertFontFamily(value, name) {
      assertString(value, name);
      fontFamilyValue(value);
    }

    function assertTypographyRole(style, key) {
      const name = `schema.settings.typography.${key}`;
      assertObject(style, name);
      assertExactKeys(style, TYPOGRAPHY_STYLE_KEYS, name);
      assertFontFamily(style.fontFamily, `${name}.fontFamily`);
      assertHexColor(style.color, `${name}.color`);
      assertNumberRange(style.size, `${name}.size`, 8, 96, true);
      assertNumberRange(style.weight, `${name}.weight`, 100, 1000, true);
      assertOneOf(style.style, ["normal", "italic"], `${name}.style`);
      assertNumberRange(style.lineHeight, `${name}.lineHeight`, 0.8, 3);
      assertNumberRange(style.letterSpacing, `${name}.letterSpacing`, 0, 12);
      assertOneOf(style.textTransform, TEXT_TRANSFORM_OPTIONS.map(([value]) => value), `${name}.textTransform`);
    }

    function assertAppearanceSettings(settings) {
      assertObject(settings.layout, "schema.settings.layout");
      assertExactKeys(settings.layout, Object.keys(DEFAULT_LAYOUT), "schema.settings.layout");
      Object.keys(DEFAULT_LAYOUT).forEach((key) => assertNumberRange(settings.layout[key], `schema.settings.layout.${key}`, 0, key === "fieldSpacing" ? 48 : 80, true));
      assertObject(settings.typography, "schema.settings.typography");
      assertExactKeys(settings.typography, TYPOGRAPHY_ROLE_KEYS, "schema.settings.typography");
      TYPOGRAPHY_ROLE_KEYS.forEach((key) => assertTypographyRole(settings.typography[key], key));
    }

    function assertCalendarMilestones(items, name) {
      assertArray(items, name);
      items.forEach((item, index) => {
        const itemName = `${name}[${index}]`;
        assertObject(item, itemName);
        assertExactKeys(item, ["id", "date", "label"], itemName);
        assertString(item.id, `${itemName}.id`);
        assertDateSetting(item.date, `${itemName}.date`);
        assertString(item.label, `${itemName}.label`);
      });
    }

    function assertRadarDefaults(values, axes, max, name) {
      assertArray(values, name);
      if (values.length !== axes.length) throw new Error(`${name} must match radar.settings.axes length.`);
      values.forEach((value, index) => assertNumberRange(value, `${name}[${index}]`, RADAR_MIN_VALUE, max, true));
    }

    function assertRadarPoint(point, max, name) {
      assertObject(point, name);
      assertExactKeys(point, ["angle", "value"], name);
      assertNumberRange(point.angle, `${name}.angle`, 0, 359);
      assertNumberRange(point.value, `${name}.value`, RADAR_MIN_VALUE, max);
    }

    function assertCssLength(value, name) {
      assertString(value, name);
      if (value && !/^\d+(?:\.\d+)?(?:px|%|rem|em|vw|vh)$/i.test(value)) throw new Error(`${name} must be a CSS length.`);
    }

    function assertSettingKeys(settings, keys, fieldType) {
      assertExactKeys(settings, [...keys, "showLabel", "outline", "background"], `${fieldType}.settings`);
      assertBoolean(settings.showLabel, `${fieldType}.settings.showLabel`);
      assertBoolean(settings.outline, `${fieldType}.settings.outline`);
      assertBoolean(settings.background, `${fieldType}.settings.background`);
    }

    function assertMediaSettingValues(settings, name) {
      assertOneOf(settings.sourceType, ["url", "file", "html"], `${name}.sourceType`);
      ["url", "dataUrl", "mimeType", "fileName", "alt", "caption", "html"].forEach((key) => assertString(settings[key], `${name}.${key}`));
      assertNumberRange(settings.iframeHeight, `${name}.iframeHeight`, 120, 1200, true);
      assertOneOf(settings.horizontalAlignment, ["left", "center", "right", "stretch"], `${name}.horizontalAlignment`);
      assertOneOf(settings.verticalAlignment, ["top", "center", "bottom"], `${name}.verticalAlignment`);
      assertNumberRange(settings.scale, `${name}.scale`, 10, 100);
      assertCssLength(settings.maxWidth, `${name}.maxWidth`);
      assertNumberRange(settings.maxHeight, `${name}.maxHeight`, 80, 1600, true);
      assertOneOf(settings.objectFit, ["contain", "cover", "fill", "scale-down"], `${name}.objectFit`);
    }

    function assertNestedMediaSettings(settings, name) {
      if (settings === null) return;
      assertObject(settings, name);
      assertExactKeys(settings, [...MEDIA_SETTING_KEYS, "showLabel", "outline", "background"], name);
      assertBoolean(settings.showLabel, `${name}.showLabel`);
      assertBoolean(settings.outline, `${name}.outline`);
      assertBoolean(settings.background, `${name}.background`);
      assertMediaSettingValues(settings, name);
    }

    const FIELD_SCHEMA_VALIDATORS = {
      calendar: "calendar",
      mood_meter: "moodMeter",
      linear_scale: "linearScale",
      star_rating: "starRating",
      radar: "radar",
      media_upload: "mediaUpload",
      media: "media",
      headline: "headline",
      spacer: "spacer"
    };

    class FieldSchemaValidator {
      constructor(raw) {
        this.field = assertObject(raw, "field");
        typeMeta(this.field.type);
        this.baseKeys = ["id", "type", "label", "description", "required", "settings"];
        assertString(this.field.id, "field.id");
        assertString(this.field.type, "field.type");
        assertString(this.field.label, `${this.field.type}.label`);
        assertString(this.field.description, `${this.field.type}.description`);
        assertBoolean(this.field.required, `${this.field.type}.required`);
        this.settings = assertObject(this.field.settings, `${this.field.type}.settings`);
      }

      fieldShape(extraKeys = [], settingKeys = []) {
        assertExactKeys(this.field, [...this.baseKeys, ...extraKeys], "field");
        assertSettingKeys(this.settings, settingKeys, this.field.type);
      }

      placeholder() {
        this.fieldShape(["placeholder"]);
        assertString(this.field.placeholder, `${this.field.type}.placeholder`);
      }

      options() {
        this.fieldShape(["options"]);
        assertArray(this.field.options, `${this.field.type}.options`);
        this.field.options.forEach((option, index) => assertString(option, `${this.field.type}.options[${index}]`));
      }

      calendar() {
        const settings = this.settings;
        this.fieldShape([], ["startDate", "endDate", "allowMilestones", "milestones"]);
        assertDateSetting(settings.startDate, "calendar.settings.startDate");
        assertDateSetting(settings.endDate, "calendar.settings.endDate");
        if (settings.startDate && settings.endDate && dateTime(settings.endDate) < dateTime(settings.startDate)) throw new Error("calendar.settings.endDate must not be before calendar.settings.startDate.");
        assertBoolean(settings.allowMilestones, "calendar.settings.allowMilestones");
        assertCalendarMilestones(settings.milestones, "calendar.settings.milestones");
      }

      moodMeter() {
        this.fieldShape([], ["minLabel", "maxLabel"]);
        assertString(this.settings.minLabel, "mood_meter.settings.minLabel");
        assertString(this.settings.maxLabel, "mood_meter.settings.maxLabel");
      }

      linearScale() {
        const settings = this.settings;
        this.fieldShape([], ["min", "max", "minLabel", "maxLabel"]);
        assertNumber(settings.min, "linear_scale.settings.min");
        assertNumber(settings.max, "linear_scale.settings.max");
        if (settings.max <= settings.min) throw new Error("linear_scale.settings.max must be greater than linear_scale.settings.min.");
        assertString(settings.minLabel, "linear_scale.settings.minLabel");
        assertString(settings.maxLabel, "linear_scale.settings.maxLabel");
      }

      starRating() {
        this.fieldShape([], ["max"]);
        assertNumberRange(this.settings.max, "star_rating.settings.max", 3, 10, true);
      }

      radar() {
        const settings = this.settings;
        this.fieldShape([], ["mode", "max", "axes", "defaultValues", "defaultPoint"]);
        assertOneOf(settings.mode, ["shape", "point"], "radar.settings.mode");
        assertNumberRange(settings.max, "radar.settings.max", RADAR_MIN_VALUE + 1, 100, true);
        assertArray(settings.axes, "radar.settings.axes");
        if (!settings.axes.length) throw new Error("radar.settings.axes must contain at least one axis.");
        settings.axes.forEach((axis, index) => assertString(axis, `radar.settings.axes[${index}]`));
        assertRadarDefaults(settings.defaultValues, settings.axes, settings.max, "radar.settings.defaultValues");
        assertRadarPoint(settings.defaultPoint, settings.max, "radar.settings.defaultPoint");
      }

      mediaUpload() {
        this.fieldShape([], ["accept"]);
        assertString(this.settings.accept, "media_upload.settings.accept");
      }

      media() {
        this.fieldShape([], MEDIA_SETTING_KEYS);
        assertMediaSettingValues(this.settings, "media.settings");
      }

      headline() {
        const settings = this.settings;
        this.fieldShape([], ["headingHorizontalAlignment", "headingVerticalAlignment", "descriptionHorizontalAlignment", "descriptionVerticalAlignment", "mediaPlacement", "media"]);
        assertOneOf(settings.headingHorizontalAlignment, ["left", "center", "right"], "headline.settings.headingHorizontalAlignment");
        assertOneOf(settings.headingVerticalAlignment, ["top", "center", "bottom"], "headline.settings.headingVerticalAlignment");
        assertOneOf(settings.descriptionHorizontalAlignment, ["left", "center", "right"], "headline.settings.descriptionHorizontalAlignment");
        assertOneOf(settings.descriptionVerticalAlignment, ["top", "center", "bottom"], "headline.settings.descriptionVerticalAlignment");
        assertOneOf(settings.mediaPlacement, HEADLINE_MEDIA_PLACEMENTS, "headline.settings.mediaPlacement");
        assertNestedMediaSettings(settings.media, "headline.settings.media");
      }

      spacer() {
        const settings = this.settings;
        this.fieldShape([], ["height", "showLine", "lineStyle", "lineThickness"]);
        assertNumberRange(settings.height, "spacer.settings.height", 0, 240, true);
        assertBoolean(settings.showLine, "spacer.settings.showLine");
        assertOneOf(settings.lineStyle, ["solid", "dashed", "dotted"], "spacer.settings.lineStyle");
        assertNumberRange(settings.lineThickness, "spacer.settings.lineThickness", 1, 12, true);
      }
    }

    function schemaField(raw) {
      const validator = new FieldSchemaValidator(raw);
      const method = PLACEHOLDER_FIELD_TYPES.has(validator.field.type)
        ? "placeholder"
        : OPTION_FIELD_TYPES.has(validator.field.type)
          ? "options"
          : FIELD_SCHEMA_VALIDATORS[validator.field.type];
      validator[method]?.();
      return validator.field;
    }

    function schemaDocument(input) {
      const schema = assertObject(input, "schema");
      assertExactKeys(schema, ["createdAt", "updatedAt", "settings", "fields"], "schema");
      assertString(schema.createdAt, "schema.createdAt");
      assertString(schema.updatedAt, "schema.updatedAt");
      assertObject(schema.settings, "schema.settings");
      assertExactKeys(schema.settings, ["name", "theme", "layout", "typography"], "schema.settings");
      assertString(schema.settings.name, "schema.settings.name");
      assertObject(schema.settings.theme, "schema.settings.theme");
      assertExactKeys(schema.settings.theme, [...THEME_COLOR_FIELDS.map(([key]) => key), "fontFamily"], "schema.settings.theme");
      THEME_COLOR_FIELDS.forEach(([key]) => assertHexColor(schema.settings.theme[key], `schema.settings.theme.${key}`));
      assertFontFamily(schema.settings.theme.fontFamily, "schema.settings.theme.fontFamily");
      assertAppearanceSettings(schema.settings);
      assertArray(schema.fields, "schema.fields");
      const seenIds = new Set();
      schema.fields.forEach((field, index) => {
        schemaField(field);
        if (seenIds.has(field.id)) throw new Error(`Duplicate field id: ${field.id}`);
        seenIds.add(field.id);
        if (NON_REQUIRED_FIELD_TYPES.has(field.type) && field.required) throw new Error(`schema.fields[${index}].required must be false for ${field.type}.`);
      });
      return schema;
    }

    function formDisplayName(schema) {
      return String(schema.settings.name || "").trim();
    }

    function formHasContent(schema) {
      return schema.settings.name !== DEFAULT_FORM_NAME
        || JSON.stringify(schema.settings.theme) !== JSON.stringify(DEFAULT_THEME)
        || JSON.stringify(schema.settings.layout) !== JSON.stringify(DEFAULT_LAYOUT)
        || JSON.stringify(typographySettings(schema.settings.typography, schema.settings.theme)) !== JSON.stringify(DEFAULT_TYPOGRAPHY)
        || schema.fields.length > 0;
    }

    function loadInitialSchema() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return schemaDocument(JSON.parse(saved));
      } catch (error) {
        console.warn(error);
      }
      return defaultSchema();
    }

    function safeFileName(value) {
      return String(value).trim().toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || "form-schema";
    }

    function encodeSchemaToken(schema) {
      const bytes = new TextEncoder().encode(JSON.stringify(schema));
      let binary = "";
      bytes.forEach((byte) => {
        binary += String.fromCharCode(byte);
      });
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    function reorder(list, from, to) {
      const next = [...list];
      const [item] = next.splice(from, 1);
      next.splice(to, 0, item);
      return next;
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function horizontalAlignmentSetting(value, allowed = ["left", "center", "right"]) {
      if (!allowed.includes(value)) throw new Error(`Unsupported horizontal alignment: ${value}`);
      return value;
    }

    function verticalAlignmentSetting(value) {
      if (!["top", "center", "bottom"].includes(value)) throw new Error(`Unsupported vertical alignment: ${value}`);
      return value;
    }

    function horizontalFlexValue(value) {
      if (value === "left") return "flex-start";
      if (value === "right") return "flex-end";
      return "center";
    }

    function verticalFlexValue(value) {
      if (value === "top") return "flex-start";
      if (value === "bottom") return "flex-end";
      return "center";
    }

    function textAlignValue(value) {
      if (value === "left" || value === "right") return value;
      return "center";
    }

    class HeadlineModel {
      constructor(field) {
        const settings = field.settings;
        this.field = field;
        this.headingHorizontalAlignment = horizontalAlignmentSetting(settings.headingHorizontalAlignment, ["left", "center", "right"]);
        this.headingVerticalAlignment = verticalAlignmentSetting(settings.headingVerticalAlignment);
        this.descriptionHorizontalAlignment = horizontalAlignmentSetting(settings.descriptionHorizontalAlignment, ["left", "center", "right"]);
        this.descriptionVerticalAlignment = verticalAlignmentSetting(settings.descriptionVerticalAlignment);
        this.mediaPlacement = HEADLINE_MEDIA_PLACEMENTS.includes(settings.mediaPlacement) ? settings.mediaPlacement : "right";
        this.mediaField = settings.media ? { id: field.id + "_media", type: "media", label: field.label, description: "", required: false, settings: settings.media } : null;
        this.showLabel = settings.showLabel;
        this.outline = settings.outline;
        this.background = settings.background;
      }

      get mediaCenter() {
        return Boolean(this.mediaField && this.mediaPlacement === "center");
      }

      get mediaFirst() {
        return Boolean(this.mediaField && this.mediaPlacement === "top");
      }

      textStyle(horizontalKey, verticalKey) {
        const horizontal = this[horizontalKey];
        const vertical = this[verticalKey];
        return `display: flex; justify-content: ${horizontalFlexValue(horizontal)}; align-items: ${verticalFlexValue(vertical)}; text-align: ${textAlignValue(horizontal)};`;
      }
    }

    class MediaModel {
      constructor(field) {
        const settings = field.settings;
        const objectFit = settings.objectFit;
        if (!["contain", "cover", "fill", "scale-down"].includes(objectFit)) throw new Error(`Unsupported media fit: ${objectFit}`);
        this.field = field;
        this.sourceType = settings.sourceType;
        this.url = settings.url;
        this.dataUrl = settings.dataUrl;
        this.mimeType = settings.mimeType;
        this.fileName = settings.fileName;
        this.alt = settings.alt;
        this.caption = settings.caption;
        this.html = settings.html;
        this.iframeHeight = settings.iframeHeight;
        this.horizontalAlignment = horizontalAlignmentSetting(settings.horizontalAlignment, ["left", "center", "right", "stretch"]);
        this.verticalAlignment = verticalAlignmentSetting(settings.verticalAlignment);
        this.scale = settings.scale;
        this.maxWidth = settings.maxWidth;
        this.maxHeight = settings.maxHeight;
        this.objectFit = objectFit;
        this.outline = settings.outline;
        this.background = settings.background;
      }

      get source() {
        return this.sourceType === "file" ? this.dataUrl : this.url;
      }

      get kind() {
        if (this.sourceType === "html") return "html";
        const source = String(this.source || "").toLowerCase().split(/[?#]/)[0];
        const mime = String(this.mimeType || "").toLowerCase();
        if (mime.startsWith("image/") || source.startsWith("data:image/") || /\.(apng|avif|gif|jpe?g|png|svg|webp)$/i.test(source)) return "image";
        if (mime.startsWith("video/") || source.startsWith("data:video/") || /\.(mp4|m4v|mov|ogv|webm)$/i.test(source)) return "video";
        if (mime.startsWith("audio/") || source.startsWith("data:audio/") || /\.(aac|flac|m4a|mp3|oga|ogg|wav|webm)$/i.test(source)) return "audio";
        if (mime === "application/pdf" || source.startsWith("data:application/pdf") || /\.pdf$/i.test(source)) return "document";
        return "unknown";
      }

      get title() {
        return this.alt || this.fileName || this.field.label;
      }

      get alignmentStyle() {
        const justify = this.horizontalAlignment === "stretch" ? "stretch" : horizontalFlexValue(this.horizontalAlignment);
        return `justify-content: ${justify}; align-items: ${verticalFlexValue(this.verticalAlignment)}; text-align: ${textAlignValue(this.horizontalAlignment)};`;
      }

      get audioStyle() {
        return this.horizontalAlignment === "stretch" ? "width: 100%;" : `width: ${this.scale}%; ${this.maxWidth ? `max-width: ${this.maxWidth};` : ""}`;
      }

      visualStyle(extra = "") {
        const width = this.horizontalAlignment === "stretch" ? "100%" : `${this.scale}%`;
        const maxWidth = this.maxWidth ? `max-width: ${this.maxWidth};` : "";
        const maxHeight = `max-height: ${this.maxHeight}px;`;
        const positionX = this.horizontalAlignment === "left" || this.horizontalAlignment === "right" ? this.horizontalAlignment : "center";
        const positionY = this.verticalAlignment === "top" || this.verticalAlignment === "bottom" ? this.verticalAlignment : "center";
        return `width: ${width}; ${maxWidth} ${maxHeight} object-fit: ${this.objectFit}; object-position: ${positionX} ${positionY}; ${extra}`.trim();
      }
    }

    function MediaPreview({ field }) {
      const media = new MediaModel(field);
      const source = media.source;
      const kind = media.kind;
      const visualStyle = media.visualStyle();

      if (kind === "html") {
        return html`
          <div class="media-preview">
            <div class="media-content-wrap" style=${media.alignmentStyle}>
              ${media.html
            ? html`<iframe class="media-embed media-visual" title=${media.title} srcdoc=${media.html} sandbox="allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox" style=${media.visualStyle(`height: ${media.iframeHeight}px; max-height: none;`)}></iframe>`
            : html`<div class="media-placeholder" style=${media.horizontalAlignment === "stretch" ? "width: 100%;" : ""}>Embedded HTML</div>`}
            </div>
            ${media.caption ? html`<p class="media-caption">${media.caption}</p>` : null}
          </div>
        `;
      }

      if (!source) {
        return html`<div class="media-preview"><div class="media-placeholder">No media selected</div></div>`;
      }

      return html`
        <div class="media-preview">
          <div class="media-content-wrap" style=${media.alignmentStyle}>
            ${kind === "image" ? html`<img class="media-visual" src=${source} alt=${media.alt || ""} style=${visualStyle} />` : null}

    function Icon({ icon, className = "", title = "" }) {
      const definition = ICONS[String(icon || "").trim()];
      if (!definition) return null;
      const svgClass = ["svg-icon", definition.className, className].filter(Boolean).join(" ");
      const viewBox = Array.isArray(definition) ? `0 0 ${definition[0]} ${definition[1]}` : definition.viewBox;
      const content = Array.isArray(definition) ? html`<path d=${definition[2]}></path>` : definition.content();
      const labelProps = title ? { role: "img", "aria-label": title } : { "aria-hidden": "true" };
      return html`<svg class=${svgClass} viewBox=${viewBox} focusable="false" ...${labelProps}>${title ? html`<title>${title}</title>` : null}${content}</svg>`;
    }

    function RadarPreview({ field }) {
      const radar = new RadarModel(field);
      const { axes, mode, max } = radar;
      const center = 65;
      const radius = 44;
      const values = radar.values;
      const point = radar.point;
      const polygon = RadarModel.polygon(values, max, center, radius);
      const pointPosition = RadarModel.polar(point.angle, point.value, max, center, radius);

      return html`
        <div class="radar-preview">
          <svg viewBox="0 0 130 130" role="img" aria-label=${mode === "point" ? "Radar single-node preview" : "Radar preview"}>
            <g class="radar-grid">
              ${[0.35, 0.7, 1].map((scale) => html`
                <polygon points=${axes.map((_, index) => {
        const gridPoint = RadarModel.vertex(index, axes.length, center, radius * scale);
        return `${gridPoint.x},${gridPoint.y}`;
      }).join(" ")} />
              `)}
              ${axes.map((_, index) => {
        const gridPoint = RadarModel.vertex(index, axes.length, center, radius);
        return html`<line x1=${center} y1=${center} x2=${gridPoint.x} y2=${gridPoint.y} />`;
      })}
            </g>
            ${mode === "point" ? html`
              <line class="radar-point-line" x1=${center} y1=${center} x2=${pointPosition.x} y2=${pointPosition.y} />
              <circle class="radar-point-node" cx=${pointPosition.x} cy=${pointPosition.y} r="5" />
            ` : html`<polygon class="radar-fill" points=${polygon} />`}
          </svg>
          <div class="radar-axis-list">
            ${mode === "point" ? html`
              <span>Single node</span>
              <span>${RadarModel.describe(point.angle, axes)}: ${RadarModel.format(point.value)}</span>
            ` : axes.map((axis, index) => html`<span key=${`${axis}-${index}`}>${axis}: ${values[index]}</span>`)}
          </div>
        </div>
      `;
    }

    function HeadlineDropPreview({ placement, copyPlacement }) {
      return html`
        <div class=${`headline-drop-preview media-${placement}`} aria-hidden="true">
          <div class="headline-drop-media-slot"></div>
          ${copyPlacement ? html`<div class=${`headline-drop-copy-slot copy-${copyPlacement}`}></div>` : null}
        </div>
      `;
    }

    function HeadlinePreview({ field, dropPlacement, dropKind, onMediaDragStart, onMediaDragEnd }) {
      const description = String(field.description || "").trim();
      const headline = new HeadlineModel(field);
      const title = headline.showLabel ? String(field.label || "").trim() : "";
      const mediaField = headline.mediaField;
      const hasCopy = Boolean(headline.showLabel || description);
      const previewPlacement = dropPlacement ? dropKind === "copy" ? OPPOSITE_HEADLINE_PLACEMENT[dropPlacement] : dropPlacement : null;
      const replacingMedia = !!(mediaField && previewPlacement);
      const previewCopyPlacement = replacingMedia && OPPOSITE_HEADLINE_PLACEMENT[previewPlacement] !== OPPOSITE_HEADLINE_PLACEMENT[headline.mediaPlacement] ? OPPOSITE_HEADLINE_PLACEMENT[previewPlacement] : null;
      const copyDraggable = !!(mediaField && onMediaDragStart);
      const copyDragStart = copyDraggable ? (event) => onMediaDragStart(event, { kind: "copy", id: field.id }) : null;
      const copyDragAttrs = { draggable: copyDraggable, title: copyDraggable ? "Drag to reposition headline text" : null, onDragStart: copyDragStart, onDragEnd: copyDraggable ? onMediaDragEnd : null };
      const mediaNode = mediaField ? html`<div class=${`headline-media${onMediaDragStart ? " is-draggable" : ""}`} draggable=${!!onMediaDragStart} title="Drag to reposition media" onDragStart=${(event) => onMediaDragStart?.(event, { kind: "split", id: field.id })} onDragEnd=${onMediaDragEnd}><${MediaPreview} field=${mediaField} /></div>` : null;
      const titleNode = (draggable = copyDraggable) => headline.showLabel ? html`<h1 class=${`headline-preview-title${title ? "" : " headline-preview-placeholder"}${draggable ? " is-draggable" : ""}`} style=${headline.textStyle("headingHorizontalAlignment", "headingVerticalAlignment")} ...${draggable ? copyDragAttrs : {}}>${title || "Heading"}</h1>` : null;
      const descriptionNode = (draggable = copyDraggable) => description ? html`<p class=${`headline-preview-subhead${draggable ? " is-draggable" : ""}`} style=${headline.textStyle("descriptionHorizontalAlignment", "descriptionVerticalAlignment")} ...${draggable ? copyDragAttrs : {}}>${description}</p>` : null;
      const copyNode = (draggable = copyDraggable) => hasCopy ? html`<div class=${`headline-copy${draggable ? " is-draggable" : ""}`} ...${draggable ? copyDragAttrs : {}}>${titleNode(draggable)}${descriptionNode(draggable)}</div>` : null;
      return html`
        <div class=${`headline-preview${mediaField && hasCopy ? " has-media media-" + headline.mediaPlacement : ""}${replacingMedia ? " is-replacing-media" : ""}`}>
          ${headline.mediaCenter && hasCopy ? html`
            ${titleNode()}
            ${mediaNode}
            ${descriptionNode()}
          ` : html`
            ${headline.mediaFirst ? mediaNode : null}
            ${copyNode()}
            ${headline.mediaFirst ? null : mediaNode}
          `}
          ${previewPlacement ? html`<${HeadlineDropPreview} placement=${previewPlacement} copyPlacement=${previewCopyPlacement} />` : null}
        </div>
      `;
    }

    function SpacerPreview({ field }) {
      const settings = field.settings;
      return html`
        <div class="spacer-preview" style=${`height: ${settings.height}px;`} aria-hidden="true">
          ${settings.showLine ? html`<hr class="spacer-line" style=${`border-top-width: ${settings.lineThickness}px; border-top-style: ${settings.lineStyle};`} />` : null}
        </div>
      `;
    }



    function CalendarPreview({ field }) {
      const calendar = new CalendarModel(field);
      const startTime = dateTime(calendar.startDate);
      const endTime = dateTime(calendar.endDate);
      const hasRange = startTime !== null && endTime !== null;
      const rangeStart = hasRange ? Math.min(startTime, endTime) : null;
      const rangeEnd = hasRange ? Math.max(startTime, endTime) : null;
      const monthDate = calendar.monthDate;
      const month = monthDate.getMonth();
      const milestones = calendar.visibleMilestones;

      return html`
        <div class=${`calendar-preview${calendar.outline ? "" : " is-unboxed"}`}>
          <div class="calendar-frame">
            <div class="calendar-preview-head">
              <div class="calendar-month-label">${monthLabel(monthDate)}</div>
            </div>
            <div class="calendar-weekdays" aria-hidden="true">
              ${["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map((day) => html`<div class="calendar-weekday" key=${day}>${day}</div>`)}
            </div>
            <div class="calendar-grid" aria-hidden="true">
            ${CalendarModel.gridDates(monthDate).map((date) => {
              const iso = isoFromDate(date);
              const time = date.getTime();
              const inRange = rangeStart !== null && rangeEnd !== null && time >= rangeStart && time <= rangeEnd;
              const isBoundary = iso === calendar.startDate || iso === calendar.endDate;
              const isRangeStart = inRange && (iso === calendar.startDate || date.getDay() === 0);
              const isRangeEnd = inRange && (iso === calendar.endDate || date.getDay() === 6);
              const isOutside = date.getMonth() !== month;
              const dayMilestones = calendar.milestonesForDate(iso);
              return html`<div class=${`calendar-day${isOutside ? " is-outside" : ""}${inRange ? " is-range" : ""}${isRangeStart ? " is-range-start" : ""}${isRangeEnd ? " is-range-end" : ""}${isBoundary ? " is-boundary" : ""}${dayMilestones.length ? " is-milestone" : ""}`} key=${iso}>
                <span class="calendar-day-number">${date.getDate()}</span>
                ${dayMilestones.length ? html`
                  <span class="calendar-milestone-popover" aria-hidden="true">
                    ${dayMilestones.map((item) => html`<span class="calendar-milestone-popover-line" key=${item.id || item.label || item.date}>${item.label || "Milestone"}</span>`)}
                  </span>
                ` : null}
              </div>`;
            })}
            </div>
          </div>
          <div class="calendar-properties">
            <div class="calendar-range-summary">
              <div class="calendar-property-row">
                <span>Start</span>
                <output class="calendar-property-value">${readableDate(calendar.startDate)}</output>
              </div>
              <div class="calendar-property-row">
                <span>End</span>
                <output class="calendar-property-value">${readableDate(calendar.endDate)}</output>
              </div>
            </div>
            ${calendar.allowMilestones ? html`
              <div class="calendar-milestone-list">
                <div class="calendar-property-heading">Milestones</div>
                ${milestones.length ? milestones.map((item) => html`
                  <div class="calendar-milestone-item" key=${item.id}>
                    <span class="calendar-milestone-date">${item.date ? readableDate(item.date) : "No date"}</span>
                    <span class="calendar-milestone-name">${item.label || "Milestone"}</span>
                  </div>
                `) : html`<div class="calendar-milestone-empty">No milestones yet.</div>`}
              </div>
            ` : null}
          </div>
        </div>
      `;
    }

    function choicePreview(field, markerClass) {
      return html`<div class="choice-preview">${field.options.map((option) => html`<div class="choice-row" key=${option}><span class=${markerClass}></span><span>${option}</span></div>`)}</div>`;
    }

    const FIELD_PREVIEW_RENDERERS = {
      headline: (field, props) => html`<${HeadlinePreview} field=${field} dropPlacement=${props.headlineDropPlacement} dropKind=${props.headlineDropKind} onMediaDragStart=${props.onHeadlineMediaDragStart} onMediaDragEnd=${props.onFieldDragEnd} />`,
      short_answer: (field) => html`<div class="preview-line">${field.placeholder}</div>`,

    function IroColorPicker({ color, onChange, width = 220 }) {
      const mountRef = useRef(null);
      const pickerRef = useRef(null);
      const changeRef = useRef(onChange);

      useEffect(() => {
        changeRef.current = onChange;
      }, [onChange]);

      useEffect(() => {
        if (!mountRef.current || !window.iro) return;
        mountRef.current.innerHTML = "";
        const picker = new window.iro.ColorPicker(mountRef.current, {
          width,
          color,
          borderWidth: 1,
          borderColor: "#4a4d50"
        });
        picker.on("input:change", (picked) => {
          changeRef.current(picked.hexString);
        });
        pickerRef.current = picker;
        return () => {
          if (mountRef.current) mountRef.current.innerHTML = "";
          pickerRef.current = null;
        };
      }, []);

      useEffect(() => {
        if (!pickerRef.current) return;
        const next = hexColor(color);
        if (pickerRef.current.color.hexString.toLowerCase() !== next.toLowerCase()) {
          pickerRef.current.color.hexString = next;
        }
      }, [color]);

      if (!window.iro) {
        return html`<div class="theme-picker-unavailable">Color picker unavailable. Use the color fields below.</div>`;
      }

      return html`<div class="theme-color-picker-ui" style=${`width: ${width}px; min-height: ${width}px;`} ref=${mountRef}></div>`;
    }

      const [hexDraft, setHexDraft] = useState(color);
      const [rgbDraft, setRgbDraft] = useState(hexToRgb(color));

      useEffect(() => {
        setHexDraft(color);
        setRgbDraft(hexToRgb(color));
      }, [color]);

      useEffect(() => {
        function handleKeyDown(event) {
          if (event.key === "Escape") onClose();
        }
        document.addEventListener("keydown", handleKeyDown);
        return () => document.removeEventListener("keydown", handleKeyDown);
      }, [onClose]);

      function applyHex(raw) {
        setHexDraft(raw);
        const next = hexCandidate(raw);
        if (next) setColor(next);
      }

      function updateRgb(channel, raw) {
        const next = { ...rgbDraft, [channel]: raw };
        setRgbDraft(next);
        const r = clampByte(next.r);
        const g = clampByte(next.g);
        const b = clampByte(next.b);
        if (r === null || g === null || b === null) return;
        setColor(rgbToHex(r, g, b));

    function FontFamilySearch({ value, onChange, sampleText }) {
      const [query, setQuery] = useState("");
      const [catalog, setCatalog] = useState([]);
      const [catalogState, setCatalogState] = useState("idle");
      const current = fontOptionByFamily(value);
      const cleanQuery = query.trim().toLowerCase();
      const hasSearch = cleanQuery.length > 0;
      const matchingFonts = useMemo(() => {
        if (!hasSearch) return [current];
        const matches = catalog.filter((font) => font.family.toLowerCase().includes(cleanQuery));
        const systemMatch = SYSTEM_FONT_OPTION.family.toLowerCase().includes(cleanQuery);
        const options = systemMatch ? [SYSTEM_FONT_OPTION, ...matches] : matches;
        return options.slice(0, GOOGLE_FONT_PREVIEW_LIMIT);
      }, [catalog, hasSearch, cleanQuery, current.stack]);

      useEffect(() => {
        if (!hasSearch) {
          setCatalogState("idle");
          return undefined;
        }
        if (catalog.length) {
          setCatalogState("ready");
          return undefined;
        }
        let cancelled = false;
        setCatalogState("loading");
        fetchGoogleFontCatalog()
          .then((items) => {
            if (cancelled) return;
            setCatalog(items);
            setCatalogState(items.length ? "ready" : "error");
          })
          .catch((error) => {
            console.warn(error);
            if (!cancelled) setCatalogState("error");
          });
        return () => {
          cancelled = true;
        };
      }, [catalog.length, hasSearch]);

      useEffect(() => {
        matchingFonts.forEach((font) => {
          const stack = font.stack || (font.system ? font.stack : googleFontStack(font.family, font.category));
          ensureGoogleFontLoaded(stack);
        });
      }, [matchingFonts]);

      return html`
        <div class="font-search-wrap">
          <label class="sr-only" for="characterFontSearch">Search fonts</label>
          <input id="characterFontSearch" value=${query} placeholder="Search Google Fonts" onInput=${(event) => setQuery(event.currentTarget.value)} />
        </div>
        <div class="font-option-list compact">
          ${matchingFonts.length ? matchingFonts.map((font) => {
            const stack = font.stack || (font.system ? font.stack : googleFontStack(font.family, font.category));
            const family = font.name || font.family;
            const selected = stack === current.stack;
            return html`
              <button
                class=${`font-option-card${selected ? " selected" : ""}`}
                type="button"
                key=${stack}
                style=${`font-family: ${stack};`}
                onClick=${() => onChange(stack)}
              >
                <span class="font-option-title-row">
                  <span class="font-option-title">${family}</span>
                  ${selected ? html`<span class="font-option-status">Selected</span>` : null}
                </span>
                <span class="font-option-sample">${sampleText}</span>
              </button>
            `;
          }) : html`<div class="font-option-empty">${catalogState === "loading" ? "Loading fonts..." : catalogState === "error" ? "Font catalog unavailable." : "No matching fonts."}</div>`}
        </div>
      `;
    }

    function CharacterStyleModal({ role, value, defaultValue, onChange, onClose }) {

      const [rgbDraft, setRgbDraft] = useState(hexToRgb(value.color));

      useEffect(() => {
        setHexDraft(draft.color);
        setRgbDraft(hexToRgb(draft.color));
      }, [draft.color]);

      useEffect(() => {
        ensureGoogleFontLoaded(draft.fontFamily);
      }, [draft.fontFamily]);

      useEffect(() => {
        function handleKeyDown(event) {
          if (event.key === "Escape") onClose();
        }
        document.addEventListener("keydown", handleKeyDown);
        return () => document.removeEventListener("keydown", handleKeyDown);
      }, [onClose]);

      function patchDraft(patch) {
        setDraft((current) => ({ ...current, ...patch }));
      }

      function patchNumber(key, raw, min, max, integer = false) {
        const number = Number(raw);
        if (!Number.isFinite(number)) return;
        const rounded = integer ? Math.round(number) : Math.round(number * 100) / 100;
        patchDraft({ [key]: Math.max(min, Math.min(max, rounded)) });
      }

      function applyHex(raw) {
        setHexDraft(raw);
        const next = hexCandidate(raw);
        if (next) patchDraft({ color: next });
      }

      function updateRgb(channel, raw) {
        const next = { ...rgbDraft, [channel]: raw };
        setRgbDraft(next);
        const r = clampByte(next.r);
        const g = clampByte(next.g);
        const b = clampByte(next.b);
        if (r === null || g === null || b === null) return;
        patchDraft({ color: rgbToHex(r, g, b) });

                  <${IroColorPicker} color=${draft.color} onChange=${(color) => patchDraft({ color })} width=${164} />
                </div>
                <div class="color-input-grid">
                  <div class="theme-modal-field">
                    <label for="characterHexInput">Hex</label>
                    <input id="characterHexInput" value=${hexDraft} spellcheck=${false} onInput=${(event) => applyHex(event.currentTarget.value)} onBlur=${() => setHexDraft(draft.color)} />
                  </div>
                  <div class="rgb-input-grid">
                    ${["r", "g", "b"].map((channel) => html`
                      <div class="theme-modal-field" key=${channel}>
                        <label for=${`characterRgb${channel}`}>${channel.toUpperCase()}</label>
                        <input id=${`characterRgb${channel}`} type="number" min="0" max="255" value=${rgbDraft[channel]} onInput=${(event) => updateRgb(channel, event.currentTarget.value)} onBlur=${() => setRgbDraft(hexToRgb(draft.color))} />
                      </div>
                    `)}
                  </div>
                </div>
              </div>
              <div class="character-controls">
                <div class="theme-modal-field">
                  <label>Family</label>
                  <${FontFamilySearch} value=${draft.fontFamily} onChange=${(fontFamily) => patchDraft({ fontFamily })} sampleText=${role.sample} />
                </div>
                <div class="character-field-grid">
                  <div class="theme-modal-field">
                    <label for="characterSize">Size</label>
                    <input id="characterSize" type="number" min="8" max="96" value=${draft.size} onInput=${(event) => patchNumber("size", event.currentTarget.value, 8, 96, true)} />
                  </div>
                  <div class="theme-modal-field">
                    <label for="characterLineHeight">Leading</label>
                    <input id="characterLineHeight" type="number" min="0.8" max="3" step="0.05" value=${draft.lineHeight} onInput=${(event) => patchNumber("lineHeight", event.currentTarget.value, 0.8, 3)} />
                  </div>
                  <div class="theme-modal-field">
                    <label for="characterWeight">Weight</label>
                    <select id="characterWeight" value=${draft.weight} onChange=${(event) => patchNumber("weight", event.currentTarget.value, 100, 1000, true)}>
                      ${FONT_WEIGHT_OPTIONS.map((weight) => html`<option value=${weight} key=${weight}>${weight}</option>`)}
                    </select>
                  </div>
                  <div class="theme-modal-field">
                    <label>Style</label>
                    <div class="character-segmented" role="group" aria-label="Font style">
                      ${["normal", "italic"].map((style) => html`
                        <button class=${draft.style === style ? "active" : ""} type="button" key=${style} onClick=${() => patchDraft({ style })}>${style === "normal" ? "Regular" : "Italic"}</button>

                    </select>

            <div class="theme-modal-foot">

    function FieldCard({ field, selected, removing, dragging, headlineDropPlacement, headlineDropKind, onSelect, onMove, onDuplicate, onReset, onDelete, onDragStart, onDragEnd, onHeadlineDragOver, onHeadlineDragLeave, onHeadlineDrop, onHeadlineMediaDragStart }) {
      const meta = typeMeta(field?.type);
      const labelText = String(field.label ?? "").trim();
      const visibleLabel = field.settings.showLabel ? labelText : "";
      const selectLabel = `Select ${labelText || meta.name} field`;
      function handleCardClick(event) {
        const target = event.target;
        if (target?.closest?.("button, a, input, textarea, select")) return;
        onSelect();

      function handleSelectKey(event) {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        onSelect();
      }

      return html`
        <article
          class=${`field-card${field.settings.background ? " with-background" : ""}${selected ? " selected" : ""}${removing ? " removing" : ""}${dragging ? " is-dragging" : ""}${headlineDropPlacement ? " is-split-target split-" + headlineDropPlacement : ""}`}
          data-field-id=${field.id}
          draggable=${true}
          onClick=${handleCardClick}
          onDragStart=${onDragStart}
          onDragEnd=${onDragEnd}
          onDragOver=${field.type === "headline" ? onHeadlineDragOver : null}
          onDragLeave=${field.type === "headline" ? onHeadlineDragLeave : null}
          onDrop=${field.type === "headline" ? onHeadlineDrop : null}

              <button class="icon-button danger" type="button" onClick=${onDelete} title="Delete" aria-label="Delete"><${Icon} icon="fa-regular fa-trash-can" /></button>
            </div>
          </div>
          <div class="field-card-body" role="button" tabIndex="0" aria-pressed=${selected} aria-label=${selectLabel} onKeyDown=${handleSelectKey}>
            ${LABELLESS_PREVIEW_FIELD_TYPES.has(field.type) ? html`

            ` : html`
              ${visibleLabel ? html`<div class="field-label">${visibleLabel}${field.required ? html`<span class="required-mark">*</span>` : null}</div>` : null}
              ${field.description ? html`<p class="field-help">${field.description}</p>` : null}
              <${FieldPreview} field=${field} />
            `}
          </div>
        </article>
      `;
    }

    class FieldSettingsEditor {
      constructor(field, onFieldChange) {
        Object.assign(this, { field, onFieldChange });
      }

      patch = (patch, extras = {}) => {
        this.onFieldChange({ ...extras, settings: { ...this.field.settings, ...patch } });
      };

      patchNonData = (patch, extras = {}) => {
        this.patch(patch, { required: false, ...extras });
      };

      patchChrome = (key, value) => {
        const extras = NON_REQUIRED_FIELD_TYPES.has(this.field.type) ? { required: false } : {};
        this.patch({ [key]: value }, extras);
      };

      patchNestedMedia = (patch) => {
        if (patch.settings) this.patchNonData({ media: patch.settings });
      };

      updateListItem = (key, index, patch) => {
        const items = this.field.settings[key].map((item, itemIndex) => itemIndex === index ? { ...item, ...patch } : item);
        this.patch({ [key]: items });
      };

      removeListItem = (key, index) => {
        this.patch({ [key]: this.field.settings[key].filter((_, itemIndex) => itemIndex !== index) });
      };

      appendListItem = (key, item) => {
        this.patch({ [key]: [...this.field.settings[key], item] });
      };
    }
