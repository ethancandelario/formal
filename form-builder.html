        window.setTimeout(() => dispatch({ type: "remove-field", id }), 150);
      }

      function duplicateContainer(blockId, containerId) {
        dispatch({ type: "duplicate-container", blockId, containerId });
      }

      function resetContainer(blockId, containerId) {
        dispatch({ type: "reset-container", blockId, containerId });
      }

      function deleteContainer(blockId, containerId) {
        dispatch({ type: "delete-container", blockId, containerId });
      }

      function dragStateFor(payload) {
        const schema = currentSchema();
        if (payload.kind === "new") return { ...payload, index: schema.blocks.length };
        if (payload.kind === "move") return { ...payload, index: schema.blocks.findIndex((block) => block.id === payload.id) };
        if (payload.kind === "container") return payload;
        if (payload.kind === "element") return payload;
        return null;
      }

      function payloadFromEvent(event) {
        return dragPayloadRef.current || DragPayloadModel.parse(event.dataTransfer?.getData("text/plain"));
      }

      const emptyDropTarget = {
        index: null,
        y: null,
        blockId: null,
        blockPlacement: null,
        containerDropId: null,
        containerDropIndex: null,
        containerDropY: null,
        containerDropHeight: null
      };
      const dropTargetKeys = Object.keys(emptyDropTarget);

      function dragStateWithTarget(payload, target = {}) {
        return { ...payload, ...emptyDropTarget, ...target };
      }

      function dragStateMatchesTarget(state, payload, target = {}) {
        const next = dragStateWithTarget(payload, target);
        return Boolean(state && DragPayloadModel.same(state, payload) && dropTargetKeys.every((key) => state[key] === next[key]));
      }

      function beginDrag(event, payload) {
        const dragState = payload && dragStateFor(payload);
        if (!dragState) return;
        dragPayloadRef.current = payload;
        event.dataTransfer.setData("text/plain", DragPayloadModel.key(payload));
        event.dataTransfer.effectAllowed = payload.kind === "new" ? "copy" : "move";
        const card = payload.kind === "container"
          ? event.currentTarget.closest(".block-container-preview")
          : payload.kind === "element"
            ? event.currentTarget.closest(".container-element")
            : payload.kind === "move"
              ? event.currentTarget.closest(".field-card")
              : null;
        if (card) event.dataTransfer.setDragImage(card, 24, 24);
        setDragState(dragState);
      }

      function clearDragState() {
        dragPayloadRef.current = null;
        blockDropRectRef.current = null;
        setDragState(null);
      }

      function insertionTargetFromPointer(clientY) {
        const list = fieldsRef.current;
        const cards = fieldCardEntries().map(([, card]) => card);
        const listRect = list?.getBoundingClientRect();
        if (!list || !listRect || !cards.length) {
          const top = list ? parseFloat(getComputedStyle(list).paddingTop) || 0 : 0;
          return { index: 0, y: top };
        }
        const rects = cards.map((card) => card.getBoundingClientRect());
        const gap = parseFloat(getComputedStyle(list).rowGap || getComputedStyle(list).gap) || 0;
        const yForIndex = (index) => {
          if (index <= 0) return Math.max(0, rects[0].top - listRect.top - gap / 2);
          if (index >= rects.length) return rects[rects.length - 1].bottom - listRect.top + gap / 2;
          return (rects[index - 1].bottom + rects[index].top) / 2 - listRect.top;
        };
        for (let index = 0; index < rects.length; index += 1) {
          const rect = rects[index];
          if (clientY < rect.top + rect.height / 2) return { index, y: Math.round(yForIndex(index)) };
        }
        return { index: rects.length, y: Math.round(yForIndex(rects.length)) };
      }

      function updateDropTarget(event) {
        const payload = payloadFromEvent(event);
        if (!payload || !["new", "move", "element"].includes(payload.kind)) return;
        event.preventDefault();
        event.dataTransfer.dropEffect = DragPayloadModel.dropEffect(payload);
        const target = insertionTargetFromPointer(event.clientY);
        setDragState((state) => dragStateMatchesTarget(state, payload, target) ? state : dragStateWithTarget(payload, target));
      }

      function clearDropTarget(event) {
        if (event.relatedTarget && event.currentTarget.contains(event.relatedTarget)) return;
        setDragState((state) => state ? dragStateWithTarget(state) : state);
      }

      function blockPointerPlacement(event, blockId) {
        const placementTarget = event.target?.closest?.("[data-block-placement]");
        let rect = blockDropRectRef.current?.blockId === blockId ? blockDropRectRef.current : null;
        if (!rect) {
          const measured = (event.currentTarget.querySelector(".field-card-body") || event.currentTarget).getBoundingClientRect();
          rect = blockDropRectRef.current = { blockId, left: measured.left, top: measured.top, width: measured.width, height: measured.height };
        }
        const x = rect.width ? Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width)) : 0.5;
        const y = rect.height ? Math.max(0, Math.min(1, (event.clientY - rect.top) / rect.height)) : 0.5;
        const placement = placementTarget && event.currentTarget.contains(placementTarget)
          ? placementTarget.dataset.blockPlacement
          : ContainerPlacementModel.placementFromPoint({ x, y });
        return { placement, x, y };
      }

      function containerPlacementFromPointer(event, blockId) {
        const point = blockPointerPlacement(event, blockId);
        return point.placement;
      }

      function containerInsertionTargetFromPointer(containerNode, clientY) {
        const list = containerNode.querySelector(".container-elements");
        const elements = [...(list?.querySelectorAll(".container-element") || [])];
        if (!list) return { index: 0, y: 0, height: 38 };
        if (!elements.length) return { index: 0, y: 0, height: 38 };
        const listRect = list.getBoundingClientRect();
        const listStyle = window.getComputedStyle(list);
        const gap = Number.parseFloat(listStyle.rowGap || listStyle.gap) || 0;
        const rects = elements.map((element) => element.getBoundingClientRect());
        for (let index = 0; index < rects.length; index += 1) {
          const rect = rects[index];
          if (clientY < rect.top + rect.height / 2) return { index, y: rect.top - listRect.top, height: rect.height };
        }
        const lastRect = rects[rects.length - 1];
        return { index: rects.length, y: lastRect.bottom - listRect.top + gap, height: lastRect.height };
      }

      function containerSiblingPlacementFromPointer(event, containerId) {
        const container = containerById(currentSchema(), containerId);
        if (!container || !ContainerPlacementModel.isMiddle(container.placement)) return null;
        const rect = event.currentTarget.getBoundingClientRect();
        if (!rect.width) return null;
        const x = Math.max(0, Math.min(1, (event.clientX - rect.left) / rect.width));
        if (x <= CONTAINER_SIBLING_DROP_BAND) return "left";
        if (x >= 1 - CONTAINER_SIBLING_DROP_BAND) return "right";
        return null;
      }

      function updateBlockDropTarget(event, blockId) {
        const payload = payloadFromEvent(event);
        if (!DragPayloadModel.canDropOnBlock(payload, currentSchema().blocks, blockId)) return;
        const blockPlacement = containerPlacementFromPointer(event, blockId);
        event.preventDefault();
        event.stopPropagation();
        event.dataTransfer.dropEffect = DragPayloadModel.dropEffect(payload);
        const target = { blockId, blockPlacement };
        setDragState((state) => dragStateMatchesTarget(state, payload, target) ? state : dragStateWithTarget(payload, target));
      }

      function updateContainerDropTarget(event, blockId, containerId) {
        const payload = payloadFromEvent(event);
        if (!DragPayloadModel.canDropOnContainer(payload, currentSchema().blocks, blockId, containerId)) return;
        if (containerSiblingPlacementFromPointer(event, containerId) && DragPayloadModel.canDropOnBlock(payload, currentSchema().blocks, blockId)) return;
        const target = containerInsertionTargetFromPointer(event.currentTarget, event.clientY);
        event.preventDefault();
        event.stopPropagation();
        event.dataTransfer.dropEffect = DragPayloadModel.dropEffect(payload);
        const dragTarget = { containerDropId: containerId, containerDropIndex: target.index, containerDropY: target.y, containerDropHeight: target.height };
        setDragState((state) => dragStateMatchesTarget(state, payload, dragTarget) ? state : dragStateWithTarget(payload, dragTarget));
      }

      function clearBlockDropTarget(event, blockId) {
        if (event.relatedTarget && event.currentTarget.contains(event.relatedTarget)) return;
        const rect = event.currentTarget.getBoundingClientRect();
        const inside = event.clientX >= rect.left && event.clientX <= rect.right && event.clientY >= rect.top && event.clientY <= rect.bottom;
        if (inside) return;
        if (blockDropRectRef.current?.blockId === blockId) blockDropRectRef.current = null;
        setDragState((state) => state?.blockId === blockId ? dragStateWithTarget(state) : state);
      }

      function clearContainerDropTarget(event, containerId) {
        if (event.relatedTarget && event.currentTarget.contains(event.relatedTarget)) return;
        setDragState((state) => state?.containerDropId === containerId ? dragStateWithTarget(state) : state);
      }

      function handleBlockDrop(event, blockId) {
        const payload = payloadFromEvent(event);
        const schema = currentSchema();
        if (!DragPayloadModel.canDropOnBlock(payload, schema.blocks, blockId)) return;
        event.preventDefault();
        event.stopPropagation();
        const placement = containerPlacementFromPointer(event, blockId);
        clearDragState();
        const result = payload.kind === "container" ? DragPayloadModel.moveContainer(schema, blockId, payload, placement) : DragPayloadModel.addElementToBlock(schema, blockId, payload, placement);
        if (!result) return;
        snapshotFieldRects();
        dispatch({ type: "commit-schema", schema: result.schema, selectedId: result.selectedId, selectedContainerId: result.selectedContainerId });
      }

      function handleContainerDrop(event, blockId, containerId) {
        const payload = payloadFromEvent(event);
        const schema = currentSchema();
        if (!DragPayloadModel.canDropOnContainer(payload, schema.blocks, blockId, containerId)) return;
        if (containerSiblingPlacementFromPointer(event, containerId) && DragPayloadModel.canDropOnBlock(payload, schema.blocks, blockId)) return;
        event.preventDefault();
        event.stopPropagation();
        const target = dragStateRef.current?.containerDropId === containerId ? dragStateRef.current : containerInsertionTargetFromPointer(event.currentTarget, event.clientY);
        clearDragState();
        const result = DragPayloadModel.addElementToContainer(schema, blockId, containerId, payload, target.containerDropIndex ?? target.index);
        if (!result) return;
        snapshotFieldRects();
        dispatch({ type: "commit-schema", schema: result.schema, selectedId: result.selectedId, selectedContainerId: result.selectedContainerId });
      }

      function handleDrop(event) {
        event.preventDefault();
        const payload = payloadFromEvent(event);
        const target = Number.isInteger(dragStateRef.current?.index) ? dragStateRef.current : insertionTargetFromPointer(event.clientY);
        clearDragState();
        if (payload?.kind === "new") addField(payload.type, target.index);
        if (payload?.kind === "move") moveFieldToDropIndex(payload.id, target.index);
        if (payload?.kind === "element") {
          const result = DragPayloadModel.moveElementToIndex(currentSchema(), payload, target.index);
          if (result) {
            snapshotFieldRects();
            dispatch({ type: "commit-schema", schema: result.schema, selectedId: result.selectedId, selectedContainerId: result.selectedContainerId });
          }
        }
      }

      async function importSchema(event) {
        const file = event.currentTarget.files?.[0];
        if (!file) return;
        try {
          replaceSchema(schemaDocument(JSON.parse(await file.text())));
        } catch (error) {
          window.alert("That JSON file could not be loaded.");
          console.error(error);
        } finally {
          event.currentTarget.value = "";
        }
      }

      function downloadBlob(blob, fileName) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function exportSchema() {
        setExportMenuOpen(false);
        const schema = currentSchema();
        const output = schemaDocument(schema);
        downloadBlob(new Blob([JSON.stringify(output, null, 2)], { type: "application/json" }), safeFileName(formDisplayName(schema) || "form-schema") + ".json");
      }

      function runtimeHtmlWithSchema(runtimeHtml, output) {
        const token = encodeSchemaToken(output);
        const embeddedTag = `<script id="formal-embedded-schema" type="application/json" data-schema-token="${token}"><` + `/script>`;
        const slotPattern = /<script id="formal-embedded-schema" type="application\/json" data-schema-token="[^"]*"><\/script>/;
        if (!slotPattern.test(runtimeHtml)) throw new Error("Runtime embedded schema slot was not found.");
        return runtimeHtml.replace(slotPattern, embeddedTag);
      }

      async function exportRuntime() {
        setExportMenuOpen(false);
        const schema = currentSchema();
        const output = schemaDocument({ ...schema, updatedAt: new Date().toISOString() });
        try {
          const response = await fetch("form-runtime.html?standalone=" + Date.now(), { cache: "no-store" });
          if (!response.ok) throw new Error("Unable to load form-runtime.html");
          downloadBlob(new Blob([runtimeHtmlWithSchema(await response.text(), output)], { type: "text/html" }), safeFileName(formDisplayName(schema) || "form-runtime") + ".html");
        } catch (error) {
          console.error(error);
          window.alert("The runtime HTML could not be exported. Make sure form-runtime.html is available next to the builder.");
        }
      }

      function previewForm() {
        const previewSchema = schemaDocument({ ...currentSchema(), updatedAt: new Date().toISOString() });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(previewSchema));
        window.open("form-runtime.html?preview=1&refresh=" + Date.now() + "#s=" + encodeSchemaToken(previewSchema), "formalRuntimePreview");
      }

      function resetForm() {
        if (formHasContent(currentSchema()) && !window.confirm("Reset this form and clear all fields?")) return;
        replaceSchema(defaultSchema());
      }

      function patchTheme(patch) {
        const schema = currentSchema();
        patchSchema({ settings: { theme: { ...schema.settings.theme, ...patch } } });
      }

      function patchTypographyRole(key, value) {
        const schema = currentSchema();
        const typography = typographySettings(schema.settings.typography, schema.settings.theme);
        patchSchema({ settings: { typography: { ...typography, [key]: value } } });
      }

      function clearSelectionFromCanvas(event) {
        if (event.target?.closest?.(".field-card, button, a, input, textarea, select")) return;
        selectField(null);
      }

      return {
        addField,
        beginDrag,
        clearBlockDropTarget,
        clearDragState,
        clearDropTarget,
        clearSelectionFromCanvas,
        deleteContainer,
        deleteElement,
        deleteField,
        duplicateContainer,
        duplicateElement,
        duplicateField,
        exportRuntime,
        exportSchema,
        handleDrop,
        handleBlockDrop,
        handleContainerDrop,
        importSchema,
        moveElement,
        moveElementOut,
        moveField,
        patchSchema,
        patchSelectedContainer,
        patchSelectedField,
        patchTheme,
        patchTypographyRole,
        previewForm,
        resetContainer,
        resetField,
        resetForm,
        selectContainer,
        selectField,
        updateContainerDropTarget,
        clearContainerDropTarget,
        updateDropTarget,
        updateBlockDropTarget
      };
    }

    function useStoredSchema(schema) {
      useEffect(() => {
        const next = { ...schema, updatedAt: new Date().toISOString() };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      }, [schema]);
    }

    function useDismissableLayer(open, ref, onDismiss) {
      useEventListener(window, "pointerdown", (event) => {
        if (ref.current?.contains(event.target)) return;
        onDismiss();
      }, open);
      useEventListener(window, "keydown", (event) => {
        if (event.key === "Escape") onDismiss();
      }, open);
    }

    function useFieldListAnimation(fieldCardRefs, fieldRectsRef, fields) {
      useLayoutEffect(() => {
        const firstRects = fieldRectsRef.current;
        if (!firstRects) return;
        fieldRectsRef.current = null;
        fields.forEach((field) => {
          const card = fieldCardRefs.current.get(field.id);
          const first = card && firstRects.get(field.id);
          if (!first) return;
          const last = card.getBoundingClientRect();
          const dx = first.left - last.left;
          const dy = first.top - last.top;
          if (dx || dy) card.animate([{ transform: `translate(${dx}px, ${dy}px)` }, { transform: "translate(0, 0)" }], { duration: 180, easing: "cubic-bezier(0.22, 1, 0.36, 1)" });
        });
      }, [fields]);
    }

    function BuilderApp() {
      const [builderState, dispatchBuilder] = useReducer(builderReducer, null, initialBuilderState);
      const { schema, selectedId, selectedContainerId, removingId } = builderState;
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
      const [dragState, setDragState] = useState(null);
      const [activeColorItem, setActiveColorItem] = useState(null);
      const [activeTypographyRole, setActiveTypographyRole] = useState(null);
      const [exportMenuOpen, setExportMenuOpen] = useState(false);
      const stateRef = useRef(builderState);
      const dragStateRef = useRef(dragState);
      const fieldsRef = useRef(null);
      const fieldCardRefs = useRef(new Map());
      const fieldRectsRef = useRef(null);
      const dragPayloadRef = useRef(null);
      const blockDropRectRef = useRef(null);
      const exportMenuRef = useRef(null);

      stateRef.current = builderState;
      dragStateRef.current = dragState;

      function registerFieldCard(id, node) {
        if (node) fieldCardRefs.current.set(id, node);
        else fieldCardRefs.current.delete(id);
      }

      const builder = useBuilderActions({ stateRef, dragStateRef, dispatch: dispatchBuilder, setDragState, setExportMenuOpen, fieldsRef, fieldCardRefs, fieldRectsRef, dragPayloadRef, blockDropRectRef });
      const selectedBlock = useMemo(() => selectedId ? blockForElement(schema, selectedId) : blockForContainer(schema, selectedContainerId), [schema.blocks, selectedId, selectedContainerId]);
      const selectedContainer = useMemo(() => selectedContainerId ? containerById(schema, selectedContainerId) : null, [schema.blocks, selectedContainerId]);
      const selectedField = useMemo(() => selectedId && (!selectedBlock || !isCompositeBlock(selectedBlock) || selectedContainerId) ? schemaElements(schema).find((field) => field.id === selectedId) || null : null, [schema.blocks, selectedId, selectedBlock, selectedContainerId]);

      useStoredSchema(schema);
      useDismissableLayer(exportMenuOpen, exportMenuRef, () => setExportMenuOpen(false));
      useEventListener(window, "dragend", builder.clearDragState, Boolean(dragState));
      useEventListener(window, "drop", builder.clearDragState, Boolean(dragState));
      useEventListener(window, "keydown", (event) => {
        if (event.key === "Escape") builder.clearDragState();
      }, Boolean(dragState));
      useFieldListAnimation(fieldCardRefs, fieldRectsRef, schema.blocks);

      const formName = formDisplayName(schema);
      const theme = schema.settings.theme;
      const typography = typographySettings(schema.settings.typography, theme);
      const activeDropIndex = Number.isInteger(dragState?.index) ? dragState.index : null;
      const activeDropY = Number.isFinite(dragState?.y) ? dragState.y : null;
      const draggingFieldId = dragState?.kind === "move" ? dragState.id : null;
      const draggingElementId = dragState?.kind === "element" ? dragState.elementId : null;
      const blockDropId = dragState?.blockId || null;
      const blockDropPlacement = dragState?.blockPlacement || null;
      const containerDropId = dragState?.containerDropId || null;
      const containerDropIndex = Number.isInteger(dragState?.containerDropIndex) ? dragState.containerDropIndex : null;
      const containerDropY = Number.isFinite(dragState?.containerDropY) ? dragState.containerDropY : null;
      const containerDropHeight = Number.isFinite(dragState?.containerDropHeight) ? dragState.containerDropHeight : null;
      const blockDropActive = Boolean(dragState?.kind && ["new", "move", "container", "element"].includes(dragState.kind));
      const listDragActive = dragState?.kind && activeDropIndex !== null;

      useEffect(() => {
        ensureGoogleFontLoaded(theme.fontFamily);
        TYPOGRAPHY_ROLES.forEach((role) => ensureGoogleFontLoaded(typography[role.key].fontFamily));
      }, [theme.fontFamily, typography.body.fontFamily, typography.heading.fontFamily, typography.description.fontFamily, typography.label.fontFamily]);

      return html`
        <div class="builder-root">
          <div class=${`shell${sidebarCollapsed ? " sidebar-collapsed" : ""}`}>
          <header class="topbar">
            <div class="toolbar-actions">
              <${IconButton} icon="fa-solid fa-rotate-left" title="Reset form" onClick=${builder.resetForm} />
              <label class="icon-button" for="importSchema" title="Open schema" aria-label="Open schema"><${Icon} icon="fa-regular fa-folder-open" /></label>
              <input class="sr-only" id="importSchema" type="file" accept="application/json,.json" onChange=${builder.importSchema} />
              <input
                class="current-form-name"
                value=${formName}
                maxlength="120"
                title=${formName}
                placeholder="Untitled form"
                aria-label="Form title"
                onInput=${(event) => builder.patchSchema({ settings: { name: event.currentTarget.value } })}
              />
            </div>
            <div class="top-actions">
              <${IconButton} icon="fa-solid fa-play" title="Preview form" onClick=${builder.previewForm} />
              <div class="export-menu-wrap" ref=${exportMenuRef}>
                <button
                  class="button primary"
                  type="button"
                  aria-haspopup="menu"
                  aria-expanded=${exportMenuOpen ? "true" : "false"}
                  aria-label="Export"
                  onClick=${() => setExportMenuOpen((open) => !open)}
                >
                  <span>Export</span><${Icon} icon="fa-solid fa-chevron-down" className="export-chevron" />
                </button>
                ${exportMenuOpen ? html`
                  <div class="export-menu" role="menu" aria-label="Export options">
                    <button class="export-menu-item" type="button" role="menuitem" onClick=${builder.exportSchema}>
                      <${Icon} icon="lucide-code-xml" /><span>Schema JSON</span>
                    </button>
                    <button class="export-menu-item" type="button" role="menuitem" onClick=${builder.exportRuntime}>
                      <${Icon} icon="lucide-package-open" /><span>Runtime HTML</span>
                    </button>
                  </div>
                ` : null}
              </div>
            </div>
          </header>

          <main class="workspace">
            <${IconButton} className="sidebar-expand-button" icon="fa-solid fa-chevron-right" title="Expand sidebar" aria-hidden=${!sidebarCollapsed} tabIndex=${sidebarCollapsed ? 0 : -1} onClick=${() => setSidebarCollapsed(false)} />

            <aside class="sidebar" aria-label="Form blocks" aria-hidden=${sidebarCollapsed} inert=${sidebarCollapsed ? "" : null}>
              <div class="sidebar-inner">
                <div class="sidebar-head">
                  <${IconButton} icon="fa-solid fa-chevron-left" title="Collapse sidebar" onClick=${() => setSidebarCollapsed(true)} />
                </div>
                <${Palette} onAdd=${builder.addField} onDragStart=${builder.beginDrag} onDragEnd=${builder.clearDragState} />
                <${SidebarSettings} schema=${schema} onSchemaChange=${builder.patchSchema} onOpenColor=${setActiveColorItem} onOpenTypography=${setActiveTypographyRole} />
              </div>
            </aside>

            <section class="canvas-shell" aria-label="Form canvas" style=${themeStyle(schema)} onClick=${builder.clearSelectionFromCanvas}>
              <article class="form-page">
                <div
                  class=${`fields-list${listDragActive ? " is-drag-target" : ""}`}
                  ref=${fieldsRef}
                  onDragOver=${builder.updateDropTarget}
                  onDragEnter=${builder.updateDropTarget}
                  onDragLeave=${builder.clearDropTarget}
                  onDrop=${builder.handleDrop}
                >
                  <${FieldListContent}
                    blocks=${schema.blocks}
                    selectedId=${selectedId}
                    selectedContainerId=${selectedContainerId}
                    draggingElementId=${draggingElementId}
                    containerDropId=${containerDropId}
                    containerDropIndex=${containerDropIndex}
                    containerDropY=${containerDropY}
                    containerDropHeight=${containerDropHeight}
                    removingId=${removingId}
                    draggingBlockId=${draggingFieldId}
                    blockDropId=${blockDropId}
                    blockDropPlacement=${blockDropPlacement}
                    blockDropActive=${blockDropActive}
                    onCardRef=${registerFieldCard}
                    onSelect=${builder.selectField}
                    onSelectContainer=${builder.selectContainer}
                    onMove=${builder.moveField}
                    onDuplicate=${builder.duplicateField}
                    onReset=${builder.resetField}
                    onDelete=${builder.deleteField}
                    onDuplicateContainer=${builder.duplicateContainer}
                    onResetContainer=${builder.resetContainer}
                    onDeleteContainer=${builder.deleteContainer}
                    onMoveElement=${builder.moveElement}
                    onMoveElementOut=${builder.moveElementOut}
                    onDuplicateElement=${builder.duplicateElement}
                    onDeleteElement=${builder.deleteElement}
                    onFieldDragStart=${builder.beginDrag}
                    onFieldDragEnd=${builder.clearDragState}
                    onBlockDragOver=${builder.updateBlockDropTarget}
                    onBlockDragLeave=${builder.clearBlockDropTarget}
                    onBlockDrop=${builder.handleBlockDrop}
                    onContainerDragOver=${builder.updateContainerDropTarget}
                    onContainerDragLeave=${builder.clearContainerDropTarget}
                    onContainerDrop=${builder.handleContainerDrop}
                  />
                  ${listDragActive && activeDropY !== null ? html`<${DropIndicator} y=${activeDropY} />` : null}
                </div>
              </article>
            </section>

            <aside class="inspector" aria-label="Field settings">
              <${Inspector}
                schema=${schema}
                selectedField=${selectedField}
                selectedBlock=${selectedBlock}
                selectedContainer=${selectedContainer}
                onSchemaChange=${builder.patchSchema}
                onFieldChange=${builder.patchSelectedField}
                onContainerChange=${builder.patchSelectedContainer}
              />
            </aside>
          </main>
        </div>

        ${activeColorItem ? html`
          <${ColorPickerModal}
            item=${activeColorItem}
            value=${theme[activeColorItem[0]]}
            defaultValue=${DEFAULT_THEME[activeColorItem[0]]}
            onChange=${(value) => builder.patchTheme({ [activeColorItem[0]]: value })}
            onClose=${() => setActiveColorItem(null)}
          />
        ` : null}

        ${activeTypographyRole ? html`
          <${CharacterStyleModal}
            role=${activeTypographyRole}
            value=${typography[activeTypographyRole.key]}
            defaultValue=${typographyRoleDefault(activeTypographyRole.key)}
            onChange=${(value) => builder.patchTypographyRole(activeTypographyRole.key, value)}
            onClose=${() => setActiveTypographyRole(null)}
          />
        ` : null}
      </div>
      `;
    }

    render(html`<${BuilderApp} />`, document.getElementById("app"));
  </script>
</body>

</html>
