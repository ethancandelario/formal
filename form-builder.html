      return blocks.flatMap((block) => {
        let changed = false;
        const containers = blockContainers(block).flatMap((container) => {
          if (container.id !== containerId) return [container];
          const elements = containerElements(container).filter((element) => element.id !== elementId);
          changed = elements.length !== containerElements(container).length;
          return elements.length ? [{ ...container, elements }] : [];
        });
        if (!changed) return [block];
        return containers.length ? [{ ...block, containers }] : [];
      });
    }

    function selectionForElement(schema, elementId) {
      const location = elementLocation(schema, elementId);
      return location ? { selectedId: elementId, selectedContainerId: location.container.id } : { selectedId: null, selectedContainerId: null };
    }

    function selectedBlockId(schema, elementId) {
      return blockForElement(schema, elementId)?.id || null;
    }

    function cloneElementWithNewId(element) {
      return schemaField({ ...clone(element), id: uid("field") });
    }

    function cloneContainerWithNewIds(container) {
      return {
        ...clone(container),
        id: uid("container"),
        elements: containerElements(container).map(cloneElementWithNewId)
      };
    }

    function cloneBlockWithNewIds(block) {
      return {
        ...clone(block),
        id: uid("block"),
        containers: blockContainers(block).map(cloneContainerWithNewIds)
      };
    }

    function resetElement(element) {
      return schemaField({ ...elementFromType(element.type), id: element.id });
    }

    function resetContainer(container) {
      const elements = containerElements(container).map(resetElement);
      return { ...container, ...defaultContainerLayout(elements), elements };
    }

    function hexColor(value) {
      const text = String(value).trim();
      if (!/^#[0-9a-f]{6}$/i.test(text)) throw new Error("Expected a #rrggbb color.");
      return text;
    }

    function fontFamilyValue(value) {
      const text = String(value).trim();
      if (!text || !/^[a-zA-Z0-9_\-\s"',.()]+$/.test(text)) throw new Error("Expected a valid font-family value.");
      return text;
    }

    function unquoteFontName(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      return text.replace(/^['"]|['"]$/g, "").trim();
    }

    function fontNameFromStack(value) {
      const first = fontFamilyValue(value).split(",")[0] || "";
      const name = unquoteFontName(first);
      return /^(ui-sans-serif|system-ui|-apple-system|BlinkMacSystemFont)$/i.test(name) ? "System UI" : name || "Roboto";
    }

    function fontOptionByFamily(value) {
      const stack = fontFamilyValue(value);
      const family = fontNameFromStack(stack);
      return { family, name: family, stack, system: family === "System UI" };
    }

    function googleFontCategoryStack(category) {
      const clean = String(category || "").toLowerCase();
      if (clean.includes("serif") && !clean.includes("sans")) return 'ui-serif, Georgia, Cambria, "Times New Roman", Times, serif';
      if (clean.includes("mono")) return 'ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace';
      if (clean.includes("display") || clean.includes("handwriting")) return 'ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
      return 'ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    }

    function quoteFontName(value) {
      return `"${String(value || "").replace(/["\\]/g, "").trim()}"`;
    }

    function googleFontStack(family, category) {
      return `${quoteFontName(family)}, ${googleFontCategoryStack(category)}`;
    }

    function googleFontParam(family) {
      return encodeURIComponent(String(family || "").trim()).replace(/%20/g, "+");
    }

    function googleFontFamilyFromStack(value) {
      const family = fontNameFromStack(value);
      return family && family !== "System UI" ? family : "";
    }

    function ensureGoogleFontLoaded(value) {
      const family = googleFontFamilyFromStack(value);
      if (!family) return;
      const id = `google-font-${family.toLowerCase().replace(/[^a-z0-9]+/g, "-")}`;
      if (document.getElementById(id)) return;
      const link = document.createElement("link");
      link.id = id;
      link.rel = "stylesheet";
      link.href = `https://fonts.googleapis.com/css2?family=${googleFontParam(family)}:wght@400;500;700;900&display=swap`;
      document.head.appendChild(link);
    }

    function googleFontCatalogItems(payload) {
      const items = Array.isArray(payload) ? payload : Array.isArray(payload?.items) ? payload.items : [];
      const seen = new Set();
      return items
        .map((item) => ({ family: String(item?.family || "").trim(), category: String(item?.category || "") }))
        .filter((item) => {
          if (!item.family || seen.has(item.family)) return false;
          seen.add(item.family);
          return true;
        });
    }

    function fetchGoogleFontCatalog() {
      if (!googleFontCatalogPromise) {
        googleFontCatalogPromise = fetch(GOOGLE_FONT_METADATA_URL)
          .then((response) => {
            if (!response.ok) throw new Error("Unable to load Google Fonts metadata");
            return response.json();
          })
          .then(googleFontCatalogItems);
      }
      return googleFontCatalogPromise;
    }

    function typographyRoleDefault(key, theme = DEFAULT_THEME) {
      const role = TYPOGRAPHY_ROLES.find((item) => item.key === key);
      if (!role) throw new Error(`Unsupported typography role: ${key}`);
      const base = DEFAULT_TYPOGRAPHY[key];
      return {
        ...base,
        fontFamily: theme?.fontFamily || base.fontFamily,
        color: theme?.[role.colorSource] || base.color
      };
    }

    function isPlainObject(value) {
      return value && typeof value === "object" && !Array.isArray(value);
    }

    function typographyRoleSettings(value, key, theme = DEFAULT_THEME) {
      const defaults = typographyRoleDefault(key, theme);
      const source = isPlainObject(value) ? value : {};
      return TYPOGRAPHY_STYLE_KEYS.reduce((settings, styleKey) => {
        settings[styleKey] = source[styleKey] ?? defaults[styleKey];
        return settings;
      }, {});
    }

    function typographySettings(input, theme = DEFAULT_THEME) {
      const source = isPlainObject(input) ? input : {};
      return TYPOGRAPHY_ROLES.reduce((settings, role) => {
        settings[role.key] = typographyRoleSettings(source[role.key], role.key, theme);
        return settings;
      }, {});
    }

    function typographyStyle(style, { includeSize = true, includeColor = true } = {}) {
      return [
        `font-family: ${style.fontFamily}`,
        includeColor ? `color: ${style.color}` : "",
        includeSize ? `font-size: ${style.size}px` : "",
        `font-weight: ${style.weight}`,
        `font-style: ${style.style}`,
        `line-height: ${style.lineHeight}`,
        `letter-spacing: ${style.letterSpacing}px`,
        `text-transform: ${style.textTransform}`
      ].filter(Boolean).join("; ");
    }

    function typographySummary(style) {
      return `${fontNameFromStack(style.fontFamily)} / ${style.size}px / ${style.weight}`;
    }

    function themeStyle(schema) {
      const theme = schema.settings.theme;
      const layout = schema.settings.layout;
      const type = typographySettings(schema.settings.typography, theme);
      return [
        `--bg: ${theme.bg}`,
        `--panel: ${theme.panel}`,
        `--panel-2: ${theme.panel2}`,
        `--ink: ${type.body.color}`,
        `--muted: ${theme.muted}`,
        `--line: ${theme.line}`,
        `--accent: ${theme.accent}`,
        `--accent-2: ${theme.accent2}`,
        `--accent-highlight: ${theme.accentHighlight}`,
        `--success: ${theme.success}`,
        `--warning: ${theme.warning}`,
        `--danger: ${theme.danger}`,
        `--success-soft: ${hexToRgba(theme.success, 0.12)}`,
        `--warning-soft: ${hexToRgba(theme.warning, 0.12)}`,
        `--danger-soft: ${hexToRgba(theme.danger, 0.12)}`,
        `--focus-ring: ${hexToRgba(theme.accent, 0.28)}`,
        `--form-font-family: ${type.body.fontFamily}`,
        `--form-page-margin: ${layout.pageMargin}px`,
        `--form-page-padding: ${layout.pagePadding}px`,
        `--form-field-spacing: ${layout.fieldSpacing}px`,
        `--form-field-padding: ${layout.fieldPadding}px`,
        ...TYPOGRAPHY_ROLES.flatMap((role) => {
          const textStyle = type[role.key];
          return [
            `--${role.key}-font-family: ${textStyle.fontFamily}`,
            `--${role.key}-color: ${textStyle.color}`,
            `--${role.key}-font-size: ${textStyle.size}px`,
            `--${role.key}-font-weight: ${textStyle.weight}`,
            `--${role.key}-font-style: ${textStyle.style}`,
            `--${role.key}-line-height: ${textStyle.lineHeight}`,
            `--${role.key}-letter-spacing: ${textStyle.letterSpacing}px`,
            `--${role.key}-text-transform: ${textStyle.textTransform}`
          ];
        })
      ].join("; ");
    }

    function hexToRgba(hex, alpha) {
      const value = parseInt(hexColor(hex).slice(1), 16);
      const r = (value >> 16) & 255;
      const g = (value >> 8) & 255;
      const b = value & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function clampByte(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return null;
      return Math.max(0, Math.min(255, Math.round(number)));
    }

    function hexToRgb(hex) {
      const value = parseInt(hexColor(hex).slice(1), 16);
      return {
        r: (value >> 16) & 255,
        g: (value >> 8) & 255,
        b: value & 255
      };
    }

    function rgbToHex(r, g, b) {
      return "#" + [r, g, b].map((value) => clampByte(value)).map((value) => value.toString(16).padStart(2, "0")).join("");
    }

    function hexCandidate(value) {
      const text = String(value || "").trim();
      const withHash = text.startsWith("#") ? text : "#" + text;
      return /^#[0-9a-f]{6}$/i.test(withHash) ? withHash : "";
    }



    function padDatePart(value) {
      return String(value).padStart(2, "0");
    }

    function isoFromDate(date) {
      return [date.getFullYear(), padDatePart(date.getMonth() + 1), padDatePart(date.getDate())].join("-");
    }

    function dateFromISO(value) {
      const text = String(value || "").trim();
      if (!/^\d{4}-\d{2}-\d{2}$/.test(text)) return null;
      const [year, month, day] = text.split("-").map(Number);
      const date = new Date(year, month - 1, day);
      if (date.getFullYear() !== year || date.getMonth() !== month - 1 || date.getDate() !== day) return null;
      return date;
    }

    function todayISO() {
      return isoFromDate(new Date());
    }

    function dateTime(value) {
      const date = dateFromISO(value);
      return date ? date.getTime() : null;
    }

    function readableDate(value) {
      const date = dateFromISO(value);
      return date ? date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }) : "Not set";
    }

    function monthLabel(date) {
      return date.toLocaleDateString(undefined, { month: "long", year: "numeric" });
    }

    class CalendarModel {
      constructor(field) {
        Object.assign(this, field.settings);
      }

      get anchorDate() {
        return this.startDate || this.endDate || this.milestones.find((item) => item.date)?.date || todayISO();
      }

      get monthDate() {
        const date = dateFromISO(this.anchorDate) || new Date();
        return new Date(date.getFullYear(), date.getMonth(), 1);
      }

      get visibleMilestones() {
        return this.milestones.filter((item) => item.date || item.label);
      }

      milestonesForDate(iso) {
        return this.milestones.filter((item) => item.date === iso);
      }

      static gridDates(monthDate) {
        const first = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
        const start = new Date(first);
        start.setDate(first.getDate() - first.getDay());
        return Array.from({ length: 42 }, (_, index) => {
          const date = new Date(start);
          date.setDate(start.getDate() + index);
          return date;
        });
      }
    }

    function settingNumber(value, defaultValue) {
      const text = String(value ?? "").trim();
      if (!text) return defaultValue;
      const number = Number(text);
      return Number.isFinite(number) ? number : defaultValue;
    }

    class RadarModel {
      constructor(field) {
        const settings = field.settings || field;
        this.mode = settings.mode === "point" ? "point" : "shape";
        this.max = settingNumber(settings.max, DEFAULT_RADAR_MAX);
        this.axes = Array.isArray(settings.axes) && settings.axes.length ? settings.axes : DEFAULT_RADAR_AXES;
        this.defaultValues = settings.defaultValues;
        this.defaultPoint = settings.defaultPoint;
      }

      get midpoint() {
        return Math.round(RADAR_MIN_VALUE + (this.max - RADAR_MIN_VALUE) / 2);
      }

      get values() {
        return RadarModel.values(this.defaultValues, this.axes, this.max);
      }

      get point() {
        return RadarModel.point(this.defaultPoint, this.max);
      }

      static clampValue(value, max) {
        const number = settingNumber(value, Number.NaN);
        return Number.isFinite(number) ? Math.max(RADAR_MIN_VALUE, Math.min(max, Math.round(number))) : null;
      }

      static values(values, axes, max) {
        const midpoint = Math.round(RADAR_MIN_VALUE + (max - RADAR_MIN_VALUE) / 2);
        const source = Array.isArray(values) ? values : [];
        return axes.map((_, index) => RadarModel.clampValue(source[index], max) ?? midpoint);
      }

      static angle(value) {
        const number = settingNumber(value, DEFAULT_RADAR_POINT.angle);
        const wrapped = ((number % 360) + 360) % 360;
        return Math.round(wrapped * 100) / 100;
      }

      static pointValue(value, max) {
        const number = settingNumber(value, Number.NaN);
        return Number.isFinite(number) ? Math.round(Math.max(RADAR_MIN_VALUE, Math.min(max, number)) * 100) / 100 : null;
      }

      static point(point, max) {
        const source = point && typeof point === "object" && !Array.isArray(point) ? point : DEFAULT_RADAR_POINT;
        return {
          angle: RadarModel.angle(source.angle),
          value: RadarModel.pointValue(source.value, max) ?? RadarModel.pointValue(DEFAULT_RADAR_POINT.value, max) ?? RADAR_MIN_VALUE
        };
      }

      static scale(value, max) {
        return Math.max(0, Math.min(1, Number(value) / Math.max(1, max)));
      }

      static vertex(index, count, center, radius) {
        const angle = -Math.PI / 2 + (Math.PI * 2 * index / count);
        return {
          x: Math.round((center + Math.cos(angle) * radius) * 100) / 100,
          y: Math.round((center + Math.sin(angle) * radius) * 100) / 100
        };
      }

      static polygon(values, max, center, radius) {
        return values.map((value, index) => {
          const point = RadarModel.vertex(index, values.length, center, radius * RadarModel.scale(value, max));
          return `${point.x},${point.y}`;
        }).join(" ");
      }

      static polar(angle, value, max, center, radius) {
        const radians = -Math.PI / 2 + (RadarModel.angle(angle) * Math.PI / 180);
        const scaled = RadarModel.scale(value, max);
        return {
          x: Math.round((center + Math.cos(radians) * radius * scaled) * 100) / 100,
          y: Math.round((center + Math.sin(radians) * radius * scaled) * 100) / 100
        };
      }

      static format(value) {
        const number = Number(value);
        if (!Number.isFinite(number)) return "";
        return Number.isInteger(number) ? String(number) : number.toFixed(2).replace(/0+$/, "").replace(/\.$/, "");
      }

      static describe(angle, axes) {
        const step = 360 / axes.length;
        const cleaned = RadarModel.angle(angle);
        const position = cleaned / step;
        const lower = Math.floor(position) % axes.length;
        const upper = (lower + 1) % axes.length;
        const blend = position - lower;
        if (blend < 0.06) return axes[lower];
        if (blend > 0.94) return axes[upper];
        return `${axes[lower]} / ${axes[upper]}`;
      }
    }

    function assertObject(value, name) {
      if (!value || typeof value !== "object" || Array.isArray(value)) throw new Error(`${name} must be an object.`);
      return value;
    }

    function assertString(value, name) {
      if (typeof value !== "string") throw new Error(`${name} must be a string.`);
    }

    function assertBoolean(value, name) {
      if (typeof value !== "boolean") throw new Error(`${name} must be a boolean.`);
    }

    function assertArray(value, name) {
      if (!Array.isArray(value)) throw new Error(`${name} must be an array.`);
    }

    function assertNumber(value, name) {
      if (typeof value !== "number" || !Number.isFinite(value)) throw new Error(`${name} must be a finite number.`);
    }

    function assertInteger(value, name) {
      assertNumber(value, name);
      if (!Number.isInteger(value)) throw new Error(`${name} must be an integer.`);
    }

    function assertExactKeys(value, keys, name) {
      keys.forEach((key) => {
        if (!(key in value)) throw new Error(`${name}.${key} is required.`);
      });
      Object.keys(value).forEach((key) => {
        if (!keys.includes(key)) throw new Error(`${name}.${key} is not supported.`);
      });
    }

    function assertOneOf(value, choices, name) {
      if (!choices.includes(value)) throw new Error(`${name} must be one of: ${choices.join(", ")}.`);
    }

    function assertNumberRange(value, name, min, max, integer = false) {
      if (integer) {
        assertInteger(value, name);
      } else {
        assertNumber(value, name);

      if (value < min || value > max) throw new Error(`${name} must be between ${min} and ${max}.`);

      media: { settings: MEDIA_SETTING_KEYS, validate: (settings) => assertMediaSettingValues(settings, "media.settings") },
      headline: {
        settings: ["headingHorizontalAlignment", "headingVerticalAlignment", "descriptionHorizontalAlignment", "descriptionVerticalAlignment"],
        validate: (settings) => {
          assertOneOf(settings.headingHorizontalAlignment, ["left", "center", "right"], "headline.settings.headingHorizontalAlignment");
          assertOneOf(settings.headingVerticalAlignment, ["top", "center", "bottom"], "headline.settings.headingVerticalAlignment");
          assertOneOf(settings.descriptionHorizontalAlignment, ["left", "center", "right"], "headline.settings.descriptionHorizontalAlignment");
          assertOneOf(settings.descriptionVerticalAlignment, ["top", "center", "bottom"], "headline.settings.descriptionVerticalAlignment");

          assertBoolean(settings.showLine, "spacer.settings.showLine");
          assertOneOf(settings.lineStyle, ["solid", "dashed", "dotted"], "spacer.settings.lineStyle");
          assertNumberRange(settings.lineThickness, "spacer.settings.lineThickness", 1, 12, true);

    class FieldSchemaValidator {
      constructor(raw) {
        this.field = assertObject(raw, "field");
        typeMeta(this.field.type);
        this.baseKeys = ["id", "type", "label", "description", "required", "settings"];
        assertString(this.field.id, "field.id");
        assertString(this.field.type, "field.type");
        assertString(this.field.label, `${this.field.type}.label`);
        assertString(this.field.description, `${this.field.type}.description`);
        assertBoolean(this.field.required, `${this.field.type}.required`);
        this.settings = assertObject(this.field.settings, `${this.field.type}.settings`);
      }

      fieldShape(extraKeys = [], settingKeys = []) {
        assertExactKeys(this.field, [...this.baseKeys, ...extraKeys], "field");
        assertSettingKeys(this.settings, settingKeys, this.field.type);
      }

      placeholder() {
        this.fieldShape(["placeholder"]);
        assertString(this.field.placeholder, `${this.field.type}.placeholder`);
      }

      options(settingKeys = []) {
        this.fieldShape(["options"], settingKeys);
        assertArray(this.field.options, `${this.field.type}.options`);
        this.field.options.forEach((option, index) => assertString(option, `${this.field.type}.options[${index}]`));
      }

      checkboxOptions() {
        this.options(["allowCustomOptions"]);
        assertBoolean(this.settings.allowCustomOptions, "checkbox.settings.allowCustomOptions");
      }
    }

    function schemaField(raw) {
      const validator = new FieldSchemaValidator(raw);
      if (PLACEHOLDER_FIELD_TYPES.has(validator.field.type)) validator.placeholder();
      else if (validator.field.type === "checkbox") validator.checkboxOptions();
      else if (OPTION_FIELD_TYPES.has(validator.field.type)) validator.options();
      else {
        const rule = FIELD_SCHEMA_RULES[validator.field.type];
        if (rule) {
          validator.fieldShape([], rule.settings);
          rule.validate?.(validator.settings, validator.field);
        }
      }
      return validator.field;
    }

    function schemaContainer(raw, path) {
      const container = assertObject(raw, path);
      assertExactKeys(container, ["id", "placement", "horizontalAlignment", "verticalAlignment", "horizontalSize", "verticalSize", "elements"], path);
      assertString(container.id, `${path}.id`);
      assertOneOf(container.placement, CONTAINER_PLACEMENTS, `${path}.placement`);
      assertOneOf(container.horizontalAlignment, ["left", "center", "right"], `${path}.horizontalAlignment`);
      assertOneOf(container.verticalAlignment, ["top", "center", "bottom"], `${path}.verticalAlignment`);
      assertOneOf(container.horizontalSize, ["auto", "stretch"], `${path}.horizontalSize`);
      assertOneOf(container.verticalSize, ["auto", "stretch"], `${path}.verticalSize`);
      assertArray(container.elements, `${path}.elements`);
      if (!container.elements.length) throw new Error(`${path}.elements must contain at least one element.`);
      container.elements.forEach(schemaField);
      return container;
    }

    function schemaBlock(raw, path) {
      const block = assertObject(raw, path);
      assertExactKeys(block, ["id", "containers"], path);
      assertString(block.id, `${path}.id`);
      assertArray(block.containers, `${path}.containers`);
      if (!block.containers.length) throw new Error(`${path}.containers must contain at least one container.`);
      block.containers.forEach((container, index) => schemaContainer(container, `${path}.containers[${index}]`));
      return block;
    }

    function schemaDocument(input) {
      const schema = assertObject(input, "schema");
      assertExactKeys(schema, ["createdAt", "updatedAt", "settings", "blocks"], "schema");
      assertString(schema.createdAt, "schema.createdAt");
      assertString(schema.updatedAt, "schema.updatedAt");
      assertObject(schema.settings, "schema.settings");
      assertExactKeys(schema.settings, ["name", "theme", "layout", "typography"], "schema.settings");
      assertString(schema.settings.name, "schema.settings.name");
      assertObject(schema.settings.theme, "schema.settings.theme");
      assertExactKeys(schema.settings.theme, [...THEME_COLOR_FIELDS.map(([key]) => key), "fontFamily"], "schema.settings.theme");
      THEME_COLOR_FIELDS.forEach(([key]) => assertHexColor(schema.settings.theme[key], `schema.settings.theme.${key}`));
      assertFontFamily(schema.settings.theme.fontFamily, "schema.settings.theme.fontFamily");
      assertAppearanceSettings(schema.settings);
      assertArray(schema.blocks, "schema.blocks");
      const seenBlockIds = new Set();
      const seenContainerIds = new Set();
      const seenElementIds = new Set();
      schema.blocks.forEach((block, blockIndex) => {
        schemaBlock(block, `schema.blocks[${blockIndex}]`);
        if (seenBlockIds.has(block.id)) throw new Error(`Duplicate block id: ${block.id}`);
        seenBlockIds.add(block.id);
        block.containers.forEach((container, containerIndex) => {
          if (seenContainerIds.has(container.id)) throw new Error(`Duplicate container id: ${container.id}`);
          seenContainerIds.add(container.id);
          container.elements.forEach((field, elementIndex) => {
            if (seenElementIds.has(field.id)) throw new Error(`Duplicate field id: ${field.id}`);
            seenElementIds.add(field.id);
            if (NON_REQUIRED_FIELD_TYPES.has(field.type) && field.required) throw new Error(`schema.blocks[${blockIndex}].containers[${containerIndex}].elements[${elementIndex}].required must be false for ${field.type}.`);
          });
        });
      });
      return schema;
    }

    function formDisplayName(schema) {
      return String(schema.settings.name || "").trim();
    }

    function formHasContent(schema) {
      return schema.settings.name !== DEFAULT_FORM_NAME
        || JSON.stringify(schema.settings.theme) !== JSON.stringify(DEFAULT_THEME)
        || JSON.stringify(schema.settings.layout) !== JSON.stringify(DEFAULT_LAYOUT)
        || JSON.stringify(typographySettings(schema.settings.typography, schema.settings.theme)) !== JSON.stringify(DEFAULT_TYPOGRAPHY)
        || schema.blocks.length > 0;
    }

    function loadInitialSchema() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) return schemaDocument(JSON.parse(saved));
      } catch (error) {
        console.warn(error);
      }
      return defaultSchema();
    }

    function safeFileName(value) {
      return String(value).trim().toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || "form-schema";
    }

    function encodeSchemaToken(schema) {
      const bytes = new TextEncoder().encode(JSON.stringify(schema));
      let binary = "";
      bytes.forEach((byte) => {
        binary += String.fromCharCode(byte);
      });
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    function reorder(list, from, to) {
      const next = [...list];
      const [item] = next.splice(from, 1);
      next.splice(to, 0, item);
      return next;
    }

    function insertAt(list, index, item) {
      const next = [...list];
      next.splice(DragPayloadModel.clampIndex(index, next.length), 0, item);
      return next;
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    class ChoiceSetting {
      constructor(name, options) {
        this.name = name;
        this.options = options;
        this.values = options.map((option) => option.value);
      }

      read(value) {
        if (!this.values.includes(value)) throw new Error(`Unsupported ${this.name}: ${value}`);
        return value;
      }
    }

    class AlignmentSetting extends ChoiceSetting {
      constructor(name, options) {
        super(name, options);
      }

      grid(value) {
        const option = this.option(value);
        return option.grid;
      }

      flex(value) {
        const option = this.option(value);
        return option.flex;
      }

      text(value) {
        const option = this.option(value);
        return option.text || "center";
      }

      objectPosition(value) {
        const option = this.option(value);
        return option.objectPosition || "center";
      }

      option(value) {
        const clean = this.read(value);
        return this.options.find((option) => option.value === clean);
      }
    }

    class SizeSetting extends ChoiceSetting {
      constructor(name) {
        super(name, [
          { value: "auto", label: "Auto" },
          { value: "stretch", label: "Stretch" }
        ]);
      }

      isStretch(value) {
        return this.read(value) === "stretch";
      }
    }

    const HORIZONTAL_ALIGNMENT = new AlignmentSetting("horizontal alignment", [
      { value: "left", label: "Left", grid: "start", flex: "flex-start", text: "left", objectPosition: "left" },
      { value: "center", label: "Center", grid: "center", flex: "center", text: "center", objectPosition: "center" },
      { value: "right", label: "Right", grid: "end", flex: "flex-end", text: "right", objectPosition: "right" }
    ]);
    const VERTICAL_ALIGNMENT = new AlignmentSetting("vertical alignment", [
      { value: "top", label: "Top", grid: "start", flex: "flex-start", objectPosition: "top" },
      { value: "center", label: "Center", grid: "center", flex: "center", objectPosition: "center" },
      { value: "bottom", label: "Bottom", grid: "end", flex: "flex-end", objectPosition: "bottom" }
    ]);
    const HORIZONTAL_SIZE = new SizeSetting("horizontal size");
    const VERTICAL_SIZE = new SizeSetting("vertical size");
    const CONTAINER_LAYOUT_CONTROLS = [
      ["horizontalAlignment", "Horizontal alignment", HORIZONTAL_ALIGNMENT.options],
      ["horizontalSize", "Horizontal size", HORIZONTAL_SIZE.options],
      ["verticalAlignment", "Vertical alignment", VERTICAL_ALIGNMENT.options],
      ["verticalSize", "Vertical size", VERTICAL_SIZE.options]
    ];
    const HEADLINE_ALIGNMENT_CONTROLS = [
      ["headingHorizontalAlignment", "Heading horizontal alignment", HORIZONTAL_ALIGNMENT.options],
      ["headingVerticalAlignment", "Heading vertical alignment", VERTICAL_ALIGNMENT.options],
      ["descriptionHorizontalAlignment", "Subhead horizontal alignment", HORIZONTAL_ALIGNMENT.options],
      ["descriptionVerticalAlignment", "Subhead vertical alignment", VERTICAL_ALIGNMENT.options]
    ];
    const MEDIA_OBJECT_FIT_OPTIONS = [["contain", "Contain"], ["cover", "Cover"], ["fill", "Fill"], ["scale-down", "Scale down"]];
    const MEDIA_LAYOUT_CONTROLS = [
      ["mediaHorizontalAlignment", "horizontalAlignment", "Horizontal alignment", HORIZONTAL_ALIGNMENT.options],
      ["mediaVerticalAlignment", "verticalAlignment", "Vertical alignment", VERTICAL_ALIGNMENT.options],
      ["mediaHorizontalSize", "horizontalSize", "Horizontal size", HORIZONTAL_SIZE.options],
      ["mediaObjectFit", "objectFit", "Object fit", MEDIA_OBJECT_FIT_OPTIONS]
    ];
    const MEDIA_SOURCE_OPTIONS = [["url", "URL"], ["file", "File"], ["html", "HTML"]];
    const RADAR_MODE_OPTIONS = [["shape", "Multi-node shape"], ["point", "Single node"]];
    const SPACER_LINE_STYLE_OPTIONS = [["solid", "Solid"], ["dashed", "Dashed"], ["dotted", "Dotted"]];

    class ContainerLayoutModel {
      constructor(container) {
        this.horizontalAlignment = HORIZONTAL_ALIGNMENT.read(container.horizontalAlignment);
        this.verticalAlignment = VERTICAL_ALIGNMENT.read(container.verticalAlignment);
        this.horizontalSize = HORIZONTAL_SIZE.read(container.horizontalSize);
        this.verticalSize = VERTICAL_SIZE.read(container.verticalSize);
      }

      get style() {
        const horizontalStretch = HORIZONTAL_SIZE.isStretch(this.horizontalSize);
        const verticalStretch = VERTICAL_SIZE.isStretch(this.verticalSize);
        const horizontal = horizontalStretch ? "stretch" : HORIZONTAL_ALIGNMENT.grid(this.horizontalAlignment);
        const vertical = verticalStretch ? "stretch" : VERTICAL_ALIGNMENT.grid(this.verticalAlignment);
        const width = horizontalStretch ? "100%" : "max-content";
        const height = verticalStretch ? "100%" : "auto";
        return `justify-self: ${horizontal}; align-self: ${vertical}; justify-items: stretch; align-content: ${vertical}; width: ${width}; max-width: 100%; height: ${height}; box-sizing: border-box;`;
      }
    }

    class TextAlignmentModel {
      constructor(horizontal, vertical) {
        this.horizontal = HORIZONTAL_ALIGNMENT.read(horizontal);
        this.vertical = VERTICAL_ALIGNMENT.read(vertical);
      }

      get style() {
        return `display: flex; justify-content: ${HORIZONTAL_ALIGNMENT.flex(this.horizontal)}; align-items: ${VERTICAL_ALIGNMENT.flex(this.vertical)}; text-align: ${HORIZONTAL_ALIGNMENT.text(this.horizontal)};`;
      }
    }

    class HeadlineModel {
      constructor(field) {
        const settings = field.settings;
        this.field = field;
        this.headingHorizontalAlignment = HORIZONTAL_ALIGNMENT.read(settings.headingHorizontalAlignment);
        this.headingVerticalAlignment = VERTICAL_ALIGNMENT.read(settings.headingVerticalAlignment);
        this.descriptionHorizontalAlignment = HORIZONTAL_ALIGNMENT.read(settings.descriptionHorizontalAlignment);
        this.descriptionVerticalAlignment = VERTICAL_ALIGNMENT.read(settings.descriptionVerticalAlignment);
        this.showLabel = settings.showLabel;
        this.outline = settings.outline;
        this.background = settings.background;
      }

      textStyle(horizontalKey, verticalKey) {
        return new TextAlignmentModel(this[horizontalKey], this[verticalKey]).style;
      }
    }

    class MediaModel {
      constructor(field) {
        const settings = field.settings;
        const objectFit = settings.objectFit;
        if (!["contain", "cover", "fill", "scale-down"].includes(objectFit)) throw new Error(`Unsupported media fit: ${objectFit}`);
        this.field = field;
        this.sourceType = settings.sourceType;
        this.url = settings.url;
        this.dataUrl = settings.dataUrl;
        this.mimeType = settings.mimeType;
        this.fileName = settings.fileName;
        this.alt = settings.alt;
        this.caption = settings.caption;
        this.html = settings.html;
        this.iframeHeight = settings.iframeHeight;
        this.horizontalAlignment = HORIZONTAL_ALIGNMENT.read(settings.horizontalAlignment);
        this.verticalAlignment = VERTICAL_ALIGNMENT.read(settings.verticalAlignment);
        this.horizontalSize = HORIZONTAL_SIZE.read(settings.horizontalSize);
        this.scale = settings.scale;
        this.maxWidth = settings.maxWidth;
        this.maxHeight = settings.maxHeight;
        this.padding = settings.padding;
        this.objectFit = objectFit;
        this.outline = settings.outline;
        this.background = settings.background;
      }

      get source() {
        return this.sourceType === "file" ? this.dataUrl : this.url;
      }

      get kind() {
        if (this.sourceType === "html") return "html";
        const source = String(this.source || "").toLowerCase().split(/[?#]/)[0];
        const mime = String(this.mimeType || "").toLowerCase();
        if (mime.startsWith("image/") || source.startsWith("data:image/") || /\.(apng|avif|gif|jpe?g|png|svg|webp)$/i.test(source)) return "image";
        if (mime.startsWith("video/") || source.startsWith("data:video/") || /\.(mp4|m4v|mov|ogv|webm)$/i.test(source)) return "video";
        if (mime.startsWith("audio/") || source.startsWith("data:audio/") || /\.(aac|flac|m4a|mp3|oga|ogg|wav|webm)$/i.test(source)) return "audio";
        if (mime === "application/pdf" || source.startsWith("data:application/pdf") || /\.pdf$/i.test(source)) return "document";
        return "unknown";
      }

      get title() {
        return this.alt || this.fileName || this.field.label;
      }

      get alignmentStyle() {
        return `justify-content: ${HORIZONTAL_ALIGNMENT.flex(this.horizontalAlignment)}; align-items: ${VERTICAL_ALIGNMENT.flex(this.verticalAlignment)}; text-align: ${HORIZONTAL_ALIGNMENT.text(this.horizontalAlignment)}; padding: ${this.padding}px;`;
      }

      get audioStyle() {
        return HORIZONTAL_SIZE.isStretch(this.horizontalSize) ? "width: 100%;" : `width: ${this.scale}%; ${this.maxWidth ? `max-width: ${this.maxWidth};` : ""}`;
      }

      visualStyle(extra = "") {
        const width = HORIZONTAL_SIZE.isStretch(this.horizontalSize) ? "100%" : `${this.scale}%`;
        const maxWidth = !HORIZONTAL_SIZE.isStretch(this.horizontalSize) && this.maxWidth ? `max-width: ${this.maxWidth};` : "";
        const maxHeight = `max-height: ${this.maxHeight}px;`;
        const positionX = HORIZONTAL_ALIGNMENT.objectPosition(this.horizontalAlignment);
        const positionY = VERTICAL_ALIGNMENT.objectPosition(this.verticalAlignment);
        return `width: ${width}; ${maxWidth} ${maxHeight} object-fit: ${this.objectFit}; object-position: ${positionX} ${positionY}; ${extra}`.trim();
      }
    }

    function MediaPreview({ field }) {
      const media = new MediaModel(field);
      const source = media.source;
      const kind = media.kind;
      const visualStyle = media.visualStyle();

      if (kind === "html") {
        return html`
          <div class="media-preview">
            <div class="media-content-wrap" style=${media.alignmentStyle}>
              ${media.html
            ? html`<iframe class="media-embed media-visual" title=${media.title} srcdoc=${media.html} sandbox="allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox" style=${media.visualStyle(`height: ${media.iframeHeight}px; max-height: none;`)}></iframe>`
            : html`<div class="media-placeholder" style=${HORIZONTAL_SIZE.isStretch(media.horizontalSize) ? "width: 100%;" : ""}>Embedded HTML</div>`}
            </div>
            ${media.caption ? html`<p class="media-caption">${media.caption}</p>` : null}
          </div>
        `;
      }

      if (!source) {
        return html`<div class="media-preview"><div class="media-placeholder">No media selected</div></div>`;
      }

      return html`
        <div class="media-preview">
          <div class="media-content-wrap" style=${media.alignmentStyle}>
            ${kind === "image" ? html`<img class="media-visual" src=${source} alt=${media.alt || ""} style=${visualStyle} />` : null}
            ${kind === "video" ? html`<video class="media-visual" src=${source} controls playsinline title=${media.title} style=${visualStyle}></video>` : null}
            ${kind === "audio" ? html`<audio class="media-visual" src=${source} controls title=${media.title} style=${media.audioStyle}></audio>` : null}
            ${kind === "document" ? html`<object class="media-visual" data=${source} type="application/pdf" title=${media.title} style=${media.visualStyle(`height: ${media.iframeHeight}px; max-height: none;`)}><a class="media-link" href=${source} target="_blank" rel="noreferrer"><${Icon} icon="fa-solid fa-arrow-up-right-from-square" /><span>${media.fileName || source}</span></a></object>` : null}
            ${kind === "unknown" ? html`<a class="media-link" href=${source} target="_blank" rel="noreferrer"><${Icon} icon="fa-solid fa-arrow-up-right-from-square" /><span>${media.fileName || source}</span></a>` : null}
          </div>
          ${media.caption ? html`<p class="media-caption">${media.caption}</p>` : null}
        </div>
      `;
    }

    function Icon({ icon, className = "", title = "" }) {
      const definition = ICONS[String(icon || "").trim()];
      if (!definition) return null;
      const svgClass = ["svg-icon", definition.className, className].filter(Boolean).join(" ");
      const viewBox = Array.isArray(definition) ? `0 0 ${definition[0]} ${definition[1]}` : definition.viewBox;
      const content = Array.isArray(definition) ? html`<path d=${definition[2]}></path>` : definition.content();
      const labelProps = title ? { role: "img", "aria-label": title } : { "aria-hidden": "true" };
      return html`<svg class=${svgClass} viewBox=${viewBox} focusable="false" ...${labelProps}>${title ? html`<title>${title}</title>` : null}${content}</svg>`;
    }

    function IconButton({ icon, title, className = "", ...props }) {
      return html`
        <button class=${["icon-button", className].filter(Boolean).join(" ")} type="button" title=${title} aria-label=${props["aria-label"] || title} ...${props}>
          <${Icon} icon=${icon} />
        </button>
      `;
    }

    function RadarPreview({ field }) {
      const radar = new RadarModel(field);
      const { axes, mode, max } = radar;
      const center = 65;
      const radius = 44;
      const values = radar.values;
      const point = radar.point;
      const polygon = RadarModel.polygon(values, max, center, radius);
      const pointPosition = RadarModel.polar(point.angle, point.value, max, center, radius);

      return html`
        <div class="radar-preview">
          <svg viewBox="0 0 130 130" role="img" aria-label=${mode === "point" ? "Radar single-node preview" : "Radar preview"}>
            <g class="radar-grid">
              ${[0.35, 0.7, 1].map((scale) => html`
                <polygon points=${axes.map((_, index) => {
        const gridPoint = RadarModel.vertex(index, axes.length, center, radius * scale);
        return `${gridPoint.x},${gridPoint.y}`;
      }).join(" ")} />
              `)}
              ${axes.map((_, index) => {
        const gridPoint = RadarModel.vertex(index, axes.length, center, radius);
        return html`<line x1=${center} y1=${center} x2=${gridPoint.x} y2=${gridPoint.y} />`;
      })}
            </g>
            ${mode === "point" ? html`
              <line class="radar-point-line" x1=${center} y1=${center} x2=${pointPosition.x} y2=${pointPosition.y} />
              <circle class="radar-point-node" cx=${pointPosition.x} cy=${pointPosition.y} r="5" />
            ` : html`<polygon class="radar-fill" points=${polygon} />`}
          </svg>
          <div class="radar-axis-list">
            ${mode === "point" ? html`
              <span>Single node</span>
              <span>${RadarModel.describe(point.angle, axes)}: ${RadarModel.format(point.value)}</span>
            ` : axes.map((axis, index) => html`<span key=${`${axis}-${index}`}>${axis}: ${values[index]}</span>`)}
          </div>
        </div>
      `;
    }

    function HeadlinePreview({ field }) {
      const description = String(field.description || "").trim();
      const headline = new HeadlineModel(field);
      const title = headline.showLabel ? String(field.label || "").trim() : "";
      const hasCopy = Boolean(headline.showLabel || description);
      const titleNode = headline.showLabel ? html`<h1 class=${`headline-preview-title${title ? "" : " headline-preview-placeholder"}`} style=${headline.textStyle("headingHorizontalAlignment", "headingVerticalAlignment")}>${title || "Heading"}</h1>` : null;
      const descriptionNode = description ? html`<p class="headline-preview-subhead" style=${headline.textStyle("descriptionHorizontalAlignment", "descriptionVerticalAlignment")}>${description}</p>` : null;
      return html`
        <div class="headline-preview">
          ${hasCopy ? html`<div class="headline-copy">${titleNode}${descriptionNode}</div>` : null}
        </div>
      `;

    function CalendarPreview({ field }) {
      const calendar = new CalendarModel(field);
      const startTime = dateTime(calendar.startDate);
      const endTime = dateTime(calendar.endDate);
      const hasRange = startTime !== null && endTime !== null;
      const rangeStart = hasRange ? Math.min(startTime, endTime) : null;
      const rangeEnd = hasRange ? Math.max(startTime, endTime) : null;
      const monthDate = calendar.monthDate;
      const month = monthDate.getMonth();
      const milestones = calendar.visibleMilestones;

      return html`
        <div class=${`calendar-preview${calendar.outline ? "" : " is-unboxed"}`}>
          <div class="calendar-frame">
            <div class="calendar-preview-head">
              <div class="calendar-month-label">${monthLabel(monthDate)}</div>
            </div>
            <div class="calendar-weekdays" aria-hidden="true">
              ${["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"].map((day) => html`<div class="calendar-weekday" key=${day}>${day}</div>`)}
            </div>
            <div class="calendar-grid" aria-hidden="true">
            ${CalendarModel.gridDates(monthDate).map((date) => {
              const iso = isoFromDate(date);
              const time = date.getTime();
              const inRange = rangeStart !== null && rangeEnd !== null && time >= rangeStart && time <= rangeEnd;
              const isBoundary = iso === calendar.startDate || iso === calendar.endDate;
              const isRangeStart = inRange && (iso === calendar.startDate || date.getDay() === 0);
              const isRangeEnd = inRange && (iso === calendar.endDate || date.getDay() === 6);
              const isOutside = date.getMonth() !== month;
              const dayMilestones = calendar.milestonesForDate(iso);
              return html`<div class=${`calendar-day${isOutside ? " is-outside" : ""}${inRange ? " is-range" : ""}${isRangeStart ? " is-range-start" : ""}${isRangeEnd ? " is-range-end" : ""}${isBoundary ? " is-boundary" : ""}${dayMilestones.length ? " is-milestone" : ""}`} key=${iso}>
                <span class="calendar-day-number">${date.getDate()}</span>
                ${dayMilestones.length ? html`
                  <span class="calendar-milestone-popover" aria-hidden="true">
                    ${dayMilestones.map((item) => html`<span class="calendar-milestone-popover-line" key=${item.id || item.label || item.date}>${item.label || "Milestone"}</span>`)}
                  </span>
                ` : null}
              </div>`;
            })}
            </div>
          </div>
          <div class="calendar-properties">
            <div class="calendar-range-summary">
              <div class="calendar-property-row">
                <span>Start</span>
                <output class="calendar-property-value">${readableDate(calendar.startDate)}</output>
              </div>
              <div class="calendar-property-row">
                <span>End</span>
                <output class="calendar-property-value">${readableDate(calendar.endDate)}</output>
              </div>
            </div>
            ${calendar.allowMilestones ? html`
              <div class="calendar-milestone-list">
                <div class="calendar-property-heading">Milestones</div>
                ${milestones.length ? milestones.map((item) => html`
                  <div class="calendar-milestone-item" key=${item.id}>
                    <span class="calendar-milestone-date">${item.date ? readableDate(item.date) : "No date"}</span>
                    <span class="calendar-milestone-name">${item.label || "Milestone"}</span>
                  </div>
                `) : html`<div class="calendar-milestone-empty">No milestones yet.</div>`}
              </div>
            ` : null}
          </div>
        </div>
      `;
    }

    function useLatestRef(value) {
      const ref = useRef(value);
      ref.current = value;
      return ref;
    }

    function useEventListener(target, type, handler, active = true) {
      const handlerRef = useLatestRef(handler);
      useEffect(() => {
        if (!active) return undefined;
        const node = typeof target === "function" ? target() : target?.current || target;
        if (!node?.addEventListener) return undefined;
        const listener = (event) => handlerRef.current(event);
        node.addEventListener(type, listener);
        return () => node.removeEventListener(type, listener);
      }, [target, type, active]);
    }

    function IroColorPicker({ color, onChange, width = 220 }) {
      const mountRef = useRef(null);
      const pickerRef = useRef(null);
      const changeRef = useLatestRef(onChange);

      useEffect(() => {
        if (!mountRef.current || !window.iro) return;
        mountRef.current.innerHTML = "";
        const picker = new window.iro.ColorPicker(mountRef.current, {
          width,
          color,
          borderWidth: 1,
          borderColor: "#4a4d50"
        });
        picker.on("input:change", (picked) => {
          changeRef.current(picked.hexString);
        });
        pickerRef.current = picker;
        return () => {
          if (mountRef.current) mountRef.current.innerHTML = "";
          pickerRef.current = null;
        };
      }, []);

      useEffect(() => {
        if (!pickerRef.current) return;
        const next = hexColor(color);
        if (pickerRef.current.color.hexString.toLowerCase() !== next.toLowerCase()) {
          pickerRef.current.color.hexString = next;
        }
      }, [color]);

      if (!window.iro) {
        return html`<div class="theme-picker-unavailable">Color picker unavailable. Use the color fields below.</div>`;
      }

      return html`<div class="theme-color-picker-ui" style=${`width: ${width}px; min-height: ${width}px;`} ref=${mountRef}></div>`;
    }

    function useEscapeKey(onEscape) {

    function useColorDraft(color) {
      const [hexDraft, setHexDraft] = useState(color);
      const [rgbDraft, setRgbDraft] = useState(hexToRgb(color));

      useEffect(() => {
        setHexDraft(color);
        setRgbDraft(hexToRgb(color));
      }, [color]);

      return { hexDraft, setHexDraft, rgbDraft, setRgbDraft };
    }

    function ModalShell({ title, subtitle, ariaLabel, className = "", bodyClassName = "", body, onClose, onDefault, onDone, defaultLabel = "Use default", doneLabel = "Done" }) {

    function ColorChannelInputs({ idPrefix, color, hexDraft, rgbDraft, onHexDraft, onRgbDraft, onColor }) {
      function applyHex(raw) {
        onHexDraft(raw);
        const next = hexCandidate(raw);
        if (next) onColor(next);
      }

      function updateRgb(channel, raw) {
        const next = { ...rgbDraft, [channel]: raw };
        onRgbDraft(next);
        const r = clampByte(next.r);
        const g = clampByte(next.g);
        const b = clampByte(next.b);
        if (r === null || g === null || b === null) return;
        onColor(rgbToHex(r, g, b));

    function FontFamilySearch({ value, onChange, sampleText }) {
      const [query, setQuery] = useState("");
      const [catalog, setCatalog] = useState([]);
      const [catalogState, setCatalogState] = useState("idle");
      const current = fontOptionByFamily(value);
      const cleanQuery = query.trim().toLowerCase();
      const hasSearch = cleanQuery.length > 0;
      const matchingFonts = useMemo(() => {
        if (!hasSearch) return [current];
        const matches = catalog.filter((font) => font.family.toLowerCase().includes(cleanQuery));
        const systemMatch = SYSTEM_FONT_OPTION.family.toLowerCase().includes(cleanQuery);
        const options = systemMatch ? [SYSTEM_FONT_OPTION, ...matches] : matches;
        return options.slice(0, GOOGLE_FONT_PREVIEW_LIMIT);
      }, [catalog, hasSearch, cleanQuery, current.stack]);

      useEffect(() => {
        if (!hasSearch) {
          setCatalogState("idle");
          return undefined;
        }
        if (catalog.length) {
          setCatalogState("ready");
          return undefined;
        }
        let cancelled = false;
        setCatalogState("loading");
        fetchGoogleFontCatalog()
          .then((items) => {
            if (cancelled) return;
            setCatalog(items);
            setCatalogState(items.length ? "ready" : "error");
          })
          .catch((error) => {
            console.warn(error);
            if (!cancelled) setCatalogState("error");
          });
        return () => {
          cancelled = true;
        };
      }, [catalog.length, hasSearch]);

      useEffect(() => {
        matchingFonts.forEach((font) => {
          const stack = font.stack || (font.system ? font.stack : googleFontStack(font.family, font.category));
          ensureGoogleFontLoaded(stack);
        });
      }, [matchingFonts]);

      return html`
        <div class="font-search-wrap">
          <label class="sr-only" for="characterFontSearch">Search fonts</label>
          <input id="characterFontSearch" value=${query} placeholder="Search Google Fonts" onInput=${(event) => setQuery(event.currentTarget.value)} />

        <div class="font-option-list compact">
          ${matchingFonts.length ? matchingFonts.map((font) => {
            const stack = font.stack || (font.system ? font.stack : googleFontStack(font.family, font.category));
            const family = font.name || font.family;
            const selected = stack === current.stack;
            return html`
              <button
                class=${`font-option-card${selected ? " selected" : ""}`}

                key=${stack}
                style=${`font-family: ${stack};`}
                onClick=${() => onChange(stack)}

                  <span class="font-option-title">${family}</span>
                  ${selected ? html`<span class="font-option-status">Selected</span>` : null}
                </span>
                <span class="font-option-sample">${sampleText}</span>
              </button>
            `;
          }) : html`<div class="font-option-empty">${catalogState === "loading" ? "Loading fonts..." : catalogState === "error" ? "Font catalog unavailable." : "No matching fonts."}</div>`}
        </div>
      `;
    }
